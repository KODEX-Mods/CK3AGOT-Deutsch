 building_type_agot_tower_of_joy_01:0 "Turm der Freude"
 building_type_agot_tower_of_joy_01_desc:0 "Der Turm der Freude ist ein kleiner Turm im Fürstenpass, der einigen der größten Persönlichkeiten des Reiches als privater Zufluchtsort diente."
 building_agot_tower_of_joy_01:0 "$building_type_agot_tower_of_joy_01$"
 building_agot_tower_of_joy_01_desc:0 "$building_type_agot_tower_of_joy_01_desc$"

 building_type_agot_the_water_gardens_01:0 "Die Wassergärten"
 building_type_agot_the_water_gardens_01_desc:0 "Die Wassergärten wurden von Fürst Moran für seine Braut, Prinzessin Daenerys, erbaut und sind ein Juwel in der Wüste von Dorne geworden.  Die aus rosafarbenem Marmor errichteten Wassergärten dienen seit ihrer Errichtung als privater Rückzugsort für die Fürsten von Dorne."
 building_agot_the_water_gardens_01:0 "$building_type_agot_the_water_gardens_01$"
 building_agot_the_water_gardens_01_desc:0 "$building_type_agot_the_water_gardens_01_desc$"

 building_type_agot_ghaston_grey_01:0 "Grässlichgrau"
 building_type_agot_ghaston_grey_01_desc:0 "Grässlichgrau ist das Inselgefängnis von Dorne. Es befindet sich im Dornischen Meer und ist der Schrecken eines jeden, der von den Dornischen gefangen wird."
 building_agot_ghaston_grey_01:0 "$building_type_agot_ghaston_grey_01$"
 building_agot_ghaston_grey_01_desc:0 "$building_type_agot_ghaston_grey_01_desc$"

 building_type_agot_the_shadow_city_01:0 "Schattenstadt"
 building_type_agot_the_shadow_city_01_desc:0 "Die drei Mauern von Sonnenspeer bilden ein Labyrinth aus Gassen und Straßen, das die Angreifer nur verwirren kann. Die drei Mauern haben nur eine Reihe von Toren, die sich direkt aneinanderreihen, das Dreifache Tor, das als Trichter und Todesfalle dient."
 building_agot_the_shadow_city_01:0 "Das Dreifache Tor"
 building_agot_the_shadow_city_01_desc:0 "$building_type_agot_the_shadow_city_01_desc$"

 building_type_agot_starfall_01:0 "Sternfall"
 building_type_agot_starfall_01_desc:0 "Eine uralte Burg, die eines der ältesten Häuser beherbergt, wurde an der Stelle erbaut, an der das Schwert Dämmerung vom Himmel stürzte."
 building_agot_starfall_01:0 "Blaustein-Schwert"
 building_agot_starfall_01_desc:0 "Der berühmte Turm, der nach dem Schwert Dämmerung des Hauses Dayn benannt ist, ist hoch und gibt Sternfall einen starken Überblick über die umliegenden Gebiete. Es hat sich jedoch als zweischneidiges Schwert erwiesen, da die Mitglieder in ihrer Verzweiflung von der Höhe springen."

 building_type_agot_vultures_roost_01:0 "Geiernest"
 building_type_agot_vultures_roost_01_desc:0 "Als berüchtigte Heimat des Geierkönigs hat sich Geiernest das Ansehen der Lords der Marschen aus der Weite und den Sturmlanden erworben."
 building_agot_vultures_roost_01:0 "Sitz des Geierkönigs"
 building_agot_vultures_roost_01_desc:0 "Von hier aus haben die zahlreichen Geierkönige die Dornischen Marschen terrorisiert, und von hier aus konnte sich ein weiterer erheben."

 building_type_agot_skyreach_01:0 "Himmelshöh"
 building_type_agot_skyreach_01_desc:0 "Himmelshöh, die einstige Heimat der Könige von Stein und Himmel, hat den Weiten Weg beherrscht, der heute als Fürstenpass bekannt ist."
 building_agot_skyreach_01:0 "Die hohen Türme"
 building_agot_skyreach_01_desc:0 "Himmelshöh ist berühmt für die Überwachung des Weiten Weges, mit seinen geschnitzten Mauern und hoch aufragenden Türmen. Keinem Feind ist es bisher gelungen, sich an dieser gewaltigen Burg vorbeizuschleichen."

 building_type_agot_raventree_hall_01:0 "Rabenbaum"
 building_type_agot_raventree_hall_01_desc:0 "Im Herzen von Rabenbaum steht ein großer, längst abgestorbener Wehrholzbaum, der vor langer Zeit von den Brackens vergiftet worden sein soll. Er ist die Heimat eines großen Rabenschwarms, der dem Schloss seinen Namen gibt."
 building_agot_raventree_hall_01:0 "Großer toter Wehrholzbaum"
 building_agot_raventree_hall_01_desc:0 "$building_type_agot_raventree_hall_01_desc$"

 building_type_agot_inn_at_the_crossroads_01:0 "Gasthaus am Kreuzweg"
 building_type_agot_inn_at_the_crossroads_01_desc:0 "Das kleine Gasthaus liegt nördlich des Trident und befindet sich an der Kreuzung des Königswegs, der Bergstraße und der Flussstraße. Es hat den Beginn und das Ende einiger der größten Ereignisse des Kontinents gesehen."
 building_agot_inn_at_the_crossroads_01:0 "$building_type_agot_inn_at_the_crossroads_01$"
 building_agot_inn_at_the_crossroads_01_desc:0 "$building_type_agot_inn_at_the_crossroads_01_desc$"

 building_type_agot_high_heart_01:0 "Hochherz"
 building_type_agot_high_heart_01_desc:0 "Auf Hochherz steht ein großer Hain von Wehrholzbäumen, die größte Ansammlung von Bäumen südlich der Eng außerhalb der Insel der Gesichter."
 building_agot_high_heart_01:0 "Hain von Hochherz"
 building_agot_high_heart_01_desc:0 "Auf Hochherz steht ein großer Hain von Wehrholzbäumen, die größte Ansammlung von Bäumen südlich der Eng außerhalb der Insel der Gesichter."
 building_agot_high_heart_02:0 "Der abgeholzte Hain"
 building_agot_high_heart_02_desc:0 "Als die Andalen Hochherz eroberten, fällten sie alle Dämonenbäume und beendeten damit den Einfluss der alten Götter in den Flusslanden."

 building_type_agot_seagard_01:0 "Seegart"
 building_type_agot_seagard_01_desc:0 "Seegart hat den Eisenmännern und ihren Angriffen seit Jahrtausenden getrotzt. Zu diesem Zweck wurde der Dröhnende Turm gebaut. Sein Klang ist meilenweit zu hören."
 building_agot_seagard_01:0 "Der Dröhnende Turm"
 building_agot_seagard_01_desc:0 "$building_type_agot_seagard_01_desc$"

 building_type_agot_maidenpool_01:0 "Jungfernteich"
 building_type_agot_maidenpool_01_desc:0 "Jungfernteich war die Heimat der berühmten Jungfer Jonquil und ihres Helden Florian des Narren. Aus diesem Grund sind Pilger aus ganz Westeros hierher gekommen."
 building_agot_maidenpool_01:0 "Jonquils Teich"
 building_agot_maidenpool_01_desc:0 "$building_type_agot_maidenpool_01_desc$"

 building_type_agot_oldstones_01:0 "Altsteinen"
 building_type_agot_oldstones_01_desc:0 "Die Ruinen der Burg der Schlammkönige sind noch erhalten. Sie sind alt und manche sagen, dass es dort spukt."
 building_agot_oldstones_01:0 "Ruinen von Altsteinen"
 building_agot_oldstones_01_desc:0 "$building_type_agot_oldstones_01_desc$"
 building_agot_oldstones_02:0 "Burg der Goldenen Krone"
 building_agot_oldstones_02_desc:0 "Die wiederaufgebaute Burg von Altstein, erneut ein Leuchtfeuer der Macht der Flusslande, ihre Mauern stehen hoch und stolz."

 building_type_agot_banefort_01:0 "Bannstein"
 building_type_agot_banefort_01_desc:0 "Bannstein, Heimat des alten Vermummten Königs und seiner Nekromanten-Sippe, kämpft seit Jahrhunderten gegen die Eisenmänner."
 building_agot_banefort_01:0 "Bergfried des Vermummten Königs"
 building_agot_banefort_01_desc:0 "$building_type_agot_banefort_01_desc$"

 building_type_agot_castamere_01:0 "Castamaer"
 building_type_agot_castamere_01_desc:0 "Castamaer mag wie eine unbedeutende Burg aussehen, aber die Regns haben sich tief unter der Erde ausgebreitet. Unter der Erde erstrecken sich die Minen weit und kräftig."
 building_agot_castamere_01:0 "Die Minen von Castamaer"
 building_agot_castamere_01_desc:0 "Castamaer mag wie eine unbedeutende Burg aussehen, aber die Regns haben sich tief unter der Erde ausgebreitet. Unter der Erde erstrecken sich die Minen weit und kräftig."
 building_agot_castamere_02:0 "Die gefluteten Minen"
 building_agot_castamere_02_desc:0 "Als sich die Regns und Tarbecks auflehnten, fanden sie in Tywin Lennister einen ebenbürtigen Gegner, der kein Erbarmen zeigte, als er die Minen überflutete und die Regns nach Castamaer brachte."
 building_agot_castamere_03:0 "Wiederhergestellten Minen von Castamaer"
 building_agot_castamere_03_desc:0 "Die Minen von Castamaer, die nun freigelegt sind, stehen nach dem Stein noch einmal an zweiter Stelle. Ihre großen Stollen verlaufen tief unter der Erde."

 building_type_agot_griffins_roost_01:0 "Greifenhorst"
 building_type_agot_griffins_roost_01_desc:0 "Greifenhorst liegt am westlichen Rand der Sturmbucht, wobei die Süd-, Ost- und Nordseite der Burg von Wasser umgeben sind. Die Westseite ist zugänglich, obwohl sie durch ein Tor geschützt ist, das zu einem schmalen Kamm führt, der Greifenkehle genannt wird und den einzigen Weg zur Burg darstellt."
 building_agot_griffins_roost_01:0 "Greifenkehle"
 building_agot_griffins_roost_01_desc:0 "Greifenhorst liegt am westlichen Rand der Sturmbucht, wobei die Süd-, Ost- und Nordseite der Burg von Wasser umgeben sind. Die Westseite ist zugänglich, obwohl sie durch ein Tor geschützt ist, das zu einem schmalen Kamm führt, der Greifenkehle genannt wird und den einzigen Weg zur Burg darstellt."

 building_type_agot_blackhaven_01:0 "Schwarzburg"
 building_type_agot_blackhaven_01_desc:0 "Als eine der alten Festungen der Lords der Marschen hat Schwarzburg lange Zeit die Dornischen und ihre Plünderer abgewehrt."
 building_agot_blackhaven_01:0 "Grenzenloser Burggraben"
 building_agot_blackhaven_01_desc:0 "Schwarzburg ist seit langem eine der Hochburgen der Lords der Marschen, gut geschützt durch den großen, tiefen Graben, in dem unzählige Überreste der Dornischen Räuber liegen."

 building_type_agot_stonehelm_01:0 "Steinhelm"
 building_type_agot_stonehelm_01_desc:0 "Steinhelm, eine der alten Festungen der Lords der Marschen, hat lange Zeit die Dornischen und ihre Plünderer abgewehrt."
 building_agot_stonehelm_01:0 "Wände in Schwarz und Weiß"
 building_agot_stonehelm_01_desc:0 "Steinhelm ist seit langem eine der Hochburgen der Lords der Marschen, die durch ihre markanten Mauern aus schwarzem und weißem Stein gut geschützt ist und schon unzähligen dornischen Plünderern das Ende bereitet hat."

 building_type_agot_nightsong_01:0 "Nachtlied"
 building_type_agot_nightsong_01_desc:0 "Nachtlied, eine der alten Festungen von den Lords der Marschen, hat lange Zeit die Dornischen und ihre Plünderer abgewehrt."
 building_agot_nightsong_01:0 "Die singenden Türme"
 building_agot_nightsong_01_desc:0 "Nachtlied ist seit langem eine der Hochburgen unter den Lords der Marschen, gut geschützt durch ihre berühmten Singenden Türme, die schon unzählige dornische Angreifer abgewehrt haben."

 building_type_agot_morne_01:0 "Morne"
 building_type_agot_morne_01_desc:0 "Morne, der Sitz der Könige von Tarth, ist ein Leuchtfeuer für alle Andalen und für die Reichtümer und Wunder der Sonnenuntergangskönigreiche."
 building_agot_morne_01:0 "Königlicher Sitz von Morne"
 building_agot_morne_01_desc:0 "$building_type_agot_morne_01_desc$"
 building_agot_morne_02:0 "Ruinen der Saphirinsel"
 building_agot_morne_02_desc:0 "Morne, der einstige Königssitz der Saphirinsel, liegt für alle sichtbar in Trümmern. Diese Ruinen zeugen von einer mächtigen Vergangenheit, als die Abendsterne noch selbst Könige waren."
 building_agot_morne_03:0 "Sitz von Morne wiederaufgebaut"
 building_agot_morne_03_desc:0 "Morne wurde wieder aufgebaut und erstrahlt in einem neuen Glanz. Dies ist ein Zeichen für eine große Zukunft für die Saphirinsel und ihre Bewohner."

 building_type_agot_evenfall_hall_01:0 "Dämmerhall"
 building_type_agot_evenfall_hall_01_desc:0 "Dämmerhall, die Heimat des Hauses Tarth, ist das pulsierende Herz der Saphirinsel."
 building_agot_evenfall_hall_01:0 "$building_type_agot_evenfall_hall_01$"
 building_agot_evenfall_hall_01_desc:0 "$building_type_agot_evenfall_hall_01_desc$"

 building_type_agot_summerhall_01:0 "Sommerhall"
 building_type_agot_summerhall_01_desc:0 "Der Sommerpalast der Targaryens, Sommerhall, diente gelegentlich als Sitz für die jüngeren Söhne oder Brüder des herrschenden Königs."
 building_agot_summerhall_01:0 "Königlicher Palast"
 building_agot_summerhall_01_desc:0 "$building_type_agot_summerhall_01_desc$"
 building_agot_summerhall_02:0 "Ruinen von Sommerhall"
 building_agot_summerhall_02_desc:0 "Sommerhall wurde in einer Nacht des Wahnsinns ruiniert, in der nicht nur die Burg zerstört, sondern auch ein König und fast die gesamte königliche Familie getötet wurden, und ist heute ein Ort der stillen Verzweiflung."
 building_agot_summerhall_03:0 "Wohnsitz des Prinzen"
 building_agot_summerhall_03_desc:0 "Wiederbelebt und wiederaufgebaut, ist Sommerhall wieder ein Palast inmitten der Dornischen Marschen."

 building_type_agot_barrow_keep_01:0 "Der Große Hügelgrab"
 building_type_agot_barrow_keep_01_desc:0 "Unter der Hügelhall befindet sich der Große Hügelgrab, von dem man sagt, er sei die Heimat des ersten Königs oder eines Königs der Riesen."
 building_agot_barrow_keep_01:0 "$building_type_agot_barrow_keep_01$"
 building_agot_barrow_keep_01_desc:0 "$building_type_agot_barrow_keep_01_desc$"

 building_type_agot_white_harbor_01:0 "Die Wintermünze"
 building_type_agot_white_harbor_01_desc:0 "Als die Manderlys in den Norden kamen, brachten sie ihren Reichtum mit, der dazu beitrug, den Norden nach einem Jahrtausend währenden Krieg mit den Falkenkönigen aus dem Tal und den Bergen neu zu beleben. Dazu trug auch die große Münzstätte des Nordens bei, die sich dort befand."
 building_agot_white_harbor_01:0 "$building_type_agot_white_harbor_01$"
 building_agot_white_harbor_01_desc:0 "$building_type_agot_white_harbor_01_desc$"
 building_agot_white_harbor_02:0 "Die Alte Münze"
 building_agot_white_harbor_02_desc:0 "Als Torrhen sich vor den Drachen niederkniete, wurde unter anderem vereinbart, dass die Münzstätte in Weißwasserhafen geschlossen wird, obwohl das Gebäude erhalten bleibt, falls ein unabhängiger Norden es jemals wieder benötigt."
 building_agot_white_harbor_03:0 "Die Münze des Nordens"
 building_agot_white_harbor_03_desc:0 "Jetzt, da der Norden frei ist, ist die Münzstätte des Nordens wieder in Betrieb und stellt die Münzen des alten Königreichs her."

 building_type_agot_sept_of_the_snows_01:0 "Schneesepte"
 building_type_agot_sept_of_the_snows_01_desc:0 "Als die Manderlys in den Norden kamen, wurde ihnen dort Sicherheit garantiert, und um ihren Glauben zu symbolisieren, errichteten sie die Schneesepte."
 building_agot_sept_of_the_snows_01:0 "$building_type_agot_sept_of_the_snows_01$"
 building_agot_sept_of_the_snows_01_desc:0 "$building_type_agot_sept_of_the_snows_01_desc$"

 building_type_agot_wolfs_den_01:0 "Der Wolfsbau"
 building_type_agot_wolfs_den_01_desc:0 "Der Wolfsbau wurde von Jon Stark errichtet, um die Weißklinge vor Plünderern und Sklavenhändlern zu schützen, und ist ein furchteinflößender Anblick für jede potenzielle Bedrohung."
 building_agot_wolfs_den_01:0 "Hüter der Weißklinge"
 building_agot_wolfs_den_01_desc:0 "$building_type_agot_wolfs_den_01_desc$"
 building_agot_wolfs_den_02:0 "Der Kerker des Wassermanns"
 building_agot_wolfs_den_02_desc:0 "Als die Manderlys nach Norden kamen und das Neue Schloss bauten, verfiel der Wolfsbau und wurde zum Gefängnis für Weißwasserhafen."
 building_agot_wolfs_den_03:0 "Der Bau"
 building_agot_wolfs_den_03_desc:0 "Der Wolfsbau wurde wiederhergestellt und ausgebaut und bietet nun wieder einen beeindruckenden Anblick."

 building_type_agot_new_castle_01:0 "Die neue Burg"
 building_type_agot_new_castle_01_desc:0 "Als die Manderlys in den Norden kamen, bauten sie die Neue Burg als Duplikat ihrer verlorenen Burg Braunsteinburg unten in der Weite. Sie steht in krassem Gegensatz zu den Burgen des Nordens, wie Winterfell und dem Wolfsbau."
 building_agot_new_castle_01:0 "$building_type_agot_new_castle_01$"
 building_agot_new_castle_01_desc:0 "$building_type_agot_new_castle_01_desc$"

 building_type_agot_dreadfort_01:0 "Grauenstein"
 building_type_agot_dreadfort_01_desc:0 "In der alten Festung der Roten Könige befindet sich die Verborgene Vitrine, in der die Boltons die berüchtigtsten und geheimen Trophäen aufbewahrten."
 building_agot_dreadfort_01:0 "Die verborgene Vitrine"
 building_agot_dreadfort_01_desc:0 "$building_type_agot_dreadfort_01_desc$"

 building_type_agot_karhold_01:0 "Karholt"
 building_type_agot_karhold_01_desc:0 "Der Sitz von Haus Karholt."
 building_agot_karhold_01:0 "Die Graue Motte"
 building_agot_karhold_01_desc:0 "Karholt war schon vor der Übernahme durch Karlon Stark eine starke Festung, die auf zwei Hügeln gelegen war und der Burg eine beeindruckende natürliche Burgmauer und Verteidigungsanlagen verlieh."

 building_type_agot_warg_king_01:0 "Die Burg des Warg-Königs"
 building_type_agot_warg_king_01_desc:0 "Die alte Festung des Warg-Königs, eines der alten Rivalen der Könige des Winters."
 building_agot_warg_king_01:0 "Ruinen der Burg des Warg-Königs"
 building_agot_warg_king_01_desc:0 "An der Spitze des Seedrachenhorns liegen noch immer die uralten Überreste der Burg des Warg-Königs, die als eine der ersten von den Königen des Winters bezwungen wurde, und viele glauben, dass es in den Ruinen bis zum heutigen Tag spukt."
 building_agot_warg_king_02:0 "Die wiederaufgebaute Burg des Warg-Königs"
 building_agot_warg_king_02_desc:0 "Die aus den Ruinen wiederaufgebaute Burg des Warg-Königs ist wieder eine beeindruckende Festung. Sie wurde zwar schon einmal zerstört, aber größer als je zuvor wiederaufgebaut."

 building_type_agot_oldtown_walls_01:0 "Mauern von Altsass"
 building_type_agot_oldtown_walls_01_desc:0 "Die großen Steinmauern von Altsass stehen empor und haben die Stadt immer geschützt, bevor die Hohenturms dem Haus Gärtner die Treue schworen."
 building_agot_oldtown_walls_01:0 "Mauern von Otho II."
 building_agot_oldtown_walls_01_desc:0 "Raised by Otho II, the massive stone walls were built after the city was sacked three times in a century; first by Samwell Starfire Dayne, second by Whored the Cruel of the Ironmen, and lastly by Gykes the Woe Gardener."

 building_type_agot_goldengrove_01:0 "Goldengrove"
 building_type_agot_goldengrove_01_desc:0 "Home of House Rowan, who trace their descent from Rowan Gold-hair."
 building_agot_goldengrove_01:0 "Snag of Rowan"
 building_agot_goldengrove_01_desc:0 "The ancient tree that was said to have bared golden apples still stands, long dead, and yet impressive all the same."

 building_type_agot_bitterbridge_01:0 "The Bridge"
 building_type_agot_bitterbridge_01_desc:0 "The ancient bridge of House Caswell that spans the Mander."
 building_agot_bitterbridge_01:0 "The Stonebridge"
 building_agot_bitterbridge_01_desc:0 "The Stonebridge of House Caswell has long been an economic focal point, being the main way to cross the Mander if one does not wish to use boats."
 building_agot_bitterbridge_02:0 "Bitterbridge"
 building_agot_bitterbridge_02_desc:0 "In the Faith Militant Uprising, the Battle of Stonebridge was so terrible that the Mander ran red with Blood, and the enmities created that day caused all who fought there to refer to the bridge by a new name; the Bitterbridge."

 building_type_agot_red_lake_01:0 "Red Lake"
 building_type_agot_red_lake_01_desc:0 "The home of House Crane in the Northern Reach."
 building_agot_red_lake_01:0 "Remains of the Giants of the Reach"
 building_agot_red_lake_01_desc:0 "The ancient bones of the last of the Giants of the Reach, can still be seen along the shore of the Red Lake. It was here that Brandon of the Bloody Blade put them to the sword."

 building_type_agot_grafton_keep_01:0 "Grafton's Holdfast"
 building_type_agot_grafton_keep_01_desc:0 "When the Grafton's first came to Westeros they entered the service of the Shett Kings of Gulltown. The Shetts tried to tie the Grafton's through a double marriage. This was their downfall as both the father and son were imprisoned until their Grafton wives were pregnant, then they disappeared."
 building_agot_grafton_keep_01:0 "$building_type_agot_grafton_keep_01$"
 building_agot_grafton_keep_01_desc:0 "$building_type_agot_grafton_keep_01_desc$"

 building_type_agot_gulltown_01:0 "Gulltown"
 building_type_agot_gulltown_01_desc:0 "The third city of Westeros, and the second smallest, Gulltown is the major port of the Vale and has been since before the coming of the Andals."
 building_agot_gulltown_01:0 "Motherhouse of Maris"
 building_agot_gulltown_01_desc:0 "The Motherhouse of Maris was started by one of the Seven Spearks, Mother Maris. From here she taught many orphans and bastard daughters, and saw the death of Lady Jeyne Arryn."

 building_type_agot_runestone_01:0 "Runestone"
 building_type_agot_runestone_01_desc:0 "The ancient home of House Royce, Runestone has seen fighting since before the coming of the Andals, and well after it."
 building_agot_runestone_01:0 "The Bronze Gate"
 building_agot_runestone_01_desc:0 "The fortress of the once Bronze Kings is guarded by a great gate with bronze adornments with ancient runes carved in the stones that make up the gatehouse."

 building_type_agot_sisterton_01:0 "Sisterton"
 building_type_agot_sisterton_01_desc:0 "The chief town of the Three Sisters, Sisterton is the closest thing to a major port on the islands."
 building_agot_sisterton_01:0 "The Night Lamp"
 building_agot_sisterton_01_desc:0 "The ancient beacon of the Three Sisters, the Night Lamp is a black tower which guides sailors to harbor when lit, and ships to doom when not."

 building_type_agot_hoare_castle_01:0 "Hoare Castle"
 building_type_agot_hoare_castle_01_desc:0 "The ancient castle once belonging to House Hoare located on Great Wyk, this was not their ancestral hall, but rather their second home on the isles."
 building_agot_hoare_castle_01:0 "Harmund's Cell"
 building_agot_hoare_castle_01_desc:0 "When Harmund Hoare forsook the Drowned God the Shrike rose the Ironborn in rebellion and exacted a terrible toll on the once king, cutting out his tongue, nose, and eyes."

 building_type_agot_dragonmont_01:0 "Dragonmont"
 building_type_agot_dragonmont_01_desc:0 "Dragonmont is the great volcano that dominates the island of Dragonstone. In days of old many dragons would flock to nest in the heated caverns or freshly cooled rock formations."
 building_agot_dragonmont_01:0 "Dragonmont"
 building_agot_dragonmont_01_desc:0 "Dragonmont is the great volcano that dominates the island of Dragonstone. In days of old many dragons would flock to nest in the heated caverns or freshly cooled rock formations."

 building_type_agot_spicetown_01:0 "Spicetown"
 building_type_agot_spicetown_01_desc:0 "Once the heart of Driftmark, Spicetown was second to only King's Landing as the chief port of the Blackwater Bay."
 building_agot_spicetown_01:0 "Port of the Sea Snake"
 building_agot_spicetown_01_desc:0 "Under Corlys Velaryon the port of Spicetown came to surpass Duskendale and all other ports of Blackwater Bay, baring King's Landing. Ships from all across Westeros, the Free Cities, and even the Jade Gates can be found there."
 building_agot_spicetown_02:0 "Ruins of Spicetown"
 building_agot_spicetown_02_desc:0 "During the Dance, the Triarchy, old enemies of Corlys, sacked the port and nearby High Tide on behalf of the greens; Spicetown has laid in ruin ever since."
 building_agot_spicetown_03:0 "The Restored Port"
 building_agot_spicetown_03_desc:0 "Built once again to its former greatness, Spicetown is once again the great port of Driftmark."

 building_type_agot_hardhome_01:0 "Hardhome"
 building_type_agot_hardhome_01_desc:0 "The only place that could be considered a town Beyond-the-Wall is Hardhome."
 building_agot_hardhome_01:0 "City of the Three Chiefs"
 building_agot_hardhome_01_desc:0 "Hardhome is a tenous thing, being home to the Freefolk any sort of ordered government is only as strong as the would be enforcers, and that is currently the three chiefs who rule different parts of the city."
 building_agot_hardhome_02:0 "Ruins of the Hardhome"
 building_agot_hardhome_02_desc:0 "Hardhome has been abandoned for sometime, and is said to be the haunt of ghouls, demons, and darker things."
 building_agot_hardhome_03:0 "City of the True North"
 building_agot_hardhome_03_desc:0 "Resettled and restored, Hardhome is now a flourishing town and the heart of the True North."

 building_type_agot_azure_palace_01:0 "Azure Dynasty Imperial Palace Complex"
 building_type_agot_azure_palace_01_desc:0 "The Imperial Palace of the Azure Dynasty. The Palace was constructed by the Azure Emperors to display their prestige and patronage of the arts."
 building_agot_azure_palace_01:0 "Palace of Heavenly Stones"
 building_agot_azure_palace_01_desc:0 "Constructed by the first Azure Emperor, the Palace of Heavenly Stones is a beautfil palace with many pieces of art depicting the skies and all contained there."
 building_agot_azure_palace_02:0 "Palace of Endless Stars"
 building_agot_azure_palace_02_desc:0 "The Imperial Palace of the twelfth Azure Emperor, being larger and grander then the older Palace of Heavenly Stones."

 building_type_agot_grey_palace_01:0 "Grey Dynstay Imperial Palace Complex"
 building_type_agot_grey_palace_01_desc:0 "The Imperial Palace of the Grey Emperors, began construction during the reign of Har Loi, but finished by his successors. The Palace is one of the more martial palaces built in the empire’s history."
 building_agot_grey_palace_01:0 "Palace of the Hanging Sword"
 building_agot_grey_palace_01_desc:0 "Built by the third Grey Emperor, the Palace of the Hanging Sword is more fortress than palace, having a commanding presence."
 building_agot_grey_palace_02:0 "Palace of Shadowy Justice"
 building_agot_grey_palace_02_desc:0 "The Palace of Shadowy Justice was built by the last of the Grey Emperors and now functions as the home of the Imperial Minister of Justice and serves as the penultimate voice on law in the empire."

 building_type_agot_indigo_palace_01:0 "Indigo Dynstay Imperial Palace Complex"
 building_type_agot_indigo_palace_01_desc:0 "The Imperial Palace of the Indigo Emperors."
 building_agot_indigo_palace_01:0 "Palace of Black Roses"
 building_agot_indigo_palace_01_desc:0 "The Imperial Palace of the Indigo Emperors, completed by Emperor Choq Choq to house his hundred wives."

 building_type_agot_pearl_white_palace_01:0 "Pearl-White Dynstay Imperial Palace Complex"
 building_type_agot_pearl_white_palace_01_desc:0 "The Imperial Palace of the Pearl-White Emperors, whose most famous leaders were the Nine Eunuchs, who gave the Golden Empire 130 years of peace. It was under the Pearl-White Emperors that the great stone roads, greater than any in the world save the dragonroads of Valyria."
 building_agot_pearl_white_palace_01:0 "Palace of the Coiling Serpent"
 building_agot_pearl_white_palace_01_desc:0 "Constructed by the sixth Pearl-White Emperor, and the first of the Nine Eunuchs, the Palace of the Coiling Serpent, lies near the center of Yin and is at the heart of the great road network which the Nine would expland across the Golden Empire."

 building_type_agot_purple_palace_01:0 "Purple Dynstay Imperial Palace Complex"
 building_type_agot_purple_palace_01_desc:0 "The Imperial Palace of the Purple Emperors is one of the furthest northern imperial palaces in the empire."
 building_agot_purple_palace_01:0 "Palace of Pale Scythe"
 building_agot_purple_palace_01_desc:0 "Constructed by the first Indigo Emperor, the Palace of the Palce Scythe served as a strong foothold to protect the northern portions of the Empire."
 building_agot_purple_palace_02:0 "Palace of the Carmine Dragon"
 building_agot_purple_palace_02_desc:0 "The Palace of the Carmine Dragon was constructed as a grander more prominent Palace than the older Palace."
 building_agot_purple_palace_03:0 "Palace of the Amethyst Winds"
 building_agot_purple_palace_03_desc:0 "The Palace of the Amethyst Winds was built by the last of the Purple Emperors, who died with no heirs."

 building_type_agot_maroon_palace_01:0 "Maroon Dynstay Imperial Palace Complex"
 building_type_agot_maroon_palace_01_desc:0 "The Maroon Emperors built their palace in the eastern city of Jinqi to keep a better guard against reavers from the Shadowlands."
 building_agot_maroon_palace_01:0 "Palace of the Burning Winds"
 building_agot_maroon_palace_01_desc:0 "The Palace of the Burning Winds was long guarded the city of Jinqi from the terrors from the Shadow Lands."

 building_type_agot_scarlet_palace_01:0 "Scarlet Dynstay Imperial Palace Complex"
 building_type_agot_scarlet_palace_01_desc:0 "The Scarlet Emperors built their palace in the jungle city of Si Qo. When the city was lost to the jungle, so was this palace complex."
 building_agot_scarlet_palace_01:0 "Palace of the Bright Trees"
 building_agot_scarlet_palace_01_desc:0 "Built by the Scarlet Emperors with the city of Si Qo, the Palace of Bright Tree was the home of the heart of the empire through all forty three of their empire."

 building_type_agot_five_forts_01:0 "Walls of the Pearl Emperor"
 building_type_agot_five_forts_01_desc:0 "The Great Forts were raised by the Pearl Emperor to protect the realms of men from the demons of the Lion of Night. The walls of the forst stand a thousand feet tall, greater than even the Wall of Westeros."
 building_agot_five_forts_01:0 "$building_type_agot_five_forts_01$"
 building_agot_five_forts_01_desc:0 "$building_type_agot_five_forts_01_desc$"

