l_german:

 ### Wolf Den ###

 agot_colonization_events.1001.t: "[obstacle_province.GetNameNoTooltip]: Den Wölfen entgegentreten"
 agot_colonization_events.1001.desc: "Meine Kundschafter durchkämmen seit Tagen die [obstacle_province.Custom('TerrainTypeProvince')] von [obstacle_province.GetName].\n\nDie meisten kehrten mit leeren Händen zurück; manche kehrten gar nicht zurück. Schon frage ich mich, ob dieser bemunkelte Wolfsbau überhaupt existiert oder ob die angeblichen Wölfe, die diese Lande heimsuchen, Werk von Zauberei oder Teufelskunst sind.\n\nEndlich meldet sich mein letzter Kundschafter bei mir, die Kleidung zerfetzt und der Blick verstört.\n\n„My [ROOT.Char.GetLadyLord], ich habe ihn gefunden! Der Bau liegt wohlverborgen in den tiefsten Winkeln der [obstacle_province.Custom('TerrainTypeProvince')], und die Wölfe dort sind zahlreich und furchterregend.“"
 agot_colonization_events.1001.a: "Ich werde selbst mit ihnen abrechnen."
 agot_colonization_events.1001.a.duel_success: "Ihr bezwingt die Wölfe"
 agot_colonization_events.1001.a.duel_failure: "Ihr werdet von den Wölfen überwältigt"
 agot_colonization_events.1001.b: "Mein $knight_culture_player_no_tooltip_lowercase$, [knight.GetTitledFirstNameNoTooltip], wird leichtes Spiel mit ihnen haben."
 agot_colonization_events.1001.b.duel_success: "[knight.GetFirstNameNoTooltip] bezwingt die Wölfe"
 agot_colonization_events.1001.b.duel_failure: "[knight.GetFirstNameNoTooltip] wird von den Wölfen überwältigt"
 agot_colonization_events.1001.c: "[hooked_character.GetTitledFirstNameNoTooltip] schuldet mir einen Gefallen..."
 agot_colonization_events.1001.c.duel_success: "[hooked_character.GetFirstNameNoTooltip] bezwingt die Wölfe"
 agot_colonization_events.1001.c.duel_failure: "[hooked_character.GetFirstNameNoTooltip] wird von den Wölfen überwältigt"
 agot_colonization_events.1001.d: "Ich vertraue diese Aufgabe bezahlten Fachleuten an."
 agot_colonization_events.1001.e: "Vielleicht sollte ich die Wölfe vorerst in Ruhe lassen..."
 agot_colonization_events.1001.success.toast.t: "Wolfsbau beseitigt"
 agot_colonization_events.1001.failure.toast.t: "Wolfsbau besteht fort"

 agot_colonization_events.1002.t: "[obstacle_province.GetNameNoTooltip]: Umzingelt"
 agot_colonization_events.1002.desc: "Ich hatte gehofft, meine Siedlung in [obstacle_province.GetName] bis zum Einbruch der Nacht zu erreichen, doch wiederholte Verzögerungen ließen uns bei Dämmerung noch einige Meilen zurück. Im Zwielicht schlugen wir am Rand eines Hains aus starken Bäumen unser Lager auf und machten uns daran, ein Feuer zu entfachen. Trotz aller Entbehrung überkommt mich eine innere Ruhe, während ich die Schönheit des sternübersäten Himmels betrachte.\n\nPlötzlich höre ich ein Knurren. Jenseits des Feuers sehe ich ein Paar Augen. Ebenso plötzlich kommen zwei Dutzend weitere hinzu, und mir wird klar, dass wir umzingelt sind. Ein grausames Heulen fährt uns in die Ohren, und unser Fehler wird offenbar —  wir haben unser Lager neben einem Wolfsbau aufgeschlagen! Hier haust also der graue Schrecken, der unsere neue Siedlung seit ihrer Gründung heimsucht."
 agot_colonization_events.1002.a: "Zu mir! Lasst uns aus diesen Scheusalen Pelze machen!"
 agot_colonization_events.1002.b: "[knight.GetFirstNameNoTooltip], verteidigt uns vor diesen Bestien!"
 agot_colonization_events.1002.c: "Flieht, ihr Narren!"

  agot_colonization_events.1003.t: "[obstacle_province.GetNameNoTooltip]: Die Wolfsmutter"
 agot_colonization_events.1003.desc: "Nach monatelanger Suche wurde er endlich entdeckt — der große Wolfsbau von [obstacle_province.GetName]. Das Rudel war gewaltig und von unheimlicher Schläue, oftmals lauerte es Händlern auf, die unseren jungen Außenposten versorgen wollten, doch nun haben wir es umzingelt.\n\nBereits türmen sich zahlreiche Felle in unserem Lager, doch herrscht eine gewisse Beklommenheit ob des letzten Vorstoßes zur Zerstörung des Baus, denn das Rudel wird von einer gewaltigen Wölfin angeführt, beinahe so groß wie ein ein kleines Pferd, deren Schnauze vom Blut ihrer Beute purpurn gefärbt ist. Als wir uns nähern, wächst unsere Furcht, denn die Wölfin steht vor einem wimmelnden Haufen Welpen, und ihr Knurren und Zähnefletschen lassen keinen Zweifel daran, dass sie gewillt ist, ihre Jungen mit all ihrer Kraft und Wildheit zu verteidigen."
 agot_colonization_events.1003.a: "Nichts als eine räudige Töle! Ich werde sie mir selbst vorknöpfen!"
 agot_colonization_events.1003.a.duel_success: "Ihr erschlagt die Wölfin"
 agot_colonization_events.1003.a.duel_failure: "Es gelingt Euch nicht, die Wölfin zu töten"
 agot_colonization_events.1003.b: "Umzingelt sie! Gemeinsam werden wir sie niederstrecken!"
 agot_colonization_events.1003.b.duel_success: "Ihr treibt die Wölfin erfolgreich in die Enge"
 agot_colonization_events.1003.b.duel_failure: "Der Wölfin gelingt die Flucht"
 agot_colonization_events.1003.c: "Ähm, vielleicht kommen wir später wieder... irgendwann."

 agot_colonization_events.1004.t: "[obstacle_province.GetNameNoTooltip]: Wolfshunde"
 agot_colonization_events.1004.desc: "Bemerkenswerte Kunde erreicht mich aus [obstacle_province.GetName]. Die dortigen Siedler haben zahlreiche Haushunde in ihre Lande gebracht, die als treue und zuverlässige Wächter von Vieh und Heim dienen. Dies jedoch hat beunruhigende Folgen gezeitigt. Da die Wolfspopulation schwindet und jene Haushunde in immer größerer Zahl durch die Lande streifen, ist eine Mischung beider Arten häufiger geworden, da sich Wölfe und Hunde miteinander paaren.\n\nDiese „Wolfshunde“ besitzen die Merkmale eines Wolfes, doch das Gemüt eines Hundes, und erfreuen sich unter der hiesigen Bevölkerung wachsender Beliebtheit als Gefährten und Wächter. Doch manch einer äußert die Sorge, diese Mischlinge könnten zu wild sein, um wahrhaft gezähmt zu werden, oder dass sie eigene verwilderte Rudel bilden könnten, sollte ihre Zahl unkontrolliert anwachsen!"
agot_colonization_events.1004.a: "Diese Praxis sollte unterbunden und eine Keulung angeordnet werden."
 agot_colonization_events.1004.b: "Der Leib eines Wolfes, doch die Treue eines Hundes..."
 agot_colonization_events.1004.c: "Was für eine vortreffliche Beute sie abgäben!"
 agot_colonization_events.1004.a.duel_success: "[obstacle_province.GetName] verzeichnet eine Wolfssichtung"
 agot_colonization_events.1004.a.success.toast.t: "Wölfe erfolgreich in die Wildnis entlassen"
 agot_colonization_events.1004.a.duel_failure: "Freilassung der Wölfe fehlgeschlagen"
 agot_colonization_events.1004.a.failure.toast.t: "Empörung in der Bevölkerung"
 agot_colonization_events.1004.b.duel_success: "Ihr zähmt erfolgreich einen Wolfshund"
 agot_colonization_events.1004.b.success.toast.t: "Des Menschen bester Freund"
 agot_colonization_events.1004.b.duel_failure: "Es gelingt Euch nicht, den Wolf zu zähmen"
 agot_colonization_events.1004.b.failure.toast.t: "Zähmen des wilden Wolfshundes fehlgeschlagen"

 agot_colonization_events.1005.t: "[obstacle_province.GetNameNoTooltip]: Die Verschwundenen"
 agot_colonization_events.1005.desc: "Betrübliche Kunde aus [obstacle_province.GetName] erreicht mich heute, denn eine Reihe jüngster Unglücke hat die dortigen Siedlungen erschüttert. Die hiesigen Wolfsrudel haben, offenbar ermutigt durch die beständigen Übergriffe auf ihr Revier, begonnen, die Jungen, die Wehrlosen und die Alten in großer Zahl zu reißen.\n\nMit einer bislang ungekannten Dreistigkeit streifen sie des Nachts sogar in gewaltigen Rudeln durch die Dörfer! Es muss etwas unternommen werden, ehe die Wölfe kühn genug werden, Säuglinge aus ihren Wiegen zu rauben."
 agot_colonization_events.1005.a: "Wir müssen die Dörfler sammeln und den Kampf zu den Wölfen tragen!"
 agot_colonization_events.1005.a.duel_success: "Der Wolfsbau ist beseitigt"
 agot_colonization_events.1005.a.duel_failure: "Der Wolfsbau besteht fort und die Siedlung ist verloren"
 agot_colonization_events.1005.success.toast.t: "Wolfsbau beseitigt!"
 agot_colonization_events.1005.failure.toast.t: "Wolfsbau konnte nicht beseitigt werden"
 agot_colonization_events.1005.b: "Schart die Dörfler zusammen und brennt die Wölfe aus!"
 agot_colonization_events.1005.b.duel_success: "Ihr brennt den Wolfsbau nieder"
 agot_colonization_events.1005.b.duel_failure: "Der Wolfsbau besteht fort, und die Siedlung ist verloren"
 agot_colonization_events.1005.c: "Bedauerlich, doch dies sind die Gefahren der Grenzlande."

 agot_colonization_events.1006.t: "[obstacle_province.GetNameNoTooltip]: Gejagt"
 agot_colonization_events.1006.desc: "Was zunächst wie ein leichtes Keulen anmutete, ist rasch außer Kontrolle geraten. Ein großer schwarzer Wolf hat meinen Trupp verfolgt und des Nachts im Schutze des Nebels zugeschlagen, begleitet von seinem rachsüchtigen Rudel. Die Jäger, die ich in den Wolfsbau von [obstacle_province.GetName] geführt habe, wurden einer nach dem anderen gerissen, und bald stehe ich allein der widernatürlichen Bestie gegenüber.\n\nEs ist bei weitem der größte Wolf, den ich je erblickt habe, und das beunruhigend kluge Glimmen in seinen Augen verheißt einen langen, grausamen Tod, sollte ich nicht augenblicks aus seinem Revier fliehen."
 agot_colonization_events.1006.a: "Du wirst einen feinen Teppich abgeben."
 agot_colonization_events.1006.a.duel_success: "Der Wolfsbau ist beseitigt"
 agot_colonization_events.1006.a.duel_failure: "Der Wolfsbau besteht fort"
 agot_colonization_events.1006.success.toast.t: "Wolfsbau beseitigt!"
 agot_colonization_events.1006.failure.toast.t: "Wolfsbau konnte nicht beseitigt werden"
 agot_colonization_events.1006.b: "Mit einem Feuer, kann ich die Bestie in die Falle locken und so erlegen."
 agot_colonization_events.1006.c: "Ich werde tapfer und mutig das Weite suchen!"
 agot_colonization_events.1006.b.duel_success: "Der Wolfsbau ist beseitigt"
 agot_colonization_events.1006.b.duel_failure: "Der Wolfsbau besteht fort"

 agot_colonization_events.1007.t: "[obstacle_province.GetNameNoTooltip]: Das Heulen aus den Hügeln"
 agot_colonization_events.1007.desc: "Ein Bote erreicht meinen Hof mit Kunde aus der Siedlung in [obstacle_province.GetName]. Die Nachricht verheißt Gutes, doch als der Bote seinen Bericht beendet, überbringt er eine Bitte der Dörfler: Wenngleich sie den Großteil der Wölfe aus der Siedlung vertrieben haben, haust noch immer ein beträchtliches Rudel in den Hügeln, wenige Meilen vom Dorf entfernt. Sie ersuchen mich um Beistand, die Bestien ein für alle Mal zu vernichten.\n\n[steward.Custom('GetCouncilOrCourtPosition')] wirft ein: „Wenn die Wölfe wahrhaftig in die Hügel getrieben wurden, Meilen von der Siedlung entfernt, so sehe ich wenig Grund, einzugreifen. Die Wölfe werden von selbst weiterziehen.“"
 agot_colonization_events.1007.a: "Gehen wir kein Wagnis ein. Ich werde die nötige Hilfe aussenden."
 agot_colonization_events.1007.b: "Ich muss [steward.GetFirstName] beipflichten — die Wölfe stellen kaum noch eine Gefahr dar."
 agot_colonization_events.1007.success.toast.t: "Die Wölfe zerstreuen sich auf natürliche Weise"
 agot_colonization_events.1007.failure.toast.t: "Die Wölfe verbleiben"

 agot_colonization_events.1008.t: "[obstacle_province.GetNameNoTooltip]: Jagdgesellschaften"
 agot_colonization_events.1008.desc: "Dank der beharrlichen Bemühungen, die gefährliche Wolfspopulation in [obstacle_province.GetName] auszurotten, haben Jäger begonnen, Jagdgesellschaften zu gründen, um ihre Anstrengungen besser aufeinander abzustimmen.\n\nNeben dem offenkundigen Vorteil, die Keulung der Wölfe weitaus sicherer und leichter zu gestalten, hat dies eine eigenständige Lebensart in dem Gebiet hervorgebracht, da die Jagd unter den Tapferen und Kühnen der hiesigen Gemeinschaften als Zeitvertreib immer größere Verbreitung und Beliebtheit erfährt."
 agot_colonization_events.1008.a: "Eine vorübergehende Laune, doch gleichwohl interessant."
 agot_colonization_events.1008.success.toast.t: "Jagdgesellschaften gefördert!"
 agot_colonization_events.1008.failure.toast.t: "Wolfsjagd gerät außer Kontrolle!"
 agot_colonization_events.1008.b: "Wir sollten diese Jagdgesellschaften weiter fördern!"
 agot_colonization_events.1008.b.duel_success: "Ihr fördert die Jagdgesellschaften erfolgreich"
 agot_colonization_events.1008.b.duel_failure: "Die Jagd gerät außer Kontrolle..."
 agot_colonization_events.1008.c: "Ich sollte diesen Leuten einen Besuch abstatten; gewiss haben sie den ein oder anderen nützlichen Kniff zu teilen."

 agot_colonization_events.1009.t: "[obstacle_province.GetNameNoTooltip]: Heulen in der Nacht"
 agot_colonization_events.1009.desc: "Als ich [obstacle_province.GetName] aufsuche, um den Fortschritt der dortigen Kolonie zu begutachten, fällt mir die schiere Verwüstung mancher Dörfer ins Auge — halb leere Geisterstätten, deren ausgemergelte Bewohner hinter kläglichen Palisaden kauern und sich kaum noch auf den Beinen halten, gestützt nur von ihren eigenen Mistgabeln. Die Wölfe, so sagen sie, seien so zahlreich und fürchterlich, dass allein das Überleben der Nächte zur Bewährungsprobe werde. Der Zustand ist unaushaltbar.\n\nAls mein Gefolge und ich uns anschicken, heimzukehren und eineb Trupp zur Keulung der Wölfe zusammenzurufen, werde ich vom Rest meiner Gruppe getrennt — nur eine Handvoll Begleiter verbleibt an meiner Seite. Schon bald zerreißt das Heulen von gewiss hundert Wölfen die stille Düsternis der Nacht. Im Handumdrehen ist mein Gefolge von allen Seiten von zähnefletschenden, knurrenden Wölfen umringt, einzig das brennende Licht unserer Fackeln hält sie auf Abstand. Doch als der Fackelschein erlischt, rücken die Wölfe näher und näher..."
 agot_colonization_events.1009.a: "Formation! In Formation, und lasst sie an uns zerbrechen!"
 agot_colonization_events.1009.a.duel_success: "Eure Kampferfahrung überwindet den Angriff der Wölfe"
 agot_colonization_events.1009.a.duel_failure: "Eure Kampferfahrung vermag den Angriff der Wölfe nicht abzuwehren"
 agot_colonization_events.1009.success.toast.t: "Wölfe abgewehrt"
 agot_colonization_events.1009.failure.toast.t: "Von Wölfen verwundet!"
 agot_colonization_events.1009.b: "Haltet die Feuer am Brennen! Wir müssen durchhalten!"
 agot_colonization_events.1009.b.duel_success: "Es gelingt Euch, die Wölfe mit dem Feuer zu vertreiben"
 agot_colonization_events.1009.b.duel_failure: "Das Feuer erwies sich als nicht ausreichend..."
 agot_colonization_events.1009.c: "[knight.GetName], beschützt Eur[ROOT.Char.Custom('DE_END_ADJ_NUL_S_A')] [ROOT.Char.GetTitleAsNameNoTooltip]!"
 agot_colonization_events.1009.c.duel_success: "[knight.GetNameNoTooltip] stellt sich den Wölfen tapfer entgegen"
 agot_colonization_events.1009.c.duel_failure: "Ihr und [knight.GetNameNoTooltip] werdet bei dem Angriff verwundet"

 ### Bear Den ###

 agot_colonization_events.1101.t: "[obstacle_province.GetNameNoTooltip]: Yoh-gi"
 agot_colonization_events.1101.desc: "Meine Siedler in [obstacle_province.GetName] sind es gewohnt, dass Bären in der Nähe ihrer Kolonie umherstreifen. Ein wenig zusätzliche Vorsicht genügt für gewöhnlich, und selbst die neugierigsten Bestien lassen sich zumeist durch beherztes Schlagen mit Löffeln auf Kochtöpfe vertreiben.\n\nEin Bär jedoch ist anders. In der hiesigen Mundart als 'Yoh-gi' bekannt, ist er klüger als der gemeine Bär. Er lauert Arbeitstrupps auf und fällt über sie her, sobald sie zur Mahlzeit rasten. Kaum sind die Arbeiter auseinandergestoben, plündert er ihr Gepäck und stiehlt jedweden Proviant.\n\nIn der Siedlung herrscht beträchtlicher Zwist darüber, wie dem Übel beizukommen sei. Die von der Kolonie angeworbenen Wildhüter wünschen, einen Jagdzug gegen den Bären zu unternehmen. Der Schmied der Siedlung hingegen ist überzeugt, die Bestie mittels einer sinnreichen Falle eigener Konstruktion überlisten zu können, geködert mit einem honiggetränkten Bienenstock."
 agot_colonization_events.1101.a: "Den Jagdzug der Wildhüter beaufsichtigen."
 agot_colonization_events.1101.a.duel_success: "Die Wildhüter erlegen Yoh-gi und seinesgleichen erfolgreich"
 agot_colonization_events.1101.a.duel_failure: "Die Wildhüter werden von dem Bären überlistet"
 agot_colonization_events.1101.b: "Den Schmied für den Bau seiner Falle entlohnen."
 agot_colonization_events.1101.c: "Was ein Schwachsinn! Ich erledige das Viech selbst!"
 agot_colonization_events.1101.c.duel_success: "Ihr erlegt Yoh-gi und seinesgleichen erfolgreich"
 agot_colonization_events.1101.c.duel_failure: "Ihr werdet von dem Bären überlistet und überwältigt"
 agot_colonization_events.1101.d: "He, he, he! Lasst den Bären in Frieden!"
 agot_colonization_events.1101.success.toast.t: "Bärenbau beseitigt"
 agot_colonization_events.1101.failure.toast.t: "Bärenbau besteht fort"

 agot_colonization_events.1102.t: "[obstacle_province.GetNameNoTooltip]: Bärgelt" # AGOT will hier auf Weregild (althochdeutsch Wergelt) anspielen, das im Mittelalter eine Art Schadensersatz oder Sühnegeld für getötete oder verletzte Personen war, hier aber auf die Bärenjagd übertragen wird. Wird hier kein Spieler raffen, aber ich lass es trotzdem hier
 agot_colonization_events.1102.desc: "Nach vier Tagen beschwerlichen Marsches durch unwirtliches Gelände nähert sich meine Bärenjagd ihrem Ende. Eine gewaltige Bärin steht im Eingang einer Höhle, den Blick unverwandt auf mich gerichtet. Sie stellt sich auf die Hinterläufe auf und brüllt, scheint jedoch zu zögern, vorzupreschen und den Schutz ihres felsigen Unterschlupfs zu verlassen. Dies für ein Zeichen der Schwäche haltend, springe ich vor und stoße ihr meinen Speer in die Brust. Nach kurzem Ringen bricht die Bärin zuckend zusammen. Mit letzter Kraft blickt sie mir abermals in die Augen, mit einem Ausdruck, der beinahe... flehend wirkt. Verstört weiche ich zurück und lasse den Speer fallen.\n\nDa erst vernehme ich das Wimmern.\n\nIm hinteren Teil der Höhle entdecke ich die Quelle des Geräusches — ein winziges Junges, noch blind und hilflos, kriecht auf mich zu. Überwältigende Schuld ergreift mich. Es zu füttern wäre kostspielig, doch vielleicht vermag ich den Bären selbst aufzuziehen..."
 agot_colonization_events.1102.a: "Ich werde es von seinem Elend erlösen."
 agot_colonization_events.1102.b: "Ich werde versuchen, das Junge selbst aufzuziehen."
 agot_colonization_events.1102.b.success.toast.t: "Aufzucht erfolgreich"
 agot_colonization_events.1102.b.failure.toast.t: "Aufzucht fehlgeschlagen"
 agot_colonization_events.1102.c: "Vielleicht vermag es allein zu überleben..."

 agot_colonization_events.1103.t: "[obstacle_province.GetNameNoTooltip]: Der Überfall"
 agot_colonization_events.1103.desc: "Die neue Siedlung in [obstacle_province.GetNameNoTier] nimmt prächtig Gestalt an. Ein Häuflein Gebäude ist bereits emporgewachsen, Rauch steigt aus zahllosen Schornsteinen und Feuerstellen gen Himmel. Land wurde für den Ackerbau gerodet, und die Wildnis weicht allmählich einer gezähmten und gepflegten Landschaft. Während ich über die erzielten Fortschritte sinniere, wird mein Tagtraum von einem Schrei durchbrochen.\n\nEin Bär! Sein gewaltiger Leib stürmt mitten ins Herz der Siedlung und fegt die Siedler beiseite wie Kegel."
 agot_colonization_events.1103.a: "Bringt mir einen Bogen! Ich werde ihn selbst zur Strecke bringen."
 agot_colonization_events.1103.a.duel_success: "Es gelingt Euch, den Bären zu erlegen"
 agot_colonization_events.1103.a.duel_failure: "Es gelingt Euch nicht, den Bären zu erlegen"
 agot_colonization_events.1103.b: "Blast die Hörner! Dem muss ein Ende bereitet werden!"
 agot_colonization_events.1103.b.duel_success: "Eurem Trupp gelingt es, den Bären zu erlegen"
 agot_colonization_events.1103.b.duel_failure: "Euer Trupp vermochte den Bären nicht zu erlegen"
 agot_colonization_events.1103.c: "Flieht! Dieser Feind ist stärker als wir alle!"
 agot_colonization_events.1103.failure.toast.t: "Bärenbau besteht fort"
 agot_colonization_events.1103.success.toast.t: "Bärenbau beseitigt"

 agot_colonization_events.1104.t: "[obstacle_province.GetNameNoTooltip]: Pilzbär"
 agot_colonization_events.1104.desc: "Mein[steward.Custom('DE_END_PRO_S_N')] [steward.Custom('GetCouncilOrCourtPosition')] [steward.GetFirstName] überbringt mir Kunde aus unserer jungen Kolonie in [obstacle_province.GetName]. Die Geschichte ist derart haarsträubend, dass [steward.GetFirstNameNoTooltip] darauf bestand, sie zu überprüfen, bevor [steward.Custom('DE_PRO_PER_S_3P_N')] sie mir vortrug, doch nun ist [steward.Custom('DE_PRO_PER_S_3P_N')] sich [steward.Custom('DE_PRO_POS_S_3P')]er Sache gewiss. Es scheint, als habe einer unserer Siedler eine besonders wirkungsvolle Pilzart entdeckt, deren Verzehr erstaunliche Visionen und Gefühle überwältigender Glückseligkeit hervorruft.\n\nDaran mag nichts Verwerfliches sein, doch ein angelegtes Pilzbeet wurde von einem hiesigen Bären von furchterregendem Ausmaß geplündert. Besagter Bär hat daraufhin einen Wutorgie von gewaltigem Ausmaß veranstaltet, Behausungen und Vorratskammern zerstört und Siedler abgeschlachtet, sodass die Kolonie nun in ihrer Existenz bedroht ist."
 agot_colonization_events.1104.a: "Einige unserer Aufgebote zur Beseitigung dieser haarigen Bedrohung abstellen."
 agot_colonization_events.1104.a.duel_failure: "Es gelingt Euren Aufgeboten nicht, den Bären zu vertreiben"
 agot_colonization_events.1104.a.duel_success: "Eure Aufgebote vertreiben den Bären erfolgreich"
 agot_colonization_events.1104.b: "Eine Spießgrube ausheben und den Bären mit frischen Pilzen ködern."
 agot_colonization_events.1104.b.duel_failure: "Dem Bären gelingt die Flucht aus Eurer Falle"
 agot_colonization_events.1104.b.duel_success: "Ihr lockt den Bären erfolgreich in Eure Falle"
 agot_colonization_events.1104.c: "Ich möchte einige dieser Pilze probieren... zu Heilzwecken, versteht sich."
 agot_colonization_events.1104.c.success.toast.t: "Ihr seid bär-rauscht und verpfifferlingt"
 agot_colonization_events.1104.c.failure.toast.t: "Ihr spürt nur den Pilzkater danach"
 agot_colonization_events.1104.failure.toast.t: "Bärenbau besteht fort"
 agot_colonization_events.1104.success.toast.t: "Bär vertrieben"

 agot_colonization_events.1105.t: "[obstacle_province.GetNameNoTooltip]: Mehr als das Auge sieht"
 agot_colonization_events.1105.desc: "Die Lande um [obstacle_province.GetName] sind seit langem für die gewaltigen Bären bekannt, die dort hausen.\n\nAls ich meine Kolonie aufsuche, um ihren Fortschritt zu begutachten, werde ich auf der Straße von etwas aufgehalten, das einer kleinen Familie massiger Bären gleicht. Angeführt werden sie offenbar von einem ungeheuren Hünen von einem Mann, der verlangt, dass wir ihre Lande verlassen, ehe sie Vergeltung fordern für all die Bären, die wir erschlagen haben."
 agot_colonization_events.1105.a: "Das möchte ich sehen, Wilder!"
 agot_colonization_events.1105.b: "Haltet Eure Bären von unseren Siedlungen fern..."
 agot_colonization_events.1105.c: "Wir waren gerade im Aufbruch begriffen, nicht wahr, Leute?"
 agot_colonization_events.1105.toast.t: "Der Bär verbleibt"
 agot_colonization_events.1105.a.duel_success: "Ihr vertreibt den Leibwechsler"
 agot_colonization_events.1105.a.success.toast.t: "Bärenbau beseitigt"
 agot_colonization_events.1105.a.duel_failure: "Es gelingt Euch nicht, den Leibwechsler zu vertreiben"
 agot_colonization_events.1105.a.failure.toast.t: "Bei der Bärenjagd verwundet"
 agot_colonization_events.1105.b.duel_success: "Ihr erzielt eine Übereinkunft mit dem Leibwechsler"
 agot_colonization_events.1105.b.success.toast.t: "Koexistenz"
 agot_colonization_events.1105.b.duel_failure: "Es gelingt Euch nicht, eine Übereinkunft mit dem Leibwechsler zu erzielen"
 agot_colonization_events.1105.b.failure.toast.t: "Bärenbau besteht fort"

 agot_colonization_events.1106.t: "[obstacle_province.GetNameNoTooltip]: Der Menschenfresser"
 agot_colonization_events.1106.desc: "Er lauert in der Nacht. Sieben Fuß hoch und eine halbe Tonne schwer. Sein Fell ist dicker und zäher als Drachenschuppen, seine Fänge und Klauen gewaltiger als Schwerter, der Gestank seines Atems fauliger als eine Wiese nach der Schlacht. Er trägt die Narben hunderter Kämpfe, und sein Antlitz zeigt die Spuren und Blessuren hunderter Jahre.\n\nZumindest berichten dies die Briefe aus [obstacle_province.GetName]. Es ist wahrscheinlich, dass zumindest einige der Angaben über diesen gewaltigen Bären übertrieben sind, doch die Empfindung dahinter ist unmissverständlich. Sie berichten vielerlei: dass er beinahe unbesiegbar sei; dass er tausend Pfeile überlebt habe; dass er Jagdtrupps von fünfzig Mann hinschlachte; und dass er des Nachts ungesehen ins Dorf eindringe, um Vieh und Dörfler zu reißen — insbesondere Dörfler! Die Siedler flehen unmissverständlich: um Beistand, um irgendetwas; dass dieser Schrecken der Nacht ein für alle Mal beseitigt werde."
 agot_colonization_events.1106.success.toast.t: "Bär erlegt"
 agot_colonization_events.1106.failure.toast.t: "Bärenbau besteht fort"
 agot_colonization_events.1106.a: "Entsendet meine besten Krieger, diese Bestie niederzustrecken!"
 agot_colonization_events.1106.b: "[marshal.GetFirstName], sammelt die Siedler und bringt mir den Kopf dieses Bären."
 agot_colonization_events.1106.b.duel_success: "Der Bär ist erlegt"
 agot_colonization_events.1106.b.duel_failure: "Der Bär hat überlebt"
 agot_colonization_events.1106.c: "Ach, nichts als der Aberglaube von Bauern! Sie mögen den Bären selbst bezwingen."

 agot_colonization_events.1107.t: "[obstacle_province.GetNameNoTooltip]: Erbitterte Feinde"
 agot_colonization_events.1107.desc: "Während die Kolonie in [obstacle_province.GetName] wächst, wird die lästige Bärenpopulation in der Gegend bejagt — der Sicherheit, der Nahrung und des bloßen Zeitvertreibs wegen. Doch es scheint, als hätten unsere Taten den Zorn dieser Bären auf uns gezogen, denn als ich die Kolonie aufsuche, um ihren Fortschritt zu begutachten, werden wir von den verfluchten Bestien belagert, angeführt von dem bei weitem größten Bären, den ich je erblickt habe. Schlimmer noch, er scheint die kleineren Bären auf irgendeine Weise zu befehligen!"
 agot_colonization_events.1107.success.toast.t: "Bär erlegt"
 agot_colonization_events.1107.failure.toast.t: "Bärenbau besteht fort"
 agot_colonization_events.1107.a: "Es ist Bärensaison, Jungs!"
 agot_colonization_events.1107.b: "Schlagt dem großen Untier den Kopf ab, und die Bären werden sich zerstreuen."
 agot_colonization_events.1107.duel_success: "Der Bär ist erlegt"
 agot_colonization_events.1107.duel_failure: "Der Bär hat überlebt"
 agot_colonization_events.1107.c: "Lenkt sie ab, während ich, äh, Verstärkung hole!"

 agot_colonization_events.1108.t: "[obstacle_province.GetNameNoTooltip]: Bärenhatz"
 agot_colonization_events.1108.desc: "Als ich beschließe, [obstacle_province.GetName] einen Besuch abzustatten, um nach dem Rechten zu sehen, werde ich mit einem üppigen Fest zu meiner Ankunft empfangen. Speisen türmen sich auf, und der Trunk fließt in Strömen. Auf dem Höhepunkt der Festlichkeiten werde ich zu einer großen Arena geleitet und auf dem Ehrensitz platziert. Einige bösartig dreinblickende, große Hunde werden durch eine Pforte in die Grube der Arena geführt. Und dann, zu meiner großen Überraschung, trottet ein traurig dreinblickender Bär langsam durch die andere Pforte herein!\n\nWie auf Kommando stürzen die Hunde auf die Bestie los und schnappen nach ihr. Das ganze Schauspiel wird rasch zu einem Blutbad, doch schließlich wird der Bär vom letzten überlebenden Hund niedergerungen. Als ich mich dem lächelnden Statthalter zu meiner Linken zuwende, bedenke ich meine Haltung zu dem Spektakel."
 agot_colonization_events.1108.a: "Das nenne ich Kurzweil!"
 agot_colonization_events.1108.b: "Dies ist ein abscheulicher Brauch, und Ihr werdet ihn nicht wiederholen!"
 agot_colonization_events.1108.c: "...Wie lässt sich damit Geld verdienen?"
 agot_colonization_events.1108.c.duel_success: "Es gelingt Euch, aus diesen Bärenkämpfen Gewinn zu schlagen"
 agot_colonization_events.1108.success.toast.t: "Einträgliches Geschäft"
 agot_colonization_events.1108.c.duel_failure: "Es gelingt Euch nicht, aus diesen Bärenkämpfen Gewinn zu schlagen"
 agot_colonization_events.1108.failure.toast.t: "Geschäft ertraglos"

 agot_colonization_events.1109.t: "[obstacle_province.GetNameNoTooltip]: Trägheit und Wildheit"
 agot_colonization_events.1109.desc: "Recht beunruhigende Kunde erreicht mich heute Morgen aus [obstacle_province.GetName]. Die dortige Bärenpopulation ist seit Anbeginn der Siedlung ein beständiger Dorn im Fleische der Ansässigen, bedingt durch die Angriffslust der Bestien. Bemähnt, sichelkrallig und struppig befellt sind diese Bären, doch was sie so gefährlich macht, ist ihre Wildheit — sie fallen Menschen ohne nennenswerten Anlass und ohne Vorwarnung an. Die Lage hat sich derart zugespitzt, dass der hiesige Statthalter persönlich an mich herangetreten ist mit der Bitte, einzugreifen und der Bedrohung durch diese Lippenbären ein Ende zu bereiten."
 agot_colonization_events.1109.success.toast.t: "Bär erlegt"
 agot_colonization_events.1109.failure.toast.t: "Bärenbau besteht fort"
 agot_colonization_events.1109.a: "[knight.GetFirstName], hättet Ihr Lust auf eine Bärenjagd?"
 agot_colonization_events.1109.b: "Reicht mir meinen heeren Bär-Speer her, Herr!"
 agot_colonization_events.1109.duel_success: "Den schweren Bären mit dem heeren Bär-Speer sehr verheerend versehrt"
 agot_colonization_events.1109.duel_failure: "Der schwere Bär trotz heerem Bär-Speer unversehrt"
 agot_colonization_events.1109.c: "Höchst interessant, doch ich habe schlicht nicht die Muße dafür."

 ### Bandit Den ###

 agot_colonization_events.1201.t: "[obstacle_province.GetNameNoTooltip]: Die Verstoßenen"
 agot_colonization_events.1201.desc.1: "Seit Wochen erreichen mich flehentliche Briefe aus der Siedlung in [obstacle_province.GetName]. Eine Bande von Geächteten überfällt seit geraumer Zeit wiederholt die Nahrungsvorräte der Ortschaft."
 agot_colonization_events.1201.desc.2.marshal: "Mein[marshal.Custom('DE_END_PRO_S_N')] [marshal.GetCouncilTitle], [marshal.GetName], schlägt einen Strafzug vor, um die Banditen zu vertreiben.\n\nAllerdings "
 agot_colonization_events.1201.desc.2.knight: "Mein[marshal.Custom('DE_END_PRO_S_N')] Heerberater[marshal.Custom('DE_END_NOU_S_GS_N')], [marshal.GetName], schlägt einen Strafzug vor, um die Banditen zu vertreiben.\n\nAllerdings "
 agot_colonization_events.1201.desc.3.spymaster: "raunt mein[spymaster.Custom('DE_END_PRO_S_N')] [spymaster.GetCouncilTitle], [spymaster.GetName], dass an dieser Angelegenheit mehr ist, als das bloße Auge sieht. Es scheint, die Geächteten gehörten zu den frühesten Siedlern und waren größtenteils rechtschaffene Untertanen — bis ehemalige Soldaten, besser bewaffnet und wenig geneigt, mit eigenen Händen Unterkünfte zu errichten, sie aus ihren Behausungen vertrieben und jene stahlen, die bereits errichtet worden waren."
 agot_colonization_events.1201.desc.3.scholar: "raunt [spymaster.Custom('DE_ART_DEF_S_N')] Gelehrte, [spymaster.GetName], dass an dieser Angelegenheit mehr ist, als das bloße Auge sieht. Es scheint, die Geächteten gehörten zu den frühesten Siedlern und waren größtenteils rechtschaffene Untertanen — bis ehemalige Soldaten, besser bewaffnet und wenig geneigt, mit eigenen Händen Unterkünfte zu errichten, sie aus ihren Behausungen vertrieben und jene stahlen, die bereits errichtet worden waren."
 agot_colonization_events.1201.a: "Es kümmert mich nicht, wer zuerst da war. Regelt dies mit dem Schwert!"
 agot_colonization_events.1201.a.duel_success: "Eure Leute bringen die letzten Unruhestifter zur Strecke."
 agot_colonization_events.1201.a.duel_failure: "Eure Leute werden von den Banditen zurückgeschlagen."
 agot_colonization_events.1201.b: "Begnadigt die Geächteten und gebt ihnen ihr Land zurück."
 agot_colonization_events.1201.b.duel_success: "Ihr erwirkt eine gerechte Einigung für die Verstoßenen"
 agot_colonization_events.1201.b.duel_failure: "Eure Bemühungen, den Verstoßenen Gerechtigkeit widerfahren zu lassen, scheitern"
 agot_colonization_events.1201.c: "Vielleicht lässt sich ein Vergleich erzielen..."
 agot_colonization_events.1201.c.duel_success: "Ihr erzielt eine Übereinkunft zwischen den Verstoßenen und den Siedlern"
 agot_colonization_events.1201.c.duel_failure: "Es gelingt Euch nicht, eine Übereinkunft zwischen den Verstoßenen und den Siedlern zu erzielen"
 agot_colonization_events.1201.d: "Dafür fehlt mir gegenwärtig schlicht die Muße!"
 agot_colonization_events.1201.success.toast.t: "Banditen beseitigt"
 agot_colonization_events.1201.failure.toast.t: "Banditen verbleiben"

 agot_colonization_events.1202.t: "[obstacle_province.GetNameNoTooltip]: Der Kessel"
 agot_colonization_events.1202.desc.marshal: "Mein[marshal.Custom('DE_END_PRO_S_N')] [marshal.GetCouncilTitle], [marshal.GetName], überbringt mir erfreuliche Kunde. Die hiesige Garnison hat das Versteck einer Bande von Gesetzlosen ausfindig gemacht, die meine Siedlung in [obstacle_province.GetName] drangsalieren. Die Soldaten haben die Geächteten eingekreist, und seit einigen Tagen findet ein anhaltendes Geplänkel statt. Doch bislang kam es zu keinem entscheidenden Vorstoß, die Pattsituation zu beenden.\n\nDer Anführer der Banditen scheint gewillt, notfalls bis zum Letzten zu kämpfen, hat jedoch angeboten, die Gegend gegen eine ansehnliche Entschädigung zu verlassen."
 agot_colonization_events.1202.desc.knight: "Mein[marshal.Custom('DE_END_PRO_S_N')] Heerberater[marshal.Custom('DE_END_NOU_S_GS_N')], [marshal.GetNameNoTooltip], überbringt mir erfreuliche Kunde. Die hiesige Garnison hat das Versteck einer Bande von Banditen ausfindig gemacht, die meine Siedlung in [obstacle_province.GetNameNoTooltip] drangsalieren. Die Soldaten haben die Geächteten eingekreist, und seit einigen Tagen findet ein anhaltendes Geplänkel statt. Doch bislang kam es zu keinem entscheidenden Vorstoß, die Pattsituation zu beenden.\n\nDer Anführer der Banditen scheint gewillt, notfalls bis zum Letzten zu kämpfen, hat jedoch angeboten, die Gegend gegen eine ansehnliche Entschädigung zu verlassen."
 agot_colonization_events.1202.a: "Macht sie nieder!"
 agot_colonization_events.1202.a.duel_success: "Eure Leute bringen die letzten Unruhestifter zur Strecke."
 agot_colonization_events.1202.a.duel_failure: "Eure Leute werden von den Banditen zurückgeschlagen."
 agot_colonization_events.1202.b: "Was, wenn man sie zum Dienst überreden könnte?"
 agot_colonization_events.1202.b.duel_success: "Ihr überzeugt den Banditenführer, die Kolonie gegen regelmäßigen Sold zu verteidigen."
 agot_colonization_events.1202.b.duel_failure: "Eure Verhandlungsbemühungen scheitern."
 agot_colonization_events.1202.c: "Ich könnte wohl ihre Reisespesen übernehmen..."

 agot_colonization_events.1203.t: "[obstacle_province.GetNameNoTooltip]: Die Bruderschaft"
 agot_colonization_events.1203.desc: "Das Banditenunwesen in [obstacle_province.GetName] stellt seit geraumer Zeit ein Ärgernis dar. Was anfänglich nur eine Handvoll vereinzelter Banden von Schurken und Wegelagerern war, hat sich mit der Zeit unter dem Befehl einiger weniger Anführer zusammengeschlossen. Skrupellos, gerissen und ehrgeizig, sind diese Banditen mittlerweile so zahlreich und wohlorganisiert, dass sie die kümmerliche Garnison von [obstacle_province.GetNameNoTooltip] durch Einschüchterug dazu gebracht haben, die Waffen niederzulegen und diese sogenannte 'Bruderschaft' als neue Statthalter der Kolonie hinzunehmen. Dies ist für mich, verständlicherweise, höchst beunruhigend.\n\nMit einem Aufgebot fähiger Krieger schicke ich mich an, auf [obstacle_province.GetNameNoTooltip] zu marschieren, um es diesen Umstürzlern zu entreißen. Doch bei meiner Ankunft werde ich unter weißer Flagge empfangen. Die Anführer der Bruderschaft treten mir entgegen und unterbreiten ein Angebot. Sie werden [obstacle_province.GetNameNoTooltip] mit ihren Schwertern schützen und mit ihren Händen aufbauen, im Gegenzug für Gnade und eine Schonfrist bei den Abgaben, während die Bruderschaft sich zu einer rechtmäßigen Gilde in der Gegend wandelt. Angesichts dessen, wie wohl gediehen [obstacle_province.GetNameNoTooltip] unter ihrer Verwaltung ist, sollte ich ihr Angebot vielleicht sogar in Betracht ziehen..."
 agot_colonization_events.1203.a: "Ihr habt doch wohl nicht im Ernst geglaubt, dies würde gelingen?"
 agot_colonization_events.1203.a.duel_success: "Eure Leute hauen die Bruderschaft kurz und klein."
 agot_colonization_events.1203.a.duel_failure: "Eure Leute werden von den Banditen zurückgeschlagen."
 agot_colonization_events.1203.b: "Ein interessantes Angebot! Doch ich habe ein weitaus besseres."
 agot_colonization_events.1203.b.duel_success: "Ihr überzeugt die Gilde, die Kolonie gegen eine Entschädigung zu verlassen."
 agot_colonization_events.1203.b.duel_failure: "Eure Verhandlungsbemühungen scheitern."
 agot_colonization_events.1203.c: "Abgemacht! Ich werde Eure Treueeide hier und jetzt entgegennehmen."
 agot_colonization_events.1203.success.toast.t: "Banditen beseitigt"
 agot_colonization_events.1203.failure.toast.t: "Banditen verbleiben"

 agot_colonization_events.1204.t: "[obstacle_province.GetNameNoTooltip]: Wildlingsstämme"
 agot_colonization_events.1204.desc: "Die Lande jenseits der Mauer sind seit langem nur dünn besiedelt. Die wenigen, die diesen kalten Flecken noch immer ihre Heimat nennen, sind primitiv, zäh und hartgesotten. Während [obstacle_province.GetName] wächst, wächst auch der Groll der Einheimischen, da sie um die wenigen Rohstoffe wetteifern müssen, die in dieser Gegend zu finden sind.\n\nWas einst angespannte Gegenüberstellungen aus der Ferne waren, hat sich zu kleinen Scharmützeln, Viehdiebstählen und gelegentlichen Entführungen zwecks Lösegelderpressung ausgewachsen. Sollten diese Stämme beschließen, die Sache selbst in die Hand zu nehmen, besteht die sehr reale Gefahr, dass sie [obstacle_province.GetNameNoTooltip] bei einem Überfall gänzlich vernichten könnten. Es muss etwas unternommen werden."
 agot_colonization_events.1204.a: "Vernichtet diese Banditen!"
 agot_colonization_events.1204.a.duel_success: "Eure Leute machen die Banditen nieder"
 agot_colonization_events.1204.a.duel_failure: "Eure Leute werden von den Banditen zurückgeschlagen"
 agot_colonization_events.1204.b: "Entsendet einen Abgesandten zum Häuptling."
 agot_colonization_events.1204.b.duel_success: "Ihr zieht klare Grenzen zwischen unseren Völkern"
 agot_colonization_events.1204.b.duel_failure: "Eure Verhandlungsbemühungen scheitern"
 agot_colonization_events.1204.c: "Als ob diese lumpentragenden Wilden eine Bedrohung darstellten."
 agot_colonization_events.1204.success.toast.t: "Banditen beseitigt"
 agot_colonization_events.1204.failure.toast.t: "Banditen verbleiben"

 agot_colonization_events.1205.t: "[obstacle_province.GetNameNoTooltip]: Der Verräter"
 agot_colonization_events.1205.desc: "Die Bekämpfung der Banditen von [obstacle_province.GetName] war mühsam und schleppend, verlief jedoch im Großen und Ganzen zufriedenstellend. Wo zuvor Lager von Banditen und Wegelagerern die Wildnis übersäten, sind die meisten ihrer Stützpunkte mittlerweile zerschlagen. Doch für die Siedler besteht die Bedrohung fort. Die verbliebenen Banditen und Überlebenden haben sich zusammengerottet und ein einziges großes Lager errichtet.\n\nEines Morgens kniet [traitor.Custom('DE_ART_IND_N')] zerlumpt[traitor.Custom('DE_END_ADJ_DEF_S_N')], verwildert aussehend[traitor.Custom('DE_END_ADJ_DEF_S_N')] [traitor.GetWomanMan] vor meinem Thron nieder.\n\n„Eure Hoheit, es ist mir wohl bewusst, dass die armen Dörfler von [obstacle_province.GetNameNoTooltip] schwer unter der Geißel der Banditen gelitten haben und jeden Tag in Furcht vor einem Überfall leben!“ [traitor.Custom('DE_PRO_PER_S_3P_N')|U] grinst. „Ich hätte einen Vorschlag für Euch: Ich lasse des Nachts einige Eurer Dorfwachen ein, und sie können jeden letzten Banditen erschlagen! Alles, worum ich bitte, ist eine bescheidene Summe Goldes, weitaus weniger als das, was es kosten würde, das Lager mit Gewalt zu zerstören.“\n\nEin interessanter Vorschlag..."
 agot_colonization_events.1205.a: "Nun gut, wenn Ihr es sagt."
 agot_colonization_events.1205.a.duel_success: "Der Plan geht wie erwartet auf."
 agot_colonization_events.1205.a.duel_failure: "Ihr werdet verraten."
 agot_colonization_events.1205.b: "Meine Soldaten werden das Gesindel zur Strecke bringen."
 agot_colonization_events.1205.b.duel_success: "Eure Leute machen die Banditen nieder"
 agot_colonization_events.1205.b.duel_failure: "Eure Leute werden von den Banditen zurückgeschlagen."
 agot_colonization_events.1205.c: "Ich bedarf Eurer Hilfe nicht."
 agot_colonization_events.1205.success.toast.t: "Banditen beseitigt"
 agot_colonization_events.1205.failure.toast.t: "Banditen verbleiben"

 agot_colonization_events.1206.t: "[obstacle_province.GetNameNoTooltip]: Der gerissene Brigant"
 agot_colonization_events.1206.desc: "Als ich die jüngsten Berichte aus der Siedlung in [obstacle_province.GetName] durchgehe, finde ich zu meiner Überraschung einen an mich adressierten Brief darunter. Verschickt wurde er von [brigand.GetName], [Select_CString( brigand.IsFemale, 'eine der Anführer', 'einem der Anführer' )] der Banditen, die das Gebiet heimsuchen.\n\nDer Inhalt des Briefes ist ebenso dreist wie verwegen: [brigand.GetFirstName] erbittet meine Erlaubnis, die Siedlung als [brigand.Custom('DE_PRO_POS_S_3P')] eigen zu beanspruchen, im Gegenzug für einen Treueeid mir gegenüber und den Dienst als mein[brigand.Custom('DE_END_PRO_S_N')] Vasall[brigand.Custom('DE_END_NOU_S_GS_N')].\n\nWenngleich dies ein wahrlich ungewöhnliches Angebot ist, so steckt darin vielleicht doch ein Funken Vernunft?"
 agot_colonization_events.1206.a: "Ungeheuerlich. Lasst dies[brigand.Custom('DE_END_ADJ_NUL_S_A')] Narr[brigand.Custom('DE_END_NOU_S_GS_N')] ergreifen."
 agot_colonization_events.1206.b: "Stattdessen werde ich dies[brigand.Custom('DE_END_ADJ_NUL_S_A')] Brigant[brigand.Custom('DE_END_NOU_S_GS_N')] in meine Dienste nehmen."
 agot_colonization_events.1206.c: "Einverstanden. Schwört mir hier und jetzt die Treue."
 agot_colonization_events.1206.c.tt.success: "[brigand.GetFirstNameNoTooltip] hält [brigand.Custom('DE_PRO_POS_S_3P')] Wort."
 agot_colonization_events.1206.c.tt.failure: "[brigand.GetFirstNameNoTooltip] reißt [obstacle_province.GetNameNoTooltip] an sich."
 agot_colonization_events.1206.d: "Ich brauche Euren Treueid nicht. [obstacle_province.GetNameNoTooltip] gehört Euch."
 agot_colonization_events.1206.d.tt: "[brigand.GetFirstNameNoTooltip] wird [obstacle_province.GetNameNoTooltip] zugesprochen."

 ### Dense Growth ###

 agot_colonization_events.1301.t: "[obstacle_province.GetNameNoTooltip]: Im Dickicht verschwunden"
agot_colonization_events.1301.desc: "Betrübliche Kunde erreicht mich aus der Siedlung in [obstacle_province.GetName]. Während eines Besuchs der Siedlung und eines Spaziergangs durch die umliegende Landschaft ist [lost_person.GetNameNoTooltip] in den tiefen Wäldern verschollen!\n\nSpurlos zu verschwinden ist ein Kunststück, dessen sich nur wenige rühmen können, doch ich hege den Verdacht, dass dieses Verschwinden nicht aus freien Stücken geschah. [lost_person.GetFirstNameNoTooltip] schwebt womöglich in großer Gefahr...\n\nEs obliegt mir, auf diese Lage zu reagieren."
 agot_colonization_events.1301.a: "Scheut keine Kosten! Ich will, dass man [lost_person.Custom('DE_PRO_PER_S_3P_A')] findet!"
 agot_colonization_events.1301.b: "Ich werde den Suchtrupp persönlich anführen!"
 agot_colonization_events.1301.duel_success: "Ihr rettet [lost_person.GetFirstNameNoTooltip]."
 agot_colonization_events.1301.duel_failure: "Es gelingt Euch nicht, [lost_person.GetFirstNameNoTooltip] zu finden."
 agot_colonization_events.1301.c: "Unsere Bemühungen sollten stattdessen der Siedlung zugutekommen."
 agot_colonization_events.1301.c.death: "Nur die sterblichen Überreste von [lost_person.GetFirstNameNoTooltip] werden gefunden."
 agot_colonization_events.1301.c.vanished: "[lost_person.GetFirstNameNoTooltip] bleibt spurlos verschwunden."
 agot_colonization_events.1301.c.laamp: "[lost_person.GetFirstNameNoTooltip] hat überlebt und wurde [adventurer|E]."

 agot_colonization_events.1302.t: "[obstacle_province.GetNameNoTooltip]: Ertrag des Waldes"
 agot_colonization_events.1302.desc: "Ich habe einen Bericht aus der Siedlung in [obstacle_province.GetName] erhalten. Die dichten Wälder rings um die Kolonie wurden hinreichend gerodet, um die grundlegende Erschließung der Provinz zu ermöglichen.\n\nNeben dieser erfreulichen Kunde wird mir eine Anfrage aus der Siedlung vorgelegt: Was soll mit all dem Holz geschehen, das beim Schlagen der Schneisen durch die Wälder angefallen ist?"
 agot_colonization_events.1302.a: "Was wir nicht benötigen, sollten wir verkaufen."
 agot_colonization_events.1302.duel_success: "Es gelingt Euch, stattlichen Gewinn zu erzielen."
 agot_colonization_events.1302.duel_failure: "Ihr erzielt nur kärglichen Gewinn."
 agot_colonization_events.1302.b: "Verwendet das Holz zum Ausbau der Siedlung."
 agot_colonization_events.1302.c: "Wir sollten ein großes Knäckerchen machen!"
 agot_colonization_events.1302.d: "Die Wälder ließen sich bewirtschaften..."

 agot_colonization_events.1303.t: "[obstacle_province.GetNameNoTooltip]: Die uralte Ruine"
 agot_colonization_events.1303.desc: "Meine Arbeiter in der Siedlung von [obstacle_province.GetName] machen gute Fortschritte. Das Buschwerk wurde gerodet und Pfade durch den dichten Wald geschlagen, sodass die Kolonie ihre notwendige Erschließung vorantreiben kann.\n\nBeim Roden des umliegenden Landes haben die Arbeiter eine uralte Ruine unbekannten Ursprungs und Zwecks entdeckt. Wer vermag zu sagen, welch längst vergessene Kultur einst diesen Ort errichtete?\n\nWenngleich die Ruine kein unmittelbares Hindernis für die Erschließung der Siedlung darstellt, bleibt die Frage, was mit ihr geschehen soll."
 agot_colonization_events.1303.a: "Versuchen wir, die Ruine in etwas brauchbares umzuwandeln."
 agot_colonization_events.1303.duel_success: "Ein neues Gebäude wird in [obstacle_province.GetNameNoTooltip] errichtet"
 agot_colonization_events.1303.duel_failure: "Die Ruine zerfällt und hinterlässt nichts als Staub"
 agot_colonization_events.1303.b: "Lasst die Ruine in Frieden und widmet Euch der Siedlung."
 agot_colonization_events.1303.c: "Wir sollten die Ruine erforschen und wiederaufbauen, was wir vermögen!"
 agot_colonization_events.1303.d: "Reißt sie ab! Ihre Steine können andernorts Verwendung finden."

 agot_colonization_events.1304.t: "[obstacle_province.GetNameNoTooltip]: Vergeltung der Natur"
 agot_colonization_events.1304.desc: "Erstaunliche Kunde erreicht mich aus der Siedlung in [obstacle_province.GetName]. Die hiesigen Arbeiter haben eifrig Teile der dichten Wälder rings um die Kolonie gerodet, doch nach einer besonders finsteren Nacht sind viele der Bäume auf rätselhafte Weise zurückgekehrt!\n\nEs ist unklar, was dies verursacht hat, doch ein Großteil der geleisteten Arbeit der Siedlung ist zunichtegemacht. Die Arbeiter werden zunehmend verdrossen, und Ertragskraft wie Arbeitsgeist schwinden dahin. Es scheint, als müsse ich rasch handeln..."
 agot_colonization_events.1304.a: "Ich werde diese Bäume eigenhändig fällen!"
 agot_colonization_events.1304.duel_success: "Eure Bemühungen sind von Erfolg gekrönt."
 agot_colonization_events.1304.duel_failure: "Die Bäume kehren in noch größerer Zahl zurück."
 agot_colonization_events.1304.b: "Stellen wir einige Aufgebote ab, um meinen Arbeitern unter die Arme zu greifen."
 agot_colonization_events.1304.c: "Lasst diese Bäume vorerst in Frieden... und baut woanders."
 agot_colonization_events.1304.d: "Ich weiß, wie man die Natur hier besänftigt..."

 ### Flooded Lands ###

 agot_colonization_events.1401.t: "[obstacle_province.GetNameNoTooltip]: Gräben graben"
 agot_colonization_events.1401.desc: "Das sumpfige Gelände rings um unsere neue Kolonie in [obstacle_province.GetName] hat sich in vielerlei Hinsicht als vorteilhaft erwiesen. Zum einen ist es leicht zu verteidigen, da die Zugänge für jede größere Streitmacht beschwerlich sind. Zum anderen wimmeln die Moore von Brassen, Barschen, Hechten und Aalen, die meine Siedler frisch fangen oder für den Winter räuchern können.\n\nAndererseits birgt das Marschland eine gewaltige Gefahr der Überflutung, insbesondere während der Frühjahrsschmelze, wenn die sumpfigen Eilande von steigenden Wassern überschwemmt werden können. Um sich dagegen zu wappnen, haben meine Siedler mit dem Bau eines Systems aus Deichen und Kanälen begonnen, um ihre Behausungen zu schützen und Land für den Ackerbau trockenzulegen. Dies erfordert ein ungeheures Maß an Arbeitskraft und hat sich als schwere Bürde für die junge Kolonie erwiesen. Nun scheint einer der Deiche gebrochen zu sein, und die Fluten drohen, die Siedlung gänzlich zu vernichten."
 agot_colonization_events.1401.a: "Ich werde die Hilfsmaßnahmen persönlich beaufsichtigen und in Arbeitskräfte investieren."
 agot_colonization_events.1401.a.duel_success: "Euer Vorhaben bleibt unter dem veranschlagten Budget."
 agot_colonization_events.1401.a.duel_failure: "Euer Vorhaben übersteigt den veranschlagten Budget."
 agot_colonization_events.1401.success.toast.t: "Vorhaben unter dem veranschlagten Budget"
 agot_colonization_events.1401.failure.toast.t: "Vorhaben über dem veranschlagten Budget"
 agot_colonization_events.1401.b: "Stellt einige Truppen ab, um beim Wiederaufbau und der Fertigstellung des Deichs zu helfen."
 agot_colonization_events.1401.c: "Vielleicht war diese Kolonie von Anbeginn zum Scheitern verurteilt..."

 agot_colonization_events.1402.t: "[obstacle_province.GetNameNoTooltip]: Sumpffieber"
 agot_colonization_events.1402.desc: "Meine Marschlandsiedlung in [obstacle_province.GetName] wird während der Frühjahrsfluten häufig überschwemmt, doch die Bedrohung schwindet allmählich, da ein System von Dämmen fertiggestellt wird, um die steigenden Wassermassen zurückzuhalten und umzuleiten.\n\nGleichwohl wird die Kolonie von einem rätselhaften Siechtum heimgesucht, das offenbar von den stechenden Insekten herrührt, die über den Wassern schwärmen. Diese Krankheit bringt Schüttelfrost, Zittern und entsetzliche Erschöpfung mit sich.\n\nDie Siedler haben nunmehr geschrieben und fordern Vorräte an Weidenrinde zur Linderung ihrer Leiden sowie Beifuß zur Abwehr der Insekten."
 agot_colonization_events.1402.a: "Sie sollen erhalten, was sie benötigen, gegen diese kleinen Mistviecher."
 agot_colonization_events.1402.b: "Es wäre an der Zeit, dass die Geistlichkeit hier etwas Wohlfahrt leisten..."
 agot_colonization_events.1402.c: "Hätten sie sich eifriger um die Entwässerung bemüht, bestünde dieses Übel nicht!"

 ### Pirate Remnants ###

 agot_colonization_events.1501.t: "[obstacle_province.GetNameNoTooltip]: Die letzten Piraten"
 agot_colonization_events.1501.desc: "Unter dem Schutze der Dunkelheit fällt eine Bande verzweifelter Piratenüberbleibsel über die Lagerschuppen der Kolonie her. Sie verbrennen Getreide und setzen Gebäude in Brand, sodass die verängstigten Siedler um ihr Leben rennen. Berichte künden von verbrannter Erde, geplünderten Vorräten und dem fernen Widerhall irren Gelächters, während die Piraten in der Nacht verschwinden.\n\nDie Kolonie wird nicht mehr lange bestehen, wenn ich diesen Räubern nicht entschieden ein Ende bereite."
 agot_colonization_events.1501.a: "Verfolgt sie und bestraft sie bis zum letzten Mann."
 agot_colonization_events.1501.a.duel_success: "Eure Soldaten überraschen die Räuber und beenden ihren Einfluss auf die Provinz"
 agot_colonization_events.1501.a.duel_failure: "Ihr verliert Männer bei der Verfolgung. Die Räuber verschwinden mit lebenswichtigen Vorräten"
 agot_colonization_events.1501.b: "Die Verteidigungsanlagen verstärken und die verbliebenen Vorräte bewahren."
 agot_colonization_events.1501.b.duel_success: "Eure umsichtige Planung verschafft Euch Zeit und bewahrt die Vorräte, bis Eure Soldaten die Räuber abwehren können"
 agot_colonization_events.1501.b.duel_failure: "Die Räuber schlagen rasch erneut zu, mit tödlicher Gewalt"
 agot_colonization_events.1501.c: "Die Piraten haben die Kolonisierung hier zur Narretei gemacht."
 agot_colonization_events.1501.success.toast.t: "Piratenüberbleibsel beseitigt"
 agot_colonization_events.1501.failure.toast.t: "Piratenüberbleibsel verbleiben"

 agot_colonization_events.1502.t: "[obstacle_province.GetNameNoTooltip]: Schatten vor der Küste"
 agot_colonization_events.1502.desc: "Ich erwachte zu seltsamer Kunde: An diesem Morgen hatte sich der Nebel gelichtet und ein sturmgepeitschtes Schiff enthüllt, das entlang der Küste nahe [obstacle_province.GetName] dahintrieb. Keine Händler waren erwartet worden, und die Siedler versammelten sich am Ufer, unruhig murmelnd, ungewiss ob das Schiff verlassen, verflucht oder ein übles Omen sei. Stunden vergingen, doch das Schiff trieb auf der Stelle, träge und stumm.\n\nBei Einbruch der Dämmerung, obgleich niemand eine Seele hatte von Bord gehen sehen, fand sich eine Warnung am Tor der Kolonie, befestigt mit einem rostigen Dolch.\n\n#italic Wir sind gekommen, zurückzuholen, was uns gestohlen ward. Übergebt eure Vorräte und Schiffe, oder ertrinkt in der Flut.#!"
 agot_colonization_events.1502.a: "Wir empfangen sie mit Feuer und Stahl."
 agot_colonization_events.1502.a.duel_success: "Eure Leute schlagen den Landungstrupp zurück und verbrennen ihr Schiff"
 agot_colonization_events.1502.a.duel_failure: "Die Räuber plündern den Hafen, ehe sie im Nebel verschwinden"
 agot_colonization_events.1502.b: "Bietet ihnen Gold, damit sie ein für alle Mal verschwinden."
 agot_colonization_events.1502.b.duel_success: "Sie nehmen das Gold und verschwinden mit der Ebbe"
 agot_colonization_events.1502.b.duel_failure: "Sie nehmen das Gold und greifen dennoch an"
 agot_colonization_events.1502.c: "Diese Piraten erweisen sich als mehr Ärgernis, als sie wert sind."
 agot_colonization_events.1502.success.toast.t: "Piratenüberbleibsel beseitigt"
 agot_colonization_events.1502.failure.toast.t: "Piratenüberbleibsel verbleiben"

 agot_colonization_events.1503.t: "[obstacle_province.GetNameNoTooltip]: Der Piratenhauptmann"
 agot_colonization_events.1503.desc: "[pirate_leader.GetName], einer der überlebenden Piratenanführer, hat eine Schar Nachzügler um sich geschart und irgendwo nahe [obstacle_province.GetNameNoTooltip] ein befestigtes Lager errichtet. Er hat durch einen Boten Wort geschickt, man möge sie in Frieden lassen, oder die Kolonie werde brennen.\n\nEin offener Sturmangriff könnte in einer Katastrophe enden, doch Untätigkeit wäre ebenso verhängnisvoll."
 agot_colonization_events.1503.a: "Fordert [pirate_leader.GetFirstNameNoTooltip] zum Zweikampf heraus."
 agot_colonization_events.1503.a.duel_success: "Ihr erschlagt den Piratenhauptmann eigenhändig, und seine Mannschaft zerstreut sich"
 agot_colonization_events.1503.a.duel_failure: "Er besiegt Euch"
 agot_colonization_events.1503.b: "Stürmt die Befestigung unter dem Schutze der Dunkelheit."
 agot_colonization_events.1503.b.duel_success: "Die Befestigung ist zerstört. Die Bedrohung ist gebannt"
 agot_colonization_events.1503.b.duel_failure: "Eure Soldaten laufen in eine Falle. Nur wenige kehren lebend zurück"
 agot_colonization_events.1503.c: "Bietet Gold, damit sie verschwinden."
 agot_colonization_events.1503.c.duel_success: "Sie nehmen das Gold und verschwinden im Nebel"
 agot_colonization_events.1503.c.duel_failure: "Sie nehmen das Gold und danken Euch für Eure „Spende“"
 agot_colonization_events.1503.d: "Wenn wir sie in Ruhe lassen, werden sie gewiss dasselbe tun..."
 agot_colonization_events.1503.success.toast.t: "Piratenüberbleibsel beseitigt"
 agot_colonization_events.1503.failure.toast.t: "Piratenüberbleibsel verbleiben"

 agot_colonization_events.1504.t: "[obstacle_province.GetNameNoTooltip]: Der Hinterhalt"
 agot_colonization_events.1504.desc: "Während einer Routinepatrouille nahe der Küste wurden meine Leute von schwerbewaffneten Piraten überfallen. Verborgene Höhlen dienten als Ausgangspunkt für ihre Raubzüge. Diese Nachzügler sind keine ziellosen Plünderer; sie sind wohlorganisiert und tödlich.\n\nWenn wir sie nicht jetzt mit der Wurzel ausreißen, könnten sie die Siedlung selbst überrennen."
 agot_colonization_events.1504.a: "Stürmt die Höhlen. Lasst keinen am Leben."
 agot_colonization_events.1504.a.duel_success: "Die Höhlen sind gesäubert"
 agot_colonization_events.1504.a.duel_failure: "Eure Leute werden in der Finsternis niedergemetzelt"
 agot_colonization_events.1504.b: "Zu gefährlich. Stellt zusätzliche Wachen auf und betet, dass sie weiterziehen."
 agot_colonization_events.1504.success.toast.t: "Piratenüberbleibsel beseitigt"
 agot_colonization_events.1504.failure.toast.t: "Piratenüberbleibsel verbleiben"