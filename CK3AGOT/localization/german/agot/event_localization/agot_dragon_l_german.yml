l_german:
 bright_text:0 "#high "
 dragon_homed_separate_from_rider:0 "Der Drache befindet sich in einer Drachengrube, fern von seinem Reiter"

 # Conduct terror campaign request
 agot_dragon.0008.t:0 "Ein Werkzeug des Schreckens"
 agot_dragon.0008.desc_intro:0 "Ich habe eine Botschaft von [actor.GetTitledFirstName] erhalten. Angesichts meines Status als Reiter[ROOT.Char.Custom('DE_END_NOU_S_GS_N')] von [ROOT.Char.MakeScope.Var('current_dragon').GetCharacter.GetName] mag dies kaum verwundern – doch der Inhalt überraschte mich. [actor.Custom('DE_PRO_PER_S_3P_N')|U] fordert, dass ich mehr tue als bloß in [actor.Custom('DE_PRO_POS_S_3P')]en Kriegen zu kämpfen: Ich solle Angst und Schrecken verbreiten – überall, wohin ich auch ziehe – und nicht nur die Heere unserer Feinde niederbrennen, sondern auch ihr Land, ihre Felder und ihr Volk.\n\n"
 agot_dragon.0008.desc_keen:0 "Obgleich solch eine Strategie unsere Feinde zweifellos vor uns hertreiben und ihr Land für eine Generation verwüsten wird, #X werden#! mich die Menschen dafür verurteilen – sowohl im Reich als auch innerhalb meines eigenen Hauses.\n\n"
 agot_dragon.0008.desc_not_keen:0 "Eine solche Strategie würde mich [Select_CString( ROOT.Char.IsFemale, 'zur', 'zum' )] Mörder[ROOT.Char.Custom('DE_END_NOU_S_GS_N')] von Hunderten, vielleicht Tausenden machen. Könnte ich damit leben? Auch andere #X werden#! mich dafür verurteilen – sowohl im Reich als auch innerhalb meines eigenen Hauses.\n\n"
 agot_dragon.0008.desc_finish:0 "Eine solche Tat lässt sich nicht erzwingen – selbst nicht von meinem Lehnsherrn und Befehlshaber. Die Entscheidung liegt also bei mir: Nehme ich an, oder weise ich diese Bitte zurück?"
 agot_dragon.0008.a:0 "Euer Wille geschehe."
 agot_dragon.0008.a.f:0 "Ihr werdet im Auftrag von [actor.GetTitledFirstNameNoTooltip] eine Terrorkampagne durchführen."
 agot_dragon.0008.b:0 "Ich werde für Euch kämpfen – doch morden werde ich nicht für Euch."
 agot_dragon.0008.b.f:0 "Ihr werdet die Bitte von [actor.GetTitledFirstNameNoTooltip] ablehnen."
 agot_dragon.0008.accept.t:0 "Terrorkampagne begonnen!"
 agot_dragon.0008.accept.desc:0 "[recipient.GetFirstName] hat Eure Bitte angenommen und brandschatzt nun das Land Eurer Feinde, soweit [recipient.Custom('DE_PRO_PER_S_3P_N')] es vermag."
 agot_dragon.0008.refuse.t:0 "Terrorkampagne verweigert!"
 agot_dragon.0008.refuse.desc:0 "[recipient.GetFirstName] hat sich geweigert, Euer Werkzeug des Schreckens zu sein."

 # End terror campaign request
 agot_dragon.0009.t:0 "Das Feuer löschen"
 agot_dragon.0009.desc_intro:0 "Eine Botschaft ist von [actor.GetTitledFirstName] eingetroffen, mit der Forderung, die Terrorkampagne einzustellen, die ich derzeit mit meinem Drachen [ROOT.Char.MakeScope.Var('current_dragon').GetCharacter.GetName] über unsere Feinde bringe, immer wenn sich mir die Gelegenheit bietet.\n\n"
 agot_dragon.0009.desc_keen:0 "Ich habe die Befehle von [ROOT.Char.MakeScope.Var('terror_campaign_instructor').GetCharacter.GetTitledFirstName] seit ihrem Eingang mit Lust und Eifer ausgeführt – und nun soll ich diesen Auftrag fallen lassen?\n\n"
 agot_dragon.0009.desc_not_keen:0 "Ich habe die Befehle von [ROOT.Char.MakeScope.Var('terror_campaign_instructor').GetCharacter.GetTitledFirstName] seit ihrem Eingang treu und pflichtgemäß erfüllt – und nun soll ich diesen Aufrag abbrechen.\n\n"
 agot_dragon.0009.desc_finish:0 "Doch [ROOT.Char.MakeScope.Var('current_dragon').GetCharacter.GetName] gehört mir – nicht [actor.GetFirstName]. Es liegt an mir, aufzuhören... oder weiterzumachen."
 agot_dragon.0009.a:0 "Wir werden dem Schrecken ein Ende setzen."
 agot_dragon.0009.b:0 "Wir werden nicht ruhen, bis sie alle #X BRENNEN!#!"
 agot_dragon.0009.b.f:0 "Ihr werdet die Terrorkampagne im Namen von [actor.GetTitledFirstNameNoTooltip] fortführen."
 agot_dragon.0009.accept.t:0 "Terrorkampagne beendet!"
 agot_dragon.0009.accept.desc:0 "[recipient.GetFirstName] hat meiner Bitte entsprochen und wird die Lande meiner Feinde nicht länger brandschatzen."
 agot_dragon.0009.refuse.t:0 "Terrorkampagne geht weiter!"
 agot_dragon.0009.refuse.desc:0 "[recipient.GetFirstName] hat sich geweigert, die Verwüstung einzustellen. Ihr könntet [recipient.Custom('DE_PRO_PER_S_3P_A')] gefangen nehmen – doch solches bei einem Drachenreiter[Custom('DE_END_NOU_S_GS_N')] zu versuchen, birgt nicht geringe Gefahren..."

 # Ride Your Dragon Normal Ride
 agot_dragon.0010.t:0 "Freiheit der offenen Lüfte"
 agot_dragon.0010.night:0 "Der Mond hängt tief am obsidianschwarzen Himmel und taucht die Welt darunter in sein silbernes Licht. [ridden_dragon.GetName] betrachtet mich schläfrig, die Nüstern begierig blähend, als [ridden_dragon.Custom('GetDragonSheHe')] merkt, dass mein Nahen einen nächtlichen Ritt bedeutet.\n\n[ridden_dragon.Custom('GetDragonHerHis')|U]e Schwingen schlagen rhythmisch gegen den Sternenhimmel — eine Sinfonie aus Macht und Anmut, die uns höher und höher trägt. Während wir aufsteigen, wandelt sich die Welt unter uns. Die Wälder werden zu einem Flickenteppich aus Schatten und Silber, die Flüsse winden sich durch sie wie schimmernde Erzadern.\n\nDer Wind umtost uns mit einem rauschenden Brüllen, untermalt vom rhythmischen Flügelschlag meines Drachen. In der Umarmung des Mondlichts spüre ich den Gesang der Welt in mir — ich bin der Komponist, und der Flug von [ridden_dragon.GetName] ist meine Melodie."
 agot_dragon.0010.sili:0 "Ich trete an den Sattel von [ridden_dragon.GetName] heran, schwinge meine Beine hinüber und spüre, wie sich [ridden_dragon.Custom('GetDragonHerHis')]e mächtigen Muskeln sich unter mir anspannen, während ich die Sattelriemen festziehe. Auf meinen Befehl hin und mit einem gewaltigen Ruck spüre ich, wie [ridden_dragon.GetName] aufwärts schnellt — und binnen Augenblicken durchschneiden wir den freien Himmel.\n\nAls wir durch die Wolken brechen, fühle ich, wie das Gewicht der Welt von meinen Schultern fällt... Ich weiß, dass ich zurückkehren muss, doch nicht bevor ich den wahren Rausch des Drachenfliegens genossen habe. Ich lasse die Zügel los, und [ridden_dragon.GetNameNoTooltip] kreischt vor Freude über [ridden_dragon.Custom('GetDragonHerHis')]e neugewonnene Freiheit, dreht sich aufwärts, die Schwingen weit ausgebreitet. Für einen kostbaren Augenblick schweben wir schwerelos im weiten offenen Himmel, während die Welt unter uns wartet."
 agot_dragon.0010.lord:0 "[ridden_dragon.GetName] hebt ab, und mit wenigen Schlägen [ridden_dragon.Custom('GetDragonHerHis')]er Schwingen sind wir dem Himmel nah. Hinter mir lasse ich die schwere Last meines Titels zurück. Für einen Moment entledige ich mich aller Pflichten, um über alles hinaufzusteigen — um die Liebkosung des Windes und den Kuss der Sonne zu spüren.\n\nSelten sind die Augenblicke, da ich mich gänzlich fallen lassen und vollends im Jetzt verweilen kann — was diesen Flug umso berauschender macht. [ridden_dragon.GetNameNoTooltip] beginnt sich zu drehen, und nachdem [ridden_dragon.Custom('GetDragonSheHe')] sich ein wenig ausgetobt hat, befehle ich, höher zu steigen — und noch höher, #italic und noch höher#!.\n\nWir erreichen die höchsten Gipfel der Wolken. Ich schließe die Augen, breite die Arme weit aus, und hier, fern von allem, ist es wie #italic eine neue Jugend#!. Das Brüllen von [ridden_dragon.GetNameNoTooltip] zeigt mir, dass [ridden_dragon.Custom('GetDragonSheHe')] ebenso entzückt ist von diesem besonderen Moment, den wir miteinander teilen."
 agot_dragon.0010.greeny:0 "[ridden_dragon.GetName] schnurrt erwartungsvoll, als ich mich in [ridden_dragon.Custom('GetDragonHerHis')]en Sattel schwinge. Eine solche Verbindung spüre ich nirgendwo sonst, und mit einem unausgesprochenen Befehl heben wir ab.\n\n[ridden_dragon.GetNameNoTooltip] brüllt zustimmend, als ich die Zügel zurückreiße und [ridden_dragon.Custom('GetDragonHerHim')] höher treibt — #italic immer höher#!. Wir steigen empor, als würden uns die Götter selbst in die Höhe ziehen, und dann tritt Stille ein — das einzige Geräusch ist der Wind, der über die Schwingen streicht.\n\nHier oben, über den Wolken, die Sonne im Gesicht, bin ich frei. Frei von Pflicht, frei von Sorge, frei von #italic allen irdischen Bürden#!. Ich empfinde, was ich weiß, dass jeder Drachreiter empfunden hat: das brennende Verlangen, immer weiter zu fliegen — jenseits der bekannten Welt, dem Horizont endlos hinterher."
 agot_dragon.0010.troof:0 "Der Himmel ist wolkenlos und die Sonne scheint — heute ist der perfekte Tag, um einige Zeit auf dem Rücken von [ridden_dragon.GetName] zu verbringen. Ich habe die Drachenhüter vorausgeschickt, meinen Sattel zu richten, und mich in mein bequemstes Reitgewand gekleidet.\n\nAls ich mich nähere, senkt [ridden_dragon.Custom('GetDragonSheHe')] [ridden_dragon.Custom('GetDragonHerHis')]en Hals, um mich willkommen zu heißen. Einen kurzen Moment lang fahre ich mit der Hand über [ridden_dragon.Custom('GetDragonHerHis')]e [ridden_dragon.Custom('GetDragonColorFull')]en Schuppen — ehrfürchtig ob [ridden_dragon.Custom('GetDragonHerHis')]er Erhabenheit — bevor ich mich dem Sattel zuwende und hinaufklettere, um Platz zu nehmen. Während ich das Bein über den Sattel hebe und mich zurechtsetze, atme ich meine Anspannung in einem langen, tiefen Atemzug aus.\n\nZur Vorbereitung auf den Abflug vergewissere ich mich, dass meine Füße sicher aufliegen, und umfasse die Griffe des Sattels fest. Ehe ich es bemerke, sind wir hoch über dem Land und schießen den Himmel wie Valyrischer Stahl. Die gewaltige Muskelkraft unter mir und den Wind über mir spürend, nehme ich die Pracht von Land und Meer in mich auf. Welch ein Anblick zum Staunen!"
 agot_dragon.0010.tukha:0 "Ich strecke die Hand aus, um die Wolken zu berühren; Tautropfen setzen sich auf meiner Haut ab. Die Tiefe dieser Tropfen hallt in meinem Geist wider wie das aufziehende Unwetter am Horizont. Dann trifft mich die Frage: Wie wenige haben je diese Empfindung gekannt? Durch die gesamte Geschichte hindurch — würden all jene in einen einzigen Saal passen? Weiß heute noch jemand Lebendiges davon, oder bin ich allein in diesem Augenblick?\n\n[ridden_dragon.GetName] taucht [ridden_dragon.Custom('GetDragonHerHis')]en Flügel in die Wolken — als sei [ridden_dragon.Custom('GetDragonSheHe')] sich meiner Gedanken bewusst — und ich muss eingestehen, dass [ridden_dragon.Custom('GetDragonSheHe')] diesen Moment nun ebenfalls teilt. Vielleicht irre ich mich, doch es scheint, als brächte [ridden_dragon.GetNameNoTooltip] dieses Eingeständnis Freude. Auch darin liegt ein gewisser Trost, denke ich; eine Erinnerung an die Tiefe unserer Verbindung."
 agot_dragon.0010.aemmly:0 "Königsmund schrumpft unter mir, als [ridden_dragon.GetName] den Wolken entgegenstürmt. [ridden_dragon.Custom('GetDragonHerHis')|U]e Begeisterung ist ansteckend, und doch ist der Schlag [ridden_dragon.Custom('GetDragonHerHis')]er Schwingen so beruhigend wie ein Herzschlag. Ich blicke über die Schwarzwasserbucht und erspähe Driftmark und Drachenstein — die Inseln, die hundert Jahre lang die letzten Überreste Valyrias beheimateten — nun kaum größer als grobe Pflastersteine auf einer Straße.\n\nBald ist all das verschwunden. [ridden_dragon.GetNameNoTooltip] durchbricht die Wolken, und mit einem Mal ist die chaotische, weitläufige Welt unter mir nicht mehr. Eine sanfte Brise streicht über meine Haut, und ein Gefühl ätherischen Friedens überkommt mich — ich kann nicht umhin zu lächeln. [ridden_dragon.GetNameNoTooltip] brummt fröhlich, als wolle [ridden_dragon.Custom('GetDragonSheHe')] verkünden, dass dies der Ort ist, wohin [ridden_dragon.Custom('GetDragonSheHe')] gehört. Wir kosten den Augenblick aus, doch er kann nicht ewig währen."
 agot_dragon.0010.harrenhal:0 "Der Sattel von [ridden_dragon.GetNameNoTooltip] ist bereits gerichtet, als ich eintreffe. Umso besser — ich kann es kaum erwarten, fernab dieser verfluchten Burg frische Luft zu schnappen. Diese düsteren Gemächer und diese beunruhigende Atmosphäre werden rasch zur Last.\n\nAls ich mich den Wolken nähere, werde ich dieses seltsame Gefühl nicht los, dass mich jemand beobachten würde. Kurz blicke ich über die Schulter, als wollte ich sichergehen, dass Harrens Geist mir nicht gefolgt ist — selbst hier oben, in dieser Höhe, wirkt seine Festung bedrohlich. Welch ein Gigantismus... Erst als ich durch die Wolken breche, bin ich ihrer Maßlosigkeit entkommen.\n\nEin Wolkenschleier wird zum Bollwerk gegen die Bedrängnis Harrenhals, deren kolossale Ausmaße der unermesslichen Freiheit des offenen Himmels nicht das Geringste entgegenzusetzen haben. Selbst all die Schrecken, die diese verdammte Burg mir bereitet, vermögen das Band, das mich mit [ridden_dragon.GetNameNoTooltip] verbindet, nicht zu schwächen!"
 agot_dragon.0010.oldtown:0 "Der Hohenturm wird seinem Namen gerecht. [ridden_dragon.GetName] braucht eine Weile, um mit den Schwingen die Spitze zu erklimmen. Dort kreisen wir umher — als wäre [ridden_dragon.GetNameNoTooltip] zu einer bloßen Motte geworden, angezogen vom Schein einer Kerze.\n\nEs mag stimmen, dass Drachen fleischgewordenes Feuer sind, und niemand zweifelt an ihrer überlegenen Naturgewalt... so mag dieser gewaltige Leuchtturm, der alles um sich herum überragt, vielleicht etwas Vertrautes in [ridden_dragon.GetName] wecken.\n\nBeide sind ein Sinnbild. Das eine, was der Mensch erschaffen kann; das andere, was die Natur erschaffen kann. Zwei Wesen, die Ehrfurcht und Schrecken einflößen. Zu wissen, dass es mir gelungen ist, mit einem solchen Wesen ein Band zu knüpfen, erfüllt mich in #italic höchstem#! Maße mit Freude."
 agot_dragon.0010.coastal:0 "Mit flach auf [ridden_dragon.GetName] gelegten Händen, den Kopf an seine harten und doch vertrauten Schuppen geschmiegt, spüre ich das Leben, das durch [ridden_dragon.Custom('GetDragonHerHis')]en Körper strömt — ein Leben, das wir durch unsere Verbindung teilen. Ich lächle [ridden_dragon.GetName] an, und ich könnte schwören, dass [ridden_dragon.Custom('GetDragonSheHe')] zurücklächelt, in der Sprache, die nur Drachen eigen ist.\n\nOhne Verzug heben wir ab. Während wir uns mühelos in der Weite des Himmels verlieren könnten, zwischen den Wolken kreisend, trägt mich [ridden_dragon.GetNameNoTooltip] gen Meer. Eine andere Weite — ebenso erhaben.\n\n[ridden_dragon.Custom('GetDragonHerHis')|U]e Geschwindigkeit ist so beeindruckend, dass sie Wellen auf der Wasseroberfläche erzeugt. Die Fische fliehen und zerstreuen sich bei unserem Nahen, während die verspielten Delfine neben uns herschwimmen. Mit einem jähen, kraftvollen Schlag [ridden_dragon.Custom('GetDragonHerHis')]er Flügel steigt [ridden_dragon.GetNameNoTooltip] empor — dorthin, wo selbst der ausgelassenste Delfin uns nicht mehr folgen kann."
 agot_dragon.0010.cloudforest:0 "[ridden_dragon.GetName] breitet [ridden_dragon.Custom('GetDragonHerHis')]e Schwingen aus — ein Zeichen, dass [ridden_dragon.Custom('GetDragonSheHe')] bereit ist zu fliegen. Ich klopfe zur Bestätigung einige Male liebevoll auf [ridden_dragon.Custom('GetDragonHerHis')]en Hals, und dann schießt [ridden_dragon.Custom('GetDragonSheHe')] gen Himmel empor.\n\nSchon bald sind wir inmitten der Wolkenschwaden, wo die Sicht durch dichten Nebel getrübt ist — doch heute erscheinen mir die Schwaden besonders undurchdringlich, als ermuntere #italic irgendetwas#! uns zur Umkehr statt zum Weiterfliegen. Hier, allein, spüre ich das Band, das uns verbindet, ungestört von allem anderen. [ridden_dragon.GetNameNoTooltip] spürt meine Frustration durch unsere Verbindung, und als wolle er mich davon befreien, entfesselt [ridden_dragon.Custom('GetDragonSheHe')] das Feuer mit voller Wucht.\n\nDiese nebligen Massen sind nichts weiter als Wassertröpfchen, und Feuer beugt sich nicht dem Wasser — #attacker_color schon gar nicht Drachenfeuer#!. Der gesamte umliegende Nebel wird zerstreut... oder vielmehr vom glühenden Feuerstrahl hinweggefegt. Diese harmlose Geste — für einen Drachen — gemahnt alle an die Macht dieser göttlichen Geschöpfe: #italic Selbst die Natur muss sich ihrem Willen beugen.#!"
 agot_dragon.0010.frozenflats:0 "[ridden_dragon.GetName] und ich sind schon eine Weile in der Luft, als [ridden_dragon.Custom('GetDragonSheHe')] beginnt, näher an den eisigen Boden hinabzutauchen. Kraftvolle Schläge [ridden_dragon.Custom('GetDragonHerHis')]er Flügel bremsten [ridden_dragon.GetName] im Fallen, bevor [ridden_dragon.Custom('GetDragonSheHe')] [ridden_dragon.Custom('GetDragonHerHis')]e Krallenfüße auf dem Eis aufsetzte. In diesem Moment begann [ridden_dragon.Custom('GetDragonSheHe')] auf dem Eis einfach weiter zu gleiten.\n\nIch hätte nicht erwartet, dass [ridden_dragon.GetName] das begeistern würde — doch so ist es! Ohne es zu bemerken, ist dieser Drachenritt zu einer Rutschpartie geworden. Ich gleite aus dem Sattel, um das Eis selbst zu genießen. Kindisches Vergnügen gewiss, doch mit [ridden_dragon.GetNameNoTooltip] geteilt stört mich das keineswegs. Als [ridden_dragon.Custom('GetDragonSheHe')] genug hat, gräbt [ridden_dragon.Custom('GetDragonSheHe')] [ridden_dragon.Custom('GetDragonHerHis')]e Klauen fest ins Eis, um sicheren Stand zu gewinnen.\n\nAls ich gerade wieder in den Sattel steigen will, bemerke ich, wie [ridden_dragon.GetName] den Kopf senkt, um [ridden_dragon.Custom('GetDragonHerHis')]e Spiegelung im Eis zu betrachten. Ich tue es gleich — doch statt meines eigenen Gesichts erblicke ich nur [ridden_dragon.GetNameNoTooltip]."
 agot_dragon.0010.urban1a:0 "Ohne viel Aufhebens trägt mich [ridden_dragon.GetName] hoch über die Stadt empor. Bei diesem Ritt spüre ich — nein, ich weiß es; ich weiß es, weil ich es #italic spüre#! — dass [ridden_dragon.Custom('GetDragonSheHe')] sich nicht in der Weite des Himmels verlieren will. Was [ridden_dragon.Custom('GetDragonSheHe')] will, ist über die Stadt zu fliegen und damit den Ort und seine Bewohner zu beherrschen. Alle Drachen tragen diesen tiefen – manchmal verborgenen – Instinkt in sich, über alles, was sie umgibt, zu herrschen.\n\n"
 agot_dragon.0010.urban1b:0 "Ohne viel Aufhebens reißt uns [ridden_dragon.GetName] himmelwärts. Unten wimmelt die Stadt vor Leben. All diese Menschen, ihren Geschäften nachgehend, durch die Straßen strömend — wie Blut, das in den Adern eines Drachen siedet. Zweifellos war es diese Lebendigkeit, die [ridden_dragon.GetName] dazu trieb, der Stadt so nah zu bleiben, dass ich die staunenden Gesichter des gemeinen Volkes beinahe deutlich erkennen konnte.\n\n"
 agot_dragon.0010.urban2a:0 "Wie oft ich auch auf [ridden_dragon.GetName] reite — es hört nie auf, dass das gemeine Volk die Nase rümpft, wenn wir vorüberziehen. Denn dies ist der einzige Weg, auf dem die Gemeinen an unsere Stelle gelangen können: in der Vorstellung. Das Vorrecht der Drachenreiter ist ihnen nicht vergönnt.\n\n"
 agot_dragon.0010.urban2b:0 "Das gemeine Volk kann so ein Geschöpf, das über ihm fliegt, nicht einfach übersehen. Sie alle recken die Augen gen Himmel... Wie oft sie dieses Schauspiel auch gesehen haben mögen — die Gemeinen wissen, dass ihnen das Vorrecht eines Drachenreiters niemals zuteil werden wird.\n\n"
 agot_dragon.0010.urban3a:0 "Diese Bauern werden diese Macht, diesen Ruhm niemals kennen. Er ist mir und meinesgleichen vorbehalten. Drachenreiter sollten kein Mitleid mit dem gemeinen Volk empfinden — nein, sie #italic können#! es nicht. Dies ist ein Geschenk von [ridden_dragon.GetNameNoTooltip] an #italic mich#!."
 agot_dragon.0010.urban3b:0 "Sie werden niemals wissen, wie es sich anfühlt, ein solches Geschöpf zu reiten, noch das Band begreifen, das mich mit [ridden_dragon.GetNameNoTooltip] verbindet. Und darin beklage ich ihr Schicksal — denn wenn ich in diesem Augenblick so belebt bin, so verdanke ich es wahrhaftig [ridden_dragon.GetNameNoTooltip]."
 agot_dragon.0010.urban3c:0 "Für immer werden sie bleiben, was sie sind... Kaufleute, Schmiede, Weber, Metzger, was auch immer. Berufe, die — so nützlich sie auch sein mögen — ihnen niemals die Tore zur wahren Freiheit öffnen werden. Diese Freiheit kann nur ein Drache schenken, und eben das macht das Band mit [ridden_dragon.GetNameNoTooltip] so kostbar."
 agot_dragon.0010.a:0 "Der Wind! Der Himmel! Welch eine Freiheit!"
 agot_dragon.0010.a.arrogant:0 "Hier oben bin ich den Göttern näher denn den Menschen!"
 agot_dragon.0010.a.f:0 "Ihr werdet die Zeit im Himmel einfach genießen."
 agot_dragon.0010.b:0 "Zeig mir den Weg, [ridden_dragon.GetNameNoTooltip]!"
 agot_dragon.0010.b.f:0 "Ihr werdet [ridden_dragon.GetNameNoTooltip] frei fliegen lassen."
 agot_dragon.0010.c:0 "Zeit, unsere Luftmanöver zu üben."
 agot_dragon.0010.c.f:0 "Ihr werdet Eure Kampfmanöver mit [ridden_dragon.GetNameNoTooltip] einüben."

 agot_dragon.0011.t:0 "Abflug verschoben"
 agot_dragon.0011.desc:0 "Ich trete an den Sattel von [ROOT.Char.MakeScope.Var('current_dragon').GetCharacter.GetName] heran, schwinge meine Beine hinüber und spüre, wie [ROOT.Char.MakeScope.Var('current_dragon').GetCharacter.Custom('GetDragonHerHis')]e mächtigen Muskeln sich unter mir anspannen, während ich die Sattelriemen festziehe. Verflucht... die Riemen, sie wollen einfach nicht... fest... #S Aghhh! #!\n\nMit einem Krachen finde ich mich neben [ROOT.Char.MakeScope.Var('current_dragon').GetCharacter.GetFirstNameNoTooltip] auf dem Boden wieder, mein verschwommener Blick registriert den verdutzten Ausdruck, mit dem [ROOT.Char.MakeScope.Var('current_dragon').GetCharacter.Custom('GetDragonSheHe')] mich betrachtet. Das unterdrückte Gelächter meiner Gefolgsleute hallt in meinem dröhnenden Kopf nach, während ich mich aufrichte. Vielleicht ist Drachenreiten heute keine so gute Idee."
 agot_dragon.0011.a:0 "Nun ja, vielleicht beim nächsten Mal!"
 agot_dragon.0011.a.f:0 "Eure Trunksucht hat heute Euren Flug gestrichen."

 agot_dragon.0012.t:0 "Trunkenheit am Zügel"
 agot_dragon.0012.desc:0 "Unbeholfen trete ich an den Sattel von [ROOT.Char.MakeScope.Var('current_dragon').GetCharacter.GetName] heran, verfehle beinahe den Tritt, bevor es mir gelingt, meine Beine über [ROOT.Char.MakeScope.Var('current_dragon').GetCharacter.Custom('GetDragonHerHis')]en Rücken zu schwingen. Mit einem genuschelten Befehl und einem gewaltigen Ruck spüre ich, wie [ROOT.Char.MakeScope.Var('current_dragon').GetCharacter.GetName] aufwärts schnellt — und binnen Augenblicken gleiten wir durch den freien Himmel.\n\nIch spüre den Wind über mein Gesicht streichen und schließe die Augen, während die Luftströme gegen meine taube Haut prasseln. Plötzlich merke ich, wie mein Gleichgewicht ins Schwanken gerät — ich greife nach dem Sattel, doch meine zappelnden Finger finden keinen Halt! Macht nichts, die Riemen werden mich schon halten...\n\nTun sie nicht. Ich hatte vergessen, sie zu binden."
 agot_dragon.0012.a:0 "#S Oh scheeeeeeeiiiiiii—#!"
 agot_dragon.0012.a.f:0 "Eure Trunksucht hat Euch heute den Garaus gemacht."

 # Dragon terror regret event
 agot_dragon.0013.t:0 "Schauderhafte Träume eines schauderhaften Menschen"
 agot_dragon.0013.desc:0 "Gesichter. Gesichter schreien zu mir empor, während ich vorüberfliege, ihre Haut löst sich ab im Sog der Schwingen meines Drachen, während sie unter uns verbrennen. Wir versuchen schneller zu fliegen, verbrennen dabei, doch die Knochen stolpern weiter voran. Männer, Frauen, Kinder. Sie schreien auf uns ein. Kommen näher. Sie krallen sich an mir hoch. Flehen mich an aufzuhören. Greifen. Strecken sich aus. Ziehen mich hinab.\n\nIch erwache in kaltem Schweiß, das Herz hämmert in meiner Brust. Ich bekomme die Gesichter nicht aus dem Kopf. Ich bekomme die Schreie nicht aus den Ohren. Ich bekomme den Geruch verbrannten Fleisches nicht aus der Nase. Ich bekomme die Hitze der Flammen nicht von der Haut.\n\n#S Ich bekomme die Schuld nicht aus meinem Herzen.#!"
 agot_dragon.0013.a:0 "Warum habe ich je solche Gräuel begangen!?"
 agot_dragon.0013.b:0 "Ich... ich werde Trost im Trunk suchen... vielleicht..."
 agot_dragon.0013.c:0 "Ich... ich muss ins Freudenhaus."
 agot_dragon.0013.d:0 "Ich kann heute niemandem ins Gesicht sehen!"
 agot_dragon.0013.e:0 "Ich muss ihren Schmerz als meinen eigenen tragen!"
 agot_dragon.0013.f:0 "Neue Kleider! Diese hier sind... besudelt..."
 agot_dragon.0013.f.f:0 "Ihr werdet neue Kleider kaufen, um jene zu ersetzen, in denen Ihr die Gräueltaten verübt habt."
 agot_dragon.0013.g:0 "Gesichter in meinen Träumen kenne ich zur Genüge..."
 agot_dragon.0013.h:0 "Diener! Ich brauche heute ein doppeltes Frühstück!"
 agot_dragon.0013.i:0 "Ich... glaube nicht, dass ich heute etwas essen kann."
 agot_dragon.0013.j:0 "Ich werde meine Gedanken zu Papier bringen — vielleicht hilft das."
 agot_dragon.0013.k:0 "Nun, mein morgendlicher Lauf wird heute etwas länger ausfallen."
 agot_dragon.0013.l:0 "Ich werde den Armen spenden — vielleicht lindert das meine Schuld."
 agot_dragon.0013.m:0 "BÖSER TRAUM SCHLIMM! BÖSER BÖSER TRAUM!"

 # Dragon conquest surrender event
 agot_dragon.0014.t:0 "Der [ROOT.Char.GetTitleAsNameNoTooltip], der das Knie beugte?"
 agot_dragon.0014.desc:0 "„Schlimme Neuigkeiten, Euer Gnaden!“ ruft mein Diener und eilt auf mich zu. „Es kam die Nachricht, dass [attacker.GetTitledFirstName] Eure Unterwerfung verlangt! [attacker.GetSheHe|U] fordert, dass Ihr [attacker.Custom('DE_PRO_PER_S_3P_D')] die Krone übergebt und [attacker.Custom('DE_PRO_PER_S_3P_A')] als Euren rechtmäßigen Lehnsherrn anerkennt!“\n\nDer Hof ist entsetzt — einem Drachen auf dem Schlachtfeld entgegentreten? Ist dies wirklich das, wofür ich meine Streitkräfte einsetzen will? Freilich ist es ebenso undenkbar, meine Unabhängigkeit aufzugeben.\n\nWas soll ich tun?"
 agot_dragon.0014.a:0 "Ich kann [attacker.GetTitledFirstNameNoTooltip] nicht entgegentreten — ich werde das Knie beugen."
 agot_dragon.0014.a.tt:0 "Ihr werdet Euch [attacker.GetTitledFirstNameNoTooltip] ergeben."
 agot_dragon.0014.b.no_dragon:0 "Ich werde [attacker.GetTitledFirstNameNoTooltip] nicht das Knie beugen!"
 agot_dragon.0014.b.dragon:0 "Wir haben eigene Drachen — wir werden uns nicht ergeben!"
 agot_dragon.0014.b.tt:0 "Ihr werdet Euch [attacker.GetTitledFirstNameNoTooltip] nicht ergeben."

 agot_dragon.0015.opening:0 "[defender.Custom2('AppropriateGreeting', ROOT.Char)]"
 agot_dragon.0015.desc:0 "Ich kann mich Euch nicht widersetzen. Ich, [defender.GetTitledFirstName], schwöre Euch hiermit Treue und erkenne Euch als meinen rechtmäßigen Lehnsherrn an. Ich werde Euch treu dienen und die Ansprüche Eurer rechtmäßigen Erben verteidigen."
 agot_dragon.0015.a:0 "Gut, ich bin froh, dass [defender.GetSheHe] Vernunft walten ließ."
 agot_dragon.0015.a.sadistic:0 "Nun ja, es gibt immer noch ein weiteres Reich zu erobern."

 # Generic dragon gender reveal event
 agot_dragon.0016.t:0 "Fragen des Geschlechts, geklärt"
 agot_dragon.0016.desc.start:0 "Obwohl bis jetzt ich und der Rest der Welt angenommen haben, dass [dragon.GetFirstName] ein männlicher Drache sei"
 agot_dragon.0016.desc.my_dragon:0 "spüre ich nun durch unser Band #emp deutlich#!, dass "
 agot_dragon.0016.desc.others_dragon:0 "werde ich nun darüber in Kenntnis gesetzt, dass [dragonrider.GetTitledFirstName] erklärt, dass"
 agot_dragon.0016.desc.owned_dragon:0 "werde ich nun darüber in Kenntnis gesetzt, dass die Beobachtungen meiner Leute ergeben haben, dass "
 agot_dragon.0016.desc.owned_dragon_revealing:0 "werde ich nun von [revealing.GetName] darüber in Kenntnis gesetzt, dass [revealing.Custom('DE_PRO_POS_S_3P')]e Beobachtungen ergeben haben, dass "
 agot_dragon.0016.desc.wild_dragon:0 "werde ich nun darüber in Kenntnis gesetzt, dass die Beobachtungen und Berichte des gemeinen Volkes ergeben haben, dass "
 agot_dragon.0016.desc.confirm:0 "dies bestätigt wurde. [dragon.GetFirstNameNoTooltip] ist tatsächlich männlich.\n\nDamit ist die Frage nach dem Geschlecht von [dragon.GetNameNoTooltip] ein für alle Mal geklärt."
 agot_dragon.0016.desc.actually:0 "[dragon.GetFirstNameNoTooltip] in Wahrheit weiblich ist!\n\nDie Welt wartet gespannt auf Neuigkeiten über etwaige Eier, die sie legen mag."
 agot_dragon.0016.a:0 "Ich verstehe! Ein [dragon.Custom('DragonGirlBoy')] also."
 agot_dragon.0016.b:0 "Also [dragon.Custom('DragonFemaleMale')]? Das ist gut zu wissen."

 # Child reveals dragon's gender event
 agot_dragon.0030.t:0 "$agot_dragon.0016.t$"
 agot_dragon.0030.desc:0 "Die Frage nach dem Geschlecht von [dragon.GetNameNoTooltip] war in letzter Zeit Gegenstand mancher Erörterung. Als [revealing.GetName] und ich uns darüber unterhalten, mischt sich [child.GetName] mit Nachdruck ein. „[dragon.GetNameNoTooltip] ist ein #italic [dragon.Custom('DragonGirlBoy')]#!!“ ruft [child.GetSheHe]. Wie [child.GetNameNoTooltip] dies weiß, ist unklar — doch [child.GetSheHe] besteht fest auf [child.Custom('DE_PRO_POS_S_3P')]em Standpunkt."
 agot_dragon.0030.a:0 "Aha! Dann also ein [dragon.Custom('DragonGirlBoy')]."

 # Child reveals dragon's flame color
 agot_dragon.0040.t:0 "Die ersten Flammen des Drachen"
 agot_dragon.0040.desc.intro:0 "Im Vorübergehen vernehme ich das ausgelassene Lachen von [child.GetName]; [child.GetSheHe] muss gerade mit [dragon.GetName] spielen. Ich lasse liegen, womit ich beschäftigt war, und nähere mich den beiden — und der Anblick verschlägt mir den Atem. Ohne meine Anwesenheit zu bemerken, sagt [child.GetNameNoTooltip] kichernd "
 # Option for child finding and showing off dragon to parent
 agot_dragon.0040.desc.fire_common:0 "„nochmal, [dragon.GetNameNoTooltip], Feuer, [dragon.GetNameNoTooltip]!“"
 agot_dragon.0040.desc.fire_valyrian:0 "„nochmal, [dragon.GetNameNoTooltip], Dracarys, [dragon.GetNameNoTooltip]!“"
 agot_dragon.0040.desc.fire_breath:0 "Flammen schießen aus dem Rachen des Drachen und entlocken [child.GetNameNoTooltip] erneut frohes Gelächter."
 agot_dragon.0040.desc.fire_breath_craven:0 "Flammen schießen aus dem Rachen des Drachen, und ich ertappe mich dabei, wie ich gen Ausgang zurückweiche. Ein Kind sollte nicht über solche Macht verfügen."
 agot_dragon.0040.a:0 "Erstaunlich."
 agot_dragon.0040.b:0 "Der Drache muss unter Kontrolle gebracht werden, bevor er jemanden tötet."

 # The conquered cities
 agot_dragon.0017.t:0 "Die eroberten Städte"
 agot_dragon.0017.desc:0 "Sieg! Mein neues Reich ist aus dem Fall der Triarchie selbst geschmiedet.\n\nNun, da dieses Gebilde unter meinem eisernen Flügel gefallen ist, bietet sich die Gelegenheit, aus der Asche der alten Oligarchie einen wahrhaft einheitlichen Staat zu formen.\n\nDoch stellt sich von Natur aus die Frage: Wo soll der Sitz meines neuen Reiches sein?"
 agot_dragon.0017.a:0 "[target_title_1.GetNameNoTier] soll der Sitz meines Reiches sein!"
 agot_dragon.0017.a.f:0 "Ihr werdet von [target_title_1.GetBaseNameNoTooltip] aus herrschen."
 agot_dragon.0017.a.tt:0 "[target_title_1.GetBaseName] wird der [de_jure_capital|E] von [GetTitleByKey('e_three_daughters').GetNameNoTier] sein."
 agot_dragon.0017.b:0 "Ist [target_title_2.GetNameNoTier] nicht die passendste Wahl?"
 agot_dragon.0017.b.f:0 "Ihr werdet von [target_title_2.GetBaseNameNoTooltip] aus herrschen."
 agot_dragon.0017.b.tt:0 "[target_title_2.GetBaseName] wird der [de_jure_capital|E] von [GetTitleByKey('e_three_daughters').GetNameNoTier] sein."
 agot_dragon.0017.c:0 "Ich werde von [target_title_3.GetNameNoTier] aus herrschen!"
 agot_dragon.0017.c.f:0 "Ihr werdet von [target_title_3.GetBaseNameNoTooltip] aus herrschen."
 agot_dragon.0017.c.tt:0 "[target_title_3.GetBaseName] wird der [de_jure_capital|E] von [GetTitleByKey('e_three_daughters').GetNameNoTier] sein."
 agot_dragon.0017.d:0 "Diese Kaufleute dienen nun #bold mir#! — ich werde nicht zu ihnen kommen!"
 agot_dragon.0017.d.f:0 "Ihr werdet an Eurem derzeitigen Reichssitz bleiben und von dort aus herrschen."
 agot_dragon.0017.d.tt:0 "[current_capital.GetName] wird der [de_jure_capital|E] von [GetTitleByKey('e_three_daughters').GetNameNoTier] sein."

 # Dragon Death
 agot_dragon.0018.t:0 "Tod eines Drachen"
 agot_dragon.0018.desc:0 "[dead_dragon.GetNameNicknamed] ist tot — wie kann das sein? Das Band, das wir so lange geteilt haben, existiert nicht mehr.\n\nIch hätte nie erwartet, dass [dead_dragon.Custom('GetDragonSheHe')] vor mir gehen würde. [Select_CString( ROOT.Char.IsFemale, 'Diejenige', 'Derjenige' )] zu sein, [ROOT.Char.Custom('DE_ART_DEF_S_N')] zurückbleibt, ist eine Qual — ich spüre die Leere, wo unser Band einst war, als hätte jemand es aus meiner Brust herausgeschnitten."
 agot_dragon.0018.a:0 "Ich werde dich vermissen, [dead_dragon.GetNameNoTooltip]..."
 agot_dragon.0018.b:0 "Wie soll ich nur weitermachen?"

 # Dragon mate notification
 agot_dragon.0019.t:0 "Ein neues Paar"
 agot_dragon.0019.desc:0 "Mir wurde berichtet, dass [dragon_female.GetFirstName] und [dragon_male.GetFirstName] zunehmend mehr Zeit miteinander verbringen. Es scheint, dass sie Gefallen aneinander gefunden haben und nun als Paar gelten.\n\nHoffentlich wird dies bald zu einem Gelege führen."
 agot_dragon.0019.a.compassionate:0 "#bold Ah!#! Wie wunderbar!"
 agot_dragon.0019.a.sadistic:0 "Ha! Welch Schrecken ihre Nachkommen bringen werden!"
 agot_dragon.0019.a.lustful:0 "Eigentlich gar nicht so anders als wir Menschen."
 agot_dragon.0019.a.cynical:0 "Ein Paar? Es sind bloß Tiere."
 agot_dragon.0019.a:0 "Nun... gut für sie, nehme ich an."
 agot_dragon.0019.tt:0 "[dragon_female.GetName] und [dragon_male.GetName] sind nun ein Paar."

 # Dragon went wild notification
 agot_dragon.0020.t:0 "Ein entflogener Drache"
 agot_dragon.0020.desc:0 "Traurige Neuigkeiten für unser Haus — [now_wild_dragon.GetName] scheint nach dem Tod von [dead_rider.GetName] davongeflogen zu sein. Ob es Trauer oder der Drang nach Freiheit war, der [now_wild_dragon.GetFirstNameNoTooltip] forttrieb, werden wir wohl nie erfahren.\n\nEs ist ein trister Tag für uns alle, da wir nun den Verlust von Drache und Reiter zugleich betrauern müssen."
 agot_dragon.0020.wild_fire_desc:0 "Seltsame Neuigkeiten für unser Haus — [now_wild_dragon.GetName] scheint nach dem Seefeuer-Unfall von [human_who_became_dragon.GetName] davongeflogen zu sein. Ich weiß nicht, welche Folgen diese Entwicklungen haben werden, doch es war zweifellos ein sehr seltsamer Tag."
 agot_dragon.0020.a:0 "Ich kann es nicht fassen..."
 agot_dragon.0020.a.f:0 "Ihr grübelt darüber, wie mit dem Verlust von [now_wild_dragon.GetNameNoTooltip] umzugehen sei."
 agot_dragon.0020.a.tt:0 "[now_wild_dragon.GetName] ist nun ein [wild_dragon|E]"

 # Dragon suicide
 agot_dragon.0021.desc:0 "Ich trete auf [helping_dragon.GetName] zu, meine Schritte hallen auf dem Stein, als [helping_dragon.Custom('GetDragonSheHe')] [helping_dragon.Custom('GetDragonHerHis')]e mächtige Gestalt mir zuwendet. Ich schaue tief in [helping_dragon.Custom('GetDragonHerHis')]e Augen — ein zweifelnder Blick begegnet meinem. Ich spüre [helping_dragon.Custom('GetDragonHerHis')]e Trauer, [helping_dragon.Custom('GetDragonHerHis')]e unausgesprochenen Fragen — doch am Ende wird [helping_dragon.Custom('GetDragonSheHe')] gehorchen.\n\nDer Rachen öffnet sich — ein furchteinflößendes Bild. Feuer lodert im Schlund. Hitze brandet auf mich ein, und alles um mich herum wird weiß."
 agot_dragon.0021.a.valyrian:0 "#italic Kirimvose, [helping_dragon.GetNameNoTooltip].#!"
 agot_dragon.0021.a:0 "Ich danke dir, [helping_dragon.GetNameNoTooltip]..."

 agot_dragon.0022.desc:0 "Ich trete auf [helping_dragon.GetName] zu, meine Schritte hallen auf dem Stein, als [helping_dragon.Custom('GetDragonSheHe')] [helping_dragon.Custom('GetDragonHerHis')]e mächtige Gestalt mir zuwendet. Ich schaue tief in [helping_dragon.Custom('GetDragonHerHis')]e Augen — ein zweifelnder Blick begegnet meinem. Ich spüre [helping_dragon.Custom('GetDragonHerHis')]e Trauer, [helping_dragon.Custom('GetDragonHerHis')]e unausgesprochenen Fragen — doch am Ende wird [helping_dragon.Custom('GetDragonSheHe')] gehorchen.\n\nDer Rachen öffnet sich — ein furchteinflößendes Bild. Feuer lodert im Schlund. Hitze brandet auf mich ein, ich bereite mich auf das Ende vor — da trifft mich ein gewaltiger #bold SCHLAG#! in die Seite und reißt mich zu Boden."
 agot_dragon.0022.desc_ending:0 "An meiner Stelle steht nun ein Drachenhüter, eingehüllt in Drachenfeuer — er hat sein Leben für meines gegeben."
 agot_dragon.0022.a:0 "Nein! Ich sollte es sein! #italic Lasst mich sterben!#!"
 agot_dragon.0022.a.f:0 "Ihr werdet von Euren anderen Drachenhütern fortgezerrt, während sie Euch vor Euch selbst bewahren."

 # Chased By Cannibal!
 agot_dragon.0023.t:0 "Verfolgt vom Kannibalen!"
 agot_dragon.0023.sili:0 "Ich trete an den Sattel von [ridden_dragon.GetName] heran, schwinge die Beine hinüber und spüre, wie [ridden_dragon.Custom('GetDragonHerHis')]e mächtigen Muskeln sich unter mir anspannen, während ich die Riemen festziehe. Ein Befehl — ein gewaltiger Ruck — und binnen Augenblicken liegen die offenen Lüfte unter uns.\n\n"
 agot_dragon.0023.lord:0 "[ridden_dragon.GetName] hebt ab, und mit wenigen Flügelschlägen sind wir dem Himmel nah. Die Last meines Titels bleibt unten. Für einen Atemzug lang gehört mir nur der Wind — seine Liebkosung, der Kuss der Sonne.\n\n"
 agot_dragon.0023.greeny:0 "Erwartungsvoll schnurrend lässt [ridden_dragon.GetName] mich in [ridden_dragon.Custom('GetDragonHerHis')]en Sattel gleiten. Diese Verbindung — nirgendwo sonst spüre ich sie so. Ein unausgesprochener Befehl, und wir heben ab.\n\n"
 agot_dragon.0023.tukha:0 "Ich strecke die Hand aus — Tautropfen sammeln sich auf meiner Haut. Ihre Stille wiegt schwer in meinem Geist, wie ein Sturm, der am Horizont aufzieht. Wie viele haben je dasselbe gefühlt? Durch alle Zeitalter hindurch — würden sie in einen einzigen Saal passen? Bin ich allein mit dieser Erfahrung?\n\n"
 agot_dragon.0023.aemmly:0 "Königsmund schrumpft zur Bedeutungslosigkeit, als [ridden_dragon.GetName] den Wolken entgegenstürmt. [ridden_dragon.Custom('GetDragonHerHis')|U]e Begeisterung ist ansteckend — und doch wirkt der Rhythmus [ridden_dragon.Custom('GetDragonHerHis')]er Schwingen so beruhigend wie ein Herzschlag. Über die Schwarzwasserbucht hinweg erspähe ich Driftmark und Drachenstein, die Inseln, die hundert Jahre lang die letzten Verbliebenen Valyrias beherbergten — jetzt kaum größer als Pflastersteine.\n\n"
 agot_dragon.0023.cont:0 "Keine paar Minuten später werde ich aus meiner Versunkenheit gerissen — ein Brüllen hinter mir! Mit einem Schauer des Entsetzens drehe ich mich um und sehe [cannibal_dragon.GetName] in vollem Anflug, [cannibal_dragon.Custom('GetDragonHerHis')]e Augen fest auf [ridden_dragon.GetNameNoTooltip] und mich gerichtet!\n\n[cannibal_dragon.Custom('GetDragonSheHe')|U] ist viel zu groß, als das wir eine Chance hätten — wir müssen fliehen, wenn wir überleben wollen!"
 agot_dragon.0023.a:0 "Flieg schneller, [ridden_dragon.GetNameNoTooltip]!"
 agot_dragon.0023.a.valyrian:0 "Soves! Soves, [ridden_dragon.GetNameNoTooltip]!"
 agot_dragon.0023.a.f:0 "Ihr treibt [ridden_dragon.GetNameNoTooltip] zur Eile an — [cannibal_dragon.GetNameNoTooltip] zu entkommen ist alles, was zählt!"
 agot_dragon.0023.escape_t:0 "Entkommen!"
 agot_dragon.0023.escape_tt:0 "Euch und [ridden_dragon.GetNameNoTooltip] gelingt die Flucht vor [cannibal_dragon.GetNameNoTooltip]"

 # Ride Your Dragon (Lifestyle Focused)
 agot_dragon.0024.t:0 "Der Himmel kennt keine Grenzen!"
 agot_dragon.0024.martial:0 "Das Klirren von Schwertern, Speeren und Schilden ist bisweilen tröstlich — doch oft liegt es #bold schwer#! auf mir. Auf dem Rücken von [ridden_dragon.GetName] davonzureiten befreit mich davon, das Lärmen des Übungshofes klingt schwächer und schwächer.\n\nEs wäre naiv zu glauben, dass die Last des Krieges eines Tages endgültig von dieser Welt getilgt sein wird. Die Welt ist zu groß, die menschliche Natur zu streitsüchtig, als dass ein solcher Traum je das Licht der Welt erblicken könnte. Doch mit [ridden_dragon.GetNameNoTooltip] zu fliegen schenkt mir einen persönlichen Frieden.\n\nHier oben ist [ridden_dragon.GetNameNoTooltip] der einzige Schild, den ich brauche — und meinen Wetzstein muss ich nicht mitnehmen, denn unser Band stumpft nicht ab, anders als Schwerter. Solch ein Augenblick des Wohlbefindens mit meinem treusten Kampfgefährten: Das nenne ich einen #bold wahren Sieg#!."
 agot_dragon.0024.learning:0 "An gewöhnlichen Tagen verlasse ich meine Bücher und all dem Reichtum, den sie bergen, nicht gern — doch ein Flug mit [ridden_dragon.GetName] ist nie gewöhnlich. Es ist ein besonderer Augenblick, in dem ich allein mit [ridden_dragon.GetNameNoTooltip] sein darf — ein Augenblick, in dem ich nicht mehr #bold denken#! muss. Ich kann all die Formeln und Gleichungen vergessen, all die Schriften und Geschichten.\n\nMein Kopf wird leicht wie eine Wolke, ich steige so hoch, dass es nichts mehr gibt, das meine Neugier wecken könnte. Alles, was hier zählt, ist [ridden_dragon.GetNameNoTooltip]. Im Himmel gibt es keine Tintenzeichen auf Pergamentfetzen; keine verworrenen Chroniken, deren Wahrheitsgehalt noch zu klären wäre; keine müßigen Grübeleien über abstrakte Begriffe. Hier ist alles greifbar und vollkommen klar.\n\nNur ich, [ridden_dragon.GetNameNoTooltip] und unser Band. Und diese #bold Schlichtheit#! begeistert mich."
 agot_dragon.0024.intrigue:0 "Ich werfe noch einen letzten Blick hinter mich — als wollte ich sichergehen, dass mir niemand Ungebetenes gefolgt ist — dann besteige ich [ridden_dragon.GetName] und befehle, abzuheben. Allein schon, jene hinter sich zu lassen, die mir Schaden wünschen, ist #bold befreiend#!.\n\nKein Meuchler, kein Verschwörer kann mich hier noch erreichen. Die Dunkelheit ist eine mächtige Waffe für jene, die sie zu nutzen wissen — und das tue ich — doch ich kann nicht leugnen, dass es mir unendlich gut tut, im Glanz der Sonne mit meinem treuen Mitstreiter zu fliegen.\n\nKeine verborgenen Klingen, die mich beunruhigen. Kein Komplott, das über meinem Haupt hängt. Hier nützt mir die Kälte der Schatten nichts mehr — es ist die #bold Wärme#! von [ridden_dragon.GetNameNoTooltip], die diese heilsame Wirkung auf mich hat."
 agot_dragon.0024.diplomacy:0 "Diplomatie ist eine Sache der Worte. Ausgetauschter Worte, ob mündlich oder schriftlich. Verhandlungen, Gespräche, Dialoge, Unterhaltungen... Alles dreht sich um den #bold Austausch#! — von Geschenken oder Worten. Dabei wäre Diplomatie so viel einfacher, wenn alle so miteinander sprechen könnten wie Drachenreiter mit ihren Drachen.\n\nKeine Deutung mehr, keine Verstellung, keine List, kein Schmeicheln. Nur das Greifbare, das Wahrhaftige. Sprache in ihrer reinsten Form. Geist ersetzte das Pergament, Verbundenheit die Tinte. Sollte so etwas je möglich werden, wäre die Welt von Grund auf verändert. Doch dieser Tag ist noch nicht gekommen.\n\nHeute können nur Drachenreiter mit Drachen sprechen — ein Vorrecht weniger Auserwählter. Und doch, wenn [ridden_dragon.GetName] und ich gemeinsam in unserer eigenen Welt sind, kann ich nicht umhin zu denken, dass wahre Diplomatie auf #bold Verbindung#! beruhen sollte."
 agot_dragon.0024.stewardship:0 "[ridden_dragon.GetName] scheint aufbruchbereit — ich noch nicht. Ich muss noch ein paar Dinge prüfen. Sitzt der Sattel richtig? Wie viel Gold kostet mich der Viehbestand, wenn dieser Ritt [ridden_dragon.Custom('GetDragonHerHis')]en Hunger weckt? Wie viele Meilen könnten wir fliegen? Meine Gedanken überwältigen mich — alles reduziert sich auf #bold Zahlen#!.\n\nEin leises Knurren reißt mich wieder zurück in die Wirklichkeit. Du hast Recht, [ridden_dragon.GetNameNoTooltip] — #italic vergiss das alles!#! Nicht um zu grübeln bin ich heute auf [ridden_dragon.GetName] gestiegen, sondern um mich von dieser Last zu befreien — darum schwinge ich mich in den Sattel und lasse mich forttragen.\n\nIch fühle mich so leicht wie die Reichsfinanzen nach einem Festmahl mit siebenundsiebzig Gängen, Gauklern und taumelnden Zwergen. Wenn ich bei [ridden_dragon.GetNameNoTooltip] bin, sind die einzigen Zahlen, die mich kümmern, die Minuten bis zu meiner Rückkehr zu den Pflichten. Und der einzige #bold Reichtum#!, der mich interessiert, ist jener, der mich mit [ridden_dragon.GetNameNoTooltip] verbindet."
 agot_dragon.0024.fallback:0 "$agot_dragon.0010.troof$"
 agot_dragon.0024.m:0 "Ein Drache ist kein #italic bloßes#! Kriegswerkzeug. [ridden_dragon.Custom('GetDragonSheHe')|U] ist fleischgewordener Krieg."
 agot_dragon.0024.l:0 "[ridden_dragon.GetNameNoTooltip] hat mir viel zu lehren. #italic Einfachheit#! ist oft die Lösung."
 agot_dragon.0024.i:0 "Ränke gedeihen im Dunkeln — doch das #italic Licht#! schenkt mir Klarheit."
 agot_dragon.0024.d:0 "Wenn meine Freunde und Verbündeten sich mir doch nur #italic so#! verbunden fühlen könnten."
 agot_dragon.0024.s:0 "[ridden_dragon.GetNameNoTooltip] kennt die Wahrheit: Wahrhaftiger Reichtum ist gut verbrachte #italic Zeit#!."
 agot_dragon.0024.oops:0 "$agot_dragon.0010.a$"
 agot_dragon.0024.flavor:0 "Ihr gewinnt eine wertvolle Erkenntnis aus dem Ritt mit Eurem Drachen."

 # Drink wildfire
 agot_dragon.0101.t:0 "Durst nach Feuer"
 agot_dragon.0101.aerion.desc:0 "Ich starre in meinen Becher, dessen Seiten bereits grün verfärbt sind, als [worried_physician.GetFirstName] in meine Gemächer stürzt, die Stirn schweißgebadet und sorgengefurcht.\n\n„Mein[ROOT.Char.Custom('DE_END_PRO_S_N')] [ROOT.Char.GetLadyLord]!“ ruft [worried_physician.GetSheHe] und greift nach dem Becher. „Was tut Ihr da?“\n\nIch schenke [worried_physician.Custom('DE_PRO_PER_S_3P_D')] kaum Beachtung und weiche [worried_physician.Custom('DE_PRO_POS_S_3P')]em Griff aus.\n\n„Hat uns [aerion_brightflame.GetFirstNameNicknamed] nichts gelehrt?“ fährt [worried_physician.GetSheHe] fort, noch immer außer Atem. „Auch er trank Seefeuer, um sich zu verwandeln — und starb stattdessen schreiend.“"
 agot_dragon.0101.desc:0 "Ich starre in meinen Becher, dessen Seiten bereits grün verfärbt sind, als [worried_physician.GetFirstName] in meine Gemächer stürzt, die Stirn schweißgebadet und sorgengefurcht.\n\n„Mein[ROOT.Char.Custom('DE_END_PRO_S_N')] [ROOT.Char.GetLadyLord]!“ ruft [worried_physician.GetSheHe] und greift nach dem Becher. „Was tut Ihr da?“\n\nIch schenke [worried_physician.Custom('DE_PRO_PER_S_3P_D')] kaum Beachtung und weiche [worried_physician.Custom('DE_PRO_POS_S_3P')]em Griff aus.\n\n„Dieser Becher wird Euch nicht in einen Drachen verwandeln.“ fährt [worried_physician.GetSheHe] fort, noch immer außer Atem. „Er wird Euch in eine Leiche verwandeln!“"
 agot_dragon.0101.a:0 "Ich werde alle meine Feinde zu Asche verbrennen!"
 agot_dragon.0101.b:0 "Bei näherer Überlegung... [worried_physician.GetFirstNameNoTooltip] hat Recht."

 agot_dragon.0200.t:0 "Eine Plage namens [wild_dragon.GetNameNoTooltip]"
 agot_dragon.0200.desc:0 "[chancellor.GetTitledFirstName] ist erschienen, um die Bedrohung zu besprechen, die [wild_dragon_location.GetName] heimsucht. „Wir müssen etwas gegen den Drachen [wild_dragon.GetNameNicknamed] unternehmen. Das Reich ist in Angst und Schrecken versetzt — wir können nicht tatenlos zusehen, während das Ungetüm das Land verwüstet. Es gibt glaubwürdige Berichte, dass [wild_dragon.Custom('GetDragonHerHis')] Unterschlupf in [wild_dragon_location.GetNameNoTooltip] entdeckt wurde. Vielleicht ist es an der Zeit, jemanden zu schicken, der dieser Sache ein für alle Mal ein Ende bereitet.“\n\nDie Anwesenden nicken zustimmend, doch die Frage bleibt: Wer soll sich dieser Aufgabe stellen?"
 agot_dragon.0200.a:0 "Der Ruhm soll meiner sein."
 agot_dragon.0200.b:0 "Ich werde jemanden bezahlen, der sich darum kümmert."
 agot_dragon.0200.c:0 "Schickt [court_combatant.GetFirstNameNicknamed]."
 agot_dragon.0200.d:0 "Gut, ich werde es selbst erledigen."
 agot_dragon.0200.e:0 "Es ist besser, ein wütendes Ungeheuer nicht zu reizen."

 agot_dragon.0201.t:0 "$agot_dragon.0200.t$: Gedungene Mörder"
 agot_dragon.0201.desc:0 "Wie angewiesen hat [chancellor.GetTitledFirstName] einige verwegene Kandidaten gefunden, die bereit sind, den Drachen [wild_dragon.GetNameNicknamed] zu erlegen... #italic gegen Bezahlung.#!"
 agot_dragon.0201.desc_child:0 "\n\n[candidate_son.GetFirstNameNicknamed], mein Kind, scheint geradezu erpicht darauf zu sein, diese Aufgabe zu übernehmen."
 agot_dragon.0201.a:0 "[candidate_merc.GetFirstName] ist der Beste der Besten."
 agot_dragon.0201.b:0 "[candidate_knight.GetFirstName] ist erschwinglich."
 agot_dragon.0201.personal_knight:0 "[candidate_personal_knight.GetFirstName] hat sich bewährt — schickt [candidate_personal_knight.Custom('DE_PRO_PER_S_3P_A')] stattdessen."
 agot_dragon.0201.c:0 "Mein Kind wird uns Ehre bereiten."
 agot_dragon.0201.d:0 "Diese Narren taugen nichts — wir werden etwas anderes versuchen."
 agot_dragon.0201.e:0 "Bei näherer Überlegung... das Ungeheuer darf leben."

 agot_dragon.0202.t:0 "$agot_dragon.0200.t$ wurde erlegt"
 agot_dragon.0202.desc:0 "Nach banger Erwartung über Tage hinweg weckt mich der Jubel auf den Straßen — ich eile auf meinen Balkon und bin erleichtert über den ersehnten Anblick.\n\n[dragon_fighter.GetTitledFirstNameNicknamed] und [dragon_fighter.Custom('DE_PRO_POS_S_3P')]e Gefährten sind zurückgekehrt! Hinter ihnen ein Karren mit Trophäen des erlegten Ungetüms, [wild_dragon.GetNameNicknamed]. Mein Blick fällt auf eine abgetrennte Klaue und ein Fass voll [wild_dragon.Custom('GetDragonColor')]er Schuppen, vom Hals des Drachen geschabt.\n\nIch eile hinunter, um [dragon_fighter.GetNameNoTooltip] auf den Straßen zu empfangen — eine Geißel des Landes ist gebannt, und die Helden sollen für ihre Taten gepriesen werden!"
 agot_dragon.0202.a:0 "All meine Untertanen sollen diesen Tag feiern!"
 agot_dragon.0202.a.tt:0 "[dragon_fighter.GetFirstNameNoTooltip] hat den wilden Schrecken [wild_dragon.GetNameNoTooltip] erschlagen!"

 agot_dragon.0203.t:0 "$agot_dragon.0200.t$ fordert ein weiteres Opfer"
 agot_dragon.0203.desc_run:0 "[dragon_fighter.GetTitledFirstNameNicknamed] hat sich als feigen Wicht erwiesen! Anstatt dem wilden Drachen entgegenzutreten, der das Land terrorisiert, ist [dragon_fighter.GetFirstNameNoTooltip] beim ersten Anblick von [wild_dragon.GetNameNoTooltip] und [wild_dragon.Custom('GetDragonHerHis')]en [wild_dragon.Custom('GetDragonColor')]en Schwingen geflohen.\n\nBei allem Prahlen und Poltern hat [dragon_fighter.GetFirstNameNoTooltip] sich für alle Zeiten blamiert.\n\n[wild_dragon.GetNameNicknamedNoTooltip] zieht noch immer durch den offenen Himmel und terrorisiert das gemeine Volk — es muss etwas anderes unternommen werden..."
 agot_dragon.0203.desc_dead:0 "Nach allzu langer Zeit ohne Nachricht nach dem Aufbruch von [dragon_fighter.GetTitledFirstNameNoTooltip] ist endlich ein versprengter Soldat aus [dragon_fighter.Custom('DE_PRO_POS_S_3P')]er Truppe zurückgekehrt. Die Neuigkeiten, die [dragon_fighter.Custom('DE_PRO_PER_S_3P_N')] überbringt, hätten kaum schlimmer sein können...\n\n[dragon_fighter.GetFirstNameNoTooltip] [dragon_fighter.GetDeathReason], und der Großteil von [dragon_fighter.Custom('DE_PRO_POS_S_3P')]er Truppe wurde von [wild_dragon.GetNameNicknamed] bei lebendigem Leibe gefressen! Der Rest hat sich in alle Winde zerstreut.\n\n[wild_dragon.GetNameNoTooltip] zieht noch immer durch den offenen Himmel und terrorisiert das gemeine Volk — es muss etwas anderes unternommen werden... Doch wer wird es jetzt wagen, den Drachen herauszufordern?"
 agot_dragon.0203.a:0 "#bold Verdammt!#!"

 agot_dragon.1001.t:0 "Die Aussaat"
 agot_dragon.1001.targ:0 "Die #italic vermeintlichen#! Drachensamen sind eingetroffen. Manche dieser angehenden Drachenreiter tragen die Züge meines Hauses, andere wirken, als entstammten sie einem völlig anderen Erbe. Einige strahlen lässige Zuversicht aus, während andere vor Angst schwitzen und zittern.\n\nDas Haus des Drachen zeigt viele Gesichter, und ich kann nicht umhin zu hoffen, dass sich unter dieser gedrängten Menge ein wahres Drachenblut verbirgt.\n\nSie alle sind meinem Ruf gefolgt, und jeder weiß um das Risiko. Nun muss ich einen letzten Augenblick innehalten.\n\n#italic Ist es das wert?#!"
 agot_dragon.1001.desc:0 "Die #italic vermeintlichen#! Drachensamen sind eingetroffen. Manche dieser angehenden Drachenreiter tragen die Züge der großen valyrischen Häuser von einst, andere wirken, als entstammten sie einem völlig anderen Erbe. Einige strahlen lässige Zuversicht aus, während andere vor Angst schwitzen und zittern.\n\nSie alle sind meinem Ruf gefolgt, und jeder weiß um das Risiko. Nun muss ich einen letzten Augenblick innehalten.\n\n#italic Ist es das wert?#!"
 agot_dragon.1001.a:0 "Gebt das Zeichen, dass es beginnen kann."
 agot_dragon.1001.b:0 "Das Risiko ist #italic zu#! groß."
 agot_dragon.1001.b_tt:0 "Die Aussaat wird abgebrochen"

 dragonseed_flees_during_taming_tt:0 "[tamer.GetFirstName] floh vor [dragon.GetFirstName]"
 dragon_wounds_during_taming_tt:0 "[dragon.GetFirstName] verwundete [tamer.GetFirstName]"
 dragon_burns_during_taming_tt:0 "[dragon.GetFirstName] verbrannte [tamer.GetFirstName]"
 dragon_success_taming_tt:0 "[tamer.GetFirstName] zähmte [dragon.GetFirstName]!"

 agot_dragon.1003.t:0 "Die Ernte"
 agot_dragon.1003.desc_none_intro:0 "Feuer und Blut umgeben mich, während ich inmitten des Blutbads der Aussaat stehe. Der Rauch raubt mir den Atem, und meine Nüstern füllen sich mit dem Geruch verbrannten Fleisches. Noch immer hallen die fernen Schreie der gescheiterten Reiter in meinem Kopf.\n\nDer letzte der Drachensamen ist fort, und ich stehe allein in den Trümmern meines gescheiterten Plans. Die Drachen selbst haben mein Vorhaben verworfen — und die Drachensamen, die es wagten.\n\n"
 agot_dragon.1003.desc_none_llama:0 "Während sich eine unbehagliche Stille breitmacht, kann ich nicht umhin, darin ein Omen zu sehen. Drachen sind fleischgewordenes Feuer — sie jemandem anzubieten, der unvorbereitet ist, ist Torheit."
 agot_dragon.1003.desc_none_aith:0 "Als ich die Verwüstung überblicke, die die herrenlosen Drachen angerichtet haben, frage ich mich, ob es vielleicht nicht doch zum Besten ist. Dieser Tag gemahnt daran, wie gefährlich ein Drache sein kann — und noch mehr in den falschen Händen."
 agot_dragon.1003.desc_one:0 "Erfolg! [tamer_1.GetTitledFirstName] hat es geschafft, [dragon_1.GetFirstName] zu zähmen."
 agot_dragon.1003.desc_two:0 "Erfolg! [tamer_1.GetTitledFirstName] und [tamer_2.GetTitledFirstName] haben [dragon_1.GetFirstName] und [dragon_2.GetFirstName] gezähmt."
 agot_dragon.1003.desc_three:0 "Ein voller Erfolg! [tamer_1.GetTitledFirstName] hat [dragon_1.GetFirstName] gezähmt, [tamer_2.GetTitledFirstName] hat [dragon_2.GetFirstName] gezähmt und [tamer_3.GetTitledFirstName] hat [dragon_3.GetFirstName] gezähmt."
 agot_dragon.1003.desc_more:0 "Ein voller Erfolg! [tamer_1.GetTitledFirstName] hat [dragon_1.GetFirstName] gezähmt, [tamer_2.GetTitledFirstName] hat [dragon_2.GetFirstName] gezähmt und [tamer_3.GetTitledFirstName] hat [dragon_3.GetFirstName] gezähmt — und weitere folgten."
 agot_dragon.1003.desc_success:0 "Die neuen Drachenreiter stehen vor mir aufgereiht. Sie haben eine Macht inne, wie sie seit dem Untergang von Valyria nur wenige kannten, und will ich ihre Drachen behalten, muss ich ihre Loyalität gewinnen.\n\nWas soll ich ihnen anbieten?"
 agot_dragon.1003.a:0 "Ich werde Gold anbieten."
 agot_dragon.1003.b:0 "Ich werde einen Adelstitel anbieten."
 agot_dragon.1003.c:0 "Gold und Titel zugleich, um sie bei der Stange zu halten."
 agot_dragon.1003.bastard_tt:0 "Da sie [Concept.('bastard', 'Bastarde')|E] sind, müsst Ihr eine Entscheidung über ihren Adelsstand treffen."
 agot_dragon.1003.d:0 "Sie haben Flügel erhalten — mehr brauchen sie nicht."
 agot_dragon.1003.e:0 "Bedauerlich."

 agot_dragon.1004.t:0 "Ein schlechter Samen"
 agot_dragon.1004.desc.intro:0 "Die Kandidaten treten vor, bereit, ihr Glück zu versuchen. Als ich sie zähle, bemerke ich zu spät, dass einer fehlt. Nur einen kurzen Moment habe ich, um über das schreckliche oder banale Schicksal zu grübeln, das ihn ereilt haben mag — dann hallt jener seelendurchbrennende Klang durch die Halle. Der Schrei von tausend Seelen verbrennt mir die Knochen zu Asche — zumindest fühlt es sich so an.\n\nIn der darauf folgenden Stille herrscht große Verwirrung, die sich in Entsetzen wandelt, als [candidate_one.GetFirstName] aufschreit und auf den grässlichen Anblick von [false_seed.GetFirstName] zeigt. Aus den Augen blutend und fast unmerklich keuchend ringt [false_seed.GetFirstNameNoTooltip] mit versengten und blasigen Lungen nach Atem.\n\nNur einen Augenblick vergeht, bevor das Drachenhorn, an das [false_seed.GetSheHe] sich klammert, der Sinfonie ein weiteres Lied hinzufügt."
 agot_dragon.1004.desc.multiple_dragons:0 "In unserem Entsetzen bemerken wir kaum, dass die Drachen zum Ausgang drängen. Wozu, wissen wir nicht — doch es ist klar, dass sie hinaus wollen. Alle Versuche, ihnen den Weg zu versperren, bleiben vergeblich."
 agot_dragon.1004.desc.single_dragons:0 "In unserem Entsetzen bemerken wir kaum, dass [dragon_one.GetName] zum Ausgang drängt. Wozu, wissen wir nicht — doch klar ist, dass [dragon_one.GetSheHe] hinaus will. Alle Versuche, [dragon_one.GetName] den Weg zu versperren, bleiben vergeblich."
 agot_dragon.1004.desc.outro:0 "Nichts kann dies aufhalten... Die Halle versinkt im Chaos."
 agot_dragon.1004.a:0 "Woran hat's jelegen? Da fragt man sich nachher natürlich immer, woran hat et jelegen!"

 agot_dragon.1005.t:0 "Eine reiche Ernte"
 agot_dragon.1005.desc.intro:0 "Der Plan hat #bold funktioniert#!!\n\n[false_seed.GetFirstName] hat [false_seed.Custom('DE_PRO_POS_S_3P')]e Aufgabe wunderbar erfüllt! Wenn ich doch nur das Gesicht von [dragon_keeper.GetTitledFirstNameNoTooltip] in jenem Augenblick hätte sehen können. Es ist schade, dass das Drachenhorn dabei verloren ging — ich muss versuchen, es wiederzubekommen.\n\n"
 agot_dragon.1005.desc.multiple_dragons:0 "Wie dem auch sei — [dragon_one.GetName], [dragon_two.GetName] und die anderen Drachen sind vor mir erschienen, und meine Aufregung ist kaum zu verbergen. Ich werde einen von ihnen als Meister beanspruchen."
 agot_dragon.1005.desc.two_dragons:0 "Wie dem auch sei — [dragon_one.GetName] und [dragon_two.GetName] sind vor mir erschienen, und meine Aufregung ist kaum zu verbergen. Ich werde einen von ihnen als Meister beanspruchen."
 agot_dragon.1005.desc.single_dragons:0 "Wie dem auch sei — [dragon_one.GetName] ist vor mir erschienen, und meine Aufregung ist kaum zu verbergen. Ich werde [dragon_one.GetName] als [dragon_one.Custom('GetDragonHerHis')]en Meister beanspruchen."
 agot_dragon.1005.a:0 "[dragon_two.GetNameNoTooltip] soll mein Drache sein."
 agot_dragon.1005.a.tt:0 "Ihr werdet [dragon_two.GetNameNoTooltip] zähmen. Die anderen Drachen bleiben in Eurem Besitz."
 agot_dragon.1005.b:0 "[dragon_one.GetNameNoTooltip] soll mein Drache sein."
 agot_dragon.1005.b.tt:0 "Ihr werdet [dragon_one.GetNameNoTooltip] zähmen. Die anderen Drachen bleiben in Eurem Besitz."
 agot_dragon.1005.c:0 "Die Welt gehört mir."
 agot_dragon.1005.c.tt:0 "Ihr werdet [dragon_one.GetNameNoTooltip] zähmen"
 agot_dragon.1005.d:0 "Ich werde unter den anderen Drachen wählen."
 agot_dragon.1005.e:0 "Meine Macht wächst."
 agot_dragon.1005.f:0 "Diese Drachen gefallen mir nicht."
 agot_dragon.1005.g:0 "[dragon_one.GetNameNoTooltip] gefällt mir nicht."

 agot_dragon.1006.t:0 "Eine unerwartete Ernte"
 agot_dragon.1006.desc:0 "Die seltsamste Geschichte überhaupt wurde aus [keeper_location.GetName] berichtet...\n\nAnscheinend hat [dragon_keeper.GetName], als er #italic vermeintliche#! Drachensamen empfing, mit denen man einen Drachen zähmen wollte, bei einem der Kandidaten entdeckt, dass [false_seed.GetSheHe] ein #bold falscher Samen#! war. [false_seed.GetFirstName] blies während der Aussaat vor den Augen von Mensch und Drache in ein Drachenhorn – und zwar nicht in irgendeines, sondern in #italic meines#!!\n\n"
 agot_dragon.1006.desc.multiple_dragons:0 "Ich hätte dies nicht für wahr gehalten, wären [dragon_one.GetNameNicknamed], [dragon_two.GetNameNicknamed] und andere nicht gerade zu mir gekommen! Es scheint, als hätte ich großes Glück."
 agot_dragon.1006.desc.two_dragons:0 "Ich hätte dies nicht für wahr gehalten, wären die Drachen [dragon_one.GetNameNicknamed] und [dragon_two.GetNameNicknamed] nicht gerade zu mir gekommen. Eine wahrhaft glückliche Ausbeute!"
 agot_dragon.1006.desc.one_dragon:0 "Ich hätte das nicht für wahr gehalten, wäre der Drache [dragon_one.GetNameNicknamed] nicht gerade vor mir erschienen. Es scheint, als erntet man manchmal, was andere gesät haben..."
 agot_dragon.1006.a:0 "$agot_dragon.1005.a$"
 agot_dragon.1006.a.tt:0 "$agot_dragon.1005.a.tt$"
 agot_dragon.1006.b:0 "$agot_dragon.1005.b$"
 agot_dragon.1006.b.tt:0 "$agot_dragon.1005.b.tt$"
 agot_dragon.1006.c:0 "$agot_dragon.1005.c$"
 agot_dragon.1006.c.tt:0 "$agot_dragon.1005.c.tt$"
 agot_dragon.1006.d:0 "$agot_dragon.1005.d$"
 agot_dragon.1006.e:0 "$agot_dragon.1005.e$"
 agot_dragon.1006.f:0 "$agot_dragon.1005.f$"
 agot_dragon.1006.g:0 "$agot_dragon.1005.g$"

 agot_dragon.1007.t:0 "Eine verdorbene Ernte"
 agot_dragon.1007.desc:0 "Allen Berichten zufolge hat der Plan funktioniert, doch ich bin nach wie vor #bold ohne Drachen#!\n\nEs kursieren Gerüchte, dass das [dragon_one.Custom('GetDragonColorFull')]e Ungeheuer [dragon_one.GetNameNicknamed] zu [true_binder.GetTitledFirstName] geflohen ist und sich damit jeglicher Macht widersetzt hat, die ich diesem Drachenhorn zu verleihen glaubte! Es sei denn...\n\nUnd um die Sache noch schlimmer zu machen, hat [dragon_keeper.GetTitledFirstName] #bold mein#! Horn!"
 agot_dragon.1007.a:0 "Das war #bold mein #! Drache!"

 agot_dragon.1008.t:0 "Das gejätete Unkraut"
 agot_dragon.1008.desc:0 "Die Kandidaten treten vor, bereit, ihr Glück zu versuchen. Als ich sie zähle, bemerke ich erst viel zu spät, dass einer fehlt. Ich habe nur einen Augenblick Zeit, darüber zu spekulieren, welches schreckliche oder ganz alltägliche Schicksal ihn oder sie wohl ereilt haben mag, bevor der seelenzerreißende Schrei in der Halle ertönt. Die Schreie von tausend Seelen verbrennen meine Knochen zu Asche – zumindest fühlt es sich so an.\n\nIn der darauf folgenden Stille herrscht große Verwirrung, eine Verwirrung, die in Entsetzen umschlägt, als [candidate_one.GetFirstName] aufschreit und auf den grauenhaften Anblick von [false_seed.GetFirstName] zeigt. Blutend aus den Augen und fast unmerklich keuchend ringt [false_seed.GetFirstNameNoTooltip] mit versengten und blasigen Lungen nach Atem.\n\nEs vergeht nur ein Augenblick, bis das Drachenhorn, an das sich [false_seed.GetSheHe] klammert, dem Chor eine weitere Stimme verleiht. Es folgt ein Moment der Stille, dann noch ein weiterer. Kein Drache brüllt, und in der Ferne sind keine Flügelschläge zu hören. Die Kandidaten blicken zu mir auf, um zu erfahren, ob sie mit der Aussaat fortfahren sollen."
 agot_dragon.1008.a:0 "Das ändert gar nichts... Weitermachen!"
 agot_dragon.1008.b:0 "Ich muss diesem #italic falschen Samen#! untersuchen!."
 agot_dragon.1008.b_tt:0 "$agot_dragon.1001.b_tt$"

 agot_dragon.1009.t:0 "Die Dürre"
 agot_dragon.1009.desc:0 "Obgleich ich ermutigende Nachrichten über die Einschleusung von [false_seed.GetFirstNamePossessive] in den Hof von [dragon_keeper.GetTitledFirstName] erhalten hatte, erreichen mich nun Berichte über einen Fehlschlag. Nachdem er das Horn geblasen hatte, soll [false_seed.GetFirstNameNoTooltip] angeblich von innen heraus verbrannt sein.\n\nAllen Berichten nach ein schrecklicher Anblick, doch sollte dies zutreffen, wirft es eine wichtige Frage auf..."
 agot_dragon.1009.a:0 "Wo ist #bold mein#! Drache?"

 agot_dragon.1010.t:0 "Der Aufstieg eines Drachensamens"
 agot_dragon.1010.desc:0 "[recipient.GetName], ein Drachensamen, der sich kürzlich meinem Hof angeschlossen hat, muss für [recipient.GetHerHis]e Tapferkeit in der Drachengrube belohnt werden.\n\nAllerdings hat [recipient.GetHerHis] Status als Bastard die Angelegenheit erschwert. Daher muss ich nun genauer überdenken, wie genau [recipient.GetSheHe] belohnt werden sollte."
 agot_dragon.1010.a:0 "Ich werde [recipient.Custom('DE_PRO_PER_S_3P_A')] legitimieren."
 agot_dragon.1010.b:0 "Ich werde [recipient.Custom('DE_PRO_PER_S_3P_D')] das Recht gewähren, ein neues [house|E] zu gründen."
 agot_dragon.1010.b_tt:0 "[recipient.GetName] wird eine neue [bastard_branch|E]"
 agot_dragon.1010.c:0 "[recipient.GetHerHis|U]e uneheliche Abstammung ist zu heikel, schlagt etwas anderes vor."
