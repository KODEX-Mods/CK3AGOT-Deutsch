l_german:
  # Precurser events
 agot_dragon_combat.will_engage: "Ihr werdet [enemy_dragonrider.GetTitledFirstName] und [enemy_dragon.GetName] in einem Drachenkampf herausfordern!"
 agot_dragon_combat.will_engage_enemy: "Ihr werdet von [dragonrider_in_battle.GetTitledFirstName] und [dragon_in_battle.GetName] in einem Drachenkampf herausgefordert!"
 agot_dragon_combat.will_attempt_engage: "Ihr werdet versuchen, [enemy_dragonrider.GetTitledFirstName] und [enemy_dragon.GetName] zu einem Drachenkampf zu zwingen!"
 agot_dragon_combat.will_attempt_engage_enemy: "Ihr werdet von [dragonrider_in_battle.GetTitledFirstName] und [dragon_in_battle.GetName] zum Drachenkampf gezwungen!"
 agot_dragon_combat.will_not: "Ihr werdet versuchen, vor [enemy_dragonrider.GetTitledFirstName] und [enemy_dragon.GetName] zu fliehen!"
 agot_dragon_combat.will_not_enemy: "Ihr werdet versuchen, vor [dragonrider_in_battle.GetTitledFirstName] und [dragon_in_battle.GetName] zu fliehen!"

 agot_dragon_combat.0001.t: "Feindlicher Drachenreiter gesichtet"
 agot_dragon_combat.0001.desc_opening: "[dragon_in_battle.GetName] und ich fliegen über [battle_location.GetName],"
 agot_dragon_combat.0001.desc_opening_fly: " und lassen die Landschaft hinter uns zurück, während wir auf die Truppen von [enemy_commander_in_battle.GetTitledFirstName] zustürmen."
 agot_dragon_combat.0001.desc_opening_fight: " und haben bereits ein Dutzend der Männer von [enemy_commander_in_battle.GetTitledFirstName] unter unseren Flammen verbrannt."
 agot_dragon_combat.0001.desc_opening_end: " Doch am Himmel erblicke ich einen noch gefährlicheren Feind.\n\nDen "
 agot_dragon_combat.0001.desc_younger: "älteren Drachen [enemy_dragon.GetName], größer als mein eigener [dragon_in_battle.GetNameNoTooltip], mit [enemy_dragonrider.GetTitledFirstName] auf [enemy_dragon.Custom('GetDragonHerHim')]."
 agot_dragon_combat.0001.desc_older: "jüngeren Drachen [enemy_dragon.GetName], kleiner als mein eigener [dragon_in_battle.GetNameNoTooltip], mit [enemy_dragonrider.GetTitledFirstName] auf [enemy_dragon.Custom('GetDragonHerHis')]em Rücken."
 agot_dragon_combat.0001.desc_same_age: "Drachen [enemy_dragon.GetName], won ähnlicher Größe wie mein [dragon_in_battle.GetNameNoTooltip], mit [enemy_dragonrider.GetTitledFirstName] auf [enemy_dragon.Custom('GetDragonHerHis')]em Rücken."
 agot_dragon_combat.0001.desc_weaker_warrior: " Wenngleich ich weiß, dass [enemy_dragonrider.GetFirstName] ein weniger geschickter Kämpfer ist als ich es bin, wird mir das hier in den Lüften nicht helfen.\n\n"
 agot_dragon_combat.0001.desc_stronger_warrior: " Wenngleich ich weiß, dass [enemy_dragonrider.GetFirstName] ein besserer Kämpfer ist als ich es bin, wird [enemy_dragonrider.Custom('DE_PRO_PER_S_3P_D')] das hier oben nicht helfen.\n\n"
 agot_dragon_combat.0001.desc_warrior: " Wenngleich ich weiß, dass [enemy_dragonrider.GetFirstName] im Gegensatz zu mir ein erprobter Kämpfer ist, wird das [enemy_dragonrider.Custom('DE_PRO_PER_S_3P_D')] hier oben nicht helfen.\n\n"
 agot_dragon_combat.0001.desc_weak: " Wenngleich ich weiß, dass [enemy_dragonrider.GetFirstName] deutlich schlechter kämpft als ich, wird mir das hier oben nicht helfen.\n\n"
 agot_dragon_combat.0001.desc_equally_weak: " Wir sind zwar beide keine besonders geschickten Kämpfer, doch ein Kampf mit solchen Bestien wird keineswegs eine Prüfung unserer eigenen Fertigkeiten sein.\n\n"
 agot_dragon_combat.0001.desc_end: "Nein, dieser Kampf wird von der Kraft unserer Drachen abhängen und davon, wie wir diese zu unserem Vorteil nutzen können. Es scheint, dass ich [enemy_dragonrider.GetFirstNameNoTooltip] und [enemy_dragon.GetNameNoTooltip] zuerst erspäht habe, und so muss ich mich nun fragen — beginne ich diesen Drachentanz?"
 agot_dragon_combat.0001.a: "Die holen wir uns, [dragon_in_battle.GetNameNoTooltip]!"
 agot_dragon_combat.0001.a.brother: "Also, Bruder, lass uns das zu Ende bringen!" # Mach dich bereit für meine Ankunft, du Wurm!
 agot_dragon_combat.0001.a.sister: "Also, Schwester, lass uns das zu Ende bringen!"
 agot_dragon_combat.0001.a.father: "Also, Vater, lass uns das zu Ende bringen!"
 agot_dragon_combat.0001.a.mother: "Also, Mutter, lass uns das zu Ende bringen!"
 agot_dragon_combat.0001.a.son: "Also, mein Sohn, lass uns das zu Ende bringen!"
 agot_dragon_combat.0001.a.daughter: "Also, meine Tochter, lass uns das zu Ende bringen!"
 agot_dragon_combat.0001.b: "Ein Kampf? Hier oben? Ich denke #EMP nicht#!!"
 agot_dragon_combat.0001.b.weaker: "Das scheint riskant zu sein."
 agot_dragon_combat.0001.b.coward: "Gegen einen anderen Drachen kämpfen? Nimmermehr!"
 agot_dragon_combat.0001.b.notice: "Sie bemerken Euer Fliehen und könnten entschließen, die Verfolgung aufzunehmen"
 agot_dragon_combat.0001.b.no_notice: "Sie bemerken nicht, dass Ihr vom Schlachtfeld flieht"
 agot_dragon_combat.0001.b.swift: "#P Die Schnelligkeit von [dragon_in_battle.GetNameNoTooltip] wird die Flucht erleichtern#!"
 agot_dragon_combat.0001.b.slow: "#N Die Langsamkeit von [dragon_in_battle.GetNameNoTooltip] wird die Flucht erschweren#!"

 agot_dragon_combat.0002.t: "Hinterhalt in den Lüften!"
 agot_dragon_combat.0002.desc: "Ich verbrenne die Truppen von [dragon_commander_in_battle.GetTitledFirstName] zu Asche, während die Schlacht von [battle_location.GetName] unter mir tobt — da bricht ein zweiter Feuerschwall durch den Himmel!\n\nIch spüre, wie [enemy_dragon.GetName] unter mir abtaucht, heißer Wind peitscht mir ins Gesicht, und erst in letzter Sekunde entgehen wir dem Flammenstrom, der über uns hinwegbraust. Als ich aufblicke, sehe ich den Drachen [dragon_in_battle.GetName] mit beängstigender Geschwindigkeit über mich hinwegschießen — [dragon_in_battle.Custom('GetDragonHerHis')] Reiter [dragonrider_in_battle.GetTitledFirstName] mustert mich vom Sattel aus mit mörderischem Blick.\n\n[dragonrider_in_battle.GetSheHe|U] sucht den Kampf!"
 agot_dragon_combat.0002.a: "Dann soll [dragonrider_in_battle.GetSheHe] ihn haben!"
 agot_dragon_combat.0002.b: "Wir müssen von hier fort!"
 agot_dragon_combat.0002.b.flee: "Ihr flieht erfolgreich vor [dragon_in_battle.GetName] und verlasst das Schlachtfeld"
 agot_dragon_combat.0002.b.swift: "#P [enemy_dragon.GetNamePossessiveNoTooltip] Schnelligkeit erleichtert die Flucht#!"
 agot_dragon_combat.0002.b.slow: "#N [enemy_dragon.GetNamePossessiveNoTooltip] Trägheit erschwert die Flucht#!"
 agot_dragon_combat.0002.b.enemy_swift: "#N [dragon_in_battle.GetNamePossessiveNoTooltip] Schnelligkeit erschwert die Flucht#!"
 agot_dragon_combat.0002.b.enemy_slow: "#P [dragon_in_battle.GetNamePossessiveNoTooltip] Trägheit erleichtert die Flucht#!"
 agot_dragon_combat.0002.escape.t: "[enemy_dragonrider.GetShortUIName] flieht vor Euch!"
 agot_dragon_combat.0002.escape.desc: "[enemy_dragonrider.GetShortUIName] ist auf [enemy_dragon.GetName] davongeflogen, anstatt sich Euch zu stellen!"

 agot_dragon_combat.0003.t: "Flucht vor dem Drachenfeuer"
 agot_dragon_combat.0003.desc: "Ich verbrenne die Truppen von [dragon_commander_in_battle.GetTitledFirstName] zu Asche, während die Schlacht von [battle_location.GetName] unter mir tobt, als ich sehe, wie sich eine Wolke #S unnatürlich#! bewegt... Das ist ein Drache!\n\nJa, bei näherer Betrachtung erkenne ich deutlich, wie [dragon_in_battle.GetName] mit voller Geschwindigkeit von mir fortflieht! [dragonrider_in_battle.GetTitledFirstName] muss im Sattel sitzen — doch dieser Feigling hat offenkundig beschlossen, [enemy_dragon.GetName] und mir aus dem Wege zu gehen!"
 agot_dragon_combat.0003.a: "[dragonrider_in_battle.GetSheHe|U] wird nicht entkommen!"
 agot_dragon_combat.0003.a.swift: "#P [enemy_dragon.GetNamePossessiveNoTooltip] Schnelligkeit erleichtert es, [dragonrider_in_battle.GetTitledFirstNameNoTooltip] einzuholen#!"
 agot_dragon_combat.0003.a.slow: "#N [enemy_dragon.GetNamePossessiveNoTooltip] Trägheit erschwert es, [dragonrider_in_battle.GetTitledFirstNameNoTooltip] einzuholen#!"
 agot_dragon_combat.0003.a.enemy_swift: "#N [dragon_in_battle.GetNamePossessiveNoTooltip] Schnelligkeit erschwert es, [dragonrider_in_battle.GetTitledFirstNameNoTooltip] einzuholen#!"
 agot_dragon_combat.0003.a.enemy_slow: "#P [dragon_in_battle.GetNamePossessiveNoTooltip] Trägheit erleichtert es, [dragonrider_in_battle.GetTitledFirstNameNoTooltip] einzuholen#!"
 agot_dragon_combat.0003.escape: "[dragon_in_battle.GetName] und [dragonrider_in_battle.GetFirstName] fliehen vom Schlachtfeld."
 agot_dragon_combat.0003.b: "Lasst sie laufen."
 agot_dragon_combat.0003.escape.t: "[dragonrider_in_battle.GetShortUIName] ist zu schnell!"
 agot_dragon_combat.0003.escape.desc: "[dragonrider_in_battle.GetShortUIName] gelingt es auf [dragon_in_battle.GetName], Eurer Verfolgung zu entkommen!"

 #############
 # Dragon fight!
 #############
 # Window
 CHANCE_OF_WINNING: "Siegeschance"
 # Combat rounds
 agot_dragon_combat.1001.t: "Ein Tanz mit Drachen"
 agot_dragon_combat.1001.defender_first_round_battle: "[dsc_defender_dragon.GetName] und ich tauchen tiefer, die Schlacht von [battle_location.GetName] tobt nur wenige Meter unter uns. Eine weitere Gruppe feindlicher Soldaten wird von unseren Flammen verschlungen, ehe wir wieder gen Himmel preschen.\n\nAuf dem nun verrauchten Feld erblicke ich [dsc_attacker.GetFirstName] im Sattel von [dsc_attacker_dragon.GetName], der laut brüllt, während sie geradewegs auf uns zusteuern. Ein Tritt meiner Fersen spornt die Flügel von [dsc_defender_dragon.GetNameNoTooltip] an — und der Tanz beginnt.\n\n"
 agot_dragon_combat.1001.defender_first_round_siege: "[dsc_defender_dragon.GetName] und ich schießen vom Boden empor und weichen [dsc_attacker.GetFirstName] auf [dsc_attacker_dragon.GetName] aus, der von oben auf uns herabstürzen will. Der Schwung treibt sie zu weit fort, und der dadurch gewonnene Abstand gibt mir die Möglichkeit, zu kreisen und mich auf den nächsten Angriff vorzubereiten.\n\nIch sehe, wie [dsc_attacker.GetTitledFirstNameNoTooltip] und [dsc_attacker_dragon.GetFirstNameNoTooltip] dasselbe tun — und ich weiß: der Tanz hat begonnen.\n\n"
 agot_dragon_combat.1001.attacker_first_round_battle:0 "Ich sehe, wie [dsc_defender_dragon.GetName] knapp unter meinem Angriff hinabtaucht und [dsc_attacker_dragon.GetName] und mich zu einem scharfen Wendemanöver zwingt. Das Tosen der Schlacht von [battle_location.GetName] wird vom Wind verschluckt, während wir zurück auf unseren Feind zusteuern. Gerade noch rechtzeitig erkenne ich, wie [dsc_defender_dragon.GetNameNoTooltip] eine weitere Gruppe unserer Männer in Flammen hüllt — mit einem Tritt meiner Fersen befehle ich [dsc_attacker_dragon.GetNameNoTooltip], aufzuholen.\n\nDer Tanz hat begonnen.\n\n"
 agot_dragon_combat.1001.attacker_first_round_siege:0 "Ich sehe, wie [dsc_defender_dragon.GetName] nur knapp von [sieging_location.GetName] aufsteigt, während ich auf sie herabstoße — [dsc_attacker_dragon.GetFirstName] verfehlt sie um kaum mehr als eine Kralle. Die Hoffnung auf einen raschen Sieg ist damit dahin; [dsc_defender_dragon.GetNameNoTooltip] und [dsc_defender.GetNameNoTooltip] drehen und bereiten sich auf den nächsten Angriff vor.\n\nDer Tanz hat begonnen.\n\n"
 # Moves
 agot_dragon_combat.1001.wait_and_hope:0 "Lasst uns, ähhh, hoffen, dass [my_foe.Custom('DE_PRO_PER_S_3P_N')] es vermasselt..."
 agot_dragon_combat.1001.tt.wait_and_hope:0 "Ihr verharrt in Untätigkeit und setzt darauf, dass [my_foe.GetTitledFirstName] als Erst[my_foe.Custom('DE_END_ADJ_NUL_S_N')] einen Fehler macht"
 agot_dragon_combat.1001.desc.my_feedback.wait_and_hope:0 "Mein Zögern schenkte [my_foe.GetTitledFirstName] und [my_foe_dragon.GetName] nichts als Zeit, um ihrerseits einen Plan zu schmieden."
 agot_dragon_combat.1001.desc.opponent_response.wait_and_hope:0 "All dies, während [my_foe.GetTitledFirstName] und [my_foe_dragon.GetName] gänzlich untätig blieben."

 agot_dragon_combat.1001.unsure_attack:0 "Ähhh... dann #EMP verbrennt#! sie halt!"
 agot_dragon_combat.1001.tt.unsure_attack:0 "Ihr sitzt auf einer feuerspeienden Echse… also nutzt sie auch."
 agot_dragon_combat.1001.desc.my_feedback.unsure_attack:0 "Der Feueratem meines Drachen streicht über das Schuppenkleid von [my_foe_dragon.GetName], hinterlässt dunkle Brandmale, die in zornigen Flammen noch glühen."
 agot_dragon_combat.1001.desc.opponent_response.unsure_attack:0 "[my_foe_dragon.GetNamePossessive] Feueratem schoss in einem wilden Bogen auf uns ein und sengte [my_dragon.GetName] an [my_dragon.Custom('GetDragonHerHis')]er Flanke."

 agot_dragon_combat.1001.enthusiastic_onslaught:0 "[my_dragon.GetName] kann mehr Schaden anrichten als [my_foe_dragon.GetName]!"
 agot_dragon_combat.1001.tt.enthusiastic_onslaught:0 "Ihr vertraut darauf, dass [my_dragon.GetNameNoTooltip] mit Zähnen und Klauen [my_foe_dragon.GetNameNoTooltip] gnadenlos zerfleischen kann."
 agot_dragon_combat.1001.desc.my_feedback.enthusiastic_onslaught:0 "[my_dragon.GetName] und ich stürmten geradewegs auf [my_foe_dragon.GetName] und [my_foe.GetName] zu und setzten alles ein, was uns an Hieben, Bissen und Flammen zu Gebote stand."
 agot_dragon_combat.1001.desc.opponent_response.enthusiastic_onslaught:0 "[my_foe_dragon.GetName] und [my_foe.GetName] preschten geradewegs auf [my_dragon.GetName] und mich zu, doch ihre Bisse und Flammenstöße entbehrten jeder Zielstrebigkeit und vermochten nicht mehr als oberflächliche Wunden zu verursachen."

 agot_dragon_combat.1001.underbelly: "Der Bauch von [my_foe_dragon.GetName] scheint ungeschützt zu sein..."
 agot_dragon_combat.1001.tt.underbelly: "Ihr greift die verwundbarste Stelle eines Drachen an"
 agot_dragon_combat.1001.desc.my_feedback.underbelly: "[my_dragon.GetName] und ich tauchten unter [my_foe_dragon.GetName] hinab, um sodann senkrecht emporzustoßen — unsere Drachen trafen aufeinander mit einem dumpfen Donner in den Wolken. Leider fanden wir keinen Halt in [my_foe_dragon.Custom('GetDragonHerHis')]em Schuppenpanzer."
 agot_dragon_combat.1001.desc.opponent_response.underbelly: "[my_foe_dragon.GetName] tauchte jäh hinab, und in demselben Augenblick wusste ich, dass [my_foe_dragon.Custom('DE_PRO_PER_S_3P_N')] auf den Bauch von [my_dragon.GetName] zielte! Ich riss [my_dragon.Custom('DE_PRO_PER_S_3P_A')] in Erwartung des Schlages empor, wich dem Treffer so Bewegung aus und zog mich zurück, um mich auf den nächsten Zusammenstoß vorzubereiten."

 agot_dragon_combat.1001.tail_smash: "Dohaerās, [my_dragon.GetName]! Fleischpeitsche!"
 agot_dragon_combat.1001.tt.tail_smash: "Ihr wählt eine etwas... unorthodoxe Taktik"
 agot_dragon_combat.1001.desc.my_feedback.tail_smash: "[my_dragon.GetName] und ich täuschten einen Biss an den Flügeln von [my_foe_dragon.GetName] an, bevor wir aber blitzschnell auswichen und [my_foe_dragon.GetName] einen wuchtigen Schwanzhieb gegen den Hals von versetzten!"
 agot_dragon_combat.1001.desc.opponent_response.tail_smash: "[my_foe_dragon.GetName] preschte vor, als wolle [my_foe_dragon.Custom('DE_PRO_PER_S_3P_N')] in die Schwingen von [my_dragon.GetName] beißen — doch kaum wich ich dem Angriff aus, landete [my_foe_dragon.GetName] einen wuchtigen Schwanzschlag gegen den Hals von [my_dragon.GetName] was beide Drachen und ihre Reiter auseinander schleuderte."

 agot_dragon_combat.1001.guard: "Wir werden warten und den rechten Augenblick zum Zuschlagen abwarten."
 agot_dragon_combat.1001.tt.guard: "Ihr und [my_dragon.GetName] wartet auf den günstigsten Moment zur Vergeltung."
 agot_dragon_combat.1001.desc.my_feedback.guard: "Unsere Schuppen schlugen krachend aufeinander, als wir die Schläge abwehrten — Funken stoben, wo die Zähne von [my_foe_dragon.GetName] auf unsere gepanzerte Haut trafen."
 agot_dragon_combat.1001.desc.opponent_response.guard: "Die Reißzähne von [my_dragon.GetName] glitten an den schützenden Schuppen von [my_foe.GetTitledFirstName] ab, und [my_dragon.Custom('GetDragonHerHis')] Brüllen spiegelte meine verzweifelte Wut wider."

 agot_dragon_combat.1001.probing_attack: "Lass uns nur mal die Oberfläche ankratzen und ihr Gemüt auf die Probe stellen!"
 agot_dragon_combat.1001.tt.probing_attack: "Ihr versucht, die Reaktionen und Schwächen des Feindes auszuloten."
 agot_dragon_combat.1001.desc.my_feedback.probing_attack: "Unsere Klauen fuhren über die Schuppen von [my_foe_dragon.GetName], bevor wir uns rasch in der Luft drehten — die Drachen tanzten umeinander und ließen uns ihre Geschwindigkeit abschätzen. Keine tiefen Schnitte, doch ein aufschlussreicher Reigen."
 agot_dragon_combat.1001.desc.opponent_response.probing_attack: "Sie prüften unsere Schwachstellen, harkten ein wenig an den Seiten von [my_dragon.GetNamePossessive] und zwangen uns, durch die Luft zu wirbeln, um unsere Verwundbarkeiten nicht zu entblößen. Zweifellos ein Probeschlag."

 agot_dragon_combat.1001.onslaught: "Schnappen wir sie uns — auf Sieg oder Tod!"
 agot_dragon_combat.1001.tt.onslaught: "Ein kompromissloser Angriff, bei dem die Verteidigung zugunsten der Offensive zurückgestellt wird"
 agot_dragon_combat.1001.desc.my_feedback.onslaught: "Wir brausten vorwärts, [my_dragon.GetName] stieß ein Dröhnen aus, das sich in ein Zischen von Feuer verwandelte. Die Luft roch nach versengten Schuppen, bevor wir mit einem dumpfen Einschlag auf sie trafen. Wildes Gebrüll, fleischreißende Krallen, und ich landete gar einen Treffer mit meiner eigenen Waffe."
 agot_dragon_combat.1001.desc.opponent_response.onslaught: "Ihr eigener Angriff war tollkühn, doch wirkungsvoll; die Wucht zweier Drachen traf aufeinander in einem Getöse von Gebrüll und aufeinanderprallenden Klauen — wir beide kamen schlechter davon, als wir uns trennten."

 agot_dragon_combat.1001.surprise_attack: "Das werden sie nicht kommen sehen!"
 agot_dragon_combat.1001.tt.surprise_attack: "Ein unerwarteter Zug, der den Feind auf dem falschen Fuß erwischen soll."
 agot_dragon_combat.1001.desc.my_feedback.surprise_attack: "Wir stießen in die Wolkendecke hinab, ließen das Licht vom Himmel durch die Wolken sickern und unseren Umriss verbergen. Dann, wie ein Bolzen aus einer Armbrust, schlugen wir zu. [my_dragon.GetName] versenkte seine Reißzähne in das zarte Fleisch direkt unterhalb des Flügels und entlockte ihm ein schmerzvolles Brüllen."
 agot_dragon_combat.1001.desc.opponent_response.surprise_attack: "[my_foe_dragon.GetName] zog sich zurück und flog in die Wolken. Für einige Herzschläge konnte ich sie nicht ausmachen — und genau da schlugen sie zu und rissen eine Wunde in die Flanke von [my_dragon.GetName]."

 agot_dragon_combat.1001.taunt: "He, [my_foe.GetFirstNameNoTooltip] — das nennst du Fliegen?"
 agot_dragon_combat.1001.tt.taunt: "Ihr schleudert beißende Schmähungen entgegen, um den Gegner zu erzürnen versetzen und seine Konzentration zu brechen."
 agot_dragon_combat.1001.desc.my_feedback.taunt: "Meine Stichelei scheint unter die Schuppen gedrungen zu sein. Der nächste Angriff wird gewiss ein wirres Durcheinander blindlings gespienen Feuers."
 agot_dragon_combat.1001.desc.opponent_response.taunt: "„He!“ höre ich aus der Ferne des Himmels. „Das nennst du Fliegen?“ ruft [my_foe.GetFirstName], als wir aneinander vorbeischießen. Welche unerhörte Vermessenheit [my_foe.Custom('DE_PRO_PER_S_3P_N')] besitzen muss, um mitten in einem Drachenkampf Zeit mit Beleidigungen zu verschwenden!"

 agot_dragon_combat.1001.go_for_the_gonads: "Tief gezielt, treu getroffen!"
 agot_dragon_combat.1001.tt.go_for_the_gonads: "Ihr wollt den Todesstoß versetzen und zielt dabei auf eine besonders empfindliche Stelle."
 agot_dragon_combat.1001.desc.my_feedback.go_for_the_gonads: "Unsere Reißzähne gruben sich in das zarte Fleisch am Bein von [my_foe_dragon.GetName]! [my_foe_dragon.Custom('GetDragonSheHe')|U] kreischte und taumelte einen Herzschlag lang, ehe [my_foe_dragon.Custom('GetDragonSheHe')] [my_foe_dragon.Custom('GetDragonHerHis')] Bein befreite und sich wieder fing — Blut prasselte auf den Boden hinab."
 agot_dragon_combat.1001.desc.opponent_response.go_for_the_gonads: "Unsere Feinde führten einen feigen Streich gegen unsere Hinterläufe und rissen ein Stück Fleisch aus dem Bein von [my_dragon.GetName]! [my_dragon.Custom('GetDragonSheHe')|U] heulte vor Schmerz und geriet ins Trudeln — doch als wir uns befreit hatten und [my_dragon.Custom('GetDragonSheHe')] sich gefasst hatte, spürte ich, wie der Zorn in meinem Drachen aufstieg."

 agot_dragon_combat.1001.strict_guard: "Wir reißen sie in Stücke, wenn sie uns nahe genug kommen!"
 agot_dragon_combat.1001.tt.strict_guard: "Ihr nehmt eine sehr defensive Haltung ein und sucht, den Schaden so gering wie möglich zu halten."
 agot_dragon_combat.1001.desc.my_feedback.strict_guard: "Mit eingezogenen Flügeln wehrten wir jeden Biss und jeden Klauenhieb ab, während das Schnappen der Zähne in der Luft widerhallte. [my_foe_dragon.GetName] stieß vor Wut einen Flammenstrahl aus."
 agot_dragon_combat.1001.desc.opponent_response.strict_guard: "Unser Angriff prallte nur gegen das harte Äußere der gepanzerten Schuppen ab, jeder Schlag war vergebliche Mühe. [my_dragon.GetName] stieß vor Verärgerung einen Flammenstoß aus."

 agot_dragon_combat.1001.confident_attack: "Unsere Flammen werden sie lebendig rösten!"
 agot_dragon_combat.1001.tt.confident_attack: "Ihr greift den Feind frontal mit der vollen Wucht Eures Drachenfeuers."
 agot_dragon_combat.1001.desc.my_feedback.confident_attack: "Unsere Flammen verschmolzen zu einem tödlichen Tanz; doch unsere erwiesen sich als stärker, durchdrangen jene der Gegner und versengten ihre Flügel."
 agot_dragon_combat.1001.desc.opponent_response.confident_attack: "Der Drache spie einen Feuerstrahl aus, sodass wir uns gezwungen sahen, mit unserem eigenen Feuer zu kontern. Zu unserem Leidwesen verloren wir allmählich die Oberhand, und [my_dragon.GetName] vebrannte sich [my_dragon.Custom('GetDragonHerHis')]e Flügel, im Versuch, die feindlichen Flammen zurückzuschlagen."

 agot_dragon_combat.1001.expert_onslaught: "Jeder Zug kalkuliert, jeder Schlag präzise!"
 agot_dragon_combat.1001.tt.expert_onslaught: "Ein akribischer, gut ausgeführter Angriff, der keinen Raum für Fehler lässt."
 agot_dragon_combat.1001.desc.my_feedback.expert_onslaught: "Wir umkreisten [my_foe_dragon.GetName] in engen Bahnen, Klauen rissen Furchen in die Drachenhaut und Zähne gruben sich mit der Präzision eines Wundarztes ins Fleisch — eine Feuersalve verfehlte [my_foe.GetName] im Sattel nur um Haaresbreite."
 agot_dragon_combat.1001.desc.opponent_response.expert_onslaught: "[my_foe.GetTitledFirstName] und [my_foe_dragon.GetName] kamen bedrohlich nah heran und führten einen Klauenhieb und einen raschen Biss gegen [my_dragon.GetName] aus, ehe sie versuchten, mich in Drachenfeuer zu hüllen!"

 agot_dragon_combat.1001.lightning_assault: "Wir treffen sie wie ein Blitz aus heiterem Himmel!"
 agot_dragon_combat.1001.tt.lightning_assault: "Ein rascher Aufstieg, gefolgt von einem Sturzflug — um zugleich zuzuschlagen und auszuweichen."
 agot_dragon_combat.1001.desc.my_feedback.lightning_assault: "Wir stürzten uns wie ein Falke hinab, Klauen und Zähne vorgestreckt. Ein schneller Hieb über den Rücken von [my_foe_dragon.GetName], gefolgt von einem Feuerstrahl, hinterließ brennende Wunden."
 agot_dragon_combat.1001.desc.opponent_response.lightning_assault: "Sie waren schnell — zu schnell. Die Klauen von [my_foe_dragon.GetName] zogen glühende Striemen über unsere Schuppen, während [my_foe_dragon.Custom('GetDragonSheHe')] an uns vorbeischoss und Flammen hinter sich ließ."

 agot_dragon_combat.1001.tire_opponent: "Lasst sie sich verausgaben!"
 agot_dragon_combat.1001.tt.tire_opponent: "Ihr trachtet danach, den Gegner zu erschöpfen — ausweichend und wendend, um seine Kräfte zu verschwenden."
 agot_dragon_combat.1001.desc.my_feedback.tire_opponent: "Wir wichen jedem Feuerstrahl aus, jeder rasenden Klaue. Das Brüllen von [my_foe_dragon.GetNamePossessive] wurde matter, und [my_dragon.Custom('GetDragonHerHis')] Flug sichtlich schwerfälliger."
 agot_dragon_combat.1001.desc.opponent_response.tire_opponent: "[my_foe.GetName] und [my_foe_dragon.GetName] bewegten sich mit kühler Meisterschaft durch die Lüfte und zwangen uns, niemals innezuhalten und stets in Bewegung zu bleiben."

 agot_dragon_combat.1001.chomp: "#bold FRISS#!"
 agot_dragon_combat.1001.tt.chomp: "Ihr #bold futtert#!"

 agot_dragon_combat.1001.motivate.generic: "Vorwärts, [my_dragon.GetNameNoTooltip]!"
 agot_dragon_combat.1001.motivate.bond: "Hab Mut, mein Schatz! Wir schaffen das!"
 agot_dragon_combat.1001.motivate.rude: "Scheiße, kämpf verdammt nochmal, du dicke Echse!"
 agot_dragon_combat.1001.motivate.authoritative: "Wir #EMP müssen #! obsiegen, [my_dragon.GetNameNoTooltip]!"
 agot_dragon_combat.1001.motivate.sadistic: "Lass uns ihr Blut auf unserer Zunge kosten!"
 agot_dragon_combat.1001.motivate.eccentric: "Schau, wie wundervoll es hier oben ist! Scheee..."
 agot_dragon_combat.1001.tt.motivate: "Ein Zuruf, um Euren Drachen trotz seiner Wunden anzuspornen."
 agot_dragon_combat.1001.desc.my_feedback.motivate: "Ein neu entfachtes Feuer loderte in den Augen von [my_dragon.GetName]; der nächste Flammenstoß war heißer, und [my_dragon.Custom('GetDragonHerHis')]e Hiebe wuchtiger."
 agot_dragon_combat.1001.desc.opponent_response.motivate: "Ich sehe, wie [my_foe.GetFirstName] sich zu [my_foe_dragon.GetName] hinunterneigt und etwas flüstert — doch was gesprochen wurde, vermag ich nicht zu hören."

 agot_dragon_combat.1001.technique_from_legend: "Versuchen wir es mit einem Drehmanöver — das ist ein guter Kniff!"
 agot_dragon_combat.1001.tt.technique_from_legend: "Ihr versucht eine legendäre Kampftechnik, von der Ihr nur in alten Geschichten gehört habt."
 agot_dragon_combat.1001.desc.my_feedback.technique_from_legend: "Mit einer Wendigkeit, die man nur aus den Liedern der Barden kennt, drehten wir uns im freien Fall, während [my_dragon.GetName] [my_dragon.Custom('GetDragonHerHis')]en Feueratem entfachte. Die Ausführung war makellos. Außerstande, unseren Bewegungen zu folgen, blieb [my_foe_dragon.GetName] desorientiert und verwundet zurück."
 agot_dragon_combat.1001.desc.opponent_response.technique_from_legend: "Wie ein außer Kontrolle geratenes Rad, dass sich von seinem Karren gelöst hatte, rasten sie auf uns zu und spiehen uns gezielte, aber unvorhersehbare Feuerstöße entgegen."

 agot_dragon_combat.1001.like_a_viper: "Rasch zuschlagen und noch rascher zurückweichen!"
 agot_dragon_combat.1001.tt.like_a_viper: "Schnelle und tödliche Nadelstiche, um den Gegner zu schwächen."
 agot_dragon_combat.1001.desc.my_feedback.like_a_viper: "Wir schossen vor und zurück — jeder blitzschnelle Angriff mit Schwanz, Klaue oder Feuerstrahl hinterließ Striemen und Wunden. Die Bewegungen von [my_foe_dragon.GetName] scheinen träger geworden zu sein."
 agot_dragon_combat.1001.desc.opponent_response.like_a_viper: "Mit schier unsäglicher Schnelligkeit schoss [my_foe_dragon.GetName] in unsere Reichweite vor und wieder zurück, erzielte kleine Treffer, die sich zu einem schmerzhaften Schlagabtausch summierten."

 agot_dragon_combat.1001.martial_voice: "Vorwärts, [my_dragon.GetNameNoTooltip]! Zeig keine Gnade!"
 agot_dragon_combat.1001.tt.martial_voice: "Ihr schöpft aus Euren Jahren der Kampferfahrung, um [my_dragon.GetNameNoTooltip] so zu steuern, wie Ihr es mit einem Soldaten tätet."
 agot_dragon_combat.1001.desc.my_feedback.martial_voice: "Mit dem Befehlston des Schlachtfeldes stimmten wir jeden Angriff mit äußerster Präzision ab. Unser Feind hatte dem unerbittlichen Ansturm nichts entgegenzusetzen."
 agot_dragon_combat.1001.desc.opponent_response.martial_voice: "Ich sehe, wie [my_foe.GetFirstName] Befehle an [my_foe_dragon.GetName] bellt, und ich denke an [my_foe.Custom('DE_PRO_POS_S_3P')]e Kriegserfahrung — ein beunruhigender Widersacher, selbst hier oben."

 agot_dragon_combat.1001.mocking_boast: "Soll diese große Echse irgendetwas kompensieren?"
 agot_dragon_combat.1001.tt.mocking_boast: "Eine verbale Stichelei, die darauf abzielt, den Gegner abzulenken und zu verärgern."
 agot_dragon_combat.1001.desc.my_feedback.mocking_boast: "Unser Spott scheint ins Schwarze getroffen zu haben. [my_foe_dragon.GetName] schlägt wild um sich und spürt die Wut [my_foe_dragon.Custom('GetDragonHerHis')][my_foe.Custom('DE_END_PRO_S_G')] [Select_CString( my_foe.IsFemale, 'Herrin', 'Herrn' )]. Die geschwundene Konzentration mag uns eine Gelegenheit zum Angriff bieten!"
 agot_dragon_combat.1001.desc.opponent_response.mocking_boast: "[my_foe.GetFirstName] versuchte, unsere Entschlossenheit mit Hohn und Beleidigungen zu erschüttern. Obwohl ihre Provokationen hier oben vergebliche Bemühungen sind, scheint der unablässige Lärm [my_dragon.GetName] doch an die Nerven gegangen zu sein."

 agot_dragon_combat.1001.desert_warrior: "Dieser Sand... ich frage mich..."
 agot_dragon_combat.1001.tt.desert_warrior: "Ihr nutzt Eure Erfahrung im Wüstenkrieg zu Eurem Vorteil."
 agot_dragon_combat.1001.desc.my_feedback.desert_warrior: "Wir tauchten schnell in Richtung des Sandes und verleiteten [my_foe.GetTitledFirstName] dazu, uns zu folgen. Mit einem gezielten Flügelschlag über einer Düne wirbelten wir eine Sandwolke in die Richtung von [my_foe.GetTitledFirstNameNoTooltip]! Desorientiert verlangsamte [my_foe.GetHerHis] Drache in der peinigenden Wolke seinen Flug, und als wir uns umwandten, um ihn mit Feuer zu attackieren, sah ich, dass die Sandwolke zu Glas geworden war und sie noch schwerer verletzte."
 agot_dragon_combat.1001.desc.opponent_response.desert_warrior: "Sie stürzten sich rasch zum Sand hinab, und [my_dragon.GetFirstName] legte [my_dragon.Custom('GetDragonHerHis')]e Flügel an, um ihnen zu folgen. Unsere Flammen verwandelten den Sand unter ihnen in Glas, doch wir konnten keinen entscheidenden Treffer landen. Plötzlich umhüllte uns eine Böe mit Sand aus den Flügeln von [my_foe_dragon.GetName]! Bevor wir der Wolke entkommen konnten, wurden wir von Hitze erfasst, und die Sandkörner um uns herum verwandelten sich in Glasscherben! Sie zerkratzten unsere Körper, bevor wir fliehen konnten."

 agot_dragon_combat.1001.jungle_stalker: "Lasst uns den Dschungel nutzen!"
 agot_dragon_combat.1001.tt.jungle_stalker: "Ihr übertragt Eure Erfahrungen aus dem Dschungelkampf auf diesen Luftkampf."
 agot_dragon_combat.1001.desc.my_feedback.jungle_stalker: "Wir ahmten die Angriffs- und Rückzugstaktik der Raubtiere des Dschungels nach und lockten sie in die Bäume, wo wir den Vorteil hatten. Sie befanden sich ständig in der Defensive, unfähig, unseren nächsten Zug vorherzusehen — und entkamen nur, indem sie unseren Teil des Dschungels in Asche legten."
 agot_dragon_combat.1001.desc.opponent_response.jungle_stalker: "Wir tappten in ihre Falle und ließen uns in den Dschungel unter uns locken, wo wir mehrere Treffer erlitten, ehe wir das Gehölz niederbrannten und wieder gen Himmel entkamen."

 agot_dragon_combat.1001.open_terrain_expert: "Unter freiem Himmel blühen wir auf!
"
 agot_dragon_combat.1001.tt.open_terrain_expert: "Ihr nutzt Eure Erfahrung im offenen Gelände am Boden, um Euch einen Vorteil unter dem weiten Himmel zu verschaffen."
 agot_dragon_combat.1001.desc.my_feedback.open_terrain_expert: "Im Himmel wie auf dem Boden ist Raum ein Werkzeug, das genutzt sein will. Ohne Hindernisse, die uns hemmten, schossen wir aufwärts und tauchten hinab — jeder Angriff saß."
 agot_dragon_combat.1001.desc.opponent_response.open_terrain_expert: "[my_foe.GetFirstName] ist als wahrer Meister des offenen Geländes bekannt, und sie machten sich das zunutze — wuchtige Schläge trafen uns, denen wir nichts entgegensetzen konnten."

 agot_dragon_combat.1001.rough_terrain_expert.rocky: "Diese Felsen sehen gefährlich aus!"
 agot_dragon_combat.1001.tt.rough_terrain_expert.rocky: "Ihr werdet [my_foe_dragon.GetFirstName] in die Felsformation unter Euch treiben."
 agot_dragon_combat.1001.desc.my_feedback.rough_terrain_expert.rocky: "Wir tauchten tief hinab und wichen ganz knapp den gezackten Felsen aus, ehe wir wieder aufstiegen — just als [my_foe_dragon.GetName] uns folgte. Diese Situation, sie am Zacken, wir über ihnen im Freien, wandten wir uns um und warfen [my_dragon.GetName] und [my_dragon.Custom('GetDragonHerHis')] volles Gewicht auf [my_foe_dragon.GetName] und drückten [my_foe_dragon.GetHerHis] Leib in die scharfen Felsen. Einmal. Zweimal. Das Dröhnen brüllender Drachen und berstenden Steins war gewaltig. Erst als [my_foe.GetFirstName] vom Sattel aus einen glücklichen Treffer landete und [my_dragon.GetName] zum Nachgeben zwang, nutzten sie die Gelegenheit zur Flucht."
 agot_dragon_combat.1001.desc.opponent_response.rough_terrain_expert.rocky: "Danach jedoch wurden wir in die Felsen unter uns getrieben, das volle Gewicht von [my_foe_dragon.GetName] drückte uns auf die scharfen Felsspitzen. Einmal, zweimal, beinahe dreimal wurden wir gegen den Stein gepresst — doch ein glücklicher Hieb mit meiner eigenen Waffe gegen das Maul von [my_foe_dragon.GetName] gab [my_dragon.GetName] die Chance zur Flucht."

 agot_dragon_combat.1001.rough_terrain_expert.boggy: "In die Sümpfe!"
 agot_dragon_combat.1001.tt.rough_terrain_expert.boggy: "Ihr versucht, die Sümpfe zu nutzen, um Euren Feind in die Falle zu locken."
 agot_dragon_combat.1001.desc.my_feedback.rough_terrain_expert.boggy: "Mit einer Reihe äußerst aggressiver Angriffe drängten wir [my_foe.GetTitledFirstName] und [my_foe_dragon.GetName] hinab in den Sumpf, wo [my_foe_dragon.Custom('GetDragonHerHis')] schwerer Leib im Morast versank. Ein Gerangel zwischen unseren Drachen entbrannte, wobei [my_dragon.GetName] den Kopf von [my_foe_dragon.GetNameNoTooltip] wiederholt in den zähen Schlamm tauchte. Schließlich mussten wir jedoch zurückweichen, ehe wir selbst hinabgezogen würden."
 agot_dragon_combat.1001.desc.opponent_response.rough_terrain_expert.boggy: "Mit einer Reihe äußerst aggressiver Angriffe drängten [my_foe.GetTitledFirstName] und [my_foe_dragon.GetName] uns hinab in den Sumpf, wo der schwere Leib von [my_dragon.GetName] im Morast versank. Ein Gerangel zwischen den Drachen entbrannte, wobei [my_dragon.GetNameNoTooltip] wieder und wieder in den zähen Schlamm getaucht wurde. Schließlich jedoch wichen sie zurück, als [my_dragon.GetNameNoTooltip] festen Halt fand und sie beinahe mit uns in die Tiefe riss."

 agot_dragon_combat.1001.forest_fighter: "Die Bäume da sind unsere Verbündeten — nutzen wir sie!"
 agot_dragon_combat.1001.tt.forest_fighter: "Ihr seid in Eurem Element und nutzt den Wald für komplexe Flugmanöver, die sie nicht nachvollziehen können."
 agot_dragon_combat.1001.desc.my_feedback.forest_fighter: "Wir sclängelten uns zwischen den Bäumen hindurch, tauchten unerwartet auf und versetzten dem Flügel von [my_foe_dragon.GetName] einen beißenden Hieb — sie entkamen nur, indem sie einen Abschnitt des Waldes in Flammen setzten."
 agot_dragon_combat.1001.desc.opponent_response.forest_fighter: "Wir folgten [my_foe_dragon.GetName] hinab in den Wald, doch [my_dragon.GetName] vermochte es nicht, ihre flinken Manöver nachzuahmen. [my_dragon.Custom('GetDragonSheHe')|U] wurde von den größeren Ästen gepeitscht, ehe [my_dragon.Custom('GetDragonSheHe')] wutentbrannt einen Abschnitt des Waldes niederbrannte, um zu entkommen."

 agot_dragon_combat.1001.special_fallback: "Rückzug!"
 agot_dragon_combat.1001.tt.special_fallback: "Ihr zieht Euch taktisch zurück, um die Lage neu zu bewerten."
 agot_dragon_combat.1001.desc.my_feedback.special_fallback: "Wir wichen gerade noch rechtzeitig zurück und entkamen nur knapp einem Biss, der die Flügel von [my_dragon.GetName] zerrissen hätte."
 agot_dragon_combat.1001.desc.opponent_response.special_fallback: "Wir setzten mit einem wuchtigen Biss nach, der ihre Flügel beinahe erwischte! Als sie unsere Entschlossenheit sahen, zogen sich [my_foe.GetName] und [my_foe_dragon.GetName] zurück – ein klares Zeichen ihrer Schwäche!"

  # Injuries
 agot_dragon_combat.1001.desc.my_injury.none: "\n\n[my_dragon.GetNameNoTooltip] und ich sind vollkommen unverletzt, "
 agot_dragon_combat.1001.desc.my_injury.light: "\n\n[my_dragon.GetNameNoTooltip] und ich sind nur leicht verwundet, "
 agot_dragon_combat.1001.desc.my_injury.heavy: "\n\n[my_dragon.GetNameNoTooltip] und ich sind verwundet, Blut tropft von uns auf den Boden herab, "
 agot_dragon_combat.1001.desc.my_injury.severe: "\n\n[my_dragon.GetNameNoTooltip] und ich sind übel zugerichtet, dampfendes Blut strömt in Bächen herab, "
 agot_dragon_combat.1001.desc.my_injury.mortal: "\n\n[my_dragon.GetNameNoTooltip] und ich sind dem Tode nahe, unsere zahlreichen Wunden drohen uns vom Himmel stürzen zu lassen, "

 agot_dragon_combat.1001.desc.foe_injury.none: "während [my_foe_dragon.GetNameNoTooltip] und [my_foe.GetTitledFirstNameNoTooltip] unversehrt erscheinen."
 agot_dragon_combat.1001.desc.foe_injury.light: "während [my_foe_dragon.GetNameNoTooltip] und [my_foe.GetTitledFirstNameNoTooltip] nur oberflächliche Wunden davongetragen haben."
 agot_dragon_combat.1001.desc.foe_injury.heavy: "während [my_foe_dragon.GetNameNoTooltip] und [my_foe.GetTitledFirstNameNoTooltip] merklich bluten."
 agot_dragon_combat.1001.desc.foe_injury.severe: "während [my_foe_dragon.GetNameNoTooltip] und [my_foe.GetTitledFirstNameNoTooltip] schwer verwundet sind."
 agot_dragon_combat.1001.desc.foe_injury.mortal: "während [my_foe_dragon.GetNameNoTooltip] und [my_foe.GetTitledFirstNameNoTooltip] offenkundig dem Untergang geweiht sind."

  # Chance of winning
 agot_dragon_combat.1001.desc.chance_of_winning.near_zero: "\n\nNach allem, was bisher geschah, bin ich gewiss, dass uns das Verderben ereilt."
 agot_dragon_combat.1001.desc.chance_of_winning.minimal: "\n\nIch bin äußerst pessimistisch, was unsere Aussichten anbelangt."
 agot_dragon_combat.1001.desc.chance_of_winning.low: "\n\n[my_foe.GetTitledFirstNameNoTooltip] wirkt zuversichtlich, und ich fürchte, wir sind weit vom Sieg entfernt."
 agot_dragon_combat.1001.desc.chance_of_winning.fair: "\n\nIch spüre den Schweiß auf meiner Stirn und fürchte, wir verlieren diesen Kampf."
 agot_dragon_combat.1001.desc.chance_of_winning.okay: "\n\nEs hätte gewiss besser laufen können, doch wir sind noch nicht geschlagen!"
 agot_dragon_combat.1001.desc.chance_of_winning.good: "\n\nEs läuft derzeit gut, doch noch ist alles offen."
 agot_dragon_combat.1001.desc.chance_of_winning.high: "\n\nIch spüre das schwindende Selbstbewusstsein von [my_foe.GetFirstNameNoTooltip]. [my_foe.GetSheHe|U] steht gewiss unter großem Druck."
 agot_dragon_combat.1001.desc.chance_of_winning.very_high: "\n\nJede Bewegung von [my_dragon.GetNameNoTooltip] scheint vom Hunger eines Raubtiers erfüllt, das sich endlich auf seine Beute stürzen will."
 agot_dragon_combat.1001.desc.chance_of_winning.excellent: "\n\n[my_dragon.GetNameNoTooltip] und ich sind eins, und dies wird fast gewiss mit unserem Sieg enden."
 agot_dragon_combat.1001.desc.chance_of_winning.near_certain: "\n\nDies ist gewiss bald vorüber — [my_foe.GetTitledFirstName] kann sich kaum noch im Sattel halten und droht vom Himmel zu stürzen."

  # Wounding
 agot_dragon_combat.wound_dragon.limit: "[wounded_dragon.GetName] kann nicht noch mehr verwundet werden."
 agot_dragon_combat.wound_dragon.1: "[wounded_dragon.GetName] ist $trait_dragon_wounded_1$."
 agot_dragon_combat.wound_dragon.2: "[wounded_dragon.GetName] ist $trait_dragon_wounded_2$."
 agot_dragon_combat.wound_dragon.3: "[wounded_dragon.GetName] ist $trait_dragon_wounded_3$."
 agot_dragon_combat.wound_dragon.4: "[wounded_dragon.GetName] ist $trait_dragon_wounded_4$."
 agot_dragon_combat.wound_dragon.5: "[wounded_dragon.GetName] ist $trait_dragon_wounded_5$."

 # I lost!
 agot_dragon_combat.1003.t: "Ein Tanz des Verderbens!"
 agot_dragon_combat.1003.desc.sudden_strike: "Unser Schicksal wendet sich so jäh wie der Wind. In einem Augenblick wirkt [my_foe.GetTitledFirstName] verwundbar, nur Momente von der Niederlage entfernt. Im nächsten sehe ich, wie [my_foe_dragon.GetName] [my_foe_dragon.Custom('GetDragonHerHis')]en Hals herumreißt und ein gewaltiger Schlund sich vor meinen Augen auftut.\n\nIch vermag gerade noch in den gähnenden Rachen zu blicken, spüre den heißen Atem des Todes zu mir emporsteigen, ehe er sich schließt, und ich denke..."
 agot_dragon_combat.1003.a.sudden_strike: "So also endet es."
 agot_dragon_combat.1003.f.sudden_strike: "Ihr werdet von [my_foe_dragon.GetName] verschlungen"

 agot_dragon_combat.1003.desc.dragonfire: "Ich bin auf Drachen in den Krieg gezogen. Ich weiß, wie es ist, Menschen verbrennen zu sehen. Nie hätte ich gedacht, dass ich einmal auf dieser Seite stehen würde. \n\nEin lautes Brüllen, ein Hitzeschwall – ich sehe, wie [my_foe_dragon.GetName] seinen Schlund öffnet und das lodernde Drachenfeuer auf [my_dragon.GetName] und mich schießt. Zu gewaltig, um auszuweichen. Zu nah, um sich zu erwehren. Instinktiv hebe ich meine Arme, obwohl ich weiß, dass es nichts nützt, und schreie."
 agot_dragon_combat.1003.a.dragonfire: "#EMP AGGGGHHHHHHHHHH!!!!#!"
 agot_dragon_combat.1003.f.dragonfire: "Ihr und [my_dragon.GetName] werdet mit beinahe völliger Gewissheit verbrennen. Solltet Ihr überleben, dann unter qualvollen Schmerzen nach dem Sturz zu Boden."

 agot_dragon_combat.1003.desc.driven_to_ground: "Die Wucht des Aufpralls von [my_foe_dragon.GetName] und [my_dragon.GetName] erschüttert mich in meinem Sattel, als wäre ein Haus auf mich gefallen. [my_dragon.GetNameNoTooltip] stößt einen verzweifelten Schrei aus, als wir heftig zu Boden geschleudert werden. \n\nIch vernehme das grausame Knacken  [my_dragon.Custom('GetDragonHerHis')]es Flügels, der unter dem gemeinsamen Gewicht zweier Drachen zerbricht. Ich blicke auf die massive Gestalt von [my_foe_dragon.GetNameNoTooltip], der wie ein Gott über dem zerbrochenen Leib von [my_dragon.GetNameNoTooltip] thront und beginnt, ihn zu verschlingen #!!"
 agot_dragon_combat.1003.a.driven_to_ground: "Ich muss aus diesem Sattel!"
 agot_dragon_combat.1003.f.driven_to_ground: "Ihr versucht Euer Bestes, um zu entkommen!"

 agot_dragon_combat.1003.desc.disemboweled:0 "Durch die Wolken glaube ich [my_foe_dragon.GetName] zu erspähen, offensichtlich im Begriff zu... nein, da!\n\nZu spät.\n\n[my_foe_dragon.GetNameNoTooltip] schießt auf uns zu wie ein Blitz aus heiterem Himmel, und ebenso unaufhaltsam. [my_foe_dragon.Custom('GetDragonSheHe')|U] stürzt sich auf den ungeschützten Bauch von [my_dragon.GetName] und reißt ein großes Stück aus [my_dragon.Custom('GetDragonHerHis')]em Leib heraus, [my_foe_dragon.Custom('GetDragonSheHe')] weidet meinen Drachen am offenen Himmel aus! Mit einem letzten Brüllen stürzen wir beide ab, der Wind rauscht an uns vorbei, während Drachenblut und Gedärme über uns in den Himmel strömen."
agot_dragon_combat.1003.a.disemboweled:0 "Nein-nein-nein-nein-nein-nein!"
agot_dragon_combat.1003.f.disemboweled:0 "Der Boden kommt erschreckend schnell näher..."

 agot_dragon_combat.1003.desc.eviscerated: "Ohne jede Anmut und Eleganz treibt [my_foe.GetTitledFirstName] [my_foe_dragon.GetName] geradewegs auf uns zu! Wenngleich [my_dragon.GetName] auszuweichen versucht und dann [my_dragon.Custom('GetDragonHerHis')]e Schwingen zur Abwehr erhebt, werden beide von Zähnen und Klauen zerfetzt!\n\n[my_dragon.GetNameNoTooltip] brüllt vor Qual, als ein ganzer Flügel abgerissen wird, doch [my_foe_dragon.GetName] lässt nicht ab, und reißt und zerrt weiter. Plötzlich verbeißt [my_foe_dragon.Custom('GetDragonSheHe')] sich furchtbar im Hals von [my_dragon.GetNameNoTooltip], und nach einem letzten Schrei reißt [my_foe_dragon.Custom('GetDragonSheHe')] meinem Drachen den Kopf ab, direkt vor meinen Augen!"
 agot_dragon_combat.1003.a.eviscerated: "Nein! Das darf nicht sein! Bitte!"
 agot_dragon_combat.1003.f.eviscerated: "Ihr und [my_dragon.GetName] werdet beide von [my_foe_dragon.GetName] verschlungen"

 agot_dragon_combat.1003.desc.chomp: "„Lykirī, bleib ruhig, [my_dragon.GetName]! Wir können noch überleben!“, rufe ich hinab, während der Wind meine Stimme zerreißt und wir zwischen den Wolken hindurchschießen. Mehrmals glaube ich, den Schatten von [my_foe_dragon.GetName] zu erspähen, doch jedes Mal löst sich das Trugbild auf, sobald wir näher kommen. Dennoch höre ich das Atmen des Untiers. Den Flügelschlag. Das tiefe, kehliges Grollen eines wahren Drachen.\n\nEin urtümlicher Teil meines Körpers erkennt, was dies bedeutet. Der tiefe, eingeweidige Schrei von Instinkten und Sinnen, geschärft zu einer Zeit, als die Menschen noch nicht mehr als Tiere waren. Wir werden gejagt.\n\nAls wolle er den Gedanken unterstreichen, formt sich ein weiterer Schatten direkt vor uns. Kurz erwarte ich, dass auch dieser nur Einbildung sei, da erscheint eine titanenhafte Gestalt vor uns, den Schlund weit genug aufgerissen, um [my_dragon.GetName] und mich im Ganzen zu verschlingen."
 agot_dragon_combat.1003.a.chomp: "Ihr habt nicht einmal mehr Zeit zu schreien."
 agot_dragon_combat.1003.f.chomp: "Ihr und [my_dragon.GetName] werdet beide von [my_foe_dragon.GetName] zu Haschee verarbeitet"


  # I won!
 agot_dragon_combat.1004.t: "Sieg!"
 agot_dragon_combat.1004.desc.sudden_strike: "Mein Plan geht auf! [my_foe.GetName] hat es nicht kommen sehen. In einem Augenblick wirken [my_dragon.GetName] und ich verwundbar, und [my_foe_dragon.GetName] setzt zum Todesstoß an. Im nächsten hat [my_dragon.GetNameNoTooltip] seinen Schwanz heftig gegen die Schulter von[my_foe_dragon.GetNameNoTooltip] gepeitscht und [my_foe_dragon.Custom('GetDragonHerHis')]en Hals umschlungen,samt [Select_CString( my_foe.IsFemale, 'der schutzlosen Reiterin, die', 'dem schutzlosen Reiter, der' )] nun an den Drachenhals gepresst eingequetscht wird.\n\nDer gewaltige Schlund von [my_dragon.GetNameNoTooltip] öffnet sich über [my_foe.GetNameNoTooltip] und verschlingt [my_foe.Custom('DE_PRO_PER_S_3P_A')]!"
 agot_dragon_combat.1004.a.sudden_strike: "Der Drache dürfte nun ein Leichtes sein!"
 agot_dragon_combat.1004.f.sudden_strike_survived: "[my_foe_dragon.GetName] gelingt die Flucht"
 agot_dragon_combat.1004.f.sudden_strike_died: "[my_foe_dragon.GetName] fällt rasch einem zweiten Angriff von [my_dragon.GetName] zum Opfer"

 agot_dragon_combat.1004.desc.dragonfire: "Ein lautes Brüllen, ein Hitzeschwall – ich sehe, wie [my_dragon.GetName] allen Widerstand hinwegfegt. Aus [my_dragon.Custom('GetDragonHerHis')]em glühenden Rachen speit er einen einzige gewaltigen Feuerstrahl auf [my_foe_dragon.GetName] und [my_foe.GetTitledFirstName] zu. Zu nah, um auszuweichen. Zu gewaltig, um sich zu erwehren. Mit einem Überschwang der Genugtuung, der dem Sturm des Feuers in nichts nachsteht, sehe ich, wie [my_foe_dragon.GetNameNoTooltip] und [my_foe.GetTitledFirstNameNoTooltip] von [my_dragon.GetNameNoTooltip] zu Asche verbrannt werden."
 agot_dragon_combat.1004.a.dragonfire: "Hab ich Euch!"
 agot_dragon_combat.1004.f.dragonfire_both: "[my_foe.GetName] und [my_foe_dragon.GetName] werden beide von [my_dragon.GetName] verbrannt"
 agot_dragon_combat.1004.f.dragonfire_dragon: "[my_foe_dragon.GetName] wird von [my_dragon.GetName] tödlich verwundet, doch [my_foe.GetName] gelingt die Flucht"
 agot_dragon_combat.1004.f.dragonfire_rider: "[my_foe_dragon.GetName] wird von [my_dragon.GetName] verbrannt, doch [my_foe.GetName] gelingt es, davonzukommen"
 agot_dragon_combat.1004.f.dragonfire_neither: "[my_foe.GetName] und [my_foe_dragon.GetName] erlitten schreckliche Brandwunden, können jedoch knapp entkommen"

 agot_dragon_combat.1004.desc.driven_to_ground: "Die Wucht des Aufpralls von [my_dragon.GetName] auf [my_foe_dragon.GetName] erschüttert mich in meinem Sattel, als wäre ein Haus auf mich gefallen. [my_foe_dragon.GetName] stößt einen verzweifelten Schrei aus, als wir unsere Feinde heftig zu Boden schleudern.\n\nIch vernehme das befriedigende Knacken des Flügels von [my_foe_dragon.GetNameNoTooltip], der unter dem vereinten Gewicht zweier Drachen bricht. Ich blicke hinab auf die Gestalt von [my_foe_dragon.GetNameNoTooltip], während wir wie ein Gott über unseren gebrochenen Feinden thronen, und ich spüre, wie der Hunger von [my_dragon.GetNameNoTooltip] [my_dragon.Custom('GetDragonHerHis')]en Drang zu töten entfesselt."
 agot_dragon_combat.1004.a.driven_to_ground: "So ist's recht, [my_dragon.GetName]! Friss!"
 agot_dragon_combat.1004.f.driven_to_ground_died: "[my_foe.GetFirstName] wird von [my_dragon.GetNameNoTooltip] verschlungen"
 agot_dragon_combat.1004.f.driven_to_ground_escaped: "[my_foe.GetFirstName] versucht verzweifelt, den reißenden Bissen von [my_dragon.GetNameNoTooltip] zu entkommen"

 agot_dragon_combat.1004.desc.disemboweled: "Unter dem Schutz der Wolken erspähe ich [my_foe_dragon.GetName], offenkundig unaufmerksam. Als wir in rasender Geschwindigkeit heranstürzen, wendet [my_foe.GetFirstName] sich uns zu.\n\nZu spät.\n\n[my_dragon.GetName] schießt von unten auf sie zu wie ein Blitz, und ebenso unaufhaltsam. [my_foe_dragon.Custom('GetDragonSheHe')|U] versucht [my_foe_dragon.Custom('GetDragonHerHis')]en ungeschützten Bauch zu schützen, kann jedoch nicht rechtzeitig reagieren – ein gewaltiges Stück wird aus [my_foe_dragon.Custom('GetDragonName')]em Leib gerissen. Wir haben [my_foe_dragon.GetName] am offenen Himmel ausgeweidet! Ich höre ein widerhallendes Brüllen, während sie beide hinter uns abstürzen, Drachenblut und Gedärme strömen aus dem Bauch von [my_dragon.GetName] in die Lüfte hinter ihnen heraus."
 agot_dragon_combat.1004.a.disemboweled: "Viel Spaß bei der Landung, [my_foe.GetFirstName]!"
 agot_dragon_combat.1004.f.disemboweled_died: "[my_foe_dragon.GetName] ist tot, und [my_foe.GetName] wird  folgen."
 agot_dragon_combat.1004.f.disemboweled_escaped: "[my_foe_dragon.GetName] ist tot, doch [my_foe.GetName] überlebt den Sturz knapp"

 agot_dragon_combat.1004.desc.eviscerated: "Ohne überhaupt an Verteidigung oder Deckung zu denken, stürzt sich [my_dragon.GetName] geradewegs auf [my_foe_dragon.GetName]! Wenngleich [my_foe_dragon.GetNameNoTooltip] auszuweichen versucht und dann [my_foe_dragon.Custom('GetDragonHerHis')]e Schwingen zur Abwehr erhebt, wird alles von unseren Zähnen und Klauen zerfetzt!\n\n[my_foe_dragon.GetNameNoTooltip] brüllt vor Qual, als ein ganzer Flügel abgerissen wird, doch [my_dragon.GetNameNoTooltip] lässt nicht locker und zerrt weiter. Mit einem Peitschenhieb des Halses verbeißt [my_dragon.Custom('GetDragonSheHe')] sich furchtbar im Hals von [my_foe_dragon.GetNameNoTooltip], und nach einem letzten Schrei des Ungetüms reißt [my_dragon.Custom('GetDragonSheHe')] [my_foe_dragon.GetName] glatt den Kopf ab!"
 agot_dragon_combat.1004.a.eviscerated: "Verschling sie beide!"
 agot_dragon_combat.1004.f.eviscerated: "[my_dragon.GetName] verschlingt sowohl [my_foe.GetTitledFirstName] als auch [my_foe_dragon.GetName]"

 agot_dragon_combat.1004.desc.chomp: "Für [my_foe.GetFirstName] hat es in Wahrheit nie Hoffnung gegeben. [my_foe_dragon.GetName] ist nicht halb so groß wie [my_dragon.GetName], und [my_foe.GetSheHe] weiß, dass ein offener Angriff Selbstmord wäre. Klugerweise zieht [my_foe.GetSheHe] es vor, sich in den Wolken zu verstecken.\n\nMehrmals glaube ich, den Schatten unserer Beute zu erspähen, doch jedes Mal löst sich das Trugbild auf, sobald wir näher kommen.\n\nWährend wir fliegen, erkennt ein urtümlicher Teil meines Körpers, was dies bedeutet. Ein urtümlicher Teil meines Körpers erkennt, was dies bedeutet. Der tiefe, eingeweidige Schrei von Instinkten und Sinnen, geschärft zu einer Zeit, als die Menschen noch nicht mehr als Tiere waren. Wir sind der Jäger, und der Drache ist unsere Beute.\n\nAls wolle er den Gedanken unterstreichen, formt sich ein weiterer Schatten direkt vor mir. Kurz erwarte ich, dass auch dieser nur Einbildung sei, da erscheint die kleinere Gestalt direkt vor uns! Ich brauche [my_dragon.GetNameNoTooltip] nicht einmal Befehle zu geben. [my_dragon.Custom('GetDragonHerHis')|U] Schlund öffnet sich, und mit einem einzigen Biss werden [my_foe_dragon.GetName] und [my_foe.GetName] im Ganzen verschlungen."
 agot_dragon_combat.1004.a.chomp: "Sie hatten nicht einmal mehr Zeit zu schreien."
 agot_dragon_combat.1004.f.chomp: "[my_foe.GetName] und [my_foe_dragon.GetName] werden beide von [my_dragon.GetName] zermalmt"
 agot_dragon_combat.1004.chomp.t: "[my_dragon.GetNameNoTooltip] hat Gefallen am Geschmack gefunden"


  # More Dragon Duel Event
 agot_dragon_combat.1010.t: "Schwingen der Vergeltung"

 agot_dragon_combat.1010.desc.commander: "Die Späher reiten atemlos heran, ihre Nachricht scharf wie eine Speerspitze. [enemy_dragonrider.GetTitledFirstName], Geißel der Lüfte, wurde über [battle_location.GetName] gesichtet. Eine solche Gelegenheit bietet sich nur selten: Wenn ich jetzt zuschlage, mag mein Feind aus den Wolken gestürzt werden, [enemy_dragonrider.Custom('DE_PRO_POS_S_3P')]e Bestie gebrochen, [enemy_dragonrider.Custom('DE_PRO_POS_S_3P')]e Männer vernichtet.\n\nDoch jedes Drachenduell ist ein Tanz mit dem Tode. Wenn ich in die Lüfte steige, wird der Himmel in Feuer und Wut lodern, und nur einer von uns wird lebend wieder herunterkommen."
 agot_dragon_combat.1010.a.commander: "Ich werde mich in die Lüfte erheben – dies endet jetzt."

 agot_dragon_combat.1010.desc.knight: "Die Kunde der Späher ist düster: [enemy_dragonrider.GetTitledFirstName] wurde über [battle_location.GetName] gesichtet, [enemy_dragonrider.Custom('DE_PRO_POS_S_3P')] Drache soll in den Hügeln kauern wie ein Sturm, der sich am Horizont zusammenbraut. Einem solchen Feind ist mit Schwertern allein nicht beizukommen. Alle Blicke richten sich auf [dragonrider_in_battle.GetTitledFirstName] und [dragon_in_battle.GetTitledFirstName], [dragonrider_in_battle.Custom('DE_ART_DEF_S_A')] Drachenreiter[dragonrider_in_battle.Custom('DE_END_NOU_S_GS_N')] in unserem Heer – nur [dragonrider_in_battle.Custom('DE_PRO_POS_S_3P')] Feuer kann Feuer begegnen, nur [dragonrider_in_battle.Custom('DE_PRO_POS_S_3P')]e Schwingen können den Schrecken der Lüfte zurücktreiben.\n\nWenn sie aufsteigen, wird der Himmel selbst in Flammen stehen."
 agot_dragon_combat.1010.a.knight: "[dragonrider_in_battle.GetTitledFirstNameNoTooltip] muss fliegen – nur [dragonrider_in_battle.Custom('DE_PRO_PER_S_3P_N')] kann dieser Bedrohung begegnen."

 agot_dragon_combat.1010.desc.lord: "Geschrei ertönt von den Mauern von [home_location.GetNameNoTooltip]: [enemy_dragonrider.GetTitledFirstName] fällt über meine Ländereien her, der Schatten von [enemy_dragon_in_battle.GetTitledFirstName] fällt lang und schwarz über Herd und Halle. Mein Volk flieht in Schrecken, wohl wissend, dass kein Speer und kein Pfeil sie vor dem Zorn des Drachenfeuers bewahren kann.\n\nNur ich vermag [enemy_dragonrider.Custom('DE_PRO_PER_S_3P_D')] entgegenzutreten. Erhebe ich mich in die Lüfte, wird der Himmel über [home_location.GetNameNoTooltip] brennen, und nur einer von uns wird überleben."
 agot_dragon_combat.1010.a.lord: "Ich werde meine Heim verteidigen – in die Lüfte!"
 agot_dragon_combat.1010.b.lord: "Nein… besser die Mauern brennen als ich."

 agot_dragon_combat.1010.desc.courtier: "Panik breitet sich in den Hallen aus, als der Schatten von [enemy_dragonrider.GetTitledFirstName] auf uns fällt. [enemy_dragonrider.Custom('DE_PRO_POS_S_3P')|U] Drache, [enemy_dragon_in_battle.GetTitledFirstName], kreist über [home_location.GetNameNoTooltip], Flammen züngeln an den Dächern, Schreie hallen durch die Höfe. Kein Ritter, kein Heer, keine Mauer kann einem solchen Feind standhalten.\n\nDoch noch ist nicht alle Hoffnung verloren. Einer unter meinen Höflingen, [dragonrider_in_battle.GetTitledFirstName], gebietet über einen eigenen Drachen. Steigt [dragonrider_in_battle.Custom('DE_PRO_PER_S_3P_N')] in die Lüfte auf, wird der Himmel von Donner und Flammen zerrissen, und nur einer von ihnen wird den Kampf überstehen."
 agot_dragon_combat.1010.a.courtier: "Ruft [dragonrider_in_battle.GetTitledFirstNameNoTooltip] herbei – Feuer muss Feuer begegnen."
 agot_dragon_combat.1010.b.courtier: "Wir müssen ausharren – der Himmel gehört heute [enemy_dragonrider.Custom('DE_PRO_PER_S_3P_D')]."

 agot_dragon_combat.1010.a.tt: "Ihr werdet Euch einem Drachenduell gegen [enemy_dragonrider.GetTitledFirstNameNoTooltip] stellen."
 agot_dragon_combat.1010.a.tt.not_me: "[dragonrider_in_battle.GetTitledFirstNameNoTooltip] wird sich einem Drachenduell gegen [enemy_dragonrider.GetTitledFirstNameNoTooltip] stellen."

 agot_dragon_combat.1010.b: "Ein andermal, vielleicht."

