l_german:
agot_btw_maintenance.0100.t: "Königreich gründen"
 agot_btw_maintenance.0100.desc: "Ich kann das [kingdom_title.GetName] gründen und ein mächtiger und gefürchteter Herrscher werden! Ich könnte dann von allen unabhängigen de-jure-Vasallen des [kingdom_title.GetNamePossessive] verlangen, mir die Treue zu schwören und meine Vasallen zu werden."
 agot_btw_maintenance.0100.a: "Gründet das Königreich."
 agot_btw_maintenance.0100.b: "Lieber nicht."

 agot_btw_maintenance.0101.t: "Treue schwören"
 agot_btw_maintenance.0101.desc: "Mein[king.Custom('DE_END_PRO_S_N')] [ROOT.Char.Custom2('RelationToMe', king.Self)] [king.GetFullName] hat das [kingdom_title.GetName] gegründet und nennt sich nun [king.GetTitleAsNameNoTooltip]! [king.Custom('DE_PRO_PER_S_3P_N')|U] fordert mich auf, [king.Custom('DE_PRO_PER_S_3P_D')] die Treue zu schwören und [king.Custom('DE_PRO_POS_S_3P')][ROOT.Char..Custom('DE_END_PRO_S_N')] Vasall[ROOT.Char.Custom('DE_END_NOU_S_GS_N')] zu werden."
 agot_btw_maintenance.0101.a: "Treue schwören."
 agot_btw_maintenance.0101.b: "Unabhängig bleiben."
