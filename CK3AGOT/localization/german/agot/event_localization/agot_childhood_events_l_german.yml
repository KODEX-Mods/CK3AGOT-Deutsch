l_german:
 agot_childhood_events.0001.t: "Der Münzwurf"
 agot_childhood_events.0001.desc: "Jedes Mal, wenn ein [GetPlayer.GetHouse.GetBaseName] geboren wird, werfen die Götter eine Münze – auf der einen Seite steht Größe, auf der anderen Wahnsinn.\n\n[child.Custom('CoinFlipChild')]"
 agot_childhood_events.0001.a: "... was wird."

 agot_childhood_events.0002.t: "Der Münzwurf"
 agot_childhood_events.0002.desc: "Jedes Mal, wenn ein [GetPlayer.GetHouse.GetBaseName] geboren wird, werfen die Götter eine Münze, die entscheidet, ob bei dem Kind Wahnsinn oder Größe die Oberhand gewinnt. Und die Welt hält den Atem an, um das Ergebnis abzuwarten. Heute scheint der Wurf günstig ausgefallen zu sein... [child.GetFirstName] [child.Custom('CoinFlip')]"
 agot_childhood_events.0002.a: "Wir werden Eure Entwicklung mit großem Interesse verfolgen."

 agot_childhood_events.0003.t: "Der Münzwurf"
 agot_childhood_events.0003.desc: "Jedes Mal, wenn ein [GetPlayer.GetHouse.GetBaseName] geboren wird, werfen die Götter eine Münze, die entscheidet, ob bei dem Kind Wahnsinn oder Größe die Oberhand gewinnt. Und die Welt hält den Atem an, um das Ergebnis abzuwarten.\n\nEs sieht so aus, als ob der Wurf heute... nicht gerade günstig ausgefallen ist. Es scheint, dass [child.GetFirstName] der Inbegriff des Wahnsinns ist."
 agot_childhood_events.0003.a: "Wehe dem Haus [GetPlayer.GetHouse.GetBaseName]!"

 coin_flip_diligent: "scheint von Natur aus fleißig und hingebungsvoll zu sein. Mal schauen, was wird..."
 coin_flip_learning: "scheint eine natürliche Begabung für die Wissenschaft zu haben. Mal schauen, was wird..."
 coin_flip_martial: "scheint eine natürliche Begabung für Kriegskunst zu haben. Mal schauen, was wird..."
 coin_flip_intrigue: "scheint eine natürliche Begabung für Intrigen zu haben. Mal schauen, was wird..."
 coin_flip_stewardship: "scheint eine natürliche Begabung für die Verwaltung zu haben. Mal schauen, was wird..."
 coin_flip_diplomacy: "scheint eine natürliche Begabung für Diplomatie zu haben. Mal schauen, was wird..."
 coin_flip_prowess: "scheint ein Naturtalent im Umgang mit der Klinge zu sein. Mal schauen, was wird..."
 coin_flip_shrewd: "scheint eine natürliche Begabung bei allem zu haben, was er anpackt. Mal schauen, was wird..."
 coin_flip_genius: "scheint erstaunlich scharfsinnig für sein Alter zu sein. Mal schauen, was wird..."
 coin_flip_child_diligent: "Es gibt Zeiten, in denen ich [ROOT.Char.GetFaith.HighGodName] für meinen Mangel an Begabung verfluchen möchte, doch ich weiß, dass Klagen mich nicht weiterbringt. Jeder Tag ist eine Herausforderung, die ich zu meistern gedenke; jede Nacht eine Gelegenheit, einen Vorsprung zu gewinnen. Ich muss — nein, ich #italic werde#! — mit meinen eigenen zwei Händen bestehen."
 coin_flip_child_learning: "Wenn ich überhaupt einen Wahnsinn in mir trage, dann den, dass ich nicht umhinkomme, jedes Buch zu lesen, das mir in die Hände fällt... Moment, hat sich der Wahnsinn der [GetPlayer.GetHouse.GetBaseName] jemals auf solche Weise gezeigt? Ich muss die Bibliothek aufsuchen und herausfinden, ob es Schriften zu diesem Thema gibt!"
 coin_flip_child_martial: "Just heute versammelten sich die Ritter bei Hofe, um eine Scheinbelagerung der Burg zu inszenieren. Von den Burgmauern aus beobachtete ich die darauffolgende ‚Schlacht’ und glaubte, den Verstand zu verlieren! Jede Entscheidung war falsch, und die richtige Taktik schmerzhaft offensichtlich. #italic Sind sie Narren?#!"
 coin_flip_child_intrigue: "Die Höflinge, die bei Hofe verstohlen Blicke austauschen, mögen es nicht ahnen, doch ihre kaum verborgene Liebschaft ist für jedermann offensichtlich... dachte ich zumindest. Als ich es jedoch einem anderen Mädchen bei Hofe erzählte, hatte [ROOT.Char.Custom('DE_PRO_PER_S_3P_N')] keine Ahnung, wovon ich sprach. Wohl liegen mir solche Dinge einfach mehr."
 coin_flip_child_stewardship: "Nachdem ich mich stundenlang mit einem der Verwalter unterhalten habe — dessen Namen ich bereits vergessen habe —, schmerzt mein Kopf, und mein Geist sehnt sich nach Schlaf. Ich könnte glücklich sterben, wenn ich nie wieder hören müsste: „Ihr wisst für Euer Alter erstaunlich viel über Angelegenheiten der Münze.“"
 coin_flip_child_diplomacy: "Weniges bereitet mir solche Freude wie das Erzählen der Geschichten aus dem Zeitalter der Helden vor meinem völlig gefesselten Publikum. Wie sie an meinen Lippen hängen, obwohl sie die Geschichte schon unzählige Male gehört haben... Ich wage zu behaupten, dass ich ein ziemliches Talent dafür habe!"
 coin_flip_child_prowess: "Mein Geist schweift wieder zum Schwertkampf ab. Angriff! Parade! #bold Riposte!#! Wie oft habe ich dieselben Bewegungen beobachtet, wenn unsere Ritter sich duellieren? Wenn sich mir endlich die Gelegenheit bietet, selbst zu kämpfen, ist meine Antwort schlicht: Parade! Riposte! #bold Guter Kampf!#!"
 coin_flip_child_shrewd: "Ich habe immer wieder mit meinem Regenten darüber gestritten, dass es durchaus Vorteile hätte, Gefangene als Spione freizulassen, anstatt sie hinzurichten. Doch jedes Mal bekomme ich zur Antwort, es sei die Pflicht [ROOT.Char.Custom('DE_ART_DEF_S_G')] [ROOT.Char.GetLadyLord][ROOT.Char.Custom('DE_END_NOU_S_G')], gerecht zu sein. Wenn die anderen doch nur sehen würden, wie Gerechtigkeit auf #italic pragmatischere#! Weise geübt werden kann."
 coin_flip_child_genius: "Jedes Fachgebiet, das ich erkunde, scheint mir seine Geheimnisse nur allzu bereitwillig preiszugeben. Welche Rede soll ich vervollkommnen? Welches Stratagem erobern? Welche Verschwörung aufdecken? Welche Theorie enträtseln? Mein armer Regent kommt kaum hinterher! #bold Gut so.#!"
 coin_flip_child_lunatic_1: "Der kopflose König beobachtet mich wieder aus der Ecke des Zimmers. Ich spüre seinen Blick in meinem Nacken, seine Gedanken, wenn ich nachsinne, seine Stimme, wenn ich schlafe. Langsam wiegen mich seine Geschichten in den Schlaf — Geschichten von meiner begabten Natur, davon, wie ähnlich wir uns sind! Je mehr er spricht, desto mehr erkenne ich die Wahrheit seiner Worte."
 coin_flip_child_possessed_1: "Warum starren die Höflinge uns an, wenn wir durch die Hallen huschen? Können sie spüren, wie besonders wir sind? Nein, nein, natürlich nicht. Aber was, wenn sie es doch wissen? Niemand darf erfahren, wie besonders wir sind. Sie würden versuchen, uns zu trennen, das spüre ich. Wir müssen heute Nacht einen Plan schmieden."
 coin_flip_child_arbitrary: "Begabt hier, wahnsinnig dort – das ist alles so furchtbar langweilig. Und kindisch dazu! Wie soll man das überhaupt beurteilen? Es gibt schließlich keine objektiven Kriterien dafür. Warum hören die anderen am Hof nicht einfach auf, darüber zu reden? Ich meine, wen interessiert das schon? Mich jedenfalls nicht, und das ist alles, was zählt."
 coin_flip_child_paranoid: "Ich kann nicht schlafen. Ich kann nicht trinken oder essen. Ich kann nicht einmal denken. Ich spüre, wie die Höflinge mich beobachten — abwartend, ob die Münze auf Kopf oder Zahl fällt. Sie treiben mich in den Wahnsinn! Aber... ich kann nicht umhin, mich ebenfalls zu fragen. Werde ich wahnsinnig? Ist dies das Zeichen? Es ist doch nur ein albernes Ammenmärchen, nicht wahr? Dazu erdacht, die anderen Kinder bei Hofe in Schach zu halten. So etwas wie den Wahnsinn der [GetPlayer.GetHouse.GetBaseName] gibt es nicht... oder?"
 coin_flip_child_wrathful: "Seit drei Wochen gehen wir dasselbe Stück Geschichte des Hauses [GetPlayer.GetHouse.GetBaseName] durch, und meine Geduld wird mit diesem Unterricht immer dünner. Heute hörte ich meinen Regenten mit einigen Höflingen reden, er sagte, ich besäße keinerlei besondere Begabungen. Wenn sie nicht auf ihre Zungen achtgeben, werde ich es für sie tun müssen."
 coin_flip_child_fire_obsessed: "Ich hatte bei Hofe Geflüster von der begabten Natur des Hauses [GetPlayer.GetHouse.GetBaseName] gehört, doch nie ahnte ich, wie deutlich sich diese Gabe zeigen würde. Jedes Mal, wenn ich in eine flackernde Flamme starre, sehe ich... Visionen. Flüchtige Bilder von etwas, das ich nicht einordnen kann, doch die lodernden Feuer versuchen, mir etwas zu sagen. Mich vor etwas zu warnen? Nur in einem wahrhaft gewaltigen Scheiterhaufen werde ich die Antwort finden."

 agot_childhood_events.0004.t: "Die Saat ist stark..."
 agot_childhood_events.0004.desc: "Je weiter [child.GetFirstName] wächst, desto weniger sehe ich in [child.Custom('DE_PRO_PER_S_3P_D')] mich selbst. Ist [child.Custom('DE_PRO_PER_S_3P_N')] überhaupt wirklich von mir?"
 agot_childhood_events.0004.a: "Vielleicht bedeutet es doch nichts..."
 agot_childhood_events.0004.b: "Ich muss die Wahrheit erfahren!"
 agot_childhood_events.0004.b.success: "Wenn Euer Kind nicht von Euch ist, werdet Ihr das Geheimnis erfahren"
 agot_childhood_events.0004.b.success.bastard.t: "Erfolgreiche Nachforschungen"
 agot_childhood_events.0004.b.success.bastard.desc: "[child.GetFirstName] in Wirklichkeit das Kind von [real_father.GetFullName]!"
 agot_childhood_events.0004.b.success.notbastard.t: "Erfolgreiche Nachforschungen"
 agot_childhood_events.0004.b.success.notbastard.desc: "[child.GetFirstName] ist also wahrlich mein Kind."
 agot_childhood_events.0004.b.failure: "Ihr könnt keine Beweise finden"
 agot_childhood_events.0004.b.failure.t: "Ergebnislose Nachforschungen"
 agot_childhood_events.0004.b.failure.desc: "Ihr fandet keine Beweise."
 agot_childhood_events.0004.c: "Alle müssen die Wahrheit erfahren!"
 agot_childhood_events.0004.c.tt: "Ihr bezichtigt Eure Kinder öffentlich als Bastarde"
 agot_childhood_events.0004.c.tt.1: "Niemand glaubt Euch, und Eure Vasallen finden Eure Anschuldigungen ehrlos"
 agot_childhood_events.0004.c.tt.2: "Die Anschuldigungen werden als glaubwürdig angesehen"
 agot_childhood_events.0004.c.failure.t: "Gescheiterte Anschuldigung"
 agot_childhood_events.0004.c.failure.desc: "Niemand glaubt Euch Eure Anschuldigungen und man hält Euch nun für einen ehrlosen Lügner."
 agot_childhood_events.0004.c.success.t: "Erfolgreiche Anschuldigung"
 agot_childhood_events.0004.c.success.desc: "Die Leute schenken Euren Anschuldigungen Glauben. [child.GetFirstName] hat die [trait|E] 'Umstrittene Abstammung' erhalten."
 agot_childhood_events.0004.d: "Ob es nun meine leiblichen Kinder sind oder nicht, das ändert nichts."
 agot_childhood_events.0004.d.tt: "Wenn Eure Frau [secrets|E] über Umstrittene Abstammungen hat, werden diese ungültig."

 agot_childhood_events.0005.t: "Eine andere Art von Tanz"
 agot_childhood_events.0005.desc: "Ich schlendere durch den Burghof, als ich [other_child.GetFirstName] erblicke, [other_child.Custom('DE_ART_DEF_S_N')] mit einem Holzschwert gegen einen unsichtbaren Feind kämpft. „Nimm das, du Schurke!“ Ich schaue eine Weile neugierig zu, ehe [other_child.Custom('DE_PRO_PER_S_3P_N')] mich bemerkt.\n\n„Hallo, meine Lady. Ich habe nur geübt, und, nun ja, sonst war niemand da... es sei denn, Ihr möchtet mitmachen?“ [other_child.Custom('DE_PRO_PER_S_3P_N')|U] errötet leicht."
 agot_childhood_events.0005.desc.alone: "Ich schlendere durch den Burghof, als ich ein paar herrenlose Übungsschwerter entdecke — irgendwelche Höflingssöhne müssen wohl gespielt und den Kampf mittendrin abgebrochen haben. Ich habe vorerst nichts Besseres zu tun..."
 agot_childhood_events.0005.a: "Das sieht nach Spaß aus!"
 agot_childhood_events.0005.b: "Ich sollte es lernen, wie die Knaben!"
 agot_childhood_events.0005.c: "Nein, das ist albern."
 agot_childhood_events.0005.tt: "Ihr werdet mit Schwertübungen beginnen"

 agot_childhood_events.0006.t: "Ein unkonventioneller Zeitvertreib"
 agot_childhood_events.0006.desc: "Ich schlendere durch den Burghof, als ich einige Kinder entdecke, die mit Holzschwertern gegeneinander kämpfen. Eines von ihnen entwaffnet das andere geschickt, und mit einem Schreck erkenne ich sie — es ist mein[child.Custom('DE_END_PRO_S_N')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child'))], [child.GetFirstName].\n\nSie muss mich bereits gesehen haben, denn sie stürmt sogleich auf mich zu. „Hast du das gesehen? Ich habe gewonnen! Ich werde eine Kriegerin, wenn ich groß bin, wie Visenya oder Nymeria!“"
 agot_childhood_events.0006.desc.alone: "Ich schlendere durch den Burghof, als ich ein Kind entdecke, das gegen die Luft Schwertkampf übt. Mit einem Schreck erkenne ich, dass es mein[child.Custom('DE_END_PRO_S_N')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child'))], [child.GetFirstName], ist.\n\nSie scheint mich ebenfalls bemerkt zu haben und stürmt sogleich auf mich zu. „Ich wusste gar nicht, dass Schwertkampf so viel Spaß macht! Ich will eine Kriegerin werden, wenn ich groß bin, wie Visenya oder Nymeria!“"
 agot_childhood_events.0006.a: "Nun denn, zeig mir, was du noch gelernt hast."
 agot_childhood_events.0006.b: "Vielleicht sollte sie auch die Kunst des Krieges erlernen..."
 agot_childhood_events.0006.c: "Das ist kein angemessener Zeitvertreib für eine Lady!"
 agot_childhood_events.0006.tt: "[child.GetFirstName] wird mit Schwertübungen beginnen"

agot_childhood_events.0007.t: "Die Farben des Hofes"
 agot_childhood_events.0007.desc.courtier: "Das Haar von[dyed_hair.GetName] macht [dyed_hair.Custom('DE_PRO_PER_S_3P_A')] zum Hingucker jedes Raumes, den [dyed_hair.Custom('DE_PRO_PER_S_3P_N')] betritt."
 agot_childhood_events.0007.desc.sellsword: "Kürzlich kam ein reisender Söldner aus den Freien Städten an den Hof, und ich konnte nicht umhin, die geradezu unglaubliche Farbe [dyed_hair.Custom('DE_PRO_POS_S_3P')]er Haare zu bemerken!"
 agot_childhood_events.0007.a: "Vielleicht sollte ich es auch versuchen..."
 agot_childhood_events.0007.tt: "Ihr werdet Euch die Haare im Stil der Freien Städte färben!"
 agot_childhood_events.0007.b: "Solche Extravaganz würde nur Spott einbringen."

 agot_childhood_events.0008.t: "Der Narr färbt ab"
 agot_childhood_events.0008.desc: "Als ich durch die Hallen von [home.GetNameNoTooltip] wandle, erhasche ich aus dem Augenwinkel einen Schimmer einer bizarren Farbe. Ich drehe den Kopf so schnell, dass ich mir beinahe das Genick breche, als ich erkenne, dass mein[dyed_hair.Custom('DE_END_PRO_S_N')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('dyed_hair'))], [dyed_hair.GetName], sich die Haare in irgendeiner lächerlichen Farbe gefärbt hat.\n\n„Was meinst Ihr, [dyed_hair.Custom2('RelationToMeShort', ROOT.Char)]? Das ist der letzte Schrei in den Freien Städten von Essos.“"
 agot_childhood_events.0008.a: "Nun ja, wenn es Euch gefällt, meinetwegen..."
 agot_childhood_events.0008.b: "Ihr werdet Euch auf der Stelle diesen Dreck aus den Haaren waschen!"
 agot_childhood_events.0008.c: "Ihr seht großartig aus!"
 agot_childhood_events.0008.c.tt: "Auch Ihr werdet Euch die Haare färben!"

 agot_childhood_events.0009.t: "Die Erziehung eines Mündels"
 agot_childhood_events.0009.desc: "Während Ihr in Euren Gemächern sitzt und über die Zukunft Eures jungen Sprosses nachsinnt, schleicht sich ein beunruhigender Gedanke ein. [ward.GetFirstName] wächst rasch heran, und es wird immer offensichtlicher, dass [ward.Custom('DE_PRO_PER_S_3P_N')] Führung und Erziehung benötigt, um [ward.Custom('DE_PRO_POS_S_3P')]en Weg in dieser Welt zu finden. Es ist an der Zeit zu entscheiden, wem diese bedeutsame Aufgabe anvertraut werden soll."
 agot_childhood_events.0009.a: "Wie wäre es mit mir?"
 agot_childhood_events.0009.a.tt: "Vielleicht solltet Ihr selbst [ward.GetFirstName] durch die stürmische Reise des Lebens geleiten. Eure Erfahrung und Weisheit könnten von unschätzbarem Wert sein, um [ward.Custom('DE_PRO_POS_S_3P')]en Charakter zu formen und [ward.Custom('DE_PRO_PER_S_3P_A')] zu [ward.Custom('DE_ART_IND_D')] würdigen Nachfolger[ward.Custom('DE_END_NOU_S_GS_N')] zu machen."
 agot_childhood_events.0009.b: "Wie wäre es mit [guardian.GetFirstName]?"
 agot_childhood_events.0009.b.tt: "Eure Gedanken schweifen zu [guardian.GetFirstName], [guardian.Custom('DE_ART_DEF_S_N')] für [guardian.Custom('DE_PRO_POS_S_3P')]e Weisheit und Rechtschaffenheit bekannt ist. [ward.GetFirstName] [guardian.Custom('DE_PRO_POS_S_3P')]er Obhut anzuvertrauen könnte eine glänzende Zukunft voller Möglichkeiten zum Aufwachsen und Lernen sicherstellen."
 agot_childhood_events.0009.c: "Wie wäre es mit jemand anderem?"
 agot_childhood_events.0009.c.tt: "Ihr werdet eine andere Person finden, die diese Verantwortung trägt."
 agot_childhood_events.0009.d: "Ich habe mich noch nicht entschieden."
 agot_childhood_events.0009.d.tt: "Die Verantwortung wiegt schwer auf Euren Schultern, und Ihr zögert, eine derart weitreichende Entscheidung zu treffen. Vielleicht ist es das Beste, diese Wahl vorerst aufzuschieben und mehr Zeit für sorgfältige Überlegung einzuräumen."

 agot_childhood_events.0011.t: "Ein vielversprechender Stern"
 agot_childhood_events.0011.desc: "Als ich [prodigy.GetFirstName] dabei beobachte, wie [prodigy.Custom('DE_PRO_PER_S_3P_N')] im Hof mit [prodigy.Custom('DE_PRO_POS_S_3P')]em Übungsschwert trainiert, fallen mir die flinken und geschmeidigen Bewegungen [prodigy.Custom('DE_PRO_POS_S_3P')]er Füße auf, sowie die gleichmäßigen und sauberen Hiebe [prodigy.Custom('DE_PRO_POS_S_3P')]er Klinge.\n\n[prodigy.Custom('DE_PRO_PER_S_3P_N')|U] entwickelt sich bereits in einem Alter zu [prodigy.Custom('DE_ART_IND_D')] herausragenden Schwertkämpfer[prodigy.Custom('DE_END_NOU_S_GS_N')], in dem die meisten mit einer Waffe herumstolpern wie kopflose Hühner. Es mag bloß familiärer Stolz sein, doch ich glaube, dieser Zwuggel könnte sich das Recht verdienen, [dawn.GetName] zu tragen, und den Titel „Schwert des Morgens“ zu führen.\n\nWenn ich [prodigy.Custom('DE_PRO_PER_S_3P_A')] jetzt fordere und richtig rannehme, könnte [prodigy.Custom('DE_PRO_PER_S_3P_N')] [prodigy.Custom('DE_PRO_POS_S_3P')] volles Potential entfalten — oder unter dem Druck zusammenbrechen. Bin ich bereit, dieses Wagnis einzugehen?"
 agot_childhood_events.0011.a: "[prodigy.Custom('DE_PRO_POS_S_3P')|U] wahres Training beginnt jetzt."
 agot_childhood_events.0011.a.tt: "Ihr werdet [prodigy.Custom('DE_PRO_PER_S_3P_A')] auf den Pfad des Schwerts des Morgens führen"
 agot_childhood_events.0011.b: "[prodigy.Custom('DE_PRO_PER_S_3P_N')|U] ist ein Kind; ich werde [prodigy.Custom('DE_PRO_PER_S_3P_A')] auf [prodigy.Custom('DE_PRO_POS_S_3P')]e eigene Weise heranwachsen lassen."
 agot_childhood_events.0011.b.tt: "[prodigy.GetFirstNameNoTooltip] wird aufwachsen wie jedes andere Kind"

agot_childhood_events.dragon_doll: "Spielzeugdrache:"
 agot_childhood_events.0020.t: "$agot_childhood_events.dragon_doll$ Ein drachenloses Kind"
 agot_childhood_events.0020.desc_dragons_live: "Nach den Bräuchen des alten Valyria hätte [child.GetFirstName] in seiner Kindheit eine Bindung zu einem Drachen aufbauen sollen, doch [child.Custom('DE_PRO_PER_S_3P_N')] hat bis heute keinen Drachen.\n\nMein Herz schmerzt für das Kind, doch ein Drachenbund ist kein Geschenk, das selbst [ROOT.Char.Custom('DE_ART_IND_N')] [ROOT.Char.GetTitleAsNameNoTooltip] wie ich [child.Custom('DE_PRO_PER_S_3P_D')] gewähren könnte. Doch gewiss lässt sich etwas tun, um dieses Unrecht zu beheben und die Traditionen unserer Vorfahren zu wahren; vielleicht kann ich ein Geschenk beschaffen, das einem Kind eher zusagt..."
 agot_childhood_events.0020.desc_dragons_dead: "Die Valyrer von einst herrschten über Land und Himmel auf dem Rücken ihrer Drachen. Doch die Drachen sind alle dahin.\n\nUnd dennoch bleiben Drachen der Kern unserer Identität, ein Symbol unserer Macht und unseres Strebens. Vielleicht gibt es einen Weg, [child.GetFirstName] dazu zu bringen, mit [child.Custom('DE_PRO_POS_S_3P')]en Erbe warm zu werden..."
 agot_childhood_events.0020.a: "Das Kind soll einen Drachen bekommen!"
 agot_childhood_events.0020.a.tt: "Ihr werdet beginnen, eine Drachenpuppe für [child.GetNameNoTooltip] anzufertigen."
 agot_childhood_events.0020.ignore: "Eine unehrerbietige Zumutung — Drachen sind kein Kinderspielzeug!"

 agot_childhood_events.0021.t: "$agot_childhood_events.dragon_doll$ [newly_created_artifact.GetNameNoTooltip]"
 agot_childhood_events.0021.desc_simple: "Meine Hand zittert, als ich das letzte Auge befestige und den losen Faden verknote. Die Puppe ist endlich fertig... und ich kann die vielen Makel erkennen, die ich in mein Geschenk eingewoben habe, doch es wird genügen.\n\nIch warte, bis [child.GetFirstName] am nächsten Morgen erwacht. Als [child.Custom('DE_PRO_PER_S_3P_N')] sich regt, enthülle ich mein Geschenk. [child.Custom('DE_PRO_PER_S_3P_N')|U] reißt es mir aus den Armen und umarmt begeistert das Spielzeug.\n\n[child.Custom('DE_PRO_POS_S_3P')|U] Entzücken eärmt mein Herz. Selbst mit all den Unvollkommenheiten des Spielzeugs war es jeden Preis wert, den dieses Vorhaben mich hätte kosten können."
 agot_childhood_events.0021.desc_exquisite: "Behutsam schneide ich den letzten Faden ab und betrachte seufzend die Puppe. Sie ist perfekt, ich atme vor glücklicher Erleichterung aus.\n\nIch wecke [child.GetFirstName] aus [child.Custom('DE_PRO_POS_S_3P')]em Schlummer und drücke [child.Custom('DE_PRO_PER_S_3P_D')] eifrig das Spielzeug in die Hände. [child.Custom('DE_PRO_PER_S_3P_N')|U] kichert vor Freude, als [child.Custom('DE_PRO_PER_S_3P_N')] das Spielzeug hin und her wirft, ehe [child.Custom('DE_PRO_PER_S_3P_N')] sich schließlich wieder zur Nachtruhe niederlegt, die Puppe nun fest im Arm. [child.Custom('DE_PRO_POS_S_3P')|U]e Begeisterung war überwältigend und jeden Preis wert, den dieses Vorhaben mich hätte kosten können."
 agot_childhood_events.0021.a: "Oh, mein Herz..."
 agot_childhood_events.0021.a.callous: "Schön für [child.Custom('DE_PRO_PER_S_3P_A')]."
 agot_childhood_events.0021.desc_chosen_dragon: "\n\nObwohl sie nur eine Nachahmung des Drachen [chosen_dragon.GetNameNicknamed] ist, hat [child.GetFirstNameNoTooltip] die Stoffpuppe bereits ins Herz geschlossen, als wäre sie ein Schlüpfling aus einem Drachengelege."
 agot_childhood_events.0021.desc_named_dragon: "\n\n[child.GetFirstNameNoTooltip] hat dem Drachen sogar liebevollerweise einen Namen gegeben: [newly_created_artifact.GetNameNoTooltip]."

 agot_childhood_events.0022.t: "$agot_childhood_events.dragon_doll$ Der Preis eines Drachen"
 agot_childhood_events.0022.desc: "Drachen sind legendäre Bestien aus Feuer und Blut, doch solche Materialien würden eine Puppe — logischerweise —  ruinieren... Was soll ich stattdessen verwenden?"
 agot_childhood_events.0022.a: "Ich werde nur die feinsten Materialien verwenden! Seide und Juwelen!"
 agot_childhood_events.0022.a.tt: "Die Qualität der Puppe wird #V #Bold erheblich verbessert#!#!."
 agot_childhood_events.0022.b: "Wir brauchen doch sicher nicht den Goldfaden..."
 agot_childhood_events.0022.b.tt: "Die Qualität der Puppe wird #V #Bold leicht verbessert#!#!."
 agot_childhood_events.0022.c: "Können wir nicht mit dem auskommen, was wir auf Lager haben?"
 agot_doll_quality_significantly_increased: "Die Qualität der Puppe wird #V #Bold erheblich verbessert#!#!."
 agot_doll_quality_slightly_increased: "Die Qualität der Puppe wird #V #Bold leicht verbessert#!#!."
 agot_doll_quality_slightly_decreased: "Die Qualität der Puppe wird #V #Bold leicht verringert#!#!."
 agot_doll_quality_significantly_decreased: "Die Qualität der Puppe wird #V #Bold erheblich verringert#!#!."

 agot_childhood_events.0023.t: "$agot_childhood_events.dragon_doll$ Einen Drachen gestalten"
 agot_childhood_events.0023.desc: "Bei einem so feinen und detailreichen Vorhaben wie diesem ist Zeit ebenso entscheidend wie Geld. Da meine Pflichten mich stark beanspruchen, muss ich mich womöglich vom Hofleben zurückziehen, um mich auf mein Handwerk zu konzentrieren. Wie soll ich meine Zeit aufteilen?"
 agot_childhood_events.0023.a: "Ich werde jede freie Sekunde dafür aufwenden!"
 agot_childhood_events.0023.b: "Beides soll gleichermaßen Aufmerksamkeit erhalten."
 agot_childhood_events.0023.c: "Dies ist ein Zeitvertreib nebenbei, nichts weiter."

 agot_childhood_events.0024.t: "$agot_childhood_events.dragon_doll$ Lebhafte Farben"
 agot_childhood_events.0024.desc_dragons_live: "Drachen sind berühmt für ihre unverwechselbare Farbenpracht. Vom Ruhm [GetScriptedCharacterByHistoryID('dragon_balerion').GetNameNicknamedPossessive] Flammen bis zu den schimmernden Schuppen von [GetScriptedCharacterByHistoryID('dragon_silverwing').GetName] frage ich mich, ob ein farbenfroheres Muster angebracht wäre; schließlich handelt es sich um ein Kinderspielzeug."
 agot_childhood_events.0024.desc_dragons_dead: "Als sie noch lebten, waren Drachen berühmt für ihre unverwechselbare Farbenpracht. Vom Ruhm [GetScriptedCharacterByHistoryID('dragon_balerion').GetNameNicknamedPossessive] Flammen bis zu den schimmernden Schuppen von [GetScriptedCharacterByHistoryID('dragon_silverwing').GetName] frage ich mich, ob ein farbenfroheres Muster angebracht wäre; schließlich handelt es sich um ein Kinderspielzeug."
 agot_childhood_events.0024.desc_fallback: "Drachen sind berühmt für ihre unverwechselbare Farbenpracht, und ich frage mich, ob ein farbenfroheres Muster angebracht wäre; schließlich handelt es sich um ein Kinderspielzeug."
 agot_childhood_events.0024.a: "Je mehr Farben, desto besser!"
 agot_childhood_events.0024.a.tt: "Ihr werdet ein aufwendiges Farbschema versuchen."
 agot_childhood_events.0024.a.vibrant_success.tt: "Erstaunlicherweise fügt sich das lebhafte Muster."
 agot_childhood_events.0024.a.vibrant_fail.tt: "Einige der Farben wirken fehl am Platz."
 agot_childhood_events.0024.a.vibrant_major_fail.tt: "Das Farbschema ist zusammenhanglos."
 agot_childhood_events.0024.b: "Ein paar Farben, der Abwechslung halber."
 agot_childhood_events.0024.b.tt: "Ihr werdet ein abwechslungsreiches Farbschema versuchen."
 agot_childhood_events.0024.b.simple_success.tt: "Die Farben ergänzen sich gut."
 agot_childhood_events.0024.b.simple_neutral.tt: "Die Farben sind wenig beeindruckend."
 agot_childhood_events.0024.b.simple_fail.tt: "Die Farben beißen sich."
 agot_childhood_events.0024.c: "Da lässt sich in der Tat wenig einwenden..."
 agot_childhood_events.0024.c.tt: "Ihr werdet Euch mit einem einfarbigen Farbschema begnügen."

 agot_childhood_events.0025.t: "$agot_childhood_events.dragon_doll$ Morgen, morgen, nur nicht heute..."
 agot_childhood_events.0025.desc: "... sagen alle faulen Leute. Ich verzerre das Gesicht, als ich am Gemach vpn [child.GetFirstName] vorbeigehe und an die Drachenpuppe erinnert werde... die unvollendet mit einer Nadel im Rücken irgendwo in meinen Privatgemächern verborgen liegt. In Wahrheit fällt es mir schwer, auch nur den Hauch einer Motivation aufzubringen, dieses Vorhaben zu Ende zu führen.\n\nIch schelte mich jedes Mal, wenn mir der Gedanke durch den Kopf geht. Der Schatten der unvollendeten Arbeit umhüllt mich und hemmt jeden meiner Schritte; solange sie nicht vollendet oder verworfen ist, kann ich mich auf nichts anderes konzentrieren, ohne von Schuldgefühlen verzehrt zu werden.\n\nEinerseits könnte Selbstdisziplin — einfach die Nadel aufheben und anfangen — der Schlüssel sein, denn man sagt ja: 'dem Gehenden legt sich der Weg unter die Füße'. Andererseits ist ein neues Vorhaben weitaus verlockender. Vielleicht finde ich die nötige Inspiration, das Spielzeug fertigzustellen, wenn ich eine neue Fertigkeit erlerne."
 agot_childhood_events.0025.a: "Na los, das Spielzeug wird sich nicht von selbst fertigstellen."
 agot_childhood_events.0025.a.push_success: "Ihr macht große Fortschritte mit dem Spielzeug."
 agot_childhood_events.0025.a.push_fail: "Ihr könnt keine Motivation finden."
 agot_childhood_events.0025.a.push_major_fail: "Ihr verausgabt Euch völlig."
 agot_childhood_events.0025.b: "Ich wollte schon immer das Holzschnitzen erlernen."
 agot_childhood_events.0025.b.wood_success: "Ihr kehrt erfrischt zum Spielzeug zurück."
 agot_childhood_events.0025.b.wood_neutral: "Es macht Spaß, hilft aber nicht weiter."
 agot_childhood_events.0025.b.wood_fail: "Ihr vertieft Euch zu sehr ins Holzschnitzen."
 agot_childhood_events.0025.c: "Ich werde es schon... irgendwann erledigen."
 agot_childhood_events.0025.c.later_success: "Ihr kehrt erfrischt zurück."
 agot_childhood_events.0025.c.later_neutral: "Ihr kämpft damit, Motivation zu finden."
 agot_childhood_events.0025.c.later_fail: "Das Vorhaben wird nie vollendet, sondern verworfen und vergessen."

 agot_childhood_events.0026.t: "$agot_childhood_events.dragon_doll$ Die Anatomie eines Drachen"
 agot_childhood_events.0026.desc: "Drachen sind furchterregende Bestien, die mit Schwingen so groß, dass sie die Sonne verdunkeln können, durch den Himmel gleiten; ein einziger Flügelschlag lässt alle Beobachter in Deckung flüchten, lange bevor der Drache auch nur den Horizont überquert hat. Es ist eine gewaltige Aufgabe, solchen Schrecken mit dieser Stoffpuppe einzufangen, doch zunächst muss ich mich auf eine Flügelspannweite festlegen."
 agot_childhood_events.0026.a: "Ich träumte von einem künftigen König, Donald der Größtartigste, der sagte: Je größer, desto besser!"
 agot_childhood_events.0026.a.large_success.tt: "Die Flügelspannweite passt bemerkenswert gut."
 agot_childhood_events.0026.a.large_fail.tt: "Die Flügel sind unangenehm groß."
 agot_childhood_events.0026.a.large_major_fail.tt: "Sie sehen eher aus wie Ziegenohren."
 agot_childhood_events.0026.small: "Klein und niedlich ist der richtige Weg."
 agot_childhood_events.0026.small.large_success.tt: "Die Flügelspannweite passt bemerkenswert gut."
 agot_childhood_events.0026.small.large_fail.tt: "Die Flügel sind seltsam klein."
 agot_childhood_events.0026.small.large_major_fail.tt: "Sie sehen eher aus wie Fischflossen."
 agot_childhood_events.0026.b: "Gewiss sollte sie proportional zum Original sein."
 agot_childhood_events.0026.b.proportional_success.tt: "Die Flügelspannweite ist zufriedenstellend proportional."
 agot_childhood_events.0026.b.proportional_neutral.tt: "Die Flügel sind wenig beeindruckend, aber brauchbar."
 agot_childhood_events.0026.b.proportional_fail.tt: "Die Flügel sind schief."
 agot_childhood_events.0026.c: "Holt die Meinung von [courtier.GetName] ein."
 agot_childhood_events.0026.c.expert_major_success.tt: "Der Rat ist von unschätzbarem Wert."
 agot_childhood_events.0026.c.expert_success.tt: "Der Rat ist hilfreich."
 agot_childhood_events.0026.c.expert_fail.tt: "Ihr erhaltet einen schlechten Rat."

 agot_childhood_events.0027.t: "$agot_childhood_events.dragon_doll$ Die Seele eines Drachen"
 agot_childhood_events.0027.desc: "Es ist Brauch, Puppen Knöpfe als Augen zu geben, doch Drachen sind mächtiger als die gewöhnlichen Tiere, denen die meisten Puppen nachempfunden sind. Vielleicht wäre etwas Prunkvolleres angebracht, auch wenn es zusätzliche Kosten verursacht... Mir schwebt vor, Edelsteine als Augäpfel einzusetzen."
 agot_childhood_events.0027.gems: "Kostbare Edelsteine sollen das Tor zu seiner Seele sein."
 agot_childhood_events.0027.gems.tt: "Ihr werdet versuchen, wertvolle Edelsteine als Augen für die Puppe zu verwenden."
 agot_childhood_events.0027.gems.success.tt: "Die Augen passen perfekt zur Puppe."
 agot_childhood_events.0027.gems.fail.tt: "Die Edelsteine wirken fehl am Platz."
 agot_childhood_events.0027.buttons: "Es ist nur eine Puppe; Knopfaugen sind genau das Richtige!"
 agot_childhood_events.0027.buttons.tt: "Ihr werdet bei den herkömmlichen Knopfaugen für die Puppe bleiben."

 agot_childhood_events.0028.t: "$agot_childhood_events.dragon_doll$ Des Drachen erste Flammen"
 agot_childhood_events.0028.desc.intro: "In der Ferne höre ich das vergnügte Lachen von [child.GetFirstName]; [child.Custom('DE_PRO_PER_S_3P_N')] muss wohl mit [dragon_doll.GetName] spielen. Ich nähere mich, bemüht, kein Geräusch zu machen, und der Anblick der beiden überwältigt mich vor Freude. Nichts ahnend von meiner Anwesenheit, sagt [child.GetNameNoTooltip] kichernd: "
 agot_childhood_events.0028.desc.fire_common: "„Nochmal, [dragon_doll.GetNameNoTooltip], spuck Flammen, [dragon_doll.GetNameNoTooltip]!“"
 agot_childhood_events.0028.desc.fire_valyrian: "„Nochmal, [dragon_doll.GetNameNoTooltip], [Glossary('dracarys','DRACARYS_GLOSS')], [dragon_doll.GetNameNoTooltip]!“"
 agot_childhood_events.0028.desc.fire_breath: "\n\nErdachte Flammen schießen aus dem Maul des Drachen und bringen [child.GetNameNoTooltip] erneut zu freudigem Gelächter."
 agot_childhood_events.0028.a: "So... wundervoll."
 agot_childhood_events.0028.a.flavor: "Die Flammen mögen imaginär sein, doch mein Herz haben sie dahingeschmolzen."
 agot_childhood_events.0028.b: "Gut, [child.Custom('DE_PRO_PER_S_3P_N')] kennt die Macht des Drachenfeuers."
 agot_childhood_events.0028.b.flavor: "Die Flammen mögen imaginär sein, doch selbst mein kaltes Herz haben sie dahingeschmolzen."

agot_childhood_events.0029.t: "$agot_childhood_events.dragon_doll$ Die Inspirationskraft einer Puppe"
agot_childhood_events.0029.desc: "Auch wenn eine Puppe nicht die Faszination und Erhabenheit eines leibhaftigen Drachen nachahmen kann, könnte sie vielleicht dennoch als Inspiration dienen? Da [child.GetFirstName] keinen Drachen hat, könnte [child.Custom('DE_PRO_PER_S_3P_N')], wenn [child.Custom('DE_PRO_PER_S_3P_N')] mit einer Puppe eines lebenden Drachen vertraut wird, eine gewisse Verbundenheit entwickeln und mutig genug werden, um das Wesen zu beanspruchen, wenn [child.Custom('DE_PRO_PER_S_3P_N')] alt genug ist."
 agot_childhood_events.0029.untamed_dragon: "Die Puppe soll nach dem Vorbild von..."
 agot_childhood_events.0029.ask_child: "Sag, [child.GetNameNoTooltip], welcher Drache ist dein Favorit?"
 agot_childhood_events.0029.unnamed: "Diese Drachenpuppe soll einzigartig sein."
 agot_childhood_events.0029.unnamed.tt: "Die Drachenpuppe wird am Ende der Ereignisse benannt."
 agot_childhood_events.0029.child_dragon_name.toast_title: "[chosen_dragon.GetNameNoTooltip]"
 agot_childhood_events.0029.child_dragon_name.toast_desc: "[child.GetFirstName] hat sich für [chosen_dragon.GetNameNicknamed] entschieden."
 agot_childhood_events.0029.inspiration_quality_bump.tt: "Die Puppe nach dem Vorbild eines lebenden Drachen zu gestalten wird ihre Qualität leicht verbessern."

 agot_childhood_events.0030.t: "$agot_childhood_events.dragon_doll$ Das Vorbild eines Drachen"
 agot_childhood_events.0030.desc: "Welcher Drache soll als Vorlage für die Puppe dienen?"
 agot_childhood_events.0030.confirm_dragon: "Dieser Drache."
 agot_childhood_events.0030.confirm_dragon.tt: "Die Puppe wird nach dem Vorbild von [chosen_dragon.GetNameNicknamed] gestaltet."
 agot_childhood_events.0030.ask_child: "Sag, [child.GetNameNoTooltip], welcher Drache ist dein Favorit?"
 agot_childhood_events.0030.cancel: "Bei näherer Überlegung, belassen wir es bei einem eigenen Entwurf."
 agot_childhood_events.0030.child_dragon_name.toast_title: "[chosen_dragon.GetNameNoTooltip]"
 agot_childhood_events.0030.child_dragon_name.toast_desc: "[child.GetFirstName] hat sich für [chosen_dragon.GetNameNicknamed] entschieden."

 agot_hand_crafted_dragon_doll_exquisite_desc: "Eine wunderschöne Stoffpuppe in der Gestalt eines Drachen.[story.Custom('GetDollColor')][story.Custom('GetDollEyes')][story.Custom('GetDollWings')]$agot_hand_crafted_dragon_doll_creator$"
 agot_hand_crafted_dragon_doll_exquisite_desc_modeled: "Eine wunderschöne Stoffpuppe nach dem Abbild des Drachen [chosen_dragon.GetNameNicknamed].[story.Custom('GetDollColor')][story.Custom('GetDollEyes')][story.Custom('GetDollWings')]$agot_hand_crafted_dragon_doll_creator$"
 agot_hand_crafted_dragon_doll_simple_desc: "Eine schlichte Stoffpuppe in der Gestalt eines Drachen.[story.Custom('GetDollColor')][story.Custom('GetDollEyes')][story.Custom('GetDollWings')]$agot_hand_crafted_dragon_doll_creator$"
 agot_hand_crafted_dragon_doll_simple_desc_modeled: "Eine schlichte Stoffpuppe nach dem Abbild des Drachen [chosen_dragon.GetNameNicknamed].[story.Custom('GetDollColor')][story.Custom('GetDollEyes')][story.Custom('GetDollWings')]$agot_hand_crafted_dragon_doll_creator$"
 agot_hand_crafted_dragon_doll_creator: " Diese Puppe wurde eigenhändig von [creator.GetTitledFirstName] für [creator.Custom('DE_PRO_POS_S_3P')] Kind [child.GetFirstName] gefertigt."
 agot_dragon_doll_color_vibrant_fit: " Die vielen lebhaften Farben dieses Stofftiers ergänzen sich auf wundersame Weise."
 agot_dragon_doll_color_vibrant_off: " Die vielen lebhaften Farben dieses Stofftiers vertragen sich nicht gut miteinander."
 agot_dragon_doll_color_vibrant_incoherent: " Die vielen lebhaften Farben dieses Stofftiers wirken zusammenhanglos."
 agot_dragon_doll_color_simple_complement: " Das schlichte Design und die Farbgebung dieses Stofftiers ergänzen sich gut."
 agot_dragon_doll_color_simple_clash: " Die Farben dieses Stofftiers beißen sich auf unbeholfene Weise."
 agot_dragon_doll_color_monotone: "Dieses einfarbige Stofftier sticht optisch nicht gerade hervor."
 agot_dragon_eyes_buttons: " Knöpfe zieren seine Augen wie bei einer herkömmlichen Puppe."
 agot_dragon_eyes_gems_off: " Edelsteine sind unbeholfen am Gesicht der Puppe befestigt."
 agot_dragon_eyes_gems_pop: " Prächtige Edelsteine schmücken das Gesicht der Puppe."
 agot_dragon_wings_large_fit: " Seine großen Flügel sind an diesem wilden Menschenfresser geradezu bezaubernd."
 agot_dragon_wings_large_oversize: " Seine großen Flügel sind ungünstig überdimensioniert."
 agot_dragon_wings_large_goat: " Seine großen Flügel hängen herab wie Ziegenohren."
 agot_dragon_wings_small_fit: " Diese furchterregende Bestie hat einen gewaltigen Körper und winzige Flügel."
 agot_dragon_wings_small_undersized: " Seine Flügel sind für diese Puppe unverhältnismäßig klein."
 agot_dragon_wings_small_whale: " Diese furchterregende Bestie segelt auf Flügeln durch die Lüfte, die eher wie Walflossen aussehen."
 agot_dragon_wings_proportional_lopsided: " Diese furchterregende Bestie fliegt mit schiefen Flügeln."

 agot_childhood_events.9001.t: "Der Drache von [child.GetNameNoTooltip] "
 agot_childhood_events.9001.desc: "[child.GetName] hat letzten Endes doch noch einen eigenen Drachen beansprucht. Offensichtlich kann diese Puppe mit einem leibhaftigen, atmenden Drachen nicht mithalten; es besteht kein Grund mehr, dieses Vorhaben fortzuführen."
 agot_childhood_events.9001.a: "Bedauerlich."
 agot_dead_pirate_dragon_baby_name: "[dead_pirate_dragon_baby.GetNameNoTooltip]"
 agot_character_name: "[character.GetNameNoTooltip]"

 child_personality.keeps_authoritative_tt: "[child.GetFirstName] behält die Eigenschaft [GetTrait('authoritative').GetName( child.Self )]"
 child_personality.keeps_rude_tt: "[child.GetFirstName] behält die Eigenschaft [GetTrait('rude').GetName( child.Self )]"
 child_personality.keeps_inquisitive_tt: "[child.GetFirstName] behält die Eigenschaft [GetTrait('inquisitive').GetName( child.Self )]"

 agot_child_personality_events.2010.t: "Zankende Diener"
 agot_child_personality_events.2010.guardian: "[guardian.GetTitledFirstName] hat mir zwei Bedienstete vorgeführt, deren Gesichter rot vor Zorn sind, während sie sich quer durch die Halle anfunkeln. Es scheint, als sei ein Vorhang mit Arbor-Rot beschüttet worden, und jeder beschuldigt den anderen. Keiner ist bereit, sich um den Weinfleck zu kümmern, und aufgebrachte Bedienstete sind der Arbeitsmoral abträglich. [guardian.GetFirstNameNoTooltip] trägt mir auf, den Streit zu schlichten, als Prüfung meines Charakters."
 agot_child_personality_events.2010.no_guardian: "Zwei Bedienstete platzen in mein Gemach, beide rot vor Wut im Gesicht. Jeder behauptet, der andere habe vergangene Nacht beim Putzen der Gemächer einen Vorhang mit einem Becher Arbor-Rot befleckt. Dieser Streit ist offenkundig der Arbeitsmoral abträglich, und ich muss rasch eingreifen."
 agot_child_personality_events.2010.a: "Ihr werdet den Weinfleck #italic gemeinsam#! entfernen."
 agot_child_personality_events.2010.b: "Ihr seid beide entlassen!"
 agot_child_personality_events.2010.c: "Wer hatte vergangene Nacht Dienst?"

 agot_child_personality_events.201.desc: "Mein[child.Custom('DE_END_PRO_S_N')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child'))], [child.GetFirstName], hat sich einer neuen Bewährungsprobe [child.Custom('DE_PRO_POS_S_3P')]er Fähigkeiten gestellt. Zwei streitsüchtige Bedienstete trugen einen Zwist vor, wobei jeder behauptete, der andere habe einen edlen Arbor-Rot auf kostbare Vorhänge verschüttet. Sie warfen sich Beschuldigungen und Sticheleien an den Kopf, während die übrigen Bediensteten gebannt zusahen."

 agot_child_personality_events.2011.t: "$agot_child_personality_events.2010.t$"
 agot_child_personality_events.201.authoritative: "[child.GetFirstNameNoTooltip] befahl beiden, den Weinfleck #italic gemeinsam#! zu entfernen, und gebot ihnen, kein Wort mehr über ihren Streit zu verlieren. [child.Custom('DE_PRO_PER_S_3P_N')|U] war entschlussfreudig, und [child.Custom('DE_PRO_POS_S_3P')]en Anweisungen wurde rasch Folge geleistet."
 agot_child_personality_events.201.confirm_authoritative: "Aus dir wird einmal [child.Custom('DE_ART_IND_N')] inspirierend[child.Custom('DE_END_ADJ_IND_S_N')] Anführer[child.Custom('DE_END_NOU_S_GS_N')]."
 agot_child_personality_events.201.authoritative_change: "Wenn du herrschen willst, musst du Führungsstärke zeigen."

 agot_child_personality_events.2012.t: "$agot_child_personality_events.2010.t$"
 agot_child_personality_events.201.rude: "[child.GetFirstNameNoTooltip] reagierte aufbrausend und schrie das gesamte Personal an, weil es nicht in der Lage war, eine derart schlichte Angelegenheit selbst zu klären. [child.Custom('DE_PRO_PER_S_3P_N')|U] bemerkte nicht die frustrierten Blicke der Bediensteten, als [child.Custom('DE_PRO_PER_S_3P_N')] sowohl ihren Streit als auch ihren Wert gleichgültig abtat."
 agot_child_personality_events.201.confirm_rude: "Ganz recht, [child.Custom('GirlBoy')]. Sie sind nichts wert."
 agot_child_personality_events.201.rude_change: "Du hättest ihnen keinen Augenblick deiner Zeit schenken sollen."

 agot_child_personality_events.2013.t: "$agot_child_personality_events.2010.t$"
 agot_child_personality_events.201.inquisitive: "[child.GetFirstNameNoTooltip] versammelte die Bediensteten, fand rasch heraus, wer vergangene Nacht tatsächlich Dienst hatte, und trug ebenjenen auf, das Malheur selbst zu beseitigen. [child.Custom('DE_PRO_PER_S_3P_N')|U] bewies Bedachtsamkeit und Feingefühl, indem [child.Custom('DE_PRO_PER_S_3P_N')] zunächst weitere Einzelheiten einholte, ehe [child.Custom('DE_PRO_PER_S_3P_N')] eine voreilige Entscheidung traf oder Befehle erteilte."
 agot_child_personality_events.201.confirm_inquisitive: "Du hast heute deine Klugheit unter Beweis gestellt."
 agot_child_personality_events.201.inquisitive_change: "Um Schwierigkeiten zu lösen, musst du ihrer Ursache auf den Grund gehen."