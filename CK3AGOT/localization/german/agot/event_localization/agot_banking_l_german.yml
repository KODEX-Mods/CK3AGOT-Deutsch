 # vassal loan stuff
 take_vassal_loan_interaction:0 "Vasallen um Darlehen bitten"
 take_vassal_loan_interaction_desc:0 "Bittet Euren Vasallen um ein persönliches Darlehen. Das Darlehen wird 25% Zinsen haben und soll nach einer Laufzeit von 5 Jahren zurückgezahlt werden."

 liege_requests_loan:0 "Ich bin in letzter Zeit in einige monetäre Schwierigkeiten geraten. Wärt Ihr bereit, mir ein Darlehen von [actor.MakeScope.Var('vassal_loan_amount').GetValue] Gold zu gewähren?\nDer Betrag, zuzüglich 25% Zinsen, wird in 5 Jahren zurückgezahlt."

 agot_banking.0501.t:0 "[loan_vassal.Custom2('AppropriateGreeting', ROOT.Char)]"
 agot_banking.0501.desc:0 "Ich nehme Eure Anfrage für ein Darlehen gerne an und werde Euch das Gold zukommen lassen. Ich erwarte die Rückzahlung innert fünf Jahren."
 agot_banking.0501.a:0 "Gute Nachrichten!"

 agot_banking.0502.t:0 "[loan_vassal.Custom2('AppropriateGreeting', ROOT.Char)]"
 agot_banking.0502.desc:0 "Bedauerlicherweise kann ich Euch das gewünschte Darlehen nicht gewähren. Ich habe meine Ersparnisse seit vielen Jahren für bestimmte Zwecke beiseite gelegt. Ich hoffe, Ihr habt Verständnis dafür und könnt es mir nachsehen."
 agot_banking.0502.a:0 "Enttäuschend."

 agot_banking.0503.t:0 "Mein[ROOT.Char.Custom('DE_END_PRO_S_N')] Lehnsherr[ROOT.Char.Custom('DE_END_NOU_S_GS_N')],"
 agot_banking.0503.desc:0 "Es ist nun fünf Jahre her, seit ich Ihrem Wunsch nach einem Darlehen entsprochen habe. Gemäß unserer Vereinbarung ist nun der Zeitpunkt der Rückzahlung gekommen. Seid Ihr redlich genug, um Euer Wort zu halten und mir zurückzugeben, was mir zusteht?"
 agot_banking.0503.a:0 "Ich werde meine ganze Schuld zurückzahlen."
 agot_banking.0503.a_tt:0 "Das Darlehen wird vollständig abgezahlt."
 agot_banking.0503.b:0 "Ich kann derzeit nur die Zinsen decken."
 agot_banking.0503.b_tt:0 "Das Darlehen wird um weitere fünf Jahre verlängert."
 agot_banking.0503.c:0 "Ich kann derzeit nichts zahlen. Doch ich schulde Euch einen Gefallen!"
 agot_banking.0503.c_tt:0 "Ihr kommt eurem Darlehensvertrag nicht nach und zahlt nichts. Das Darlehen wird um weitere fünf Jahre verlängert, und [vassal_loan_creditor.GetTitledFirstName] erhält ein schwaches Druckmittel gegen euch."
 agot_banking.0503.d:0 "Ich kann nichts zahlen. Ich werde Euch auf jede erdenkliche Weise entschädigen!"
 agot_banking.0503.d_tt:0 "Ihr kommt zum zweiten Mal mit der Rückzahlung eures Darlehens in Verzug. Das Darlehen wird gekündigt, und [vassal_loan_creditor.GetTitledFirstName] erhält stattdessen ein starkes Druckmittel gegen euch."
 agot_banking.0503.e:0 "Nichts da! Ihr werdet keinen Heller von mir sehen!"
 agot_banking.0503.e_tt:0 "Ihr verweigert die Rückzahlung. Dies macht das Darlehen ungültig, doch [vassal_loan_creditor.GetTitledFirstName] erhält im Gegenzug einen Anspruch auf Euren Haupttitel."

 agot_banking.0504.t:0 "Treuer Vasall,"
 agot_banking.0504.repay_full_desc:0 "Die Zeit ist endlich gekommen, das Darlehen zurückzuzahlen, das Ihr mir vor fünf Jahren großzügigerweise gewährt habt. Ich schätze Eure Bereitschaft, mir in meiner Not zu helfen; Eure Güte wird in Erinnerung bleiben."
 agot_banking.0504.repay_interest_desc:0 "Die Zeit ist gekommen, das Darlehen zurückzuzahlen, das Ihr mir gewährt habt... Allerdings kann ich das Darlehen zum jetzigen Zeitpunkt nicht vollständig zurückzahlen, sondern werde die Zinsen für die letzten fünf Jahre begleichen! Ich verspreche, dass ich in weiteren fünf Jahren den gesamten Betrag zurückzahlen werde. Ich hoffe, Ihr habt Verständnis dafür, mein treuer Vasall."
 agot_banking.0504.first_default_desc:0 "Obgleich die Zeit gekommen ist, das Darlehen, das Ihr mir gewährt habt, zurückzuzahlen, bedauere ich, dass ich derzeit keine Tilgung leisten kann. Ich verspreche Euch, dass Ihr in fünf Jahren Eure Forderung erhalten werdet! Als Entschädigung für diese Unannehmlichkeit werde ich Euch einen Gefallen gewähren, sei es eine Steuerermäßigung oder ein Sitz in meinem Rat."
 agot_banking.0504.second_default_desc:0 "Ich bedauere bitterlich, dass ich das Darlehen, das Ihr mir vor zehn Jahren gewährt habt, nicht zurückzahlen kann. Als Entschädigung für dieses anhaltende Ungemach werde ich jeden Wunsch erfüllen, der in meiner Macht steht. Ein Wort von Euch, und es soll geschehen!"
 agot_banking.0504.refusal_desc:0 "Das Geld, das Ihr mir geliehen habt, werdet Ihr nicht zurückerhalten. Ich habe beschlossen, dass es mein Recht als Euer Lehnsherr ist, mir zu nehmen, was ich brauche, um die Ordnung aufrechtzuerhalten und die Bedürfnisse des Reiches zu erfüllen. Betrachtet es als Sondersteuer. Ich werde Euch nichts zurückzahlen, und Ihr solltet es nicht wagen, in Zukunft Forderungen zu stellen."
 agot_banking.0504.a:0 "Ein Vergnügen, mit Euch Geschäfte zu machen."
 agot_banking.0504.b:0 "Nun, ich schätze, es ist besser als nichts."
 agot_banking.0504.c:0 "Das nächste Mal hätte ich lieber mein Geld."
 agot_banking.0504.d:0 "Das war so nicht vereinbart!"
 agot_banking.0504.e:0 "Die Schuld wird auf andere Weise beglichen. Ihr seid des Herrschens unwürdig."

 repay_vassal_loan_decision:0 "Vasallen-Darlehen Zurückzahlen"
 repay_vassal_loan_decision_desc:0 "Ihr habt von einem Vasallen ein Darlehen mit einer Laufzeit von fünf Jahren aufgenommen. Ihr könnt es jederzeit vor Ablauf der Darlehenslaufzeit vollständig zurückzahlen."
 repay_vassal_loan_decision_tooltip:0 "Ihr werdet das gesamte Darlehen zuzüglich angefallener Zinsen zahlen."
 repay_vassal_loan_decision_tooltip_confirm_text_desc:0 "Eine Sorge weniger."
 repay_vassal_loan_decision_effect:0 "Ihr könnt Euer derzeitiges Vasallen-Darlehen vor Ablauf der Laufzeit zurückzahlen."



