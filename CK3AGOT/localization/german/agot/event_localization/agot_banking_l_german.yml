l_german:
 agot_banking.0001.t:0 "Gesandte der Bank"
 agot_banking.0001.desc:0 "Meine Diener bringen Kunde, dass die Gesandten der [agot_bank|E] endlich zu der von mir erbetenen Audienz eingetroffen sind. Da ich diese geschätzten Gäste nicht beleidigen möchte, eile ich sogleich herbei, um mich ihnen zu widmen.\n\nDie Gesandten wirken fehl am Platz in meiner Halle, ihre Roben ein scharfer Kontrast zum gehärteten Leder meiner Wachen. Ihre Vorschläge indes sind klar genug.\n\nVor mir breiten sie eine Vielfalt an Darlehen aus, die sich in Dauer und Wert unterscheiden. Die Frage ist, welches meinen Bedürfnissen am besten entspricht?"
 agot_banking.0001.a:0 "Ich wähle eine #bold geringe#! Menge Gold auf #bold langen#! Zeitraum."
 agot_banking.0001.a_tt:0 "Dieses Darlehen wird den #difficulty_easy niedrigsten#! [agot_bank_interest_rate|E] aufweisen."
 agot_banking.0001.b:0 "Ich wähle eine #bold geringe#! Menge Gold auf #bold kurzen#! Zeitraum."
 agot_banking.0001.b_tt:0 "Dies wird den [agot_bank_interest_rate|E] des Darlehens #difficulty_medium mäßig#! erhöhen."
 agot_banking.0001.c:0 "Ich wähle eine #bold große#! Menge Gold auf #bold langen#! Zeitraum."
 agot_banking.0001.c_tt:0 "Dies wird den [agot_bank_interest_rate|E] des Darlehens #difficulty_hard erheblich#! erhöhen."
 agot_banking.0001.d:0 "Ich wähle eine #bold große#! Menge Gold auf #bold kurzen#! Zeitraum."
 agot_banking.0001.d_tt:0 "Dieses Darlehen ist #XB sehr riskant#!. Der [agot_bank_interest_rate|E] wird hoch sein."
 agot_banking.0001.e:0 "Ich habe es mir anders überlegt, schickt sie fort."
 agot_banking.0001.e_tt:0 "Die Gesandten werden fortgeschickt."

 agot_banking.0002.t:0 "Darlehen abgelehnt"
 agot_banking.0002.desc:0 "Nach Bewertung der Bedingungen und möglichen Risiken meines Darlehens haben die Gesandten der [agot_bank|E] meine Anfrage nach Mitteln abgelehnt. Meine derzeitige finanzielle Lage scheint zu unsicher, und ein solches Darlehen wäre [Concept('agot_bank_risk_level', 'hochriskant') |E], unter Berücksichtigung der gegenwärtigen finanziellen Reserven der Bank und des Glaubens an meine Fähigkeit, Rückzahlungsfristen einzuhalten."
 agot_banking.0002.a:0 "Ich werde die benötigten Mittel anderswo auftreiben."

 agot_banking.0003.t:0 "Ein Angebot der Bank"
 agot_banking.0003.desc:0 "Nach Abwägung der damit verbundenen Risiken haben die Gesandten der [agot_bank|E] beschlossen, mir ein Darlehen unter folgenden Bedingungen anzubieten:\nMir wird @gold_icon! [ROOT.Var('loaned_amount').GetValue|2|P] geliehen.\nDas Geld ist in [ROOT.Var('loan_term').GetValue|0|N] Jahren mit einem [agot_bank_interest_rate|E] von [ROOT.Var('loan_interest_rate').GetValue|0|N] Prozent pro Jahr zurückzuzahlen.\n\n#help @warning_icon! Solltet Ihr während der Laufzeit des Darlehens sterben, wird der gesamte Betrag einschließlich Zinsen sofort fällig und von Eurem primären überlebenden Erben zu zahlen.#!"
 agot_banking.0003.a:0 "Diese Bedingungen sind eine Beleidigung. Macht Euch davon!"
 agot_banking.0003.b:0 "Dieses Abkommen ist vernünftig, ich nehme an!"
 agot_banking.0003.c:0 "Lasst uns nochmals über Laufzeit und Betrag sprechen."

 agot_banking.0004.t:0 "Der Anspruch der Bank"
 agot_banking.0004.desc:0 "Spannung durchdringt meine Hallen, da die Gesandten der [agot_bank|E] gekommen sind, um ihr Recht einzufordern.\n\nNach einem kurzen Austausch von Höflichkeiten überreichen mir die Gesandten der Bank ein paar Dokumente. Das erste ist eine Abschrift des ursprünglichen Darlehensvertrags, die beweist, dass dessen Laufzeit nun abgelaufen ist. Das zweite ist ein Blatt mit Berechnungen, die zeigen, dass ich ihnen nun insgesamt [ROOT.Var('total_repayment').GetValue|2|N] schulde, welches sofort zu zahlen ist."
 agot_banking.0004.a:0 "Mein Darlehen wird vollständig zurückgezahlt."
 agot_banking.0004.a_tt:0 "Euer Darlehen wird abgeschlossen, und Ihr seid schuldenfrei."
 agot_banking.0004.b:0 "Ich kann derzeit nur die Zinsen decken."
 agot_banking.0004.b_tt:0 "Euer Darlehen wird verlängert und es fallen weiterhin [Concept('agot_bank_interest_rate', 'Zinsen') |E] an. Dies gilt nicht als Zahlungsausfall."
 agot_banking.0004.c:0 "Ich kann mir derzeit gar nichts zahlen..."
 agot_banking.0004.c_tt:0 "Die Bank wird dies als Zahlungsausfall betrachten. Allerdings könnt Ihr einem neuen Abkommen zustimmen: Das Darlehen wird um 5 Jahre verlängert, doch Euer [agot_bank_interest_rate|E] für zukünftige Darlehen wird erheblich steigen. #italic Dies ist Eure letzte Chance!#!"
 agot_banking.0004.d:0 "Ihr werdet keinen Heller von mir sehen!"
 agot_banking.0004.d_tt:0 "Ihr verweigert die Rückzahlung Eures Darlehens. Die Bank wird darüber nicht erfreut sein, Ihr werdet nie wieder ein Darlehen erhalten... Und die Eiserne Bank bekommt immer, was ihr zusteht"

 agot_banking.0005.t:0 "Rückzahlung"
 agot_banking.0005.desc:0 "Ich kann mein Darlehen vor dem Fälligkeitstermins zurückzahlen. Ich kann wählen, alles oder nur die Hälfte des Geschuldeten zu begleichen."
 agot_banking.0005.a:0 "Ich werde mein Darlehen vollständig zurückzahlen."
 agot_banking.0005.a_tt:0 "Euer Darlehen wird abgeschlossen, und Ihr seid schuldenfrei."
 agot_banking.0005.b:0 "Ich werde die Hälfte der Schuld begleichen."
 agot_banking.0005.b_tt:0 "Ihr zahlt die Hälfte des geliehenen Betrags und die Hälfte der angefallenen [Concept('agot_bank_interest_rate','Zinsen')|E]. Der verbleibende Betrag kann bei Ablauf der Darlehenslaufzeit gezahlt werden."
 agot_banking.0005.c:0 "Ich werde 50 Golddrachen zahlen."
 agot_banking.0005.c_tt:0 "Ihr zahlt 50 Golddrachen. Der verbleibende Betrag kann bei Ablauf der Darlehenslaufzeit gezahlt werden."
 agot_banking.0005.d:0 "Ich habe es mir anders überlegt, ich zahle später zurück."

 agot_banking.0006.t:0 "Eine Erbschuld"
 agot_banking.0006.desc:0 "[parent_debtor.GetTitledFirstName], möge [parent_debtor.Custom('DE_PRO_PER_S_3P_N')] in Frieden ruhen, war bei der [agot_bank|E] verschuldet.\n\nDa ich ebenfalls ein laufendes Darlehen habe, hat die Bank eine Botschaft gesandt, um mich zu informieren, dass die beiden Darlehen zusammengelegt werden, da ich der rechtmäßige Erbe bin und daher angehalten, die Verpflichtungen von[parent_debtor.GetFirstNameNoTooltip] zu erfüllen.\n\nDer Betrag, den ich nun schulde, beläuft sich insgesamt auf @gold_icon! [ROOT.Var('total_repayment').GetValue|2|N]."
 agot_banking.0006.a:0 "Dank für das Erbe..."

 agot_banking.0007.t:0 "Eine Erbschuld"
 agot_banking.0007.desc:0 "[parent_debtor.GetTitledFirstName], möge [parent_debtor.Custom('DE_PRO_PER_S_3P_N')] in Frieden ruhen, war bei der [agot_bank|E] verschuldet.\n\nAls [parent_debtor.Custom('DE_PRO_POS_S_3P')][ROOT.Char.Custom('DE_END_PRO_S_N')] rechtmäßig[ROOT.Char.Custom('DE_END_ADJ_NUL_S_N'] [Select_CString( ROOT.Char.IsFemale, 'Erbin', 'Erbe' )] bin ich verpflichtet, die Verpflichtungen von[parent_debtor.GetFirstNameNoTooltip] zu erfüllen. Ich sollte erwarten, dass die Bank mich bald kontAnteilrt.\n\nDer Betrag, den ich schulde, beläuft sich insgesamt auf @gold_icon! [ROOT.Var('total_repayment').GetValue|2|N]."
 agot_banking.0007.a:0 "Dank für das Erbe..."

 agot_banking.0101.t:0 "Der Zorn der Bank"
 agot_banking.0101.desc:0 "Banditen, die von der [agot_bank|E] entsandt und finanziert wurden, sind in mein Reich eingefallen, um meinen Sitz zu plündern!\n\nGlücklicherweise waren meine Soldaten stark genug, um sie abzuwehren, bevor nennenswerter Schaden angerichtet wurde. Jene Plünderer, die gefangen genommen wurden, gestanden, dass sie von der Bank angeheuert worden waren, um einzutreiben, was ich ihnen schulde. Es scheint, als ob die Bank nun zu extremeren Methoden greift, um ihre Ansprüche durchzusetzen.\n\nHoffen wir, dass, falls sie es erneut versuchen, das Ergebnis dasselbe bleibt..."
 agot_banking.0101.a:0 "Ist das wirklich ihre Art der Schuldeneintreibung?"

 agot_banking.0102.t:0 "Der Zorn der Bank"
 agot_banking.0102.desc:0 "Meine Felder liegen brach, und meine Untertanen trauern um ihre Lieben, während die Söldner, die meine Ländereien überfallen haben, sich zurück ins Meer schleichen, um ihre Beute ihren Auftraggebern bei der [agot_bank|E] zu übergeben!\n\nMeine Kräfte waren nicht stark genug, um ihrer Macht standzuhalten, und die örtliche Garnison erlag ihrem Willen. Das Land wird die Narben dieses Überfalls lange tragen, und meine Untertanen mögen sie noch länger tragen.\n\nKurz nach dem Überfall erhalte ich einen Brief von der Bank, in dem mir kurz und bündig mitgeteilt wird, dass meine Schulden nun als beglichen gelten."
 agot_banking.0102.a:0 "Ist das der Preis, den ich zahlen muss?"

 agot_banking.0103.t:0 "Ein Dolch im Dunkeln"
 agot_banking.0103.desc:0 "Die [agot_bank|E] hat einen Attentäter auf mich angesetzt!\n\nMeine Wachen waren sehr aufmerksam und konnten den Angreifer identifizieren, obwohl er das Gesicht eines vertrauten Dieners trug! Ich bin einer lautlosen und feigen Ermordung entgangen, aber die Gefahr eines weiteren Dolches im Dunkeln schwebt weiterhin über mir. Es scheint, als würde die Bank vor nichts zurückschrecken, um ihre Forderungen einzutreiben."
 agot_banking.0103.a:0 "Verflucht seien diese gierigen Buchhalter!"

 agot_banking.0104.t:0 "Valar Ademmis"
 agot_banking.0104.desc:0 "Was für eine grausame Ironie, dass sich ein Gesichtsloser Mann, der von der Bank gesandt wurde, vor meinen Augen zu erkennen gab, gerade als ich in Gedanken versunken war und über das heikle Problem nachgrübelte, das mein Zahlungsausfall geworden war. Da er die Gestalt eines Dieners angenommen hatte, war es für ihn ein Leichtes, sich an mich heranzuschleichen und mir eine Klinge an die Kehle zu setzen.\n\nDas Blut fließt in Strömen, und der Schnitt war so präzise ausgeführt, dass ich nicht einmal einen Hilferuf über meine Lippen bringen kann.\n\nIn diesem kurzen Augenblick der Qual begreife ich, dass meine Gläubiger die Geduld verloren haben und hoffen, dass mein Erbe kooperativer sein wird."
 agot_banking.0104.a:0 "[ROOT.Char.Custom('Scream')]"

 agot_banking.0105.t:0 "Ein vereitelter Putsch"
 agot_banking.0105.desc:0 "Die [agot_bank|E] ist in ihrem Versuch gescheitert, mich als [ROOT.Char.GetLadyLord] zu verdrängen!\nSie beabsichtigten, die Eroberung meiner Lande durch einen Vasallen zu unterstützen, im Austausch dafür, dass dieser mein ausgefallenes Darlehen begleicht. Sie scheiterten, und das Stahl bleibt stumm – vorerst. Doch es besteht kein Zweifel, dass die Bank letztendlich einen ehrgeizigen und verräterischen Verbündeten finden wird, um ihr Gold zurückzubekommen.\n\nDie Bank wird weiterhin meine Herrschaft untergraben und Prätendenten aufstellen, wenn ich es am wenigsten erwarte."
 agot_banking.0105.a:0 "Meine Herrschaft ist nicht so unstet!"

 agot_banking.0106.t:0 "Ein goldener Rivale"
 agot_banking.0106.desc:0 "Die [agot_bank|E] hat sich hinter [buyer.GetTitledFirstName] gestellt, um mich zu entmachten! [buyer.GetFirstNameNoTooltip] hat sich bereit erklärt, meine ausstehenden Schulden bei der Bank zu begleichen, im Gegenzug für deren Unterstützung bei diesem Verrat. Allein die Erklärung der Bank, sich gegen mich zu stellen, hat meine Legitimität unter meinen Standesgenossen bereits beschädigt. Nun bleibt nur noch abzuwarten, ob [buyer.GetFirstNameNoTooltip] [buyer.Custom('DE_PRO_POS_S_3P')]e Forderung durchsetzen wird..."
 agot_banking.0106.a:0 "Ich werde nichts kampflos aufgeben!"

 agot_banking.0116.t:0 "Eine Chance zum Aufstieg"
 agot_banking.0116.desc:0 "Heute ist ein Mann an meinem Hof eingetroffen, der behauptet, ein Vertreter der [agot_bank|E] zu sein. Nach Überprüfung seiner Identität teilte er mir mit, dass die Bank bereit sei, meinen Erwerb der Lande von [FinalDefaulter.GetTitledFirstNameNoTooltip] zu unterstützen! Alles, was ich für sie tun muss, ist, den Rest [FinalDefaulter.Custom('DE_PRO_POS_S_3P')]es Darlehens zu abzuzahlen. Der Preis ist hoch, doch es ist ein verlockendes Angebot dennoch..."
 agot_banking.0116.a:0 "Dies wird eine fruchtbare Partnerschaft!"
 agot_banking.0116.b:0 "Ich begehre diese Lande nicht."

 agot_banking.0107.t:0 "Die Forderungen eines Gläubigers"
 agot_banking.0107.desc:0 "Die [agot_bank|E] hat einen Brief an meinen Lehnsherrn gesandt, der [debtors_liege.Custom('DE_PRO_PER_S_3P_A')] über meinen Zahlungsausfall informiert und [debtors_liege.Custom('DE_PRO_POS_S_3P')]e Unterstützung bei der Einholung ihrer Mittel erbittet. Ich könnte versuchen, [debtors_liege.GetTitledFirstName] davon zu überzeugen, dass die Ansprüche der Bank ungültig und ungerecht seien, in der Hoffnung, dass [debtors_liege.Custom('DE_PRO_PER_S_3P_N')] mich nicht zwingt, die Bank zu entschädigen, oder gar drastischere Maßnahmen ergreift..."
 agot_banking.0107.a:0 "Gewiss wird [debtors_liege.Custom('DE_PRO_PER_S_3P_N')] mich nicht an die Bankiers verkaufen."

 agot_banking.0108.t:0 "Ein gebrochener Vertrag"
 agot_banking.0108.desc:0 "Ich wurde informiert, dass [FinalDefaulter.GetTitledFirstName] mit der Rückzahlung [FinalDefaulter.Custom('DE_PRO_POS_S_3P')]es Darlehens in Verzug geraten ist, weitere Zahlungen an die [agot_bank|E] verweigert und auch keinem neuen Plan zustimmt.\n\nDie Bank besteht darauf, dass ich als Lehnsherr von [FinalDefaulter.GetFirstNameNoTooltip] verpflichtet bin, meine Untergebenen zu zwingen, ihre Verträge einzuhalten.\n\nEinen Moment lang erwäge ich, die Anfrage der Bank abzulehnen – um meinen Vasallen nicht zu verärgern – doch dies würde sicher als Beleidigung gesehen und die Bereitschaft jeder Bank schädigen, Mittel bereitzustellen, sollte ich selbst in Zukunft ein Darlehen benötigen.\n\nIch könnte [FinalDefaulter.GetFirstNamePossessiveNoTooltip] Schuld selbst zahlen... Doch ich möchte dieses Verhalten nicht belohnen."
 agot_banking.0108.a:0 "[FinalDefaulter.GetFirstNameNoTooltip] muss [FinalDefaulter.Custom('DE_PRO_POS_S_3P')]en Vertrag ehren!"
 agot_banking.0108.a_tt:0 "Sollte [FinalDefaulter.GetTitledFirstName] ablehnen, erhaltet Ihr einen Grund zur Gefangennahme."
 agot_banking.0108.b:0 "Ich werde aus eigenen Taschen zahlen, was geschuldet ist..."
 agot_banking.0108.c:0 "Diese kleinlichen Streitigkeiten um Münzen betreffen mich nicht."
 agot_banking.0108.c_tt:0 "Dies wird den [agot_bank_interest_rate|E] all Eurer zukünftigen Darlehen erhöhen."

 agot_banking.0109.t:0 "Lehnsherr macht Druck"
 agot_banking.0109.desc:0 "[debtors_liege.GetTitledFirstName] hat mich zur Rede gestellt und verlangt, dass ich den Restbetrag des Darlehens zurückzahle, mit dessen Tilgung ich kürzlich in Verzug geraten bin. Es ist klar, dass die [agot_bank|E] mich so lange drangsalieren wird, bis sie bekommen hat, was ihr zusteht, und unerbittlich auf die Rückzahlung drängen wird. Ist das Gold es wert, meinem Lehnsherrn zu trotzen?\n\n[debtors_liege.GetFirstNameNoTooltip] erklärte, dass ich verpflichtet bin, meinen Vertrag mit der Bank zu ehren, die Rückzahlung wieder aufzunehmen und die vollständige Tilgung innerhalb von drei Jahren zu leisten, zuzüglich einer sofortigen Strafzahlung für meinen früheren Ausfall."
 agot_banking.0109.a:0 "Wie mein Lehnsherr befiehlt."
 agot_banking.0109.a_tt:0 "Euer Darlehen wird fortgesetzt, und die Rückzahlung ist in drei Jahren fällig."
 agot_banking.0109.b:0 "Ich muss gar nichts!"
 agot_banking.0109.b_tt:0 "Sollte Ihr die Einhaltung verweigern, könnte Euer Lehnsherr versuchen, Euch einzukerkern!"

 agot_banking.0110.t:0 "Eine erfüllte Verpflichtung"
 agot_banking.0110.desc:0 "[FinalDefaulter.GetTitledFirstName] hat meinem Befehl gehorcht und gelobt, [FinalDefaulter.Custom('DE_PRO_POS_S_3P')]es Darlehen an die [agot_bank|E] innerhalb von drei Jahren zurückzuzahlen."
 agot_banking.0110.a:0 "Ich freue mich, dass [FinalDefaulter.GetFirstName] [FinalDefaulter.Custom('DE_PRO_POS_S_3P')] Wort gehalten hat."

 agot_banking.0111.t:0 "Dem Befehl getrotzt"
 agot_banking.0111.desc:0 "[FinalDefaulter.GetTitledFirstName] hat verweigert, [FinalDefaulter.Custom('DE_PRO_POS_S_3P')] notleidendes Darlehen an die [agot_bank|E] zurückzuzahlen.\n\nDiese Missachtung meiner Autorität kann nicht ungestraft bleiben!"
 agot_banking.0111.a:0 "Das wird [FinalDefaulter.Custom('DE_PRO_PER_S_3P_N')|U] bereuen."

 agot_banking.0112.t:0 "Eine teure Gunst"
 agot_banking.0112.desc:0 "[debtors_liege.GetTitledFirstName] hat mich informiert, dass ein Gesandter der [agot_bank|E] an [debtors_liege.Custom('DE_PRO_POS_S_3P')]em Hof eingetroffen ist und gefordert hat, dass [debtors_liege.Custom('DE_PRO_PER_S_3P_N')] Maßnahmen in Reaktion auf meinen kürzlichen Ausfall ergreift. Um gute Beziehungen zur Bank zu wahren, hat [debtors_liege.Custom('DE_PRO_PER_S_3P_N')] persönlich beglichen, was ich schulde. Allerdings wird [debtors_liege.Custom('DE_PRO_PER_S_3P_N')] im Gegenzug einen Gefallen erwarten."
 agot_banking.0112.a:0 "Naja, solange ich nicht zahle..."

 agot_banking.0113.t:0 "Krise abgewendet"
 agot_banking.0113.desc:0 "Die [agot_bank|E] hat versucht, meine Wirtschaft zu ruinieren!\n\nSie haben versucht, wichtige Unternehmen in meinem Regierungssitz zu übernehmen, Preise anzuheben und Kosten zu senken, um das Geld, das ich ihnen schulde, direkt aus meiner eigenen Kasse zu pressen – auf Kosten der einfachen Leute. Glücklicherweise war ihr Versuch so offenkundig, dass ich ihn rechtzeitig erkennen und jede Übernahme verhindern konnte, wodurch ich die Gesundheit meiner Wirtschaft sichern und den größten Teil des Schadens abwenden konnte."
 agot_banking.0113.a:0 "Mein Volk wird nicht wegen meinere Schulden leiden!"

 agot_banking.0114.t:0 "Wirtschaftlicher Zusammenbruch"
 agot_banking.0114.desc:0 "Die [agot_bank|E] hat meine Wirtschaft ruiniert!\n\nSie haben wichtige Unternehmen in meinen Städten übernommen und die Preise erhöht, um mir das Geld, das ich ihnen schulde, direkt aus meiner eigenen Kasse und aus den Taschen der einfachen Leute zu pressen! Bevor ich es überhaupt bemerkt habe, hat die Bank einen erheblichen Teil meiner Vermögenswerte in ihre eigenen Taschen umgeleitet, um ihre Verluste zu decken. Der Schaden, den sie angerichtet haben, wird noch jahrelang nachwirken und mein Volk in Armut stürzen."
 agot_banking.0114.a:0 "Das ist eine Katastrophe!"

 agot_banking.0115.t:0 "Tod eines Schuldners"
 agot_banking.0115.desc:0 "[DeadDefaulter.GetFirstName] starb, bevor unsere Bemühungen, [DeadDefaulter.Custom('DE_PRO_POS_S_3P')] Darlehen einzutreiben, in die Tat umgesetzt werden konnten, sodass [DeadDefaulter.Custom('DE_PRO_POS_S_3P')]e Schulden an [DeadDefaulter.Custom('DE_PRO_POS_S_3P')]en Erben übergegangen sind und vorerst keine weiteren Maßnahmen erforderlich sind."
 agot_banking.0115.a:0 "Manche Probleme lösen sich von allein."

 agot_banking.0202.t:0 "Die Buchhaltung der [ROOT.Char.Custom('agot_bank_name')]"
 agot_banking.0202.IB.desc:0 "Alle 5 Jahre informiert die Eiserne [agot_bank|E] von Braavos ihre Anteilseigner über die Ergebnisse des letzten Berichtszeitraums und schüttet Dividenden an ihre Investoren aus.\n\n#T Die aktuellen Zahlen, die vom [agot_bank_director|E] [director.GetTitledFirstName] präsentiert werden, lauten:#!\n\nVerfügbares Kapital:                            #bold [ROOT.Var('IB_FreeCapital').GetValue|2] #!\nAn Kunden verliehenes Kapital:       #bold [ROOT.Var('IB_LoanedCapital').GetValue|2] #!\nVolumen des Investmentfonds:             #bold [ROOT.Var('IB_InvestmentFund').GetValue|2] #!\nGesamtwert der Bank:                #bold [ROOT.Var('IB_BankValue').GetValue|2] #!\nAnzahl ausgegebener Anteile:             #bold [ROOT.Var('IB_NofShares').GetValue|0] #!\nEinnahmen:                                          #bold [ROOT.Var('IB_Earnings').GetValue|2|P] #!\nAusgaben:                                         #bold [ROOT.Var('IB_Expenses').GetValue|2|N] #!\nDurch Ausfälle verlorene Darlehen:                     #bold [ROOT.Var('IB_LostLoans').GetValue|2|N] #!\nNettogewinn:                                        #bold [ROOT.Var('IB_Profit').GetValue|2] #!\nGewinn pro Anteil:                              #bold [ROOT.Var('IB_ProfitPerShare').GetValue|2] #!\nDividende pro Anteil:                         #bold [ROOT.Var('IB_DividendPerShare').GetValue|2] #!"
 agot_banking.0202.bank1.desc:0 "Alle 5 Jahre informiert die [ROOT.Char.Custom('agot_bank_name')] ihre Anteilseigner über ihre Leistung im vergangenen Zeitraum und zahlt Dividenden an ihre Investoren aus.\n\n#T Die aktuellen Zahlen, die von [agot_bank_director|E] [director.GetTitledFirstName] präsentiert werden, lauten:#!\n\nVerfügbares Kapital:                            #bold [ROOT.Var('bank1_FreeCapital').GetValue|2] #!\nAn Kunden verliehenes Kapital:       #bold [ROOT.Var('bank1_LoanedCapital').GetValue|2] #!\nVolumen des Investmentfonds:             #bold [ROOT.Var('bank1_InvestmentFund').GetValue|2] #!\nGesamtwert der Bank:                #bold [ROOT.Var('bank1_BankValue').GetValue|2] #!\nAnzahl ausgegebener Anteile:             #bold [ROOT.Var('bank1_NofShares').GetValue|0] #!\nEinnahmen:                                          #bold [ROOT.Var('bank1_Earnings').GetValue|2|P] #!\nAusgaben:                                         #bold [ROOT.Var('bank1_Expenses').GetValue|2|N] #!\nDurch Ausfälle verlorene Darlehen:                     #bold [ROOT.Var('bank1_LostLoans').GetValue|2|N] #!\nNettogewinn:                                        #bold [ROOT.Var('bank1_Profit').GetValue|2] #!\nGewinn pro Anteil:                              #bold [ROOT.Var('bank1_ProfitPerShare').GetValue|2] #!\nDividende pro Anteil:                         #bold [ROOT.Var('bank1_DividendPerShare').GetValue|2] #!"
 agot_banking.0202.bank2.desc:0 "Alle 5 Jahre informiert die [ROOT.Char.Custom('agot_bank_name')] ihre Anteilseigner über die Ergebnisse des letzten Berichtszeitraums und schüttet Dividenden an ihre Investoren aus.\n\n#T Die aktuellen Zahlen, die vom [agot_bank_director|E] [director.GetTitledFirstName] präsentiert werden, lauten:#!\n\nVerfügbares Kapital:                            #bold [ROOT.Var('bank2_FreeCapital').GetValue|2] #!\nAn Kunden verliehenes Kapital:       #bold [ROOT.Var('bank2_LoanedCapital').GetValue|2] #!\nVolumen des Investmentfonds:             #bold [ROOT.Var('bank2_InvestmentFund').GetValue|2] #!\nGesamtwert der Bank:                #bold [ROOT.Var('bank2_BankValue').GetValue|2] #!\nAnzahl ausgegebener Anteile:             #bold [ROOT.Var('bank2_NofShares').GetValue|0] #!\nEinnahmen:                                          #bold [ROOT.Var('bank2_Earnings').GetValue|2|P] #!\nAusgaben:                                         #bold [ROOT.Var('bank2_Expenses').GetValue|2|N] #!\nDurch Ausfälle verlorene Darlehen:                     #bold [ROOT.Var('bank2_LostLoans').GetValue|2|N] #!\nNettogewinn:                                        #bold [ROOT.Var('bank2_Profit').GetValue|2] #!\nGewinn pro Anteil:                              #bold [ROOT.Var('bank2_ProfitPerShare').GetValue|2] #!\nDividende pro Anteil:                         #bold [ROOT.Var('bank2_DividendPerShare').GetValue|2] #!"
 agot_banking.0202.bank3.desc:0 "Alle 5 Jahre informiert die [ROOT.Char.Custom('agot_bank_name')] ihre Anteilseigner über die Ergebnisse des letzten Berichtszeitraums und schüttet Dividenden an ihre Investoren aus.\n\n#T Die aktuellen Zahlen, die vom [agot_bank_director|E] [director.GetTitledFirstName] präsentiert werden, lauten:#!\n\nVerfügbares Kapital:                            #bold [ROOT.Var('bank3_FreeCapital').GetValue|2] #!\nAn Kunden verliehenes Kapital:       #bold [ROOT.Var('bank3_LoanedCapital').GetValue|2] #!\nVolumen des Investmentfonds:             #bold [ROOT.Var('bank3_InvestmentFund').GetValue|2] #!\nGesamtwert der Bank:                #bold [ROOT.Var('bank3_BankValue').GetValue|2] #!\nAnzahl ausgegebener Anteile:             #bold [ROOT.Var('bank3_NofShares').GetValue|0] #!\nEinnahmen:                                          #bold [ROOT.Var('bank3_Earnings').GetValue|2|P] #!\nAusgaben:                                         #bold [ROOT.Var('bank3_Expenses').GetValue|2|N] #!\nDurch Ausfälle verlorene Darlehen:                     #bold [ROOT.Var('bank3_LostLoans').GetValue|2|N] #!\nNettogewinn:                                        #bold [ROOT.Var('bank3_Profit').GetValue|2] #!\nGewinn pro Anteil:                              #bold [ROOT.Var('bank3_ProfitPerShare').GetValue|2] #!\nDividende pro Anteil:                         #bold [ROOT.Var('bank3_DividendPerShare').GetValue|2] #!"
 agot_banking.0202.a:0 "Eine gründliche Bewertung!"

 agot_banking.0203.t:0 "Das Angebot der Bank"
 agot_banking.0203.desc:0 "Die [ROOT.Char.Custom('agot_bank_name')] hat einen Gesandten in Reaktion auf meine Anfrage zum Kauf von Anteile entsandt. Für jede Anteil, die ich halte, würde ich alle fünf Jahre [Concept('agot_bank_dividend_level','Dividenden')|E] erhalten. Und sollte ich mich je in schweren finanziellen Nöten befinden, könnte ich sie jederzeit für eine Pauschalsumme verkaufen.\n\nDer aktuelle Preis einer Anteil beträgt @gold_icon! [ROOT.Var('ShareBuyingPrice').GetValue|2|N]."
 agot_banking.0203.a:0 "Das kann ich mir nicht leisten!"
 agot_banking.0203.b:0 "Abgemacht!"
 agot_banking.0203.c:0 "Ich werde 5 Anteile kaufen."
 agot_banking.0203.d:0 "Nicht jetzt, ich habe es mir anders überlegt."

 agot_banking.0204.t:0 "Verkauf eines Bankanteils"
 agot_banking.0204.desc:0 "Ich bin unzufrieden damit, dass ich so viel Geld in [ROOT.Char.Custom(‚agot_bank_name‘)] gesteckt habe, nur um alle paar Jahre ein paar lächerliche Münzen zu erhalten! Es wäre besser, wenn ich einen meiner Anteile verkaufen und mein Gold zurückholen würde, solange ich noch kann, bevor der Wert der Anteile zusammenbricht.\n\nIch kann einen Anteil an der [ROOT.Char.Custom('agot_bank_name')] verkaufen und ihren aktuellen Wert in Höhe von @gold_icon! [ROOT.Var('ShareSellingPrice').GetValue|2|N] erhalten."
 agot_banking.0204.a:0 "Dies ist annehmbar."
 agot_banking.0204.b:0 "Ich werde meinen Anteil behalten."

 agot_banking.0205.t:0 "Der neue Direktor der Bank"
 agot_banking.0205.desc:0 "Die [ROOT.Char.Custom(‚agot_bank_name‘)] hat einen neuen [agot_bank_director|E] ausgewählt, der die Bedingungen für die Fortführung ihrer Geschäfte überwachen und anpassen soll.\n\nDer neue [agot_bank_director|E] [director.GetTitledFirstName] erhielt [ROOT.Var('director_winner_votes').GetValue] Stimmen und wird die Bank zu stets wachsendem Wohlstand führen!"
 agot_banking.0205.a:0 "Hört, hört!"
 agot_banking.0205.a_tt:0 "Ihr habt [THIS.Var('director_votes').GetValue] Stimmen erhalten."

 agot_banking.0206.t:0 "Risikograd festlegen"
 agot_banking.0206.desc:0 "Bevor ein Darlehen an einen Kunden gewährt wird, wird die [agot_bank|E] zunächst dessen Kreditwürdigkeit ermitteln. Je nach Bewertung wird die Bank entscheiden, ob ein Darlehen an ihn vergeben werden kann.\n\nAls [agot_bank_director|E] der Bank obliegt es mir, zu definieren, wie viel Risiko die Bank bereit ist einzugehen, bevor Darlehen an unzuverlässige Kunden abgelehnt werden."
 agot_banking.0206.a:0 "Wir sollten vorsichtig sein. Es besteht keine Notwendigkeit, unnötige Risiken einzugehen!"
 agot_banking.0206.b:0 "Wir werden einen ausgewogenen Ansatz wählen, Risiken und potenzielle Gewinne gleichermaßen abwägen."
 agot_banking.0206.c:0 "Kommt herbei, kommt alle!"

 agot_banking.0207.t:0 "Dividendenniveau festlegen"
 agot_banking.0207.desc:0 "Als [agot_bank_director|E] der [ROOT.Char.Custom('agot_bank_name')] obliegt es mir zu entscheiden, wie viel der Gewinne der Bank an ihre Anteilseigner ausgezahlt werden. Die Summe des Geldes, die nicht als [agot_bank_dividends|E] ausgezahlt wird, verbleibt in der Bank und kann genutzt werden, um in Zukunft weitere Darlehen zu vergeben und mehr Gewinn zu erzeugen."
 agot_banking.0207.a:0 "Wir müssen uns auf langfristiges Wachstum konzentrieren!"
 agot_banking.0207.a_tt:0 "50% der [agot_bank_profits|E] der Bank werden alle 5 Jahre als Dividenden an die Anteilseigner ausgezahlt."
 agot_banking.0207.b:0 "Eine ausgewogene Politik ist nachhaltiger."
 agot_banking.0207.b_tt:0 "75% der [agot_bank_profits|E] der Bank werden alle 5 Jahre als Dividenden an die Anteilseigner ausgezahlt."
 agot_banking.0207.c:0 "Wir sind hier, um unsere Anteilseigner zu bereichern!"
 agot_banking.0207.c_tt:0 "100% der [agot_bank_profits|E] der Bank werden alle 5 Jahre als Dividenden an die Anteilseigner ausgezahlt."

 agot_banking.0210.t:0 "Ein Schuldner in Verzug"
 agot_banking.0210.desc:0 "Ein Schreiber informiert mich, dass [FinalDefaulter.GetTitledFirstName] nicht länger in der Lage oder willens ist, [FinalDefaulter.Custom('DE_PRO_POS_S_3P')] Darlehen in Höhe von [ROOT.Var('show_loan').GetValue|2] @gold_icon zu tilgen. Das geliehene Geld ist daher verloren. Dies erfordert unmittelbares Handeln der [agot_bank|E]. Unsere Anteilseigner würden zurecht toben, wenn ich die Mittel einfach aufgebe!\n\nAls [agot_bank_director|E] der Bank kann ich entscheiden, wie mit diesem Fall umzugehen ist."
 agot_banking.0210.a:0 "Ich werde dies selbst handhaben."
 agot_banking.0210.a_tt:0 "Euch werden mehrere Optionen präsentiert, wie das verlorene Darlehen einzutreiben ist."
 agot_banking.0210.b:0 "Ein Anteilseigner soll sich darum kümmern."
 agot_banking.0210.b_tt:0 "Einer der anderen Anteilseigner der Bank wird entscheiden, wie das verlorene Darlehen einzutreiben ist."
 agot_banking.0210.c:0 "Belästigt mich nicht mehr mit säumigen Schuldnern!"
 agot_banking.0210.c_tt:0 "Die anderen Anteilseigner werden von nun an alle Ausfälle handhaben."
 agot_banking.0210.d:0 "Das ist der Preis des Unternehmertums."
 agot_banking.0210.d_tt:0 "Ihr werdet dieses Darlehen in Zukunft nicht eintreiben können!"

 agot_banking.0211.t:0 "Ein Schuldner in Verzug"
 agot_banking.0211.raid_failed_desc:0 "Katastrophe! [FinalDefaulter.GetTitledFirstNamePossessive] Wachen waren gut vorbereitet und wehrten die Piraten ab, die wir angeheuert hatten, bevor sie Nennenswertes aus [FinalDefaulter.Custom('DE_PRO_POS_S_3P')]em Besitz plündern konnten.\n\nWir werden etwas anderes versuchen müssen..."
 agot_banking.0211.assassin_failed_desc:0 "Katastrophe! Der Attentäter, den wir entsandt haben, um [FinalDefaulter.GetTitledFirstName] zu beseitigen, ist nicht zurückgekehrt. Wir müssen annehmen, dass er von [FinalDefaulter.GetFirstNamePossessive] Leibwachen gefasst wurde und in seiner Mission gescheitert ist.\n\nWir werden etwas anderes versuchen müssen..."
 agot_banking.0211.claim1_failed_desc:0 "Katastrophe! Der Anspruch, den wir auf [FinalDefaulter.GetTitledFirstNamePossessive] Titel zu fälschen versuchten, war einfach nicht glaubwürdig genug, um potenzielle Käufer von seiner Legitimität zu überzeugen.\n\nWir werden etwas anderes versuchen müssen..."
 agot_banking.0211.claim2_failed_desc:0 "Schlechte Nachrichten: Wir versuchten, unseren gefälschten Anspruch auf [FinalDefaulter.GetTitledFirstNamePossessive] Titel an [buyer.GetTitledFirstName] zu verkaufen, doch [buyer.Custom('DE_PRO_PER_S_3P_N')] weigerte sich, einen für uns akzeptablen Preis zu zahlen.\n\nWir werden etwas anderes versuchen müssen..."
 agot_banking.0211.letter1_failed_desc:0 "Schlechte Nachrichten: Der Brief, den wir an [FinalDefaulter.GetTitledFirstNamePossessive] Lehnsherrn sandten, bewegte diesen nicht dazu, die Verfehlungen seines Vasallen zu berichtigen. Es scheint, als ob [FinalDefaulter.GetTitledFirstName] erfolgreich argumentiert hat, dass unsere Ansprüche illegitim sind.\n\nWir werden etwas anderes versuchen müssen..."
 agot_banking.0211.letter2_failed_desc:0 "Schlechte Nachrichten: Obwohl [FinalDefaulter.GetTitledFirstNamePossessive] Lehnsherr nicht leugnen kann, dass unsere Ansprüche legitim sind, verweigert er dennoch, [FinalDefaulter.GetTitledFirstNameNoTooltip] zu befehlen, das Abkommen mit der Bank zu ehren.\n\nWir werden etwas anderes versuchen müssen..."
 agot_banking.0211.letter3_failed_desc:0 "Schlechte Nachrichten: Auch wenn [FinalDefaulter.GetTitledFirstNamePossessive] Lehnsherr überzeugt wurde, seinem Vasallen zu befehlen, das Abkommen zu ehren, hat [FinalDefaulter.GetTitledFirstNameNoTooltip] rundweg verweigert zu gehorchen.\n\nWir werden etwas... Direkteres versuchen müssen..."
 agot_banking.0211.economy_failed_desc:0 "Unglückliche Nachrichten: Unsere aggressiven Investitionen in [FinalDefaulter.GetTitledFirstNamePossessive] Wirtschaft waren nicht erfolgreich. Es scheint, als ob [FinalDefaulter.Custom('DE_PRO_PER_S_3P_N')] Gegenmaßnahmen ergriffen hat, um zu verhindern, dass wir das, was uns zusteht, aus [FinalDefaulter.Custom('DE_PRO_POS_S_3P')]er lokalen Wirtschaft in unsere Taschen umleiten.\n\nWir müssen etwas anderes versuchen..."
 agot_banking.0211.director_desc:0 "Um [FinalDefaulter.GetTitledFirstNamePossessive] ausgefallenes Darlehen einzutreiben, habt Ihr verschiedene Ansätze zur Auswahl."
 agot_banking.0211.delegated_desc:0 "[agot_bank_director|E] [director.GetTitledFirstName] hat Euch über [FinalDefaulter.GetTitledFirstNamePossessive] Zahlungsausfall bezüglich [FinalDefaulter.Custom('DE_PRO_POS_S_3P')]es Darlehen informiert und Euch angewiesen, das entgangene Geld zurückzufordern.\n\nUm diesen Auftrag zu erfüllen, stehen Euch verschiedene Vorgehensweisen zur Auswahl."
 agot_banking.0211.a:0 "Piraten anheuern, um [FinalDefaulter.Custom('DE_PRO_POS_S_3P')]e Domäne zu plündern."
 agot_banking.0211.a_tt:0 "Dies wird die Bank @gold_icon! [default_revisor.MakeScope.Var('RaiderCost').GetValue] kosten. Bei Erfolg werden die Plünderer das geschuldete Geld an die Bank zurückgeben und jegliche überschüssige Beute behalten, die sie gegebenenfalls erbeuten konnten."
 agot_banking.0211.b:0 "Einen Meuchler schicken, wir werden mehr Glück mit [FinalDefaulter.Custom('DE_PRO_POS_S_3P')]em Erben haben."
 agot_banking.0211.b_tt:0 "Dies wird die Bank @gold_icon! [default_revisor.MakeScope.Var('AssassinCost').GetValue] kosten. Sollte der Attentäter [FinalDefaulter.GetTitledFirstName] töten, werden wir versuchen, die Schuld von [FinalDefaulter.Custom('DE_PRO_POS_S_3P')]em Erben einzutreiben."
 agot_banking.0211.c:0 "Einen Anspruch auf [FinalDefaulter.Custom('DE_PRO_POS_S_3P')]en Titel fälschen."
 agot_banking.0211.c_tt:0 "Dies wird die Bank @gold_icon! [default_revisor.MakeScope.Var('ClaimCost').GetValue] kosten. Bei Erfolg können wir versuchen, den Anspruch an einen ehrgeizigen Nachbarn von [FinalDefaulter.GetTitledFirstName] zu verkaufen."
 agot_banking.0211.d:0 "Einen Brief an [FinalDefaulter.GetTitledFirstName]s Lehnsherrn schreiben."
 agot_banking.0211.d_tt:0 "Dies wird die Bank @gold_icon! [default_revisor.MakeScope.Var('LetterCost').GetValue] kosten. [FinalDefaulter.GetTitledFirstNamePossessive] Lehnsherr könnte von seinem Vasallen fordern, das Abkommen zu ehren, das [FinalDefaulter.Custom('DE_PRO_PER_S_3P_N')] mit der Bank getroffen hat, oder könnte sogar die Schuld selbst tilgen."
 agot_banking.0211.e:0 "[FinalDefaulter.Custom('DE_PRO_POS_S_3P')]e Wirtschaft untergraben."
 agot_banking.0211.e_tt:0 "Dies wird die Bank @gold_icon! [default_revisor.MakeScope.Var('EconomyCost').GetValue] kosten. Wenn wir erfolgreich sind, werden wir in den kommenden Monaten jeden Heller, der uns zusteht, direkt aus der Wirtschaft von [FinalDefaulter.GetTitledFirstName] herausholen können, indem wir Geld aus unseren Investitionen abziehen und die umliegenden Städte lahmlegen. Es wird einige Zeit dauern, bis sie sich davon erholt haben."
 agot_banking.0211.g:0 "Es gibt nichts, was wir tun können."
 agot_banking.0211.g_tt:0 "Das Darlehen kann nicht eingetrieben werden, weder jetzt noch in der Zukunft!"
 agot_banking.0211.a.failure:0 "Der Überfall scheitert."
 agot_banking.0211.a.success:0 "Der Überfall gelingt."
 agot_banking.0211.b.failure:0 "Der Attentäter scheitert."
 agot_banking.0211.b.success:0 "Der Attentäter gelingt."
 agot_banking.0211.c.failure:0 "Der Anspruch wird als illegitim angesehen."
 agot_banking.0211.c.success:0 "Der Anspruch wird als legitim akzeptiert."
 agot_banking.0211.d.failure:0 "Der Lehnsherr traut Euren Anschuldigungen nicht."
 agot_banking.0211.d.success:0 "Der Lehnsherr ist überzeugt, dass Eure Ansprüche gültig sind."
 agot_banking.0211.e.failure:0 "Die Wirtschaftssabotage scheitert."
 agot_banking.0211.e.success:0 "Die Wirtschaftssabotage ist erfolgreich."

 agot_banking.0212.t:0 "Eingetriebene Schulden"
 agot_banking.0212.raid_success_desc:0 "Es war erfolgreich!\nDie Piraten, die wir zum Sitz von [FinalDefaulter.GetTitledFirstName] entsandt haben, konnten die Dörfer und Städte in [FinalDefaulter.Custom('DE_PRO_POS_S_3P')]en Landen plündern und mit genügend Beute verschwinden, bevor [FinalDefaulter.GetFirstNamePossessive] Wachen eine wirksame Verteidigung aufbieten konnten. Das Gold, das sie plünderten, reicht gerade aus, um die Verluste aus [FinalDefaulter.GetTitledFirstNamePossessiveNoTooltip] ausgefallenem Darlehen auszugleichen."
 agot_banking.0212.assassin_success_desc:0 "Es war erfolgreich!\nDer Attentäter, den wir entsandt haben, um [FinalDefaulter.GetTitledFirstName] zu beseitigen, war erfolgreich. Hoffentlich ist [FinalDefaulter.Custom('DE_PRO_POS_S_3P')] Erbe eine... rationalere Person, andernfalls könnte auch er sich mit einem Fuß im Grab wiederfinden..."
 agot_banking.0212.claim_success_desc:0 "Es war erfolgreich!\nDer Anspruch, den wir gefälscht haben, wurde als legitim betrachtet und wir konnten ihn an [buyer.GetTitledFirstName] verkaufen. Das Geld, das [buyer.Custom('DE_PRO_PER_S_3P_N')] uns im Austausch gab, reicht aus, um die Verluste aus [FinalDefaulter.GetTitledFirstNamePossessive] Darlehen auszugleichen. Hoffentlich wird [buyer.GetFirstNameNoTooltip] [FinalDefaulter.GetFirstNameNoTooltip] auf dem Schlachtfeld lehren, warum man die Bank nicht betrügt."
 agot_banking.0212.letter1_success_desc:0 "Es war erfolgreich!\n[FinalDefaulter.GetTitledFirstNamePossessive] Lehnsherr hat unseren Anspruch als legitim anerkannt und die ausstehende Schuld aus eigenen Taschen beglichen. Nun, da [FinalDefaulter.GetTitledFirstNamePossessiveNoTooltip] Schuld beglichen ist, lasst [FinalDefaulter.Custom('DE_PRO_PER_S_3P_A')] den Zorn [FinalDefaulter.Custom('DE_PRO_POS_S_3P')]es Lehnsherrn ertragen."
 agot_banking.0212.letter2_success_desc:0 "Es war erfolgreich!\nNachdem [FinalDefaulter.Custom('DE_PRO_POS_S_3P')] Lehnsherr [FinalDefaulter.GetTitledFirstName] befohlen hat, das Geld zurückzuzahlen, das der Bank geschuldet wird, hat [FinalDefaulter.Custom('DE_PRO_PER_S_3P_N')] gehorcht und zugestimmt, eine Strafe zu zahlen und den ursprünglich geschuldeten Betrag innerhalb der nächsten drei Jahre zurückzuzahlen."
 agot_banking.0212.economy_success_desc:0 "Es war erfolgreich!\nUnsere aggressiven Investitionen in [FinalDefaulter.GetTitledFirstNamePossessive] Hauptsitz ermöglichten es uns, genug Geld aus der lokalen Wirtschaft [FinalDefaulter.Custom('DE_PRO_POS_S_3P')]er Domäne in unsere Kassen abzuzweigen, um die Verluste aus [FinalDefaulter.GetTitledFirstNamePossessiveNoTooltip] ausgefallenem Darlehen auszugleichen."
 agot_banking.0212.a:0 "Die Bank bekommt, was ihr zusteht."

 agot_banking.0213.t:0 "Anteilsspaltung" # Aktiensplit / Aktiensplitting ist der Fachbegriff, aber zu modern
 agot_banking.0213.desc:0 "Die [ROOT.Char.Custom(‚agot_bank_name‘)] hat in den letzten Jahren einen Aufschwung erlebt, was zu einem Anstieg des Wertes pro Anteil geführt hat. Da dies den Kauf neuer Anteile erschwert, hat die Bank beschlossen, eine Anteilspaltung durchzuführen:\n\nDie derzeit gehaltenen Anteile jedes Anteilseigners werden in zwei Teile geteilt. Dadurch wird der Preis für neue Anteile um die Hälfte reduziert, während alle derzeitigen Anteilseigner weiterhin denselben Wert halten."
 agot_banking.0213.a:0 "Ein kluger Zug."
 agot_banking.0213.a_tt:0 "Ihr haltet nun doppelt so viele Anteile wie zuvor."

 agot_banking.0301.t:0 "Die Buchhaltung der [ROOT.Char.Custom('agot_bank_name')]"
 agot_banking.0301.IB.desc:0 "Als Anteilseigner könnt Ihr die aktuelle Buchhaltung der [ROOT.Char.Custom('agot_bank_name')] einsehen.\n\n#T Dies sind die aktuellen Zahlen, die von den Schreibern der Bank präsentiert werden:#!\n\nVerfügbares Kapital:                            #bold @gold_icon! [ROOT.Var('IB_FreeCapital').GetValue|2] #!\nAn Kunden verliehenes Kapital:       #bold @gold_icon! [ROOT.Var('IB_LoanedCapital').GetValue|2] #!\nVolumen des Investmentfonds:             #bold @gold_icon! [ROOT.Var('IB_InvestmentFund').GetValue|2] #!\nGesamtwert der Bank:                #bold @gold_icon! [ROOT.Var('IB_BankValue').GetValue|2] #!\nAnzahl ausgegebener Anteile:                     #bold [ROOT.Var('IB_NofShares').GetValue|0] #!\nEinnahmen:                                          #bold @gold_icon! [ROOT.Var('IB_Earnings').GetValue|2|P] #!\nAusgaben:                                         #bold @gold_icon! [ROOT.Var('IB_Expenses').GetValue|2|N] #!\nDurch Ausfälle verlorene Darlehen:                     #bold @gold_icon! [ROOT.Var('IB_LostLoans').GetValue|2|N] #!"
 agot_banking.0301.bank1.desc:0 "Als Anteilseigner könnt Ihr die aktuelle Buchhaltung der [ROOT.Char.Custom('agot_bank_name')] einsehen.\n\n#T Dies sind die aktuellen Zahlen, die von den Schreibern der Bank präsentiert werden:#!\n\nVerfügbares Kapital:                            #bold @gold_icon! [ROOT.Var('bank1_FreeCapital').GetValue|2] #!\nAn Kunden verliehenes Kapital:       #bold @gold_icon! [ROOT.Var('bank1_LoanedCapital').GetValue|2] #!\nVolumen des Investmentfonds:             #bold @gold_icon! [ROOT.Var('bank1_InvestmentFund').GetValue|2] #!\nGesamtwert der Bank:                #bold @gold_icon! [ROOT.Var('bank1_BankValue').GetValue|2] #!\nAnzahl ausgegebener Anteile:                     #bold [ROOT.Var('bank1_NofShares').GetValue|0] #!\nEinnahmen:                                          #bold @gold_icon! [ROOT.Var('bank1_Earnings').GetValue|2|P] #!\nAusgaben:                                         #bold @gold_icon! [ROOT.Var('bank1_Expenses').GetValue|2|N] #!\nDurch Ausfälle verlorene Darlehen:                     #bold @gold_icon! [ROOT.Var('bank1_LostLoans').GetValue|2|N] #!"
 agot_banking.0301.bank2.desc:0 "Als Anteilseigner könnt Ihr die aktuelle Buchhaltung der [ROOT.Char.Custom('agot_bank_name')] einsehen.\n\n#T Dies sind die aktuellen Zahlen, die von den Schreibern der Bank präsentiert werden:#!\n\nVerfügbares Kapital:                            #bold @gold_icon! [ROOT.Var('bank2_FreeCapital').GetValue|2] #!\nAn Kunden verliehenes Kapital:       #bold @gold_icon! [ROOT.Var('bank2_LoanedCapital').GetValue|2] #!\nVolumen des Investmentfonds:             #bold @gold_icon! [ROOT.Var('bank2_InvestmentFund').GetValue|2] #!\nGesamtwert der Bank:                #bold @gold_icon! [ROOT.Var('bank2_BankValue').GetValue|2] #!\nAnzahl ausgegebener Anteile:                     #bold [ROOT.Var('bank2_NofShares').GetValue|0] #!\nEinnahmen:                                          #bold @gold_icon! [ROOT.Var('bank2_Earnings').GetValue|2|P] #!\nAusgaben:                                         #bold @gold_icon! [ROOT.Var('bank2_Expenses').GetValue|2|N] #!\nDurch Ausfälle verlorene Darlehen:                     #bold @gold_icon! [ROOT.Var('bank2_LostLoans').GetValue|2|N] #!"
 agot_banking.0301.bank3.desc:0 "Als Anteilseigner könnt Ihr die aktuelle Buchhaltung der [ROOT.Char.Custom('agot_bank_name')] einsehen.\n\n#T Dies sind die aktuellen Zahlen, die von den Schreibern der Bank präsentiert werden:#!\n\nVerfügbares Kapital:                            #bold @gold_icon! [ROOT.Var('bank3_FreeCapital').GetValue|2] #!\nAn Kunden verliehenes Kapital:       #bold @gold_icon! [ROOT.Var('bank3_LoanedCapital').GetValue|2] #!\nVolumen des Investmentfonds:             #bold @gold_icon! [ROOT.Var('bank3_InvestmentFund').GetValue|2] #!\nGesamtwert der Bank:                #bold @gold_icon! [ROOT.Var('bank3_BankValue').GetValue|2] #!\nAnzahl ausgegebener Anteile:                     #bold [ROOT.Var('bank3_NofShares').GetValue|0] #!\nEinnahmen:                                          #bold @gold_icon! [ROOT.Var('bank3_Earnings').GetValue|2|P] #!\nAusgaben:                                         #bold @gold_icon! [ROOT.Var('bank3_Expenses').GetValue|2|N] #!\nDurch Ausfälle verlorene Darlehen:                     #bold @gold_icon! [ROOT.Var('bank3_LostLoans').GetValue|2|N] #!"
 agot_banking.0301.a:0 "Das reicht an Zahlen für jetzt."

 agot_banking.0401.t:0 "Den Investmentfonds auffüllen"
 agot_banking.0401.desc:0 "Durch die Auffüllung des Investitionsfonds der [agot_bank|E] steht das Geld nicht mehr für die Vergabe von Darlehen an potenzielle Schuldner zur Verfügung.\n\nIm Gegenzug wird der Fonds jedes Jahr Gewinne abwerfen, wenn sinnvolle Investitionen getätigt werden. Investitionen in instabile und riskante Vorhaben bergen jedoch die Gefahr, dass das Geld im Fonds verloren geht, was umso wahrscheinlicher ist, wenn es nicht von einem kompetenten [agot_bank_director|E] gut verwaltet wird!"
 agot_banking.0401.a:0 "Die Investition tätigen."
 agot_banking.0401.a_tt:0 "@gold_icon! 1000 werden dauerhaft aus der Bargeldreserve der Bank in den Investmentfonds übertragen. @warning_icon! #X Es ist nicht möglich, Geld aus dem Fonds zurückzuziehen, sobald es investiert ist. #!"
 agot_banking.0401.b:0 "Ich habe es mir anders überlegt."

 agot_banking.0403.t:0 "Die Erträge des Investementfonds"
 agot_banking.0403.positive_desc:0 "Wie jedes Jahr händigen mir die Angestellten der Bank die aktuellen Zahlen zur Wertentwicklung des Investmentfonds aus.\n\nDieses Jahr hat das investierte Geld uns einen Gewinn von @gold_icon! [ROOT.Var('ShownInvestProfit').GetValue|0|P] eingebracht."
 agot_banking.0403.neutral_desc:0 "Wie jedes Jahr händigen mir die Angestellten der Bank die aktuellen Zahlen zur Wertentwicklung des Investmentfonds aus.\n\nEs scheint, dass sich die Einnahmen und Verluste dieses Jahr nicht viel nehmen."
 agot_banking.0403.negative_desc:0 "Wie jedes Jahr händigen mir die Angestellten der Bank die aktuellen Zahlen zur Wertentwicklung des Investmentfonds aus.\n\nEs war ein schwieriges Jahr, in dem einige Unternehmen, in die wir investiert hatten, zu kämpfen hatten oder sogar ganz schließen mussten. Nicht nur hat der Fonds keine Gewinne gemacht, sondern sein Volumen hat sich sogar um @gold_icon! [ROOT.Var('ShownInvestProfit').GetValue|0|N] verringert."
 agot_banking.0403.a:0 "Genug Zahlen für heute."

 # Decision loc
 decision_group_type_banking: "Bankentscheidungen"
 take_loan_decision:0 "Bankdarlehen Beantragen"
 take_loan_decision_desc:0 "Die reichsten und angesehensten Geldhäuser der Welt sind mehr als bereit, jedem, den sie für vertrauenswürdig halten, Darlehen zu gewähren. Doch seid gewarnt: Es heißt nicht umsonst, dass die [agot_bank|E] bekommt, was ihr zusteht."
 take_loan_decision_effect:0 "Ein Vertreter der [agot_bank|E] wird entsandt, um ein Darlehen und seine Bedingungen zu verhandeln."
 take_loan_decision_tooltip:0 "Eine Botschaft an die ausgewählte Bank senden, um ein Darlehen zu beantragen."
 take_loan_decision_tooltip_confirm_text_desc:0 "Wählt eine Bank."
 take_loan_bank_cash_reserve:0 "Keine Bank hat derzeit genug Mittel, um weitere Darlehen zu vergeben."

 agot_repay_loan_decision:0 "Bankdarlehen Zurückzahlen"
 agot_repay_loan_decision_desc:0 "Ihr könnt Euer derzeitiges Darlehen vollständig oder teilweise vor Ablauf der Laufzeit zurückzahlen."
 agot_repay_loan_decision_tooltip:0 "Euch werden verschiedene Tilgungspläne angeboten, um Eure Schulden zurückzuzahlen."
 agot_repay_loan_decision_tooltip_confirm_text_desc:0 "Zeigt mir meine Optionen."
 agot_repay_loan_decision_effect:0 "Ihr könnt Euer derzeitiges Darlehen vollständig oder teilweise vor Ablauf der Laufzeit zurückzahlen."

 buy_shares_decision:0 "In Bank investieren"
 buy_shares_decision_shareholder_IB_desc:0 "Die [ROOT.Char.Custom('agot_bank_name')] nimmt neue Investitionen an.\n\nIch halte derzeit [ROOT.Var('IB_Shares').GetValue] Anteile, doch es wäre weise, einen größeren Anteil zu beanspruchen, solange ich noch kann. Ein größerer Anteil bedeutet eine größere [Concept('agot_bank_dividend_level','Dividende')|E] aus den [Concept('agot_bank_profits','Gewinnen')|E] der Bank."
 buy_shares_decision_shareholder_bank1_desc:0 "Die [ROOT.Char.Custom('agot_bank_name')] nimmt neue Investitionen an.\n\nIch halte derzeit [ROOT.Var('bank1_Shares').GetValue] Anteile, doch es wäre weise, einen größeren Anteil zu beanspruchen, solange ich noch kann. Ein größerer Anteil bedeutet eine größere [Concept('agot_bank_dividend_level','Dividende')|E] aus den [Concept('agot_bank_profits','Gewinnen')|E] der Bank."
 buy_shares_decision_shareholder_bank2_desc:0 "Die [ROOT.Char.Custom('agot_bank_name')] nimmt neue Investitionen an.\n\nIch halte derzeit [ROOT.Var('bank2_Shares').GetValue] Anteile, doch es wäre weise, einen größeren Anteil zu beanspruchen, solange ich noch kann. Ein größerer Anteil bedeutet eine größere [Concept('agot_bank_dividend_level','Dividende')|E] aus den [Concept('agot_bank_profits','Gewinnen')|E] der Bank."
 buy_shares_decision_shareholder_bank3_desc:0 "Die [ROOT.Char.Custom('agot_bank_name')] nimmt neue Investitionen an.\n\nIch halte derzeit [ROOT.Var('bank3_Shares').GetValue] Anteile, doch es wäre weise, einen größeren Anteil zu beanspruchen, solange ich noch kann. Ein größerer Anteil bedeutet eine größere [Concept('agot_bank_dividend_level','Dividende')|E] aus den [Concept('agot_bank_profits','Gewinnen')|E] der Bank."
 buy_shares_decision_desc:0 "Gold, das ungenutzt herumliegt, erfüllt keinen Zweck. Da meine örtliche Bank für Anleger offen ist, könnte ich einen Anteil erwerben – und damit ein Mitspracherecht in ihren Angelegenheiten und einen Teil ihres [agot_bank_profit|E]es."
 buy_shares_decision_tooltip:0 "Anteile Eurer örtlichen Bank kaufen"
 buy_shares_decision_tooltip_confirm_text_desc:0 "Wie hoch ist der derzeitige Preis eines Anteils?"
 buy_shares_decision_effect:0 "Euch wird die Möglichkeit geboten, Bankenanteile zu einem nach der aktuellen Bewertung festgelegten Kurs zu erwerben."
 bank_needs_no_cash:0 "Die Bank hat ausreichende Bargeldreserven und nimmt derzeit keine neuen Investitionen an"

 sell_shares_decision:0 "Bankanteil verkaufen"
 sell_shares_decision_IB_desc:0 "Die [ROOT.Char.Custom('agot_bank_name')] hat derzeit genug Gold, um Euch für eine Eurer Anteile auszuzahlen.\n\nIhr haltet derzeit [ROOT.Var('IB_Shares').GetValue] Anteile in der Eisernen Bank."
 sell_shares_decision_bank1_desc:0 "Die [ROOT.Char.Custom('agot_bank_name')] hat derzeit genug Gold, um Euch für eine Eurer Anteile auszuzahlen.\n\nIhr haltet derzeit [ROOT.Var('bank1_Shares').GetValue] Anteile in der Bank."
 sell_shares_decision_bank2_desc:0 "Die [ROOT.Char.Custom('agot_bank_name')] hat derzeit genug Gold, um Euch für eine Eurer Anteile auszuzahlen.\n\nIhr haltet derzeit [ROOT.Var('bank2_Shares').GetValue] Anteile in der Bank."
 sell_shares_decision_bank3_desc:0 "Die [ROOT.Char.Custom('agot_bank_name')] hat derzeit genug Gold, um Euch für eine Eurer Anteile auszuzahlen.\n\nIhr haltet derzeit [ROOT.Var('bank3_Shares').GetValue] Anteile in der Bank."
 sell_shares_decision_tooltip:0 "Ihr werdet Gold im Wert des aktuellen Preises eines Anteils angeboten."
 sell_shares_decision_tooltip_confirm_text_desc:0 "Wie hoch ist der aktuelle Preis eines Anteils?"
 sell_shares_decision_effect:0 "Ihr werdet Gold im Wert des aktuellen Preises eines Anteils angeboten."

 set_risk_level_decision:0 "Risikograd Anpassen"
 set_risk_level_decision_desc:0 "Als [agot_bank_director|E] der [ROOT.Char.Custom('agot_bank_name')] könnt Ihr entscheiden, wie viel [Concept('agot_bank_risk_level','Risiko')|E] die Bank bereit ist einzugehen, wenn Darlehen gewährt oder Investitionen getätigt werden."
 set_risk_level_decision_tooltip:0 "Ihr könnt zwischen niedrigen, ausgewogenen und hohen Risikograden für Darlehen und Investitionen wählen."
 set_risk_level_decision_tooltip_confirm_text_desc:0 "Ich werde die Unternehmensstrategie der Bank neu bewerten."
 set_risk_level_decision_effect:0 "Ihr könnt zwischen niedrigen, ausgewogenen und hohen Risikograden für Darlehen und Investitionen wählen."

 set_dividend_level_decision:0 "Dividendensätze anpassen"
 set_dividend_level_decision_desc:0 "Als [agot_bank_director|E] der [ROOT.Char.Custom('agot_bank_name')] könnt Ihr anpassen, wie viel der [agot_bank_profits|E] der Bank an ihre Anteilseigner ausgeschüttet wird."
 set_dividend_level_decision_tooltip:0 "Ihr könnt zwischen niedrigen, ausgewogenen und hohen Sätzen an [agot_bank_dividends|E] wählen."
 set_dividend_level_decision_tooltip_confirm_text_desc:0 "Ich werde die Unternehmensstrategie der Bank neu bewerten."
 set_dividend_level_decision_effect:0 "Ihr könnt zwischen niedrigen, ausgewogenen und hohen [Concept('agot_bank_dividends','Dividendensätzen')|E] wählen."

 show_bank_numbers_decision:0 "Hauptbuch einsehen"
 show_bank_numbers_decision_confirm:0 "Lasst uns einen Blick in die Bücher werfen."
 show_bank_numbers_decision_desc:0 "Die [ROOT.Char.Custom('agot_bank_name')] hat eine Vielfalt an finanziellen Vermögenswerten und Verbindlichkeiten, die in ihrem Hauptbuch eingesehen werden können. Dies zeigt, wie viel die Bank derzeit zur Hand hat und wie viel sie in Zukunft einnehmen kann."
 show_bank_numbers_decision_tooltip:0 "Lasst uns einen Blick in die Bücher werfen"
 show_bank_numbers_decision_effect:0 "Ihr erhaltet einen Überblick über alle derzeitigen Kennzahlen der Bank."

 # delegate_defaulter_handling_decision:0 "Delegate Management of Defaults"
 # delegate_defaulter_handling_decision_desc:0 "I no longer wish to manage debtors who are defaulting on their debts. Instead, a shareholder will be tasked with overseeing, handling, and resolving these cases."
 # delegate_defaulter_handling_decision_tooltip:0 "You will no longer receive messages about debtors defaulting."
 # delegate_defaulter_handling_decision_confirm:0 "Do not bother me with this."
 # delegate_defaulter_handling_decision_effect:0 "You will no longer receive messages about debtors defaulting. A shareholder will automatically be tasked with handling defaults."

 # handle_defaulters_again_decision:0 "Manage Defaults"
 # handle_defaulters_again_decision_desc:0 "I am willing to resume managing defaulting debtors personally."
 # handle_defaulters_again_decision_tooltip:0 "You will receive a message each time a default occurs."
 # handle_defaulters_again_decision_confirm:0 "It is my duty to handle such cases."
 # handle_defaulters_again_decision_effect:0 "You will receive reports of loan defaults again."

 fill_investment_fund_decision:0 "Investmentfonds auffüllen"
 fill_investment_fund_decision_desc:0 "Als [agot_bank_director|E] der [ROOT.Char.Custom(‚agot_bank_name‘)] habt Ihr die Möglichkeit, den Investitionsfonds der Bank zu vergrößern. Das Geld in diesem Fonds wird in kleine Unternehmen und Projekte investiert und bietet Chancen auf dauerhafte Gewinne. Allerdings besteht bei investiertem Geld immer das Risiko, dass es vollständig verloren geht, was die Liquidität der Bank gefährden könnte. Ein gutes Verständnis der Nachhaltigkeit und Zuverlässigkeit der Investitionsmöglichkeiten ist der Schlüssel zu einer guten langfristigen Leistung."
 fill_investment_fund_decision_tooltip:0 "Ihr könnt alle zwei Jahre 1000 Gold investieren. Die Leistung des Investmentfonds hängt von der aktuellen Verwaltungfähigkeit des Direktors ab."
 fill_investment_fund_decision_tooltip_confirm_text_desc:0 "Die Bank soll gedeihen."
 fill_investment_fund_decision_effect:0 "Ihr werdet 1000 Gold aus der Bargeldreserve der Bank in den Investmentfonds übertragen. Geld im Investmentfonds ist gebunden und kann nicht abgezogen werden."

 agot_banking.0215.t:0 "Wahl eines neuen Direktors"
 agot_banking.0215.desc:0 "Die Zeit ist gekommen, den nächsten [agot_bank_director|E] der [ROOT.Char.Custom('agot_bank_name')] zu wählen.\n\nEin Anteilseigner muss in das Amt gewählt werden, um die Bank in eine prosperierende Zukunft zu lenken. Die vier Anteilseigner, die die meisten Anteile in der Bank besitzen, sind Kandidaten für die Führung.\n\nJeder Anteilseigner kann für einen Kandidaten abstimmen, dabei zählt jeder Anteil als eine Stimme. Der Wahlsieger ist der Kandidat mit den meisten Stimmen.\n\nWer erhält Eure Stimmen?"
 agot_banking.0215.a:0 "Ich stimme für [director_candidate1.GetTitledFirstName]."
 agot_banking.0215.b:0 "[director_candidate2.GetTitledFirstName] hat meine Unterstützung."
 agot_banking.0215.c:0 "[director_candidate3.GetTitledFirstName] ist die weiseste Wahl."
 agot_banking.0215.d:0 "Ich wähle [director_candidate4.GetTitledFirstName]."

 agot_banking.1001.t:0 "Eine Bank wählen"
 agot_banking.1001.desc:0 "Es gibt mehrere [agot_banks|E], die Darlehen vergeben. Welche soll kontaktiert werden?"
 agot_banking.1001.a:0 "Ich wähle die Eiserne Bank von Braavos."
 agot_banking.1001.low_interest:0 "Das [agot_bank_interest_rate|E]-Niveau bei dieser Bank ist #difficult_easy derzeit reduziert#!."
 agot_banking.1001.medium_interest:0 "Das [agot_bank_interest_rate|E]-Niveau bei dieser Bank ist #difficult_medium derzeit ausgewogen#!."
 agot_banking.1001.high_interest:0 "Das [agot_bank_interest_rate|E]-Niveau bei dieser Bank ist #difficult_hard derzeit erhöht#!."
 agot_banking.1001.b:0 "Ich wähle die [director_bank1.Custom('agot_bank_name')]."
 agot_banking.1001.c:0 "Ich wähle die [director_bank2.Custom('agot_bank_name')]."
 agot_banking.1001.d:0 "Ich wähle die [director_bank3.Custom('agot_bank_name')]."
 agot_banking.1001.e:0 "Ich habe es mir anders überlegt."

 set_interest_level_decision:0 "Zinssätze anpassen"
 set_interest_level_decision_desc:0 "Als [agot_bank_director|E] der [ROOT.Char.Custom('agot_bank_name')] könnt Ihr das allgemeine [agot_bank_interest_rate|E]-Niveau neu vergebener Darlehen anpassen."
 set_interest_level_decision_tooltip:0 "Ihr könnt zwischen niedrigeren, normalen und höheren Zinssätzen wählen. Je niedriger der Zinssatz, desto mehr Kunden werdet Ihr anziehen, und desto niedriger werden Eure [agot_bank_profits|E] je Darlehen sein, und umgekehrt."
 set_interest_level_decision_tooltip_confirm_text_desc:0 "Ich werde die Geschäftsstrategie der Bank neu bewerten."
 set_interest_level_decision_effect:0 "Ihr könnt zwischen niedrigeren, ausgewogenen und höheren Zinssätzen wählen. Je niedriger der Zinssatz, desto mehr Kunden werdet Ihr anziehen, und desto niedriger werden Eure [agot_bank_profits|E] je Darlehen sein, und umgekehrt."

 agot_banking.0208.t:0 "Festlegen des Zinssatzniveaus"
 agot_banking.0208.desc:0 "Als [agot_bank_director|E] der [ROOT.Char.Custom('agot_bank_name')] obliegt es mir, über das allgemeine [agot_bank_interest_rate|E]-Niveau neu vergebener Darlehen zu entscheiden. Je niedriger der Zinssatz, desto mehr Kunden könnte ich anziehen, doch desto niedriger werden meine [agot_bank_profits|E] je Darlehen sein, und umgekehrt."
 agot_banking.0208.a:0 "Wir müssen wettbewerbsfähiger werden."
 agot_banking.0208.a_tt:0 "Der jährliche Zinssatz wird um ein Prozent reduziert. Dies wird mehr Kunden anziehen, während die Gewinne je Kunde abnehmen."
 agot_banking.0208.b:0 "Eine ausgewogene Strategie ist nachhaltiger."
 agot_banking.0208.b_tt:0 "Der jährliche Zinssatz wird auf das Standardniveau gesetzt."
 agot_banking.0208.c:0 "Wir müssen profitabler sein."
 agot_banking.0208.c_tt:0 "Der jährliche Zinssatz wird um ein Prozent erhöht. Dies wird weniger Kunden anziehen, während die Gewinne je Kunde steigen."

 found_bank_decision:0 "Eine neue Bank gründen"
 found_bank_decision_desc:0 "Nachdem Ihr genügend Reichtum und wirtschaftliche Erfahrung erlangt habt, möchtet Ihr vielleicht Euren Wohlstand durch die Gründung einer neuen [agot_bank|E] mehren."
 found_bank_decision_tooltip:0 "Eine neue Bank wird in Eurem Hauptsitz errichtet. Ihr werdet der erste [agot_bank_director|E] der Bank, und jeder Charakter in Eurem Reich kann Geld in die neue Bank investieren, um Anteilseigner zu werden."
 found_bank_decision_tooltip_confirm_text_desc:0 "Zu Wohlstand!"
 not_in_a_megawar_realm:0 "Euer Reich darf nicht im Krieg gespalten sein"
 agot_found_bank_decision_effect_tooltip:0 "Eine neue [agot_bank|E] wird in Eurem Hauptsitz errichtet. Ihr werdet der erste [agot_bank_director|E] der Bank, und jeder Charakter in Eurem Reich kann Geld in die neue Bank investieren, um Anteilseigner zu werden."

 rename_bank_decision:0 "Bank umbenennen"
 rename_bank_decision_desc:0 "Namen bergen Macht. In letzter Zeit bin ich besorgt, dass die [ROOT.Char.Custom('agot_bank_name')] nicht das Vertrauen genießt, das sie sollte. Ein neuer Name könnte ihrem Ansehen neues Gewicht verleihen und dazu beitragen, mehr Vertrauen und höhere Investitionen zu gewinnen."
 rename_bank_decision_tooltip:0 "Einen neuen Namen für Eure Bank wählen"
 rename_bank_decision_tooltip_confirm_text_desc:0 "Gebt ihr einen Namen, der es wert ist, erinnert zu werden."
 agot_rename_bank_decision_effect_tooltip:0 "Ihr könnt einen neuen Namen für die Bank wählen."

 agot_banking.0601.t:0 "Eine neue Bank"
 agot_banking.0601.desc:0 "Heute hat eine neue Bank ihre Türen geöffnet, und ich werde ihr erster [agot_bank_director|E] sein. Die Bank wird sofort mit der Vergabe von Darlehen beginnen, und neue Investoren werden gefunden, um den Wohlstand der Bank zu stärken.\n\nWie soll die neue Bank heißen?"
 agot_banking.0601.a:0 "Die Zukunft ist vielversprechend!"

 agot_banking.0602.t:0 "Ein neuer wichtiger Schuldner"
 agot_banking.0602.desc:0 "Heute hat die [messaged_director.Custom('agot_bank_name')] die enorme Summe von [NewDebtor.MakeScope.Var('loaned_amount').GetValue|2|P] Gold an [NewDebtor.GetTitledFirstName] geliehen. Dies macht [NewDebtor.Custom('DE_PRO_PER_S_3P_A')] zu einem unserer größten Kunden."
 agot_banking.0602.a:0 "Ein Vergnügen, mit Euch Geschäfte zu machen."

 agot_banking.0607.t:0 "Das Gewicht eines Namens"
 agot_banking.0607.desc:0 "Ein Name kann Wahrnehmung formen, Vermächtnis definieren und Gewicht tragen, das weit über Münzen hinausgeht. Als Direktor der Bank fällt mir nun das Privileg – und die Macht – zu, sie umzubenennen. Der derzeitige Name hat seine Zeit gedient... doch ich glaube, er ist nicht länger ausreichend. Wenn diese Institution meine Ambitionen widerspiegeln soll, dann muss sie einen Namen tragen, der ihnen würdig ist."
 agot_banking.0607.a:0 "Ein passender Name."

 show_shareholders_decision:0 "Anteilseigner einsehen"
 show_shareholders_decision_desc:0 "Die Schreiber der [ROOT.Char.Custom('agot_bank_name')] werden Euch eine Liste der derzeitigen Anteilseigner der Bank zur Verfügung stellen."
