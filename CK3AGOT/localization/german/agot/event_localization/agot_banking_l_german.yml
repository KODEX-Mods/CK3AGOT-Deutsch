 agot_banking.0604.t:0 "Die [ROOT.Char.Custom('agot_bank_name')] und ihre größten Schuldner"
 agot_banking.0604.desc:0 "Die [ROOT.Char.Custom('agot_bank_name')] hat viele Schuldner. Hier seht ihr die wichtigsten, absteigend sortiert nach geschuldetem Betrag (geliehener Betrag zuzüglich Zinsen):"
 agot_banking.0604.a:0 "Habt Dank."

