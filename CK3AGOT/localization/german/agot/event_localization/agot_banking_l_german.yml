 agot_banking.0605.t:0 "Alle bekannten Banken der Welt"
 agot_banking.0605.desc:0 "Dies sind die Bankdirektoren und die Bankwerte der derzeit in der bekannten Welt tätigen Banken:"
 agot_banking.0605.a:0 "Vielen Dank."

 agot_banking.0211.letter4_failed_desc:0 "Schlechte Nachrichten: [FinalDefaulter.GetTitledFirstNameNoTooltip] hat unser großzügiges Angebot für einen neuen Tilgungsplan rundweg abgelehnt.\n\nWir werden etwas... Direkteres versuchen müssen..."
 agot_banking.0212.letter3_success_desc:0 "Es war erfolgreich!\n[FinalDefaulter.GetTitledFirstNameNoTooltip] hat unserem großzügigen Angebot zugestimmt, die Strafgebühr gezahlt und gelobt, [FinalDefaulter.Custom('DE_PRO_POS_S_3P')]e volle Schuld innert 3 Jahren zurückzuzahlen."

 agot_banking.0211.f:0 "Einen Brief an [FinalDefaulter.GetTitledFirstName] senden."
 agot_banking.0211.f_tt:0 "Dies wird die Bank @gold_icon! [default_revisor.MakeScope.Var('LetterCost').GetValue] kosten. Wir werden [FinalDefaulter.GetTitledFirstName] einen neuen Tilgungsplan anbieten: Wir können die endgültige Rückzahlung um weitere 3 Jahre aufschieben, doch [FinalDefaulter.GetTitledFirstName] muss sofort eine zusätzliche Strafgebühr in Höhe der Hälfte des zahlbaren Zinsbetrags zahlen."

 agot_banking.1108.t:0 "Ein großzügiges Angebot"
 agot_banking.1108.desc:0 "Es kam ein Brief, in dem die [agot_bank|E] meine mangelnde Bereitschaft zur Rückzahlung meiner Schulden beklagte. Um eine für beide Seiten zufriedenstellende Lösung zu finden, schlägt die Bank einen neuen Tilgungsplan vor: Ich muss umgehend eine Strafgebühr in Höhe der Hälfte der fälligen Zinsen zahlen. Im Gegenzug wird die endgültige Rückzahlung um weitere drei Jahre aufgeschoben."
 agot_banking.1108.a:0 "Ein gerechter Vorschlag."
 agot_banking.1108.a_tt:0 "Euer Darlehen wird fortgesetzt, und die Rückzahlung ist in drei Jahren fällig."
 agot_banking.1108.b:0 "Ich muss gar nichts! Diese Räuber!"
 agot_banking.1108.b_tt:0 "Ihr lehnt das Angebot der Bank ab. Dies könnte zu einer schärferen Reaktion führen...."

 agot_banking.0606.t:0 "Ein neuer Anteilseigner"
 agot_banking.0606.desc:0 "Heute hat die [ROOT.Char.Custom('agot_bank_name')] einen neuen Anteil an [NewShareholder.GetTitledFirstName] vergeben."

 bank_name_default:0 "Bank von [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetNameNoTierNoTooltip]"
 bank_name_default_IB:0 "Eiserne Bank von Braavos"
 bank_name_default_Rogare:0 "Rogare-Bank"
 bank_name_default_blank:0 ""
 bank_name_fallback:0 "[ROOT.Char.GetCulture.GetNameNoTooltip]e Bank"

 bank_name_normal:0 "[ROOT.Var('BankName').Char.GetLocalizedText( 'bank_name' )]"
 bank_name_normal_list:0 "[Character.GetLocalizedText( 'bank_name' )]"

 agot_banking.0700.t:0 "Die Bank wurde aufgelöst"
 agot_banking.0700.desc:0 "Schlimme Nachrichten! Der Hauptsitz unserer Bank befindet sich nun in den Händen von [NewHolder.GetTitledFirstName]. Da [NewHolder.GetHerHis] Reich bereits eine andere Bank hat, hat [NewHolder.GetSheHe] beschlossen, unsere Bank aufzulösen, um den Wettbewerb zu verringern.\n\nAlle Anteilseigner erhalten einen Bruchteil der aktuellen Bargeldreserven der Bank. Danach wird die Bank nicht mehr existieren."
 agot_banking.0700.a:0 "Und so endet dieses Unterfangen."

 event_window_widget_enter_bank_name_prompt:0 "Wählt den Banknamen (beginnt nicht mit „Die“, und aufgrund grammatikalischer Schönheitsprobleme in der deutschen Übersetzung sollte sie entweder „Bank von/der/des...“ oder „...bank“ heißen, nicht aufgeteilt in „... Bank“):"

 agot_banking.0701.t:0 "Eine Bank plündern?"
 agot_banking.0701.desc:0 "Der Geruch von Asche und der Lärm ausgelassener Krieger liegen in der Luft um mich herum. Meine Truppen haben erfolgreich [barony.GetNameNoTierNoTooltip] belagert, den Sitz der berühmten [bank_shareholder.Custom(‚agot_bank_name‘)].\n\nVor uns liegt eine verlockende Gelegenheit: Sicherlich bergen die Schatzkammern dieser Bank üppige Schätze und unvorstellbaren Reichtum... Und da wir die Kontrolle über das Besitztum haben, ist die Bank meinen Truppen schutzlos ausgeliefert.\n\nDoch eine solche Handlung würde nicht unbemerkt bleiben. Die Bank würde diese Aggression nicht unbeantwortet lassen..."
 agot_banking.0701.a:0 "Ich kann diese Gelegenheit nicht vergeuden!"
 agot_banking.0701.b:0 "Die [bank_shareholder.Custom('agot_bank_name')] ist nicht mein Feind."

 agot_banking.0702.t:0 "Die Bank wurde geplündert"
 agot_banking.0702.desc:0 "Nach der Belagerung von [barony.GetNameNoTierNoTooltip] hat der Angreifer [bank_raider.GetTitledFirstNameNicknamed] beschlossen, das Hauptquartier unserer Bank zu plündern, und [bank_raider.Custom('DE_PRO_POS_S_3P')]e Truppen konnten sich in einige unserer Tresore Zutritt verschaffen. Sie stahlen einen Betrag von [bank_raider.MakeScope.Var('raided_gold').GetValue|2|N] Gold aus unserer Bargeldreserve.\n\nDie Bank muss sich gegen diesen feindlichen Akt mit allen Mitteln verteidigen!\n\nWir können [bank_raider.GetTitledFirstNameNoTooltip] informieren, dass [bank_raider.Custom('DE_PRO_POS_S_3P')]e Handlungen schwere Konsequenzen haben werden – und dass das gestohlene Geld sowie zusätzliche eine Strafe zurückgezahlt werden muss.\n\nFalls [bank_raider.Custom('DE_PRO_PER_S_3P_N')] ablehnt, werden wir [bank_raider.Custom('DE_PRO_PER_S_3P_A')] wie jeden anderen säumigen Schuldner behandeln... #bold hart.#!"
 agot_banking.0702.a:0 "Schickt [bank_raider.Custom('DE_PRO_PER_S_3P_D')] den Brief."
 agot_banking.0702.b:0 "Wir werden keine Maßnahmen ergreifen..."

 agot_banking.0703.t:0 "[raided_director.Custom2('AppropriateGreetingNegative', bank_raider)]"
 agot_banking.0703.desc:0 "Euer Raubüberfall auf unsere Bank bleibt nicht ohne Folgen. Wir bieten euch die einmalige Gelegenheit, das gestohlene Gold zuzüglich einer Strafgebühr zurückzuzahlen. Falls Ihr dies törrichterweise ablehnt, sehen wir uns gezwungen, das Geld auf andere Weise zurückzuerlangen."
 agot_banking.0703.a:0 "Ich werde umgehend Eure Forderung begleichen.."
 agot_banking.0703.b:0 "Ich brauche etwas Zeit für die Rückzahlung."
 agot_banking.0703.b_tt:0 "Das Geld, das Ihr gestohlen habt, wird in ein Darlehen umgewandelt, das in 3 Jahren mit einer Zinsrate von 5% pro Jahr zurückzuzahlen ist."
 agot_banking.0703.c:0 "Pah! Keinen Heller kriegt ihr von mir!"
 agot_banking.0703.c_tt:0 "Ihr verweigert jegliche Zahlungen an die Bank, was sie als Zahlungsausfall behandeln wird..."

 agot_banking.0704.t:0 "Der Plünderer hat gezahlt"
 agot_banking.0704.desc:0 "[bank_raider.GetTitledFirstNameNicknamed] hat nachgegeben und zurückgezahlt, was gestohlen wurde, zuzüglich einer Strafgebühr von 10%."
 agot_banking.0704.a:0 "Kluge Entscheidung."

 agot_banking.0705.t:0 "Der Plünderer hat Rückzahlung versprochen"
 agot_banking.0705.desc:0 "[bank_raider.GetTitledFirstNameNicknamed] hat nachgegeben und gelobt, was gestohlen wurde, innert der nächsten 3 Jahre zurückzuzahlen. Wir werden dies als Darlehen mit einer jährlichen Zinsrate von 5% betrachten."
 agot_banking.0705.a:0 "Hoffen wir, dass [bank_raider.Custom('DE_PRO_PER_S_3P_N')] sich an die Vereinbarung hält."

 gift_share_interaction:0 "Einen Bankanteil schenken"
 gift_share_interaction_desc:0 "Dem Charakter einen Eurer Bankanteile schenken"
 gift_share:0 "Da."

 take_share_interaction:0 "Bankanteile wegnehmen"
 take_share_interaction_desc:0 "Alle Bankanteile eines Hausmitglieds übernehmen"
 take_share:0 "Gib!"

 agot_banking.0801.t:0 "Ein drohender Bankrott"
 agot_banking.0801.desc:0 "Die [ROOT.Char.Custom(‚agot_bank_name‘)] verfügt nicht über ausreichende Bargeldreserven, um ihre laufenden Kosten zu decken. Alle Anteilseigner werden daher dringend gebeten, schnellstmöglich zusätzliche Anteile zu erwerben, um eine Insolvenz zu vermeiden.\n\nSollten nicht genügend Mittel aufgebracht werden können, wird die Bank gezwungen sein, ihre Pforten endgültig zu schließen."
 agot_banking.0801.a:0 "Ich werde meinen Teil beitragen."
 agot_banking.0801.b:0 "Ich verlasse mich auf die anderen Anteilseigner."

 agot_banking.0803.t:0 "Bankrott"
 agot_banking.0803.desc:0 "Katastrophe!\n\nDie [ROOT.Char.Custom(‚agot_bank_name‘)] konnte nicht genügend neue Investitionen mobilisieren, um ihre laufenden Kosten zu decken. Infolgedessen ist die Bank nun endgültig bankrott und wird ihren Betrieb dauerhaft einstellen."
 agot_banking.0803.a:0 "Meine Investition ist verloren..."

 agot_banking.0804.t:0 "Die Bank ist gerettet"
 agot_banking.0804.desc:0 "Dank der Bereitschaft von ausreichend vielen Anteilseignern, ihre Investitionen zu erhöhen, konnte die drohende Pleite der Bank abgewendet werden."
 agot_banking.0804.a:0 "Welche Erleichterung!"
