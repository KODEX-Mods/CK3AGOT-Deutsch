 deepen_bond_with_dragon_scheme_invalidated_title: "Komplott zur Vertiefung der Drachenbindung endet"
 deepen_bond_with_dragon_scheme_invalidated_dead: "[target.GetName] ist gestorben. Ihr könnt die Verbundenheit nicht mehr vertiefen."
