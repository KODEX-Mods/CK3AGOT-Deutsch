l_german:

  # Bonding results
  # Bond with untamed/wild dragon
 dragon_bond_events.1000.t: "Ein geschmiedeter Bund"
 dragon_bond_events.1000.desc: "[target.GetNameNicknamed]. Ist. #bold MEIN!#!\n\nMan sagt, niemand könne das Herz eines Drachen ergründen, doch [target.GetNameNoTooltip] hat das meine erblickt, und [target.Custom('GetDragonSheHe')] hat es für würdig befunden. Wir sind nun verbunden, eine Vereinigung aus Blut und Fleisch und Feuer.\n\nVon [ROOT.Char.GetCapitalLocation.GetName] bis zu den Schattenlanden jenseits von Asshai sei es kundgetan, dass ich, [ROOT.Char.GetFullNameNoTooltip], den Drachen [target.GetNameNoTooltip] als den meinen beanspruche. Lasset die [GetPlayer.Custom('KnightCulturePluralNoTooltipLowercase')] des Hauses [ROOT.Char.GetHouse.GetNameNoTooltip] frohlocken, denn ein neuer [Concept('owned_dragon','Drache')|E] steigt in die Lüfte.\n\n[ROOT.Char.GetHouse.GetMotto]!"
 dragon_bond_events.1000.a: "Solange ich atme, werde ich diesen Tag nimmer vergessen."

 dragon_bond_events.1001.t: "[target.GetNameNoTooltip] verweigert den Bund"
 dragon_bond_events.1001.desc: "Unheil erfüllt mich, als ich die Höhle [target.GetNameNicknamed] durchschreite. Obgleich jede Faser meines Leibes mich anfleht, nach draußen zurückzukehren, zwinge ich mich zu einem Schritt, dann einem weiteren, bis ich nur noch Fingerbreit von [target.GetNameNoTooltip] entfernt bin. Der [Concept('owned_dragon','Drache')|E] regt sich bei meiner Annäherung, abgelenkt vom verbrannten Tier ([GetPlayer.Custom('RegionalEdibleAnimal')]), das zwischen [target.Custom('GetDragonHerHis')]en Kiefern klemmt. [target.Custom('GetDragonHerHis')|U]e Augen verfolgen mich mit arglistiger Neugier, gleich einer Katze, die eine Amsel beäugt.\n\nDie letzten Reste meines Mutes zusammennehmend, strecke ich meine Hand der Kreatur entgegen. Als meine Finger nur noch eine Handbreit entfernt sind, stürzt [target.GetNameNoTooltip] plötzlich auf mich zu, [target.Custom('GetDragonHerHis')]e [target.Custom('GetDragonColor')]en Kiefer schnappen nur knapp an meinen Fingern vorbei. [target.Custom('GetDragonSheHe')|U] bäumt sich zu [target.Custom('GetDragonHerHis')]er vollen Größe auf, [target.GetNameNoTooltip] brüllt warnend, und ich erblicke orangene Flammenzungen hinter [target.Custom('GetDragonHerHis')]en Fängen aufsteigen. Panik schießt durch meine Adern,ch fliehe aus der Höhle und halte erst an, als ich mich im Schutze meiner [GetPlayer.Custom('KnightCulturePluralNoTooltipLowercase')] wiederfinde."
 dragon_bond_events.1001.a: "[ROOT.Char.GetFaith.DevilName] soll diese [ROOT.Char.Custom('InsultAdjective')]e  Schlange holen!"

dragon_bond_events.1002.t: "[target.GetNameNoTooltip]: Sengende Zurückweisung"
 dragon_bond_events.1002.desc: "Beklommenheit erfüllt mich, als ich mich dem [Concept.('dragon', 'Drachen')|E] [target.GetNameNicknamed] nähere. Doch diese Furcht wird mehr als aufgewogen durch meine Erwartung. Welch[Select_CString( ROOT.Char.IsFemale, 'es', 'er' )] [ROOT.Char.GetCulture.GetNameNoTooltip]e [ROOT.Char.Custom('GirlBoy')] träumte nicht in seiner Jugend davon, sich einen Drachen zum Freund zu machen? Und welch[ROOT.Char.Custom('DE_END_ADJ_NUL_S_N')] [ROOT.Char.GetTitleAsNameNoTooltip] würde heute nicht nach solcher Macht greifen, ungeachtet der Gefahren?\n\nMeine Kindheitsfantasien jedoch schwinden, als ich mich der Bestie nähere. [target.GetNameNoTooltip] ist sichtlich erregt: [target.Custom('GetDragonSheHe')|U] kauert tief am Boden, die gewaltigen Augen scheinen die meinen zu durchbohren, und [target.Custom('GetDragonHerHis')]e [target.Custom('GetDragonColorFull')] geschuppte Schwanzspitze schwingt unheilverheißend. Doch für Zweifel ist es zu spät, und der einzige Weg führt vorwärts. Ich strecke meine Hand [target.Custom('GetDragonHerHis')]er nun fauchenden Schnauze entgegen und beginne, die uralten valyrischen Worte der Besänftigung zu sprechen: #italic Lykirī! Ryptē—#!\n\nKaum habe ich angesetzt, da füllt sich mein Blickfeld mit Flammen und meine Welt mit Schmerz. Dann #bold schreie#! ich laut auf!.\n\nMit dem Kopf schwer von Mohnblumensaft erwache ich später in meinem Bett in [ROOT.Char.GetCapitalLocation.GetName]. Ich bin in eitrige Verbände gewickelt, vom Scheitel bis zum Nabel – und leide Qualen. Doch, vielleicht bedauerlicherweise, bin ich am Leben."

 dragon_bond_events.1003.t:0 "[target.GetNameNoTooltip] '[ROOT.Char.GetTitleAsNameNoTooltip|U]verbrenner[ROOT.Char.Custom('DE_END_NOU_S_GS_N')]'"
 dragon_bond_events.1003.desc:0 "Der Tag ist gekommen, an dem ich mich endlich mit dem [Concept.('dragon', 'Drachen')|E] [target.GetNameNoTooltip] verbinden werde. [ROOT.Char.GetHouse.GetMotto]!\n\nIch lasse meine [GetPlayer.Custom('KnightCulturePluralNoTooltipLowercase')] vor der Höhle von [target.GetNameNoTooltip] zurück und betrete sie allein. Über verkohlte Gerippe schreitend, nähere ich mich [target.Custom('GetDragonHerHis')]er trägen Gestalt, die sich um eine Felssäule geschlungen hat. [target.GetNameNoTooltip] regt sich nicht, als ich mich nähere, und öffnet nur ein einzelnes Auge, um mich flüchtig zu mustern, ehe [target.Custom('GetDragonSheHe')] in [target.Custom('GetDragonHerHis')]en Schlummer zurücksinkt. [target.Custom('GetDragonSheHe')] döst einfach weiter? Welch Dreistigkeit! Ich bin [Select_CString( ROOT.Char.IsFemale, 'eine Frau', 'ein Mann' )] aus [ROOT.Char.GetCapitalLocation.GetName] und lasse mich nicht abweisen!\n\nWährend ich mich zu meiner vollen Größe aufrichte, befehle ich dem Drachen in den valyrischen Worten, die ich mir für diesen Augenblick eingeprägt habe: #italic Rȳbās! Dohaerās!#! Doch [target.GetNameNoTooltip] regt sich nicht. Ich schreie, ich brülle, ich stampfe mit den Füßen, doch alles ist vergebens. Voller Verzweiflung ergreife ich einen Knochen in meiner Nähe und schleudere ihn gegen den Drachen, wo er klappernd an [target.Custom('GetDragonHerHis')]em Hals abprallt.\n\nEndlich bemerkt mich [target.GetNameNoTooltip]! Langsam, träge wendet [target.Custom('GetDragonSheHe')] [target.Custom('GetDragonHerHis')]en Kopf zu mir, ohne sich auch nur vom Boden zu erheben. Und dann kommen die Flammen. Sie sind das Letzte, was ich je erblicke."
 dragon_bond_events.1003.a:0 "Es brennt, es brennt! Mama! Mami! #strong_glow;R ES BRENNT!#!"

  # Bonding
dragon_bond_events.t: "Bindung mit [target.GetNameNoTooltip]:"

  # Deepen Bond Results
 dragon_bond_events.2001.t: "$dragon_bond_events.t$ Wohl genutzte Zeit"
 dragon_bond_events.2001.desc: "Die Wochen des Übung, der Gewöhnung und der Vertrautheit, die ich mit [target.GetName] verbracht habe, tragen endlich Früchte. Ob wir über [ROOT.Char.GetCapitalLocation.GetName] emporschweben oder in [target.Custom('GetDragonHerHis')]em Hort rasten – [target.GetNameNoTooltip] und ich finden zunehmend Vertrauen zueinander.\n\nMit jedem Tag gleichen wir weniger einem bloßen Gespann aus Reiter und Reittier und mehr wahrhaftigen Gefährten, verbunden durch aufrichtige Bande des Vertrauens und der Zuneigung.\n\nVielleicht vermag niemand je das Herz eines Drachen wahrhaft zu ergründen, doch ich glaube, die Seele dieses einen zu kennen."
 dragon_bond_events.2001.a: "Gemeinsam werden wir die Legende von [ROOT.Char.GetFirstName] und [target.GetName] schreiben."

 dragon_bond_events.2002.t: "$dragon_bond_events.t$ Gemischte Ergebnisse"
 dragon_bond_events.2002.desc: "Von Tag zu Tag wird deutlicher, dass meine Bemühungen, mich [target.GetName] anzunähern, nicht fruchten.\n\nEs scheint, als folgten auf jeden Tag, an dem wir in gemeinsamem Vertrauen hoch emporstiegen, ein weiterer, an dem wir in entgegengesetzte Richtungen streben. Die Bande zwischen uns sind zwar nicht schwächer geworden, doch auch nicht erstarkt, und ich sehe mich genötigt, zu unserem früheren, zurückhaltenderen Bund zurückzukehren."
 dragon_bond_events.2002.a: "Enttäuschend..."

  # Scheme Events - These are the events that fire as part of the scheme.
 dragon_bond_events.3000.t: "$dragon_bond_events.t$ Teures Fleisch"
 dragon_bond_events.3000.desc: "Der [dragon|E] [target.GetNameNicknamed] ist ein launisches Geschöpf. An manchen Tagen begehrt [target.Custom('GetDragonSheHe')] nichts sehnlicher, als [target.Custom('GetDragonHerHis')]e Schwingen zu strecken und durch [target.Custom('GetDragonHerHis')]en Hort in [ROOT.Char.GetCapitalLocation.GetNameNoTooltip] zu tollen, während es am nächsten Tag schier unmöglich ist, den Drachen aus [target.Custom('GetDragonHerHis')]em Schlummer zu locken.\n\nDie Gelüste von [target.GetNameNoTooltip] sind ebenso wechselhaft, und obgleich [target.Custom('GetDragonSheHe')] noch stets das zerteilte Wild verzehrt, das meine Diener herabschaffen, erwäge ich, aus der Küche erlesnere Kost zu bestellen. Gewiss würde ein feiner Leckerbissen [target.GetNameNoTooltip] und mich einander näherbringen."
 dragon_bond_events.3000.a: "[target.GetNameNoTooltip] soll speisen wie [ROOT.Char.Custom('DE_ART_DEF_S_N')] [ROOT.Char.GetTitleTierName]. Ich werde verkohltes Hammelfleisch bringen lassen."
 dragon_bond_events.3000.b: "[target.Custom('GetDragonSheHe')|U] hat einen feinen Gaumen. Ich werde angebratenes Schweinefleisch bringen lassen."
 dragon_bond_events.3000.c: "Drachen sind für den Krieg geschaffen, nicht für Gelage. [target.Custom('GetDragonSheHe')|U] wird keine #italic Leckerbissen#! erhalten..."

 dragon_bond_events.3001.t: "$dragon_bond_events.t$ Lecker Lecker"
 dragon_bond_events.3001.desc: "Die Küchen von [target.GetCurrentLocation.GetNameNoTooltip] arbeiten die ganze Nacht hindurch an dem Mahl für [target.GetName]. Das Fleisch ist zart und saftig, und seine goldene, gebutterte Kruste knistert, beinahe berstend vor der Füllung darin. Einige meiner [GetPlayer.Custom('KnightCulturePluralNoTooltipLowercase')] blicken sehnsüchtig auf das Fleisch, als es aus den Küchen verladen wird, doch diese Köstlichkeit gebührt allein [ROOT.Char.Custom('DE_ART_IND_D')] [ROOT.Char.GetTitleTierName] — oder einem [Concept('dragon','Drachen')|E].\n\nIch schiebe den Karren in den Hort von [target.GetNameNoTooltip] und bin im Begriff zu rufen, als der Drache aus dem Nichts herbeigestürmt kommt und nur wenige Schritte entfernt schlitternd zum Stehen kommt. [target.Custom('GetDragonHerHis')|U] Kopf schwenkt zwischen mir und dem Karren hin und her, und obgleich [target.Custom('GetDragonSheHe')] drauf und dran scheint, sich auf [target.Custom('GetDragonHerHis')]en verlockenden Preis zu stürzen, hält [target.Custom('GetDragonSheHe')] sich zurück. Erfreut, [target.GetNameNoTooltip] so folgsam zu sehen, spreche ich die Worte, nach denen [target.Custom('GetDragonSheHe')] sich so sehnt: #italic Havor zaldrīzes!#!\n\nKaum haben die Worte meine Lippen verlassen, da fällt [target.GetNameNoTooltip] über das Fleisch her. Ich habe [target.Custom('GetDragonHerHim')] seit Monden nicht so glücklich gesehen."
 dragon_bond_events.3001.a: "Guten Appetit, mein Drache!"

 dragon_bond_events.3002.t: "$dragon_bond_events.t$ Teures Fleisch verschmäht"
 dragon_bond_events.3002.desc: "Die Küchen arbeiten die ganze Nacht hindurch an dem Mahl für [target.GetName]. Das Fleisch ist zart, und seine goldene Kruste knistert unter dem berstenden Gewicht einer saftigen Füllung. Einige meiner [GetPlayer.Custom('KnightCulturePluralNoTooltipLowercase')] blicken neidisch auf das Fleisch, als es aus den Küchen verladen wird, doch diese erlesene Kost gebührt allein [ROOT.Char.Custom('DE_ART_IND_D')] [ROOT.Char.GetTitleTierName] — oder einem [Concept('dragon','Drachen')|E].\n\nIch schiebe den Karren in den Hort von [target.GetNameNoTooltip] und bin im Begriff, nach [target.GetNameNoTooltip] zu rufen, als ich von einem wirbelnden Knäuel aus Schuppen und Muskeln zu Boden gerissen werde. [target.GetNameNoTooltip] fällt mit gieriger Inbrunst über das Fleisch her, [target.Custom('GetDragonHerHis')]e gewaltigen Kiefer machen kurzen Prozess mit den Verschlägen des Karrens, um an das Festmahl darin zu gelangen."
 dragon_bond_events.3002.a: "Verdammt!"

 dragon_bond_events.3003.t: "$dragon_bond_events.t$ Ein lebendiger Leckerbissen"
 dragon_bond_events.3003.desc: "Obgleich es bisweilen angenehm ist, es zu vergessen und sich einzureden, sie könnten so folgsam sein wie der treueste Jagdhund, so sind [Concept('dragon','Drachen')|E] am Ende doch Raubtiere. Meine Besorgnis wächst, dass [target.GetName] zunehmend an der Eintönigkeit [target.Custom('GetDragonHerHis')]er Gefangenschaft verzweifelt und dass dies unseren fragilen Bund belastet.\n\nObwohl es gewiss ein dürftiger Ersatz für die Freuden einer wahren Jagd wäre, erwäge ich, einige Schweine oder Schafe in [target.Custom('GetDragonHerHis')]en Hort zu treiben. Wenngleich ich daran gearbeitet habe, [target.GetNameNoTooltip] [target.Custom('GetDragonHerHis')]e gewalttätigeren Neigungen abzugewöhnen, so würde etwas lebendiger Zeitvertreib vielleicht willkommen sein."
 dragon_bond_events.3003.a: "Lasst eine kleine Herde Schafe frei."
 dragon_bond_events.3003.b: "Lockt einen Trupp Schweine in den Hort."
 dragon_bond_events.3003.c: "Zum Töten wird noch Zeit genug sein. Belasst es bei [target.Custom('GetDragonHerHis')]er gewohnten Kost."

 dragon_bond_events.3004.t: "$dragon_bond_events.t$ Ein goutierter Leckerbissen"
 dragon_bond_events.3004.desc: "Die Jagd hat meine Erwartungen übertroffen. Anstatt [target.Custom('GetDragonHerHis')]e Beute schlicht zu erlegen, hat [target.GetName] ein wundervolles Spiel daraus gemacht. Obgleich die Tiere keine wahre Gefahr für den Drachen darstellen, lässt sich [target.GetNameNoTooltip] Zeit, die Gruppe zu belauern, das schwächste Glied auszumachen, ehe [target.Custom('GetDragonSheHe')] es mit [target.Custom('GetDragonHerHis')]en Kiefern packt und sich zurückzieht.\n\nDies wiederholt sich über mehr als eine Stunde, bis [target.GetNameNoTooltip] zufrieden ist, und zu diesem Zeitpunkt ist der Boden mit Eingeweiden bedeckt, und der Schwanz von [target.GetNameNoTooltip] schwingt vor Wohlgefallen. Nachdem [target.Custom('GetDragonHerHis')] Durst nach Aufregung und Blut gestillt ist, kann ich mich [target.GetNameNoTooltip] viel näher als sonst nähern und ihm sogar [target.Custom('GetDragonHerHis')]en Bottich Wasser bringen, den [target.Custom('GetDragonSheHe')] gierig hinunterschlürft."
 dragon_bond_events.3004.a: "Wir sind beide im Herzen wild..."

 dragon_bond_events.3005.t: "$dragon_bond_events.t$ Ein zu guter Leckerbissen"
 dragon_bond_events.3005.desc: "Wenngleich es einen guten Teil des Tages in Anspruch nahm, gelingt es meinen Bediensteten und mir, auch das letzte Vieh in ein behelfsmäßiges Gatter unweit des Hortes von [target.GetName] zu treiben. Daraufhin begebe ich mich in sicherer Entfernung in Stellung, um [target.Custom('GetDragonHerHis')]e Ankunft abzuwarten. [target.Custom('GetDragonSheHe')|U] lässt mich nicht lange warten.\n\nEs ist ein Blutbad. In einem Moment waren die Tiere noch da, lebendig und wohlauf. Und dann ist [target.GetNameNoTooltip] mitten unter ihnen. Im Gegensatz zu anderen Raubtieren, die versuchen würden, die Herde auseinanderzutreiben, ergötzt sich mein [dragon|E] an dem Gemetzel, schnappt mit [target.Custom('GetDragonHerHis')]en Kiefern nach einem der größeren Tiere und zerfleischt dann mit [target.Custom('GetDragonHerHis')]en Klauen ein anderes.\n\nIch beginne, mich [target.GetNameNoTooltip] zu nähern, als [target.Custom('GetDragonSheHe')] das letzte Tier der Herde ausweidet, doch ich erstarre, als [target.Custom('GetDragonSheHe')] sich plötzlich mir zuwendet, [target.Custom('GetDragonHerHis')]e Nüstern gebläht, die Reißzähne drohend entblößt. In Furcht vor [target.Custom('GetDragonHerHis')]er Blutgier weiche ich langsam zurück."
 dragon_bond_events.3005.a: "Nur ein Narr stellt sich zwischen einen Drachen und seine Beute."

 dragon_bond_events.3006.t: "$dragon_bond_events.t$ Rohfütterung"
 dragon_bond_events.3006.desc: "Der [dragon|E] [target.GetNameNicknamed] begegnet mir mit verständlichem Argwohn. Obgleich [target.Custom('GetDragonSheHe')] [Concept('owned_dragon','nicht mehr wirklich wild')|E] ist und manche Annehmlichkeiten [target.Custom('GetDragonHerHis')]es Hortes genießt, vertraut [target.Custom('GetDragonSheHe')] mir nicht und lässt mich nur widerwillig auf hundert Schritt an sich heran. Doch wie alle [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip] wissen, führt der Weg zu eines jeden Herzen durch den Magen. Der von [target.GetNameNoTooltip] ist nur etwas größer als die meisten.\n\nNach Beratung mit den Zwingermeistern von [ROOT.Char.GetCapitalLocation.GetNameNoTooltip] über das Fleisch und Geschlinge, das ihre Hunde bevorzugen, habe ich einen Karren voll frischem Hammel- und Schweinefleisch bestellt. Das Fleisch ist noch nicht vollständig zerlegt, doch die Hundemeister versichern mir, je blutiger, desto besser. Doch welches würde [target.GetNameNoTooltip] vorziehen?"
 dragon_bond_events.3006.a: "[target.GetNameNoTooltip] bevorzugt Wildaromen. Schafft das rohe Hammelfleisch herbei."
 dragon_bond_events.3006.b: "[target.GetNameNoTooltip] liebt milderes Fleisch. Karrt das rohe Schweinefleisch heraus."
 dragon_bond_events.3006.c: "Lasst es gut sein."

 dragon_bond_events.3007.t: "$dragon_bond_events.t$ Ein roher Erfolg"
 dragon_bond_events.3007.desc: "Das Haupt von [target.GetName] erhebt sich neugierig vom Boden, als ich den mit Fleisch beladenen Karren in [target.Custom('GetDragonHerHis')]en Hort schiebe. Auf [target.Custom('GetDragonHerHis')]e Vorderläufe gestützt, nähert sich [target.GetNameNoTooltip] mir langsam, [target.Custom('GetDragonHerHis')]e Augen wandern zwischen mir und meinen blutigen Kostbarkeiten hin und her.\n\nIch wuchte eines der dickeren Stücke empor und schleudere es [target.GetNameNoTooltip] entgegen. Noch ehe das Fleisch den Boden berührt, schnellt [target.GetNameNoTooltip] vor und fängt es in [target.Custom('GetDragonHerHis')]en Kiefern. Zufrieden mit dem Mahl, blickt [target.Custom('GetDragonSheHe')] erwartungsvoll zu mir. Ich komme dem gerne nach. Stück um Stück werfe ich [target.GetNameNoTooltip] zu und rücke dabei jedes Mal ein wenig näher.\n\nWohlwissend, mein Glück nicht überstrapazieren zu dürfen, schleudere ich [target.GetNameNoTooltip] das letzte und größte Stück zu und verlasse den Hort, während [target.Custom('GetDragonSheHe')] die Delikatesse verschlingt. Wenngleich ich noch weit davon entfernt bin, als [target.Custom('GetDragonHerHis')] [GetTrait('dragonrider').GetName(GetNullCharacter)] anerkannt zu werden, haben wir heute wahre Fortschritte erzielt."
 dragon_bond_events.3007.a: "Binnen weniger Monde wird [target.Custom('GetDragonSheHe')] mir aus der Hand fressen!"

dragon_bond_events.3008.t: "$dragon_bond_events.t$ Ein roher Misserfolg"
 dragon_bond_events.3008.desc: "Das Haupt von [target.GetName] erhebt sich alarmiert vom Boden, als ich den übelriechenden, mit Fleisch beladenen Karren in [target.Custom('GetDragonHerHis')]en Hort manövriere. Auf [target.Custom('GetDragonHerHis')]e Vorderläufe gestützt, nähert sich [target.GetNameNoTooltip] mir langsam, [target.Custom('GetDragonHerHis')]e Augen mustern den stinkenden Karren und mich mit Argwohn.\n\nIch wuchte eines der dickeren Stücke empor und schleudere es dem Drachen entgegen. Es fällt mit einem feuchten Klatschen zu Boden, und erst dann beschnuppert [target.GetNameNoTooltip] es bedächtig, [target.Custom('GetDragonHerHis')]e Zunge leckt über die blutige Masse. Da [target.GetNameNoTooltip] das Mahl offenkundig nicht mundet, stößt [target.GetNameNoTooltip] ein verächtliches Schnauben aus und kehrt um, um sich um [target.Custom('GetDragonHerHis')]e bevorzugte Felssäule zu winden.\n\nRatlos, was ich sonst tun könnte, lasse ich den Karren stehen und ziehe mich in nach Hause zurück, um über mein Scheitern nachzusinnen."
 dragon_bond_events.3008.a: "[GetTitleByKey('c_harrenhal').GetNameNoTier] wurde auch nicht an einem Tag erbaut..." # Custom('GetDragonHerHim') muss immer umgangen werden, da es nicht zwischen deutschen Dativ- und Akkusativpronomen unterscheiden kann.

 dragon_bond_events.3009.t: "$dragon_bond_events.t$ Drachenkunde zu Rate ziehen"
 dragon_bond_events.3009.desc: "Mein Ringen mit der Abrichtung von [target.GetName] währt an, und ich fürchte, die Grenzen meines Wissens über [Concept('dragon','Drachen')|E] erreicht zu haben. Glücklicherweise hat sich, obgleich viel Drachenkunde beim Untergang verloren ging, einiges auf beiden Seiten der Meerenge erhalten.\n\nDie Echtheit und Genauigkeit vieler dieser Schriften ist indes ungewiss. Schließlich sind die meisten überlieferten Werke zur Drachenkunde bloße Abschriften, und Fälschungen sind weit verbreitet.\n\nAndererseits hat das gemeine Volk über die Jahrhunderte eine reiche eigene Drachenkunde hervorgebracht, eine Sammlung aus Ammenmärchen und Aberglauben. Vielleicht birgt diese Volksweisheit einen gewissen Wert?"
 dragon_bond_events.3009.a: "Selbst die bescheidenste Erzählung birgt ein Körnchen Wahrheit. Lasst das gemeine Volk vorsprechen."
 dragon_bond_events.3009.b: "Sendet Boten zur Zitadelle und nach Drachenstein. Ich werde die alte valyrische Überlieferung nutzen."
 dragon_bond_events.3009.c: "Vergesst es."

 dragon_bond_events.3010.t: "$dragon_bond_events.t$ Nützliche Drachenkunde"
 dragon_bond_events.3010.desc: "Meine Diener haben mir zwei Berichte über die Flucht von [GetScriptedCharacterByHistoryID('Targaryen_13').GetFirstNameNicknamed], seinen Kindern [GetScriptedCharacterByHistoryID('Targaryen_15').GetFirstNameNicknamed] sowie [GetScriptedCharacterByHistoryID('Targaryen_14').GetFirstNameNicknamed] und ihren [Concept('dragon','Drachen')|E] aus dem alten Valyria beschafft. Wenngleich die Berichte voneinander abweichen, so ist ihr vorgeblicher Bericht über die Besiedlung von [GetTitleByKey('c_dragonstone').GetNameNoTier] durch die Targaryen von größtem Belang, insbesondere ihre Bemühungen, auf der Insel Drachen aufzuziehen.\n\nDen Schriften zufolge verloren Aenar und seine Kinder in den Jahren nach ihrer Umsiedlung vier ihrer Drachen. Doch [GetScriptedCharacterByHistoryID('dragon_balerion').GetName], der gewaltigste der fünf, gedieh prächtig, während zwei weitere, [GetScriptedCharacterByHistoryID('dragon_meraxes').GetName] und [GetScriptedCharacterByHistoryID('dragon_vhagar').GetName], später im Schatten des Drachenbergs schlüpften. Die Berichte legen nahe, dass die Targaryen, der Magie ihrer Heimat beraubt, neue Verfahren zur Aufzucht von Drachen entwickeln mussten, wie etwa den Gebrauch geschlossener #italic Dijemion#!-Kohlenbecken zum Ausbrüten der Eier. Solches Wissen wird sich bei meinen Bemühungen mit [target.GetName] zweifellos als nützlich erweisen."
 dragon_bond_events.3010.a: "Vorzüglich."

 dragon_bond_events.3011.t: "$dragon_bond_events.t$ Nutzlose Drachenkunde"
 dragon_bond_events.3011.desc: "Ich habe die Abschrift eines Manuskripts studiert, das die Aufzucht der großen [Concept('dragon','Drachen')|E] durch [GetScriptedCharacterByHistoryID('Targaryen_27').GetFirstNameNicknamed], [GetScriptedCharacterByHistoryID('Targaryen_28').GetFirstNameNicknamed] und [GetScriptedCharacterByHistoryID('Targaryen_29').GetFirstNameNicknamed] beschreibt. Das Buch, angeblich ein Augenzeugenbericht des Kämmerers von [GetTitleByKey('c_dragonstone').GetNameNoTier], behauptet, die Geschwister, allen voran Aegon und Rhaenys, hätten in den vulkanischen heißen Quellen Drachensteins gemeinsam mit ihren Drachen gebadet.\n\nDavon beflügelt, ließ ich Fässer voll Wasser und Karren mit Feuerholz in den Hort von [target.GetName] schaffen. Dort habe ich in einer der innersten Kammern ein behelfsmäßiges Schwitzbad errichtet, und es steigt bereits heißer Dampf aus einem Dutzend Bottichen empor, die einst zum Vergären von [GetPlayer.Custom('RegionalAlcoholicDrink')] dienten.\n\nLeider, obgleich das Schwitzbad mir eine Wonne ist, zeigt [target.GetNameNoTooltip] weder an mir noch an dem Dampfbad, das ich für uns bereitet habe, das geringste Interesse. Wenn überhaupt, scheint [target.GetNameNoTooltip] über den Umbau [target.Custom('GetDragonHerHis')]es Hortes verärgert. Vielleicht zieht [target.Custom('GetDragonSheHe')] trockene Hitze vor?"
 dragon_bond_events.3011.a: "Verdammte Axt!"

 dragon_bond_events.3012.t: "$dragon_bond_events.t$ Ratschläge der Drachenhüter"
 dragon_bond_events.3012.desc: "[head_dragonkeeper.GetNameNicknamed], mein oberster Drachenhüter und vornehmlichster Pfleger von [target.GetName], hat meine wechselhaften Bemühungen, [target.GetNameNoTooltip] an mich zu binden, viele Monde lang ohne Urteil beobachtet und sich stets meiner Führung gefügt.\n\nWenngleich die Verantwortung für die Bindung mit [target.GetNameNoTooltip] allein die meine ist, so ist [head_dragonkeeper.Custom('DE_ART_DEF_S_N')] [head_dragonkeeper.GetWomanMan] wohl vertraut mit den Launen und dem Temperament des Drachen und gilt allen Berichten nach als [Select_CString( head_dragonkeeper.IsFemale, 'klügere Frau', 'klügerer Mann' )], als [head_dragonkeeper.GetHerHis]e Erscheinung vermuten lässt.\n\nDie Weisheit und Erfahrung von [head_dragonkeeper.GetNameNoTooltip] könnten meine Arbeit mit [target.GetNameNoTooltip] befördern, doch es birgt ein Wagnis. Die Aufgabe von [head_dragonkeeper.GetNameNoTooltip] war stets, für die leiblichen Bedürfnisse von [target.GetNameNoTooltip] zu sorgen – [target.Custom('GetDragonHerHis')]e Fütterung, Tränkung, Reinigung und Beschäftigung. Doch [head_dragonkeeper.Custom('DE_ART_DEF_S_N')] [head_dragonkeeper.GetWomanMan] hat nie mit meinem Drachen auf jener tieferen, geistigeren Ebene, wie ich es vorhabe, Zwiesprache gehalten."
 dragon_bond_events.3012.a: "Ich habe kein Alleinrecht auf Weisheit. Bittet [head_dragonkeeper.GetFirstNameNoTooltip] um Beistand."
 dragon_bond_events.3012.b: "[head_dragonkeeper.GetFirstNameNoTooltip] ist nichts als [Select_CString( head_dragonkeeper.IsFemale, 'eine ausländische Dienerin', 'ein ausländischer Diener' )]. Was könnte [head_dragonkeeper.GetSheHe] vom Herzen eines Drachen wissen?"

 dragon_bond_events.3013.t: "$dragon_bond_events.t$ Weiser Rat"
 dragon_bond_events.3013.desc: "Mein Schicksal in die schwieligen Hände des Drachenhüters legend, habe ich beschlossen, [head_dragonkeeper.GetNameNicknamed] heute bei [head_dragonkeeper.GetHerHis]en Verrichtungen mit [target.GetName] zu begleiten. Gleich [head_dragonkeeper.GetHerHis]en Akolythen kleide ich mich in eine grobe Tunika und bewaffne mich mit einem schlichten hölzernen Kampfstab.\n\nWir verbringen den Tag damit, die Hauptkammer von [target.GetNamePossessiveNoTooltip] Hort auszumisten, [target.Custom('GetDragonHerHis')]e Wassertröge zu füllen und die unzähligen Gatter und Schlösser zu überprüfen, die meinen Drachen drinnen und ungebetene Besucher draußen halten. All dies und mehr verrichten wir unter dem wachsamen Blick von [target.GetNameNoTooltip], der mir bei meinen Arbeiten schwerfällig folgt.\n\nAm Ende des Tages bin ich schweißüberströmt und stinke nach drachenverschmutztem Unrat. Und doch, als ich mich anschicke zu gehen, neigt [target.GetNameNoTooltip] [target.Custom('GetDragonHerHis')]en Hals einladend zu mir. Zaghaft zunächst, dann mit wachsendem Eifer, kratze ich die Seite [target.Custom('GetDragonHerHis')]es geschuppten Halses. Es scheint, als sei meine Mühe nicht ohne Anerkennung geblieben."
 dragon_bond_events.3013.a: "[head_dragonkeeper.GetNameNoTooltip] hatte recht. Saubere Hände vollbringen nichts."

 dragon_bond_events.3014.t: "$dragon_bond_events.t$ Beschissener Rat"
 dragon_bond_events.3014.desc: "Wider besseres Wissen habe ich beschlossen, [head_dragonkeeper.GetNameNicknamed] heute bei [head_dragonkeeper.GetHerHis]en Verrichtungen mit [target.GetName] zu begleiten. Gleich [head_dragonkeeper.GetHerHis]en Akolythen kleide ich mich in eine grobe Tunika. Obgleich das Gewand bestialisch riecht, besteht der Drachenhüter darauf, dass [target.GetNameNoTooltip] einen beständigen Geruch bevorzuge.\n\n[head_dragonkeeper.GetNameNoTooltip] lässt mich damit beginnen, die Hauptkammer des Drachenhorts auszumisten, und behauptet, [target.GetNameNoTooltip] werde [Select_CString( ROOT.Char.IsFemale, 'eine Reiterin', 'einen Reiter' )] nicht achten, [ROOT.Char.Custom('DE_ART_DEF_S_N')] sich nicht die Hände schmutzig zu machen gedenke. Und ich bin willens. Um die Mittagsstunde bin ich schweißgetränkt und stehe bis zu den Knien in verdrecktem Stroh. Da geruht mein Drache, uns aufzusuchen.\n\n[target.GetNameNoTooltip] große, schlangengleiche Augen weiten sich überrascht bei meinem jämmerlichen Anblick, ehe [target.Custom('GetDragonHerHis')] Maul sich angewidert verzieht. Ohne den Blickkontakt mit mir zu brechen, hebt [target.Custom('GetDragonSheHe')] [target.Custom('GetDragonHerHis')]en Schwanz und fügt meiner Bürde weitere hundert übelriechende Schaufelladungen hinzu. Der Drache stößt ein höhnisches Schnauben aus und entfernt sich."
 dragon_bond_events.3014.a: "Ich soll dein[ROOT.Char.Custom('DE_END_PRO_S_N')] Reiter[ROOT.Char.Custom('DE_END_NOU_S_GS_N')] werden, nicht dein[ROOT.Char.Custom('DE_END_PRO_S_N')] [Select_CString( ROOT.Char.IsFemale, 'Kammerzofe', 'Kammerdiener' )]!"

 dragon_bond_events.3015.t: "$dragon_bond_events.t$ Ein valyrisches Lied"
 dragon_bond_events.3015.desc: "Ich fürchte, dass [target.GetName] auf meine Bemühungen um eine Bindung nicht so anspricht, wie [target.Custom('GetDragonSheHe')] es sollte. Obgleich der [dragon|E] bei meiner Gegenwart nicht mehr aufbegehrt, ist [target.Custom('GetDragonSheHe')] leicht abgelenkt und nur selten bereit, meinen Befehlen zu lauschen, geschweige denn ihnen zu gehorchen.\n\nDoch dann erinnere ich mich an etwas, das meine Amme mir einst erzählte. Sie sagte, als ich ein Säugling war, hätte ich von der Stunde der Fledermaus bis zu jener der Nachtigall geschrien. Und das Einzige, was mich aus diesen Anfällen zu reißen vermochte, seien ihre lieblichen Lieder gewesen.\n\nDavon beflügelt, habe ich nach [ROOT.Char.GetCapitalLocation.GetNameNoTooltip] gesandt, um eine Abschrift alter valyrischer Hymnen zu beschaffen, die angeblich aus der Zeit von [GetScriptedCharacterByHistoryID('Targaryen_13').GetName] Flucht vom untergegangenen Kontinent stammen. Obgleich die wahre Herkunft des Gesangbuches sich nicht ergründen lässt, sind die Verse in Valyrisch verfasst, und die Komposition unterscheidet sich nicht allzu sehr von einigen älteren [ROOT.Char.GetCulture.GetNameNoTooltip]en Liedern."
 dragon_bond_events.3015.a: "Ich werde die alten Lieder singen..."
 dragon_bond_events.3015.b: "Vergesst es."

 dragon_bond_events.3016.t: "$dragon_bond_events.t$ Ein gutes valyrisches Lied"
 dragon_bond_events.3016.desc: "#italic Isse se prūmia hen wild, skoriot se tegon sīmonagon,#!\nIm Herzen der Wildnis, wo die Berge gen Himmel ragen,\n\n#italic Kesīr's nykeā zaldrīzes nēdenka, rūsīr perzys laesi,#!\nDort haust ein [dragon|E] grimmig, mit brennendem Blick,\n\n#italic Ñelly hen āeksion, tīkuni bona span se jēdar,#!\nSchuppen aus Gold, Schwingen, die den Himmel umspannen,\n\n#italic Yn konīr's iā vāedar bona mazverdagon ziry limagon.#!\nDoch es gibt ein Lied, die ihn zum Weinen bringt.\n\nMeine Stimme hallt durch den Hort von [target.GetName]. Kein Beifall empfängt mich, doch als ich den dritten Vers anstimme, sehe ich den Drachen die Kammer betreten, und [target.Custom('GetDragonSheHe')] lässt sich langsam zu Boden nieder. Am Ende des Liedes ist [target.Custom('GetDragonSheHe')] tief eingeschlafen und schnarcht zufrieden."
 dragon_bond_events.3016.a: "Schlaf gut, mein Drache."

 dragon_bond_events.3017.t: "$dragon_bond_events.t$ Ein misslungenes valyrisches Lied"
 dragon_bond_events.3017.desc: "Ich betrete den Hort von [target.GetName], wo ich den [dragon|El] in einer der Kammern schlafend vorfinde. Ich bin beklommen, nicht allein wegen [target.Custom('GetDragonHerHis')]er Gegenwart, sondern auch, weil ich kein Barde bin, bewandert im Vortrag uralter Lieder. Doch wie die Mummenschanzspieler uns lehren, muss das Spiel weitergehen. Ich räuspere mich und hebe mit den ersten Strophen an:\n\n#italic Kesīr's nykeā zaldrīzes nēdenka, rūsīr perz—#!\n\nIch bin noch nicht bei der zweiten Strophe angelangt, als [target.GetNameNoTooltip] erwacht, sich erhebt und die Kammer verlässt. Verwirrt folge ich, nur um zu sehen, wie [target.Custom('GetDragonSheHe')] sich erneut zu Boden legt und die Augen schließt. Unschlüssig, was sonst zu tun wäre, setze ich mein Lied von Neuem an, und abermals entfernt sich [target.Custom('GetDragonSheHe')], diesmal mit unwirschem Schwanzschlagen.\n\nNicht so leicht entmutigt, folge ich [target.GetNameNoTooltip] singend. Da reißt [target.Custom('GetDragonHerHis')]e Geduld. Der Drache fährt herum und lässt ein wütendes Brüllen los, das meine Stimme zum Verstummen bringt und mich zu meinem [ROOT.Char.Custom('ResidenceBuilding')] flüchten lässt."
 dragon_bond_events.3017.a: "Verfluchter Drache!"

 dragon_bond_events.3018.t: "$dragon_bond_events.t$ Valyrische Lektüre"
 dragon_bond_events.3018.desc: "[Concept('dragon','Drachen')|E] sind ebenso Sprösslinge des alten Valyria wie die Kinder des Hauses [GetScriptedCharacterByHistoryID('Targaryen_27').GetHouse.GetName], und das Blut jenes untergegangenen Landes fließt noch immer durch die Adern von [target.GetName] . Es ist kein bloßer Zufall, dass Drachen seit Jahrhunderten, vielleicht Jahrtausenden, Befehle nur in einer einzigen Sprache befolgen: dem Hochvalyrischen.\n\nWenngleich ich die grundlegenden valyrischen Wendungen mit [target.GetNameNoTooltip] durchgearbeitet habe — #italic sōvēs#! zum Aufsteigen, #italic rȳbās#! zum Gehorchen, #italic māzīs#! zum Herbeikommen —, frage ich mich, ob [target.Custom('GetDragonSheHe')] es schätzen würde, mehr Valyrisch von mir zu hören als immer nur Befehle.\n\nSo wie vielen [ROOT.Char.GetCulture.GetNameNoTooltip]en Kindern in ihrer frühen Kindheit Fabeln vorgelesen werden, um sie zu unterhalten und zu belehren, so könnte vielleicht auch [target.GetNameNoTooltip] an einer Lesung Gefallen finden?"
 dragon_bond_events.3018.a: "Ich werde dem Drachen etwas vorlesen."
 dragon_bond_events.3018.b: "Vergesst es."


 dragon_bond_events.3019.t:0 "$dragon_bond_events.t$ Eine gute Lektüre"
 dragon_bond_events.3019.desc:0 "Ich beginne, [target.GetName] aus einem alten Buch voller alter Legenden vorzulesen, das ich den größten Teil des letzten Tages mühsam ins Valyrische übersetzt habe. Ich erzähle von der schicksalhaften Reise der Kriegerkönigin [GetScriptedCharacterByHistoryID('Nymeros_1').GetFirstName] von der Rhoyne nach Dorne. Ich erzähle [target.GetName] von den Heldentaten von [GetScriptedCharacterByHistoryID('Arryn_15').GetFirstNameNicknamed] und den zahlreichen Leistungen von [GetScriptedCharacterByHistoryID('Stark_12').GetFirstNameNicknamed].\n\nIch verliere mich in den Geschichten, meine Worte triefen vor poetischer Schönheit des wohlklingenden Hochvalyrischen. Als ich das Ende des Buches erreiche, ist die Sonne über [target.GetCurrentLocation.GetNameNoTooltip] untergegangen. Obwohl [target.GetNameNoTooltip] nur ein Drache ist und ich weiß, dass [target.Custom('GetDragonSheHe')] kaum etwas von meinen Worten verstanden hat, scheint [target.Custom('GetDragonSheHe')] die Zuwendung zu schätzen und schnarcht nun zufrieden nur eine Armeslänge entfernt."
 dragon_bond_events.3019.a: "Eines Tages wird man auch über uns Geschichten schreiben..."

 dragon_bond_events.3020.t: "$dragon_bond_events.t$ Misslungene Lektüre"
 dragon_bond_events.3020.desc: "Während [target.Custom('GetDragonHerHis')]er nächsten Fütterung beginne ich, [target.GetName] aus einem alten Buch dornischer Fabeln vorzulesen, das ich den größten Teil des Morgens hastig ins Valyrische übersetzt habe. Ich stolpere über zahllose Worte, verheddere mich in der unbeholfen übersetzten Satzstellung und verschlungenen Wendungen. Am Ende des Vorlesens sehe ich, dass [target.GetNameNoTooltip] ebenso verwirrt ist wie ich, und der [dragon|E] entfernt sich, sichtlich gereizt davon, dass er zu etwas herbeigerufen wurde, das ihm wie das Geschwätz [Select_CString( ROOT.Char.IsFemale, 'einer Irren', 'eines Irren' )] vorkommen musste.\n\n[target.GetNameNoTooltip] missachtet oder versteht bereits einige meiner hochvalyrischen Befehle nicht, und ich fürchte, dass dies unser ohnehin begrenztes Einvernehmen nur weiter trüben wird."
 dragon_bond_events.3020.a: "Sapperlot noch eins!"

dragon_bond_events.3021.t: "$dragon_bond_events.t$ Den Blick gen Himmel"
dragon_bond_events.3021.desc: "Ich nehme mein Frühstück draußen auf dem Balkon ein, wo sich mir ein strahlend blauer Himmel darbietet, ohne auch nur ein einziges Wölkchen. Etwas in mir weiß, dass dies kein Tag ist, den man müßig in der Residenz oder auf den Straßen von [ROOT.Char.GetCapitalLocation.GetName] verbringen sollte. Es ist, als hätte [ROOT.Char.GetFaith.FateGodName] höchstselbst diesen Tag für einen einzigen Zweck geschaffen: den Flug.\n\nUnd dennoch bin ich zaghaft. Die letzten Flüge von [target.GetName] verliefen nicht eben gut – in den vergangenen Monden hat [target.Custom('GetDragonSheHe')] es sich bisweilen erlaubt, jene Befehle nach Belieben zu missachten, die [target.Custom('GetDragonSheHe')] als lästig erachtet, Befehle, die zumeist damit zu tun haben, dass ich nicht in den Tod stürzen möchte.\n\nGleichwohl könnte mehr Zeit im Sattel sowohl unsere Vertrautheit als auch die Bereitschaft von [target.GetNameNoTooltip] stärken, meinen Befehlen zu gehorchen. Und es ist ein so herrlicher Tag..."
 dragon_bond_events.3021.a: "Den Tag drinnen zu vergeuden, täte keinem von uns gut. In die Lüfte!"
 dragon_bond_events.3021.b: "[ROOT.Char.Custom('DE_ART_IND_N')|U] [ROOT.Char.GetTitleTierName] muss [ROOT.Char.GetHerHis]em Reich, nicht [ROOT.Char.GetHerHis]en Launen, dienen. Wir werden heute nicht fliegen."
 dragon_bond_events.3021.custom_tt: "Eure Verbundenheit wird nicht gestärkt"

 dragon_bond_events.3022.t: "$dragon_bond_events.t$ Neue Höhen"
 dragon_bond_events.3022.desc: "[target.GetName] begrüßt mich beinahe begierig, als ich mit einem Sattel in der Hand [target.Custom('GetDragonHerHis')]en Hort betrete – offenkundig bin ich nicht der Einzige, den es gen Himmel drängt. Mit ungewohnter Fügsamkeit lässt [target.Custom('GetDragonSheHe')] mich den Sattel anlegen und aufsitzen, und mit einem Nicken zu meinen Begleitern treten wir hinaus ins Freie. Kaum haben wir das letzte Tor passiert, schwingt sich [target.GetNameNoTooltip] empor und kostet die Freiheit aus.\n\nMit jedem Schlag [target.Custom('GetDragonHerHis')]er Schwingen steigen wir höher und höher, bis meine Residenz nur noch ein ferner Farbfleck tief unter uns ist. [target.Custom('GetDragonSheHe')|U] ist heute in seltener Verfassung, und unter meinen Zügeln fühlt sich [target.GetNameNoTooltip] so flink an wie [GetScriptedCharacterByHistoryID('dragon_nessarion').GetName] aus den alten Legenden und so mächtig wie der berüchtigte [GetScriptedCharacterByHistoryID('dragon_terrax').GetName].\n\nWir schweben dahin hoch über den Wolken, unter denen alle Ängste und Sorgen verborgen bleiben, und der Wind peitscht vorbei, hebt Haar und Gemüt gleichermaßen, während sich die Welt unter uns entfaltet. Vor der Kulisse des endlosen Himmels erstarkt unser Bund noch mehr."
 dragon_bond_events.3022.a: "Über den Wolken muss die Freiheit wohl grenzenlos sein..."

 dragon_bond_events.3023.t: "$dragon_bond_events.t$ Einfach mal am Boden bleiben"
 dragon_bond_events.3023.desc: "Behutsam nähere ich mich [target.GetName] und werde von einem schelmischen Funkeln in [target.Custom('GetDragonHerHis')]en Augen empfangen. Trotz unserer vorangegangenen Übungen widersetzt sich [target.GetNameNoTooltip] meinen Bemühungen, den Sattel anzulegen, offenbar einer [target.Custom('GetDragonHerHis')]er vielen Launen erlegen. Mit einem mutwilligen Schnauben entwischt [target.Custom('GetDragonSheHe')] mir, gerade als ich zugreifen will, [target.Custom('GetDragonHerHis')]e Schwingen entfalten sich in anmutiger Auflehnung.\n\nJeder Versuch, den Gurt oder die Zügel des Sattels zu befestigen, wird mit einem trotzigen Hieb [target.Custom('GetDragonHerHis')]es Schwanzes oder einem jähen Flammenstoß quittiert – eine Mahnung, dass ein [dragon|E] zwar [Concept('tamed_dragon','gezähmt')|E] sein mag, doch nimmer wahrhaft beherrscht werden kann. Während mein Unmut wächst, wird mir bewusst, dass meine Zeit vielleicht besser verbracht wäre, als meinen Drachen zu etwas zu bewegen, das [target.Custom('GetDragonSheHe')] nicht zu tun gedenkt."
 dragon_bond_events.3023.a: "Welch Zeitverschwendung..."

 dragon_bond_events.3024.t: "$dragon_bond_events.t$ Besuchszeiten"
 dragon_bond_events.3024.desc: "Nach meinem letzten Besuch bei [target.GetName] war ich bestürzt über [target.Custom('GetDragonHerHis')]e scheinbare Unfähigkeit, mich von den Bediensteten zu unterscheiden, die [target.Custom('GetDragonHerHis')] Futter bringen. Als wäre ich, [ROOT.Char.GetTitleAsNameNoTooltip] von [ROOT.Char.GetCapitalLocation.GetNameNoTooltip], nicht unterscheidbar von [Select_CString( ROOT.Char.IsFemale, 'einer Magd', 'einem Stallburschen' )]! Wenngleich meine Pflichten als [ROOT.Char.GetTitleAsNameNoTooltip] die meisten meiner Tage beanspruchen, könnte es sich lohnen, mehr Zeit für Besuche bei [target.GetNameNoTooltip] freizumachen.\n\nDoch ein solches Vorgehen birgt Gefahren. Nicht allein die offenkundige Gefahr, mehr Zeit in nächster Nähe eines solch wilden Raubtiers zu verbringen, sondern auch das Wagnis, dass [target.GetNameNoTooltip] meine allzu eifrige, aufdringliche Gegenwart in dieser heiklen Phase unserer Beziehung übel aufnehmen könnte.\n\n"
 dragon_bond_events.3024.a: "Ich werde den Drachen aufsuchen. Schauen wir mal, was wird."
 dragon_bond_events.3024.b: "Schauen wir mal lieber nicht, was wird."
 dragon_bond_events.3024.custom_tt: "Die Haltung von [target.GetNameNoTooltip] Euch gegenüber bleibt gleich"

 dragon_bond_events.3025.t: "$dragon_bond_events.t$ Erfolgreicher Besuch"
 dragon_bond_events.3025.desc: "Gleichwie meine Lehrmeister in der Kindheit mich zu dem Menschen formten, der ich heute bin, und sich dadurch meine Wertschätzung verdienten, so haben auch meine Bemühungen, ein beständigerer Teil der Pflege von [target.GetName] zu sein, mir ein Mindestmaß an Achtung des Drachen eingetragen. Wo [target.Custom('GetDragonSheHe')] noch vor einem Mond mich nicht anders behandelt hätte als jeden anderen der Träger, die [target.Custom('GetDragonHerHis')] Fleisch hereinschaffen und schmutziges Stroh hinaustragen, so glaube ich, dass [target.Custom('GetDragonSheHe')] mich nun in besserem Lichte sieht.\n\nWenngleich noch fern von Zuneigung, beobachtet [target.GetNameNoTooltip] mich aufmerksamer, kann meine Stimme von jener meiner Begleiter unterscheiden und duldet es sogar, dass ich während der Fütterungen [target.Custom('GetDragonHerHis')]en Hals berühre."
 dragon_bond_events.3025.a: "Tag um Tag werde ich mir [target.Custom('GetDragonHerHis')]en Gehorsam verdienen."

 dragon_bond_events.3026.t: "$dragon_bond_events.t$ Gescheiterter Besuch"
 dragon_bond_events.3026.desc: "Meine Besuche haben sich als widersinnig erwiesen. Hatte ich gehofft, dass [target.GetName] meine Gegenwart mit den Fütterungen verbinden würde, die [target.Custom('GetDragonSheHe')] so offenkundig genießt, so fürchte ich, dass [target.Custom('GetDragonSheHe')] mich stattdessen mit der Gefangenschaft gleichsetzt, die [target.Custom('GetDragonSheHe')] so verabscheut.\n\nWo [target.GetNameNoTooltip] noch vor einem Mond meine Gegenwart bei [target.Custom('GetDragonHerHis')]en Fütterungen kaum zur Kenntnis genommen hätte, blähen sich nun [target.Custom('GetDragonHerHis')]e Nüstern vor Erregung, sobald [target.Custom('GetDragonSheHe')] meine Witterung aufnimmt, und [target.Custom('GetDragonSheHe')] gibt sich augenscheinlich Mühe, mir bei jeder Gelegenheit den Rücken zuzukehren – ein bedauerliches Zeichen der Geringschätzung."
 dragon_bond_events.3026.a: "Ratte, du."

 dragon_bond_events.3027.t: "Bindung mit [target.GetNameNoTooltip]: Valar Ēdrussis" # reused for whole event chain
 dragon_bond_events.3027.desc: "Auf einem einsamen Spaziergang vernehme ich ein leises Schnarchen in der Nähe.\n\nIch halte inne, um genauer zu lauschen, und bemerke plötzlich, dass die übrige Umwelt unheimlich still ist. Es scheint, als ruhe die gesamte Landschaft mitten am Tage, und an einem Tag wie diesem ist es eine willkommene Zuflucht vor dem Trubel und Getriebe des höfischen Alltags."
 dragon_bond_events.3027.a: "Ich sollte dem Schnarchen nachgehen."
 dragon_bond_events.3027.custom_tt.a: "@warning_icon! Es gibt auch gefährliches Schnarchen!"
 dragon_bond_events.3027.b: "Endlich Frieden."

 dragon_bond_events.3028.desc: "Ich schlage die Richtung ein, aus der das Schnarchen zu stammen scheint. Ein seltsames Unbehagen überkommt mich, als mir gewahr wird, dass ich seit geraumer Zeit keiner einzigen lebenden Kreatur begegnet bin, noch vermag ich auch nur das leiseste Zwitschern oder Rascheln der kleinsten Baumbewohner zu vernehmen.\n\nAls ich einen mächtigen Baum umrunde, erblicke ich die Ursache dieser Stille und dieses Schnarchens: [target.GetNameNoTooltip], tief schlafend auf einer Lichtung, nur wenige Schritte vor mir! [target.Custom('GetDragonSheHe')|U] sieht so überraschend friedvoll aus, behaglich zusammengerollt."
 dragon_bond_events.3028.a: "Ein Schläfchen klingt verlockend..."
 dragon_bond_events.3028.custom_tt.a: "Sucht Euch ein gemütliches Laubpolster und gönnt Euch ein wohlverdientes Nickerchen"
 dragon_bond_events.3028.custom_tt.react: "[target.GetNameNoTooltip] wird reagieren..."
 dragon_bond_events.3028.b: "Langsam zurückweichen, ganz langsam."
 dragon_bond_events.3028.custom_tt.b: "Beginnt Euch in den Wald zurückzuziehen"
 dragon_bond_events.3028.custom_tt.b.a: "Ihr entkommt unbemerkt"
 dragon_bond_events.3028.custom_tt.b.b: "[target.GetNameNoTooltip] erwacht"
 dragon_bond_events.3028.b.success.t: "Davongehuscht"
 dragon_bond_events.3028.b.success.custom_tt: "Schweiß tropft Euch von der Stirn, Ihr brecht beinahe zusammen, ehe Ihr zurückblickt und erkennt, dass [target.GetNameNoTooltip] noch immer friedlich schlummert."
 dragon_bond_events.3028.c: "Ähm... NÖ!"
 dragon_bond_events.3028.custom_tt.c: "Rennt in die entgegengesetzte Richtung"
 dragon_bond_events.3028.c.success.t: "Eine wahnsinnige Flucht"
 dragon_bond_events.3028.c.success.custom_tt: "Ihr rennt, so schnell Euch die Beine tragen, bis Ihr sicher daheim seid, und betet, dass der Drache nichts bemerkt hat."

 dragon_bond_events.3029.desc: "Einige Zeit verstreicht, und ich schrecke aus dem Schlaf, als mir warmer Atem ins Gesicht weht. Vor Schreck erstarrt, verharre ich reglos und sehe, dass [target.GetNameNoTooltip] [target.Custom('GetDragonHerHis')]en Hals gereckt hat, um mir ins Antlitz zu spähen!\n\nEin Schauer läuft mir über den Rücken... Dies war wohl nicht mein klügster Einfall.\n\nZu meiner Überraschung scheint [target.GetNameNoTooltip] einfach wieder einzuschlafen? Vielleicht gewöhnt [target.Custom('GetDragonSheHe')] sich allmählich an meine Gesellschaft!"
 dragon_bond_events.3029.a: "Das ist wärmer als mein Bett!"

 dragon_bond_events.3030.desc: "Ich spüre es beinahe, als [target.GetNameNoTooltip] sich aus [target.Custom('GetDragonHerHis')]em Schlummer regt, ehe [target.Custom('GetDragonSheHe')] plötzlich auffährt, sichtlich überrascht, dass ich [target.Custom('GetDragonHerHis')]er Rastplatz so nahe gerückt bin.\n\nEin Teil von mir erwartet, alsbald in Flammen gehüllt oder von einer Klaue aufgeschlitzt zu werden, doch der Drache erhebt sich nur, [target.Custom('GetDragonHerHis')]e Schuppen schimmern sacht im Licht der Mittagssonne, [target.Custom('GetDragonHerHis')]e Augen ruhen unverwandt auf mir."
 dragon_bond_events.3030.a: "Schhhhh, braver Drache..."
 dragon_bond_events.3030.custom_tt.a: "Erinnert Euch an ein Wiegenlied und singt es dem Drachen vor"
 dragon_bond_events.3030.c.success.t: "Ōtor vorgesungen"
 dragon_bond_events.3030.c.success.custom_tt: "[target.GetNameNoTooltip] scheint auf Euer Schlaflied anzusprechen und lässt sich schließlich wieder in den Schlaf wiegen, sodass Ihr Euch davonstehlen könnt"


 dragon_bond_events.3031.desc: "[target.GetNameNoTooltip] bäumt sich auf, sichtlich erzürnt, dass ich [target.Custom('GetDragonHerHis')]en Schlafplatz bedrängt habe! Alles, was mir bleibt, ist mich zu ducken und den Kopf zu bedecken und zu den Göttern zu beten, dass die Bestie Gnade walten lassen möge..."
 dragon_bond_events.3031.custom_tt.a: "[target.GetNameNoTooltip] ist wütend und greift an!"
 dragon_bond_events.3031.custom_tt.b: "[target.GetNameNoTooltip] fliegt fort und kehrt nicht zurück"
 dragon_bond_events.3031.attack.t: "Ein jämmerlicher Zustand..."
 dragon_bond_events.3031.attack.custom_tt: "[target.GetNameNoTooltip] peitscht Euch mit Flammen, ehe [target.Custom('GetDragonSheHe')] davonfliegt, und es sieht nicht so aus, als sei [target.Custom('GetDragonSheHe')] gewillt, zurückzukehren..."
 dragon_bond_events.3031.flee.t: "Glück im Unglück?"
 dragon_bond_events.3031.flee.custom_tt: "Ihr nehmt die Hände von den Augen und seht, wie [target.GetNameNoTooltip] davonfliegt. Ein glücklicher Ausgang, doch es sieht nicht so aus, als sei [target.Custom('GetDragonSheHe')] gewillt, zurückzukehren..."

