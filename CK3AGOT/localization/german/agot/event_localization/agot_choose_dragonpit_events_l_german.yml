l_german:

 agot_choose_dragonpit_event.0001.t: "Eine Drachengrube für [dragon.GetNameNoTooltip]"
 agot_choose_dragonpit_event.0001.desc: "Ein Drache ohne Reiter ist ein unberechenbarer und gefährlicher Machtfaktor. Ohne eine Bindung, die ihn zügelt, gibt es kaum etwas, das das Tier am Fortfliegen oder an Feindseligkeit hindert. Wenn wir die Kontrolle behalten wollen, muss der Drache sicher untergebracht werden. Glücklicherweise stehen uns mehrere geeignete Orte zur Verfügung, ein jeder mit eigenen Vor- und Nachteilen."
 agot_choose_dragonpit_event.0001.desc_rider: "Ein Drache ist ein mächtiger Verbündeter, doch ohne Reiter ist seine Treue nicht garantiert. Wenn [Select_CString( rider.IsLocalPlayer, 'ich', rider.GetName )] [Select_CString( rider.IsLocalPlayer, 'sterbe', 'stirbt' )], könnte er fortfliegen und in die Wildnis zurückkehren. Um die Kontrolle zu behalten, müssen wir ihn sicher unterbringen. Glücklicherweise stehen uns mehrere geeignete Orte zur Verfügung, jeder mit eigenen Vor- und Nachteilen."
 agot_choose_dragonpit_event.0001.a: "Das wird genügen."
 agot_choose_dragonpit_event.0001.a.tt: "[dragon.GetNameNoTooltip] wird in der ausgewählten Drachengrube untergebracht."
 agot_choose_dragonpit_event.0001.a.tt_2: "@warning_icon! #X Einen Drachen in einer Grube fern von seinem Reiter unterzubringen, verhindert, dass er auf Reisen oder im Krieg eingesetzt wird, und kann die Bindung schwächen#!"
 agot_choose_dragonpit_event.0001.b: "[dragon.GetNameNoTooltip] sollte frei sein."
 agot_choose_dragonpit_event.0001.c: "[dragon.GetNameNoTooltip] ist gut aufgehoben, wo [dragon.Custom('GetDragonSheHe')] ist."
 agot_choose_dragonpit_event.0001.d: "Nein, ich werde [dragon.GetNameNoTooltip] nicht einsperren."

 dragon_bond_weakening_toast: "Bindung wird geschwächt"
