  #USURPER CAN DECIDE TO USURP
 agot_crown_theft.0100.t: "Der Thron"
  #King dies in trial by combat
 agot_crown_theft.0100.desc.tbc: "Als mein[crown_theft_king.Custom('DE_END_PRO_S_N'))] [SCOPE.sC('crown_thief').Custom2('RelationToMeShort', SCOPE.sC('crown_theft_king'))], [crown_theft_king.Custom('DE_ART_DEF_S_N')] [Select_CString(crown_theft_king.IsFemale,'Königin','König')], in der Arena[crown_theft_king.Custom('DE_PRO_POS_S_3P')]en letzten Atemzug tut, während des Urteils durch Kampf,"
agot_crown_theft.0200.desc.tbc:0 "Als [crown_theft_king.Custom('DE_ART_DEF_S_N')] [Select_CString(crown_theft_king.IsFemale,'Königin','König')] [crown_theft_king.Custom('DE_PRO_POS_S_3P')]en letzten Atemzug in der Arena tut, während des Urteils durch Kampf,"
 #King dies in battle
 agot_crown_theft.0100.desc.battle:0 "Als mein[crown_theft_king.Custom('DE_END_PRO_S_N')] [SCOPE.sC('crown_thief').Custom2('RelationToMeShort', SCOPE.sC('crown_theft_king'))], [crown_theft_king.Custom('DE_ART_DEF_S_N')] [Select_CString(crown_theft_king.IsFemale,'Königin','König')], [crown_theft_king.Custom('DE_PRO_POS_S_3P')]en Wunden auf dem Schlachtfeld erliegt,"
 agot_crown_theft.0200.desc.battle:0 "Als [crown_theft_king.Custom('DE_ART_DEF_S_N')] [Select_CString(crown_theft_king.IsFemale,'Königin','König')] [crown_theft_king.Custom('DE_PRO_POS_S_3P')]en Wunden auf dem Schlachtfeld erliegt,"
 #King dies in illness
 agot_crown_theft.0100.desc.illness:0 "Als mein[crown_theft_king.Custom('DE_END_PRO_S_N')] [SCOPE.sC('crown_thief').Custom2('RelationToMeShort', SCOPE.sC('crown_theft_king'))], [crown_theft_king.Custom('DE_ART_DEF_S_N')] [Select_CString(crown_theft_king.IsFemale,'Königin','König')], auf [crown_theft_king.Custom('DE_PRO_POS_S_3P')]em Sterbebett liegt,"
 agot_crown_theft.0200.desc.illness:0 "Als [crown_theft_king.Custom('DE_ART_DEF_S_N')] [Select_CString(crown_theft_king.IsFemale,'Königin','König')] auf [crown_theft_king.Custom('DE_PRO_POS_S_3P')]em Sterbebett liegt,"
 #King dies in siege
 agot_crown_theft.0100.desc.siege:0 "Als mein[crown_theft_king.Custom('DE_END_PRO_S_N')] [SCOPE.sC('crown_thief').Custom2('RelationToMeShort', SCOPE.sC('crown_theft_king'))], [crown_theft_king.Custom('DE_ART_DEF_S_N')] [Select_CString(crown_theft_king.IsFemale,'Königin','König')], innerhalb der Mauern der belagerten Burg den Tod findet,"
 agot_crown_theft.0200.desc.siege:0 "Als [crown_theft_king.Custom('DE_ART_DEF_S_N')] [Select_CString(crown_theft_king.IsFemale,'Königin','König')] innerhalb der Mauern der belagerten Burg den Tod findet,"

  #desc
agot_crown_theft.0100.intro.desc: "lastet das Gewicht [crown_theft_king.Custom('DE_PRO_POS_S_3P')]er Krone schwer in der Luft. "
 agot_crown_theft.0100.intro_bastard.desc: "lastet das Gewicht [crown_theft_king.Custom('DE_PRO_POS_S_3P')]er Krone schwer in der Luft. Gleichwohl gebieten es die Sitten, dass ein Bastard keine Titel erben darf, doch das Schicksal hat einen anderen Pfad gewoben. "
 agot_crown_theft.0100.intro_disinherited.desc: "lastet das Gewicht [crown_theft_king.Custom('DE_PRO_POS_S_3P')]er Krone schwer in der Luft. Gleichwohl ward ich enterbt und kann keine Titel erben, doch die Winde des Schicksals wehen nun anders. "

 agot_crown_theft.0100.trait_brave.desc: "Es wäre eine Herausforderung, sie an mich zu reißen. Je größer die Gefahr, desto befriedigender die Belohnung. Das Wagnis ist groß, doch die Umstände sind günstig, denn"
 agot_crown_theft.0100.trait_craven.desc: "Der Gedanke beruhigt mich keineswegs, doch ich könnte... #italic vielleicht#!... zugreifen. Mir wird schwindelig beim bloßen Gedanken daran, doch ich bedenke:"
 agot_crown_theft.0100.trait_wrathful.desc: "Sie sollte mein sein! #bold Mein und nur mein!#! Doch dies[crown_theft_king_legit_heir.Custom('DE_END_ADJ_IND_S_N')] [crown_theft_king_legit_heir.Custom('InsultNoun')],"
 agot_crown_theft.0100.trait_calm.desc: "Ich atme tief durch, um einen klaren Gedanken zu fassen, und dann denke ich an eines:"
 agot_crown_theft.0100.trait_chaste.desc: "Begehren, welcher Art auch immer, hat mich nie gelockt, und dennoch bedenke ich:"
 agot_crown_theft.0100.trait_lustful.desc: "Ich denke an all die [Select_CString(crown_thief.IsFemale,'Männer','Frauen')], die vor mir auf den Knien lägen, verzweifelt begierig, [Select_CString(crown_thief.IsFemale,'es ihrer neuen Königin zu besorgen','für ihren neuen König die Beine zu öffnen')]. Meine lustvollen Träume könnten wahr werden, denn"
 agot_crown_theft.0100.trait_content.desc: "Nie hegte ich sonderlichen Ehrgeiz, und dennoch denke ich an all die Dinge, die ich mit solcher Macht vollbringen könnte, und ich bedenke:"
 agot_crown_theft.0100.trait_ambitious.desc: "Ich leugne nicht, dass mein Herz dies innig begehrt hat, und ich könnte nun endlich mein Ziel erreichen, denn"
 agot_crown_theft.0100.trait_diligent.desc: "Mein ganzes Leben habe ich unermüdlich gewirkt, dies wäre nur ein gerechter Lohn für all diese Mühen, und es scheint, dass der Lohn nun zum Greifen nah ist, denn"
 agot_crown_theft.0100.trait_lazy.desc: "Für gewöhnlich wäre es mir zu mühselig, sie an mich zu reißen, doch glücklicherweise zeigt sich eine einfache Gelegenheit, denn"
 agot_crown_theft.0100.trait_forgiving.desc: "" #TODO, currently turned off
 agot_crown_theft.0100.trait_vengeful.desc: "Mit solcher Macht in meinen Händen würde jeder, der mir zu schaden trachtete, wie eine Fliege verenden, überdies sind mir die Umstände günstig, denn"
 agot_crown_theft.0100.trait_generous.desc: "Der Reichtum und die Macht, die ich erlangen würde, gäben mir so vieles zu gewähren, zudem fügt es sich, dass"
 agot_crown_theft.0100.trait_greedy.desc: "Ich sehe mich bereits in Fluten von Reichtum, Gold und Gütern ertrinken. Mir läuft schon das Wasser im Munde zusammen, denn"
 agot_crown_theft.0100.trait_gregarious.desc: "An der Spitze der Stufen wäre ich [Select_CString(crown_thief.IsFemale,'die Königin','der König')] des Festes und feierte bis in die späten Stunden in einem Saal voller Menschen. Ich bedenke:"
 agot_crown_theft.0100.trait_shy.desc: "Nähme ich sie an mich, ich... #italic Nein!#! Ich kann nicht... wie könnte ich nur... ich müsste... dies... theoretisch..."
 agot_crown_theft.0100.trait_honest.desc: "" #TODO, currently turned off
 agot_crown_theft.0100.trait_deceitful.desc: "Ich wüsste #bold genau#!, was ich mit solcher Macht anzufangen hätte, und es wäre ein Leichtes, sie zu ergreifen, denn durch eine #italic glückliche Fügung#!,"
 agot_crown_theft.0100.trait_humble.desc: "Nie hätte ich zu hoffen gewagt, dass jemand so Gewöhnliches wie ich die Gelegenheit erhielte, solche Macht an sich zu reißen, doch es ist gleichwohl der Fall, denn"
 agot_crown_theft.0100.trait_arrogant.desc: "Niemand ist würdiger, solche Macht zu erlangen, als ich. Ich ward geboren, um zu herrschen, und nun ergäbe sich die Möglichkeit, denn"
 agot_crown_theft.0100.trait_just.desc: "Es ist nicht mein Recht. Es ward anders bestimmt. Und dennoch... dennoch, je mehr ich darüber nachsinne, desto mehr bedenke ich, dass"
 agot_crown_theft.0100.trait_arbitrary.desc: "Nicht ich ward auserkoren... doch das kümmert mich nicht. Regeln sind dazu da, gebrochen zu werden, und überdies,"
 agot_crown_theft.0100.trait_patient.desc: "#italic Die Götter haben noch [Select_CString(crown_thief.IsFemale,'keine Frau','keinen Mann')] geschaffen, der die Geduld für unumschränkte Macht fehlt#!, und es scheint, als belohne mich die Geduld reichlich, denn"
 agot_crown_theft.0100.trait_impatient.desc: "#italic Die Götter haben noch [Select_CString(crown_thief.IsFemale,'keine Frau','keinen Mann')] geschaffen, der die Geduld für unumschränkte Macht fehlt#!, doch ich habe zu lange gewartet, und ich sehe eine Möglichkeit, denn"
 agot_crown_theft.0100.trait_temperate.desc: "Der Gedanke, solche Macht in meinen Händen zu halten, verstört mich, zumal für jemanden wie mich, der das Maß dem Überfluss vorzieht, und dennoch bedenke ich, dass"
 agot_crown_theft.0100.trait_gluttonous.desc: "Wer ein gekröntes Haupt hat, hat auch einen vollen Bauch. Macht zu erlangen bedeutet, sich all die Speisen verschaffen zu können, die man begehrt. Und die Umstände sind mir gewogen, denn"
 agot_crown_theft.0100.trait_trusting.desc: "Sie in an mich zu nehmen wäre ein gewagtes Unterfangen, doch ich bin gewiss, dass sich das Königreich hinter den Fähigsten scharen wird, denn"
 agot_crown_theft.0100.trait_paranoid.desc: "#italic Was wird aus mir werden?!#! Ich bin #bold nicht#! der Erbe, doch ich stehe in der #bold Thronfolge#!. Man #bold könnte#! beschließen, mich #bold hinrichten#! zu lassen, um jegliche #italic möglichen#! #bold Rivalen#! auszumerzen. Mir bleibt #italic noch#! eine #bold Chance#! zu #italic überleben#!, denn"
 agot_crown_theft.0100.trait_zealous.desc: "Stets war ich der Frömmste in der Familie, der Gottesfürchtigste, und deshalb sehe ich dies als ein Zeichen vom [ROOT.Char.GetFaith.HighGodName]. Diese Macht ist ein Geschenk des Himmels, der Lohn dafür, dass ich treu dem Pfade der Götter folgte. Ich hätte nun die Gelegenheit, diesem Zeichen folge zu leisten, denn"
 agot_crown_theft.0100.trait_cynical.desc: "#italic Nach den Gesetzen der Götter und der Menschen...#! Die Götter scheren mich nicht, und die Menschen folgen dem Gesetz jener, die die Macht besitzen. So bedenke ich, dass"
 agot_crown_theft.0100.trait_fallback.desc: "Wenngleich ich lange den Ehrgeiz hegte, über das Reich zu herrschen, "

 agot_crown_theft.0100.outro.desc: " [crown_theft_king_legit_heir.Custom('DE_ART_DEF_S_N')] rechtmäßig[crown_theft_king_legit_heir.Custom('DE_END_ADJ_DEF_S_N')] [Select_CString(crown_theft_king_legit_heir.IsFemale,'Erbin','Erbe')], mein[crown_theft_king_legit_heir.Custom('DE_END_PRO_S_N')] [SCOPE.sC('crown_thief').Custom2('RelationToMeShort', SCOPE.sC('crown_theft_king_legit_heir'))], [crown_theft_king_legit_heir.GetTitledFirstName], weilt derzeit fern der Hauptstadt.\n\nDie Gelegenheit, den Thron an mich zu reißen, lockt und verheißt Macht und Autorität über jedes Maß hinaus."
 agot_crown_theft.0100.outro_guardian.desc: " [crown_theft_king_legit_heir.Custom('DE_ART_DEF_S_N')] rechtmäßig[crown_theft_king_legit_heir.Custom('DE_END_ADJ_DEF_S_N')] [Select_CString(crown_theft_king_legit_heir.IsFemale,'Erbin','Erbe')], [crown_theft_king_legit_heir.GetTitledFirstName], weilt derzeit fern der Hauptstadt.\n\nDie Gelegenheit, den Thron für mein Mündel, [crown_thief.GetTitledFirstName], zu ergreifen, lockt und verheißt Macht und Autorität über jedes Maß hinaus."

 agot_crown_theft.0100.a: "Der Thron ist mein!"
 agot_crown_theft.0200.a: "Der Thron gehört [crown_thief.GetTitledFirstNameNoTooltip]!"
 agot_crown_theft.0100.b: "Nein, ich muss die rechtmäßige Thronfolge achten."

  #KING DECIDES WHO TO CONTINUE AS
 agot_crown_theft.0102.t: "Sterbebett"
  #King dies in trial by combat
 agot_crown_theft.0102.desc.tbc: "Während ich während des Urteils durch Kampf meine letzten Atemzüge tue,"
  #King dies in battle
 agot_crown_theft.0102.desc.battle: "Während ich auf dem Schlachtfeld mein Ende finde, umgeben vom Klirren des Stahls und den Schreien der Krieger,"
  #King dies in illness
 agot_crown_theft.0102.desc.illness: "Während ich auf meinem Sterbebett liege,"
  #King dies in siege
 agot_crown_theft.0102.desc.siege: "Während ich innerhalb der Mauern der belagerten Burg den Tod finde, meine letzten Augenblicke erfüllt vom Dröhnen der Belagerungwerkzeuge,"
  #desc
 agot_crown_theft.0102.desc: "kreisen meine Gedanken um das Schicksal des Königreichs. Mein[crown_thief.Custom('DE_END_PRO_S_N')] [SCOPE.sC('crown_theft_king').Custom2('RelationToMeShort', SCOPE.sC('crown_thief'))], [crown_thief.GetTitledFirstName], steht bereit, den Thron an sich zu reißen, und weckt in mir eine Mischung aus Hoffnung und Furcht.\n\nIch bete um Frieden, doch der Schatten eines drohenden Krieges lastet schwer auf meinen letzten Stunden."
 agot_crown_theft.0202.desc: "kreisen meine Gedanken um das Schicksal des Königreichs. [crown_thief.Custom('DE_ART_DEF_S_N')] Vormund[crown_thief.Custom('DE_END_NOU_S_GS_N')] von [crown_thief.GetTitledFirstNameNoTooltip], [usurper_guardian.GetTitledFirstName], steht bereit, den Thron für mein[crown_thief.Custom('DE_END_PRO_S_A')] [SCOPE.sC('crown_theft_king').Custom2('RelationToMeShort', SCOPE.sC('crown_thief'))] zu ergreifen, und weckt in mir eine Mischung aus Hoffnung und Furcht.\n\nIch bete um Frieden, doch der Schatten eines drohenden Krieges lastet schwer auf meinen letzten Stunden."
 agot_crown_theft.0302.desc: "kreisen meine Gedanken um das Schicksal des Königreichs. Mein[crown_thief.Custom('DE_END_PRO_S_N')] Bastard-[SCOPE.sC('crown_theft_king').Custom2('RelationToMeShort', SCOPE.sC('crown_thief'))], [crown_thief.GetTitledFirstName], steht bereit, den Thron an sich zu reißen, und weckt in mir eine Mischung aus Hoffnung und Furcht.\n\nIch bete um Frieden, doch der Schatten eines drohenden Krieges lastet schwer auf meinen letzten Stunden."
 agot_crown_theft.0402.desc: "kreisen meine Gedanken um das Schicksal des Königreichs. Mein[crown_thief.Custom('DE_END_PRO_S_N')] enterbt[crown_thief.Custom('DE_END_ADJ_DEF_S_N')] [SCOPE.sC('crown_theft_king').Custom2('RelationToMeShort', SCOPE.sC('crown_thief'))], [crown_thief.GetTitledFirstName], steht bereit, den Thron an sich zu reißen, und weckt in mir eine Mischung aus Hoffnung und Furcht.\n\nIch bete um Frieden, doch der Schatten eines drohenden Krieges lastet schwer auf meinen letzten Stunden."

 agot_crown_theft.0102.a: "Ich wünschte, ich könnte [crown_thief.GetTitledFirstNameNoTooltip] in [crown_thief.Custom('DE_PRO_POS_S_3P')]er Herrschaft beistehen."
 agot_crown_theft.0102.b: "Mein[crown_theft_king_legit_heir.Custom('DE_END_PRO_S_N')] [Select_CString(crown_theft_king_legit_heir.IsFemale,'Nachfolgerin','Nachfolger')] hätte [crown_theft_king_legit_heir.GetTitledFirstNameNoTooltip] sein sollen."
 agot_crown_theft.0502.b: "[landed_helper.GetTitledFirstNameNoTooltip] muss mein[crown_theft_king_legit_heir.Custom('DE_END_PRO_S_D')] [SCOPE.sC('crown_theft_king').Custom2('RelationToMeShort', SCOPE.sC('crown_theft_king_legit_heir'))] beistehen."

  #LEGITIMATE HEIR DECIDES TO PUSH CLAIMS OR ACCEPT THEIR FATE
 agot_crown_theft.0110.t: "Die Entschlossenheit des Erben"
 agot_crown_theft.0110.desc: "Als die Kunde vom Verrat und Thronraub mein[crown_thief.Custom('DE_END_PRO_S_G')] [SCOPE.sC('crown_theft_king_legit_heir').Custom2('RelationToMeShort', SCOPE.sC('crown_thief'))], [crown_thief.GetFirstName], mein Ohr erreicht, tobt ein Sturm widerstreitender Gefühle in meiner Brust.\n\nDas Gewicht meines Geburtsrechts lastet schwer auf mir und drängt mich, mich zu erheben und einzufordern, was mir von Rechts wegen zusteht. Doch inmitten des Aufruhrs zupft ein Flüstern der Vorsicht an meinem Gewissen und mahnt zur Zurückhaltung angesichts der Ungewissheit."
 agot_crown_theft.0210.desc: "Als die Kunde von [usurper_guardian.GetTitledFirstName] und dessen Verrat mein Ohr erreicht, der den Thron für mein[crown_thief.Custom('DE_END_PRO_S_A')] [SCOPE.sC('crown_theft_king_legit_heir').Custom2('RelationToMeShort', SCOPE.sC('crown_thief'))], [crown_thief.GetFirstName], usurpiert hat, tobt ein Sturm widerstreitender Gefühle in meiner Brust.\n\nDas Gewicht meines Geburtsrechts lastet schwer auf mir und drängt mich, mich zu erheben und einzufordern, was mir von Rechts wegen zusteht. Doch inmitten des Aufruhrs zupft ein Flüstern der Vorsicht an meinem Gewissen und mahnt zur Zurückhaltung angesichts der Ungewissheit."
 agot_crown_theft.0310.desc: "Als die Kunde vom Verrat und Thronraub mein[crown_thief.Custom('DE_END_PRO_S_G')] Bastard-[SCOPE.sC('crown_theft_king_legit_heir').Custom2('RelationToMeShort', SCOPE.sC('crown_thief'))], [crown_thief.GetFirstName], mein Ohr erreicht, tobt ein Sturm widerstreitender Gefühle in meiner Brust.\n\nDas Gewicht meines Geburtsrechts lastet schwer auf mir und drängt mich, mich zu erheben und einzufordern, was mir von Rechts wegen zusteht. Doch inmitten des Aufruhrs zupft ein Flüstern der Vorsicht an meinem Gewissen und mahnt zur Zurückhaltung angesichts der Ungewissheit."
 agot_crown_theft.0410.desc: "Als die Kunde vom Verrat und Thronraub mein[crown_thief.Custom('DE_END_PRO_S_G')] enterbt[crown_thief.Custom('DE_END_ADJ_DEF_S_G')] [SCOPE.sC('crown_theft_king_legit_heir').Custom2('RelationToMeShort', SCOPE.sC('crown_thief'))], [crown_thief.GetFirstName], mein Ohr erreicht, tobt ein Sturm widerstreitender Gefühle in meiner Brust.\n\nDas Gewicht meines Geburtsrechts lastet schwer auf mir und drängt mich, mich zu erheben und einzufordern, was mir von Rechts wegen zusteht. Doch inmitten des Aufruhrs zupft ein Flüstern der Vorsicht an meinem Gewissen und mahnt zur Zurückhaltung angesichts der Ungewissheit."
 agot_crown_theft.0510.desc: "Als die Kunde vom Verrat und Thronraub mein[crown_thief.Custom('DE_END_PRO_S_G')] [SCOPE.sC('crown_theft_king_legit_heir').Custom2('RelationToMeShort', SCOPE.sC('crown_thief'))], [crown_thief.GetFirstName], mein Ohr erreicht, tobt ein Sturm widerstreitender Gefühle in meiner Brust.\n\nDas Gewicht meines Geburtsrechts lastet schwer auf mir und drängt mich, mich zu erheben und einzufordern, was mir von Rechts wegen zusteht.\n\nWährend ich mich eilends aufmache, um Zuflucht am Hof von[landed_helper.GetTitledFirstName] zu suchen, grüble ich über die Schwere der Entscheidung, die mir bevorsteht."

 agot_crown_theft.0110.a: "Ich muss mein Geburtsrecht einfordern!"
 agot_crown_theft.0110.a.tt: "Einen Schritt näher am Krieg..."
 agot_crown_theft.0110.b: "Ich sollte [crown_thief.Custom('DE_ART_DEF_S_A')] neu[crown_thief.Custom('DE_END_ADJ_DEF_S_A')] [Select_CString(crown_thief.IsFemale,'Königin','König')] nicht herausfordern."

  #USURPER RECEIVES LETTER FROM LEGITIMATE HEIR: TO STEP DOWN, USURPER OFFERS SOME ARTIFACT OR LAND, OR NOTHING FOR LEGITIMATE HEIR AS A PRICE OF PEACE
 agot_crown_theft.0111.opening: "An [crown_thief.Custom('DE_ART_DEF_S_A')] [crown_thief.Custom('UsurperName')],"
 agot_crown_theft.0211.opening: "An [usurper_guardian.Custom('DE_ART_DEF_S_A')] verräterisch[usurper_guardian.Custom('DE_END_ADJ_DEF_S_A')] [usurper_guardian.GetTitledFirstNameNoTooltip],"
 agot_crown_theft.0311.opening: "An [Select_CString(crown_thief.IsFemale,'die Bastardkönigin','den Bastardkönig')],"
 agot_crown_theft.0411.opening: "An [Select_CString(crown_thief.IsFemale,'die unrechtmäßige Königin','den unrechtmäßigen König')],"

 agot_crown_theft.0111.desc: "Ich schreibe Euch in aller Dringlichkeit, denn das Königreich siecht unter Eurer unrechtmäßigen Herrschaft dahin. Als rechtmäßig[crown_theft_king_legit_heir.Custom('DE_END_ADJ_DEF_S_N')] [Select_CString(crown_theft_king_legit_heir.IsFemale,'Erbin','Erbe')] des Thrones fordere ich Euch auf, unverzüglich abzudanken und unserem Land weiteres Unheil zu ersparen. Dieser Thron steht Euch nicht zu."
 agot_crown_theft.0211.desc: "Ich schreibe Euch in aller Dringlichkeit, denn das Königreich siecht unter Eurer unrechtmäßigen Herrschaft dahin. Als rechtmäßig[crown_theft_king_legit_heir.Custom('DE_END_ADJ_DEF_S_N')] [Select_CString(crown_theft_king_legit_heir.IsFemale,'Erbin','Erbe')] des Thrones fordere ich Euch und mein[crown_thief.Custom('DE_END_PRO_S_A')] [SCOPE.sC('crown_theft_king_legit_heir').Custom2('RelationToMeShort', SCOPE.sC('crown_thief'))] auf, unverzüglich abzudanken und unserem Land weiteres Unheil zu ersparen. Dieser Thron steht Euch nicht zu."
 agot_crown_theft.0111.a: "Nehmt dieses Familienerbstück als Zeichen des guten Willens."
 agot_crown_theft.0111.a.tt: "Ihr bietet [crown_theft_king_legit_heir.GetTitledFirstNameNoTooltip] [random_artifact_one.GetName] als friedensstiftende Geste an"
 agot_crown_theft.0111.b: "Vielleicht etwas Erleseneres?"
 agot_crown_theft.0111.b.tt: "Ihr bietet [random_artifact_two.GetName] für [crown_theft_king_legit_heir.GetTitledFirstNamePossessiveNoTooltip] Stillschweigen an"
 agot_crown_theft.0111.c: "Vielleicht hält Euch etwas Land ruhig."
 agot_crown_theft.0111.c.tt: "Ihr bietet [random_giveaway_title.GetName] an, um den Frieden zu wahren"
 agot_crown_theft.0111.d: "Es ist an der Zeit, dass Ihr Euch mit Anstand zurückzieht."

  #USURPER RECEIVES LETTER FROM LEGITIMATE HEIR: ABOUT THEIR PEACE DECISION
 agot_crown_theft.0112.opening: "An [crown_thief.GetFirstNameNoTooltip],"
 agot_crown_theft.0112.desc: "Als [crown_thief.Custom('DE_PRO_POS_P_2P_N')|U] demütig[crown_thief.Custom('DE_END_ADJ_IND_S_N')] Vasall[crown_thief.Custom('DE_END_NOU_S_GS_N')] wünsche ich Eurer Herrschaft Gerechtigkeit und Wohlstand. Möge das Reich unter Eurer Regentschaft Frieden und Beständigkeit finden."
 agot_crown_theft.0112.a: "[crown_theft_king_legit_heir.Custom('DE_PRO_PER_S_3P_N')|U] war nie dazu bestimmt, [Select_CString(crown_theft_king_legit_heir.IsFemale,'Königin','König')] zu sein."

  #LEGITIMATE HEIR RECEIVES LETTER FROM USURPER: ACCEPT GIFT OR SEND ULTIMATUM
 agot_crown_theft.0113.opening: "An [crown_theft_king_legit_heir.GetTitledFirstNameNoTooltip],"
 agot_crown_theft.0113.desc.artifact_one: "Ich sende Euch diese Botschaft mit einem Angebot aus meiner Hand. Ein Erbstück, [random_artifact_one.GetName], als Zeichen des guten Willens überreicht, in der Hoffnung, den Frieden zwischen uns zu sichern. Möge dies als Geste der Versöhnung verstanden werden und den Weg zur Eintracht zwischen uns ebnen."
 agot_crown_theft.0113.desc.artifact_two: "Ich sende Euch diese Botschaft mit einem Angebot aus meiner Hand. Ein Erbstück, [random_artifact_two.GetName], als Zeichen des guten Willens überreicht, in der Hoffnung, den Frieden zwischen uns zu sichern. Möge dies als Geste der Versöhnung verstanden werden und den Weg zur Eintracht zwischen uns ebnen."
 agot_crown_theft.0113.desc.duchy: "Ich sende Euch diese Botschaft mit einem Angebot aus meiner Hand. Ein Land aus meinem Besitz, [random_giveaway_title.GetName], als Zeichen des guten Willens überreicht, in der Hoffnung, den Frieden zwischen uns zu sichern. Möge dies als Geste der Versöhnung verstanden werden und den Weg zur Eintracht zwischen uns ebnen."
 agot_crown_theft.0113.desc.nothing: "Ich habe Eure Botschaft empfangen und Eure Forderungen zur Kenntnis genommen. Gleichwohl vermag ich Eurem Ansinnen, den Thron aufzugeben, nicht zu entsprechen. Die Beständigkeit und das Wohl des Königreichs sind von höchster Bedeutung, und ich vertraue darauf, dass Ihr die Notwendigkeit der Fortdauer meiner Herrschaft anerkennt."
 agot_crown_theft.0213.desc.nothing: "Ich habe Eure Botschaft empfangen und Eure Forderungen zur Kenntnis genommen. Gleichwohl vermag ich Eurem Ansinnen, den Thron aufzugeben, nicht zu entsprechen. Die Beständigkeit und das Wohl des Königreichs sind von höchster Bedeutung, und ich vertraue darauf, dass Ihr die Notwendigkeit der Fortdauer der Herrschaft von [crown_thief.GetFirstName] anerkennt."
 agot_crown_theft.0113.a: "Ein gerechtes Angebot."
 agot_crown_theft.0113.b: "Dankt ab, oder seht Euch dem Krieg gegenüber!"

  #USURPER RECEIVES LETTER FROM LEGITIMATE HEIR: ULTIMATUM RECEIVED: WAR OR ABDICATION
 agot_crown_theft.0114.opening: "An [crown_thief.Custom('DE_ART_DEF_S_A')] [crown_thief.Custom('UsurperName')],"
 agot_crown_theft.0114.desc: "Dankt ab, oder wisset, dass die Flammen des Krieges Euch und Eure Ambitionen verzehren werden. Wählt weise, dies ist meine letzte Warnung."
 agot_crown_theft.0114.a: "Dann sei es Krieg."
 agot_crown_theft.0114.b: "Ich muss den Frieden wahren, gleich welchen Preis es kostet."
 agot_crown_theft.0114.b.tt: "Ich werde all meine Titel an [crown_theft_king_legit_heir.GetTitledFirstNameNoTooltip] abtreten"

  #USURPER RECEIVES LETTER FROM LEGITIMATE HEIR: THEY ACCEPTED THE GIFT
 agot_crown_theft.0115.opening: "An [crown_thief.GetFirstNameNoTooltip],"
 agot_crown_theft.0115.desc: "Ich schreibe Euch, um den Empfang Eures großzügigen Geschenks zu bestätigen. Eure Geste zeugt von Eurem Verlangen nach Frieden, ein Empfinden, das ich von ganzem Herzen erwidere. Lasst uns bestrebt sein, die Eintracht zwischen uns zum Wohle des Reiches zu wahren."
 agot_crown_theft.0115.a: "So sei es."
 agot_crown_theft.0215.a: "Das ist super, doch... von welchem Geschenk sprecht Ihr?"
 agot_crown_theft.0215.a.tt: "[usurper_guardian.GetTitledFirstName] hat [random_artifact_one.GetName] in Eurem Namen an [crown_theft_king_legit_heir.GetTitledFirstName] überreicht"

  #LEGITIMATE HEIR RECEIVES LETTER FROM USURPER: WAR
 agot_crown_theft.0116.opening: "An [crown_theft_king_legit_heir.GetTitledFirstNameNoTooltip],"
 agot_crown_theft.0116.desc: "Schweren Herzens schreibe ich Euch, denn ungeachtet aller Versuche, Euren Entschluss zu mildern, scheinen unsere Bemühungen vergebens gewesen zu sein. Wisset, dass ich jeden Weg ausgeschöpft habe, einen gemeinsamen Grund zu finden, doch den Göttern zu leide scheint es, als stünden wir vor einer unüberbrückbaren Kluft. Ich vermag Euren Forderungen nicht nachzukommen, denn dies käme einem Verrat an dem Vertrauen und der Beständigkeit des Reiches gleich. Vielleicht bietet die Zeit noch einen Pfad zur Versöhnung, doch vorerst, so fürchte ich, müssen wir die gegenwärtigen Umstände hinnehmen."
 agot_crown_theft.0216.desc: "Schweren Herzens schreibe ich Euch, denn ungeachtet aller Versuche, Euren Entschluss zu mildern, scheinen unsere Bemühungen vergebens gewesen zu sein. Wisset, dass ich jeden Weg ausgeschöpft habe, einen gemeinsamen Grund zu finden, doch den Göttern zu leide scheint es, als stünden wir vor einer unüberbrückbaren Kluft. Wir vermögen Euren Forderungen nicht nachzukommen, denn dies käme einem Verrat an dem Vertrauen und der Beständigkeit des Reiches gleich. Vielleicht bietet die Zeit noch einen Pfad zur Versöhnung, doch vorerst, so fürchte ich, müssen wir die gegenwärtigen Umstände hinnehmen."
 agot_crown_theft.0116.a: "Dann sei es Krieg!"

  #LEGITIMATE HEIR RECEIVES LETTER FROM USURPER: ABDICATION
 agot_crown_theft.0117.t: "An [crown_theft_king_legit_heir.GetTitledFirstNameNoTooltip],"
 agot_crown_theft.0117.desc: "Schweren Herzens setze ich diese Worte nieder, doch auch mit einem Schimmer der Hoffnung für das Reich. Nach reiflicher Überlegung und langer Beratung bin ich zu dem feierlichen Entschluss gelangt, Eurer Forderung zu entsprechen. Der Thron soll aus meinen Händen in die Euren übergehen, in der Hoffnung, dass diese Geste den Weg zu Frieden und Wohlstand ebnen möge. Ich vertraue das Schicksal des Königreichs Euch an, wohl wissend, dass Ihr mit Weisheit und Güte herrschen werdet. Möge Eure Herrschaft von Einigkeit und Gedeihen für alle geprägt sein."
 agot_crown_theft.0117.a: "Eine weise Entscheidung."

  #REALM NOTIFIED ABOUT THE CONFLICT: WAR
 agot_crown_theft.0120.t: "[crown_theft_king_legit_heir.Custom('WarOfSuccessionNumbers')] [crown_theft_king_legit_heir.Custom('WarOfSuccessionNames')]"
 agot_crown_theft.0120.desc: "Raben durchqueren die Himmel, dunkle Schwingen tragen dunkle Worte in jeden Winkel des Reiches. Ein Sturm braut sich am Horizont zusammen, während die Kriegstrommeln dröhnen und den Ausbruch des Konflikts zwischen den rivalisierenden Thronanwärtern verkünden: [crown_thief.GetTitledFirstName] und [crown_theft_king_legit_heir.GetTitledFirstName].\n\nGeflüster hallt durch die Hallen einer jeden Burg und erzählt die Geschichte der Usurpation, wie [crown_thief.GetTitledFirstNameNoTooltip] die Krone an sich riss, während [crown_theft_king.GetTitledFirstNameNoTooltip] auf [crown_theft_king.Custom('DE_PRO_POS_S_3P')]em Sterbebett lag. Nun hat [crown_theft_king_legit_heir.GetTitledFirstNameNoTooltip], [crown_theft_king_legit_heir.Custom('DE_ART_DEF_S_N')] rechtmäßig[crown_theft_king_legit_heir.Custom('DE_END_ADJ_DEF_S_N')] [Select_CString(crown_theft_king_legit_heir.IsFemale,'Erbin','Erbe')], zu den Waffen gerufen, um einzufordern, was [crown_theft_king_legit_heir.Custom('DE_PRO_PER_S_3P_D')] von Rechts wegen zusteht."
 agot_crown_theft.0220.desc: "Raben durchqueren die Himmel, dunkle Schwingen tragen dunkle Worte in jeden Winkel des Reiches. Ein Sturm braut sich am Horizont zusammen, während die Kriegstrommeln dröhnen und den Ausbruch des Konflikts zwischen den rivalisierenden Thronanwärtern verkünden: [crown_thief.GetTitledFirstName], unterstützt von [usurper_guardian.GetTitledFirstName], und [crown_theft_king_legit_heir.GetTitledFirstName].\n\nGeflüster hallt durch die Hallen einer jeden Burg und erzählt die Geschichte der Usurpation, wie [crown_thief.GetTitledFirstNameNoTooltip] die Krone an sich riss, während [crown_theft_king.GetTitledFirstName] auf [crown_theft_king.Custom('DE_PRO_POS_S_3P')]em Sterbebett lag. Nun hat [crown_theft_king_legit_heir.GetTitledFirstNameNoTooltip], [crown_theft_king_legit_heir.Custom('DE_ART_DEF_S_N')] rechtmäßig[crown_theft_king_legit_heir.Custom('DE_END_ADJ_DEF_S_N')] [Select_CString(crown_theft_king_legit_heir.IsFemale,'Erbin','Erbe')], zu den Waffen gerufen, um einzufordern, was [crown_theft_king_legit_heir.Custom('DE_PRO_PER_S_3P_D')] von Rechts wegen zusteht."
 agot_crown_theft.0320.desc: "Raben durchqueren die Himmel, dunkle Schwingen tragen dunkle Worte in jeden Winkel des Reiches. Ein Sturm braut sich am Horizont zusammen, während die Kriegstrommeln dröhnen und den Ausbruch des Konflikts zwischen den rivalisierenden Thronanwärtern verkünden: [Select_CString(crown_thief.IsFemale,'die Bastardkönigin','der Bastardkönig')] [crown_thief.GetTitledFirstName] und [crown_theft_king_legit_heir.GetTitledFirstName].\n\nGeflüster hallt durch die Hallen einer jeden Burg und erzählt die Geschichte der Usurpation, wie [crown_thief.GetTitledFirstNameNoTooltip] die Krone an sich riss, während [crown_theft_king.GetTitledFirstName] auf [crown_theft_king.Custom('DE_PRO_POS_S_3P')]em Sterbebett lag. Nun hat [crown_theft_king_legit_heir.GetTitledFirstNameNoTooltip], [crown_theft_king_legit_heir.Custom('DE_ART_DEF_S_N')] rechtmäßig[crown_theft_king_legit_heir.Custom('DE_END_ADJ_DEF_S_N')] [Select_CString(crown_theft_king_legit_heir.IsFemale,'Erbin','Erbe')], zu den Waffen gerufen, um einzufordern, was [crown_theft_king_legit_heir.Custom('DE_PRO_PER_S_3P_D')] von Rechts wegen zusteht."
 agot_crown_theft.0420.desc: "Raben durchqueren die Himmel, dunkle Schwingen tragen dunkle Worte in jeden Winkel des Reiches. Ein Sturm braut sich am Horizont zusammen, während die Kriegstrommeln dröhnen und den Ausbruch des Konflikts zwischen den rivalisierenden Thronanwärtern verkünden: [crown_thief.Custom('DE_ART_DEF_S_N')] enterbt[crown_thief.Custom('DE_END_ADJ_DEF_S_N')] [crown_thief.GetTitledFirstName] und [crown_theft_king_legit_heir.GetTitledFirstName].\n\nGeflüster hallt durch die Hallen einer jeden Burg und erzählt die Geschichte der Usurpation, wie [crown_thief.GetTitledFirstNameNoTooltip] die Krone an sich riss, während [crown_theft_king.GetTitledFirstName] auf [crown_theft_king.Custom('DE_PRO_POS_S_3P')]em Sterbebett lag. Nun hat [crown_theft_king_legit_heir.GetTitledFirstNameNoTooltip], [crown_theft_king_legit_heir.Custom('DE_ART_DEF_S_N')] rechtmäßig[crown_theft_king_legit_heir.Custom('DE_END_ADJ_DEF_S_N')] [Select_CString(crown_theft_king_legit_heir.IsFemale,'Erbin','Erbe')], zu den Waffen gerufen, um einzufordern, was [crown_theft_king_legit_heir.Custom('DE_PRO_PER_S_3P_D')] von Rechts wegen zusteht."

 agot_crown_theft.0120.a: "Das verheißt Unheil."

  #REALM NOTIFIED ABOUT THE CONFLICT: RESOLUTION
 agot_crown_theft.0121.t: "Ein beigelegter Zwist"
 agot_crown_theft.0121.desc.usurper: "Der Zwist, der einst das Reich zu zerreißen drohte, hat sein Ende gefunden. [crown_thief.GetTitledFirstName], einst [Select_CString(crown_thief.IsFemale,'Thronräuberin','Thronräuber')], entsagt nun [crown_thief.Custom('DE_PRO_POS_S_3P')]em Anspruch auf den Thron.\n\nWährend sich der Staub legt, wappnet sich das Königreich für ein neues Zeitalter, eines, das von den Nachwehen erbitterter Feindschaft und der Verheißung erneuerter Einheit geprägt ist."
 agot_crown_theft.0121.desc.legit: "Der Zwist, der einst das Reich zu zerreißen drohte, hat sein Ende gefunden. [crown_theft_king_legit_heir.GetTitledFirstName], einst [crown_theft_king_legit_heir.Custom('DE_ART_DEF_S_N')] rechtmäßig[crown_theft_king_legit_heir.Custom('DE_END_ADJ_DEF_S_N')] [Select_CString(crown_theft_king_legit_heir.IsFemale,'Erbin','Erbe')] des Thrones, entsagt nun [crown_theft_king_legit_heir.Custom('DE_PRO_POS_S_3P')]em Anspruch auf den Thron.\n\nWährend sich der Staub legt, wappnet sich das Königreich für ein neues Zeitalter, eines, das von den Nachwehen erbitterter Feindschaft und der Verheißung erneuerter Einheit geprägt ist."
 agot_crown_theft.0321.desc.usurper: "Der Zwist, der einst das Reich zu zerreißen drohte, hat sein Ende gefunden. [crown_thief.GetTitledFirstName], einst [Select_CString(crown_thief.IsFemale,'die Bastardkönigin','der Bastardkönig')], entsagt nun [crown_thief.Custom('DE_PRO_POS_S_3P')]em Anspruch auf den Thron.\n\nWährend sich der Staub legt, wappnet sich das Königreich für ein neues Zeitalter, eines, das von den Nachwehen erbitterter Feindschaft und der Verheißung erneuerter Einheit geprägt ist."
 agot_crown_theft.0421.desc.usurper: "Der Zwist, der einst das Reich zu zerreißen drohte, hat sein Ende gefunden. [crown_thief.GetTitledFirstName], einst [Select_CString(crown_thief.IsFemale,'die unrechtmäßige Königin','der unrechtmäßige König')], entsagt nun [crown_thief.Custom('DE_PRO_POS_S_3P')]em Anspruch auf den Thron.\n\nWährend sich der Staub legt, wappnet sich das Königreich für ein neues Zeitalter, eines, das von den Nachwehen erbitterter Feindschaft und der Verheißung erneuerter Einheit geprägt ist."

 agot_crown_theft.0121.a: "Möge der Friede lange währen."

