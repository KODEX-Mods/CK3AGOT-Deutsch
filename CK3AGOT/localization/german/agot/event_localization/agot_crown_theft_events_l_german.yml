 #USURPER GUARDIAN RECEIVES LETTER FROM LEGITIMATE HEIR: ABOUT THEIR PEACE DECISION
 agot_crown_theft.0222.opening: "An [usurper_guardian.GetTitledFirstNameNoTooltip],"
 agot_crown_theft.0222.desc: "Als [Select_CString(crown_thief.IsFemale,'Eurer Königin','Eures Königs')] demütig[crown_thief.Custom('DE_END_ADJ_IND_S_N')] Vasall[crown_thief.Custom('DE_END_NOU_S_GS_N')] wünsche ich [crown_thief.Custom('DE_PRO_POS_S_3P')]er Herrschaft Gerechtigkeit und Wohlstand. Möge das Reich unter [crown_thief.Custom('DE_PRO_POS_S_3P')]er Regentschaft Frieden und Beständigkeit finden."
 agot_crown_theft.0222.a: "[crown_theft_king_legit_heir.Custom('DE_PRO_PER_S_3P_N')|U] war nie dazu bestimmt, [Select_CString(crown_theft_king_legit_heir.IsFemale,'Königin','König')] zu sein."

 #USURPER GUARDIAN RECEIVES LETTER FROM LEGITIMATE HEIR: ULTIMATUM RECEIVED: WAR OR ABDICATION
 agot_crown_theft.0223.opening: "An [Select_CString(usurper_guardian.IsFemale,'die verräterische','den verräterischen')] [usurper_guardian.GetTitledFirstNameNoTooltip],"
 agot_crown_theft.0223.desc: "Dankt ab, oder wisset, dass die Flammen des Krieges Euch und [Select_CString(crown_thief.IsFemale,'Eure Königin','Euren König')] verzehren werden. Wählt weise, dies ist meine letzte Warnung."
 agot_crown_theft.0223.a: "Oh, oh."

 #KINGMAKER
 agot_crown_theft.0224.t: "Die Falsche Krönung"
 agot_crown_theft.0224.desc.you: "In einem dreisten Akt des Verrats hat [usurper_guardian.GetTitledFirstName] [crown_thief.GetFirstName] in [crown_thief.GetCapitalLocation.GetName] vor einer großen Versammlung gekrönt und damit den Thron an sich gerissen, der mir von Rechts wegen zusteht.\n\nDieser Affront gegen meinen Anspruch darf nicht unbeantwortet bleiben."
 agot_crown_theft.0224.desc.notyou: "In einem dreisten Akt des Verrats hat [usurper_guardian.GetTitledFirstName] [crown_thief.GetTitledFirstName] in [crown_thief.GetCapitalLocation.GetName] vor einer großen Versammlung gekrönt und damit den Thron usurpiert, der von Rechts wegen [crown_theft_king_legit_heir.GetTitledFirstName] zusteht."
 agot_crown_theft.0224.a: "Rüstet Euch für meinen Zorn, Königsmacher."
 agot_crown_theft.0224.queen.a: "Rüstet Euch für meinen Zorn, Königinmacher."
 agot_crown_theft.0224.b: "Aha."

 #KINGMAKER followup
 agot_crown_theft.0225.t: "Der Königsmacher"
 agot_crown_theft.0225.queen.t: "Der Königinmacher"
 agot_crown_theft.0225.desc.king: "Mein Vormund, [usurper_guardian.GetTitledFirstName], hat mich in [crown_thief.GetCapitalLocation.GetName] vor einer großen Versammlung gekrönt.\n\nVon diesem Tage an bin ich [Select_CString(crown_thief.IsFemale,'die rechtmäßige Königin','der rechtmäßige König')]."
 agot_crown_theft.0225.desc.guardian: "Ich habe [crown_thief.GetTitledFirstName] in [crown_thief.GetCapitalLocation.GetName] vor einer großen Versammlung gekrönt.\n\nVon diesem Tage an ist [crown_thief.Custom('DE_PRO_PER_S_3P_N')] [Select_CString(crown_thief.IsFemale,'die rechtmäßige Königin','der rechtmäßige König')]."
 agot_crown_theft.0225.a: "Der Thron ist unser."

 #BASTARD CAN LEGIZIMIZE
 agot_crown_theft.0318.t: "Der Aufstieg [Select_CString(crown_thief.IsFemale,'der Bastardkönigin','des Bastardkönigs')]"
 agot_crown_theft.0318.desc: "Obwohl mir mein Geburtsrecht abgesprochen ward, habe ich den Thron an mich gerissen und stehe nun an einem Scheideweg. Die Gelegenheit, mich selbst zu legitimieren und die Krone mit unangefochtener Autorität zu beanspruchen, liegt zum Greifen nah.\n\nDoch die Frage bleibt: Soll ich die Legitimität und die volle Macht, die sie mit sich bringt, annehmen, oder soll ich im Schatten verweilen, [Select_CString(crown_thief.IsFemale,'eine Bastardkönigin, die allein durch Stärke herrscht','ein Bastardkönig, der allein durch Stärke herrscht')]?"
 agot_crown_theft.0318.a: "Ich muss mein Geburtsrecht einfordern."
 agot_crown_theft.0318.b: "Ich werde nie vergessen, was ich bin, denn die Welt wird es gewiss auch nicht vergessen."
 agot_crown_theft.0318.b.tt: "Ihr bleibt ein illegitimer Bastard"

 #REALM NOTIFIED: BASTARD KING
 agot_crown_theft.0322.t: "Ein Thron im Schatten"
 agot_crown_theft.0322.desc: "Das Reich ist in Aufruhr, als sich die bestürzende Wahrheit gleich einem Banner im Winde entfaltet — ein Bastard hat den Thron usurpiert und damit die Gebräuche edler Abstammung missachtet.\n\nBestürzung hallt durch die höfischen Kreise und dringt bis zu den Ohren des gemeinen Volkes, entfacht Debatten und sät Zweifel an der Rechtmäßigkeit der Herrschaft [Select_CString(crown_thief.IsFemale,'der neuen Herrscherin','des neuen Herrschers')]."
 agot_crown_theft.0322.a: "[Select_CString(crown_thief.IsFemale,'Eine Bastardkönigin','Ein Bastardkönig')]?"

 #BASTARD CAN LEGIZIMIZE
 agot_crown_theft.0418.t: "Rückforderung meines Geburtsrechts"
 agot_crown_theft.0418.desc: "Den Gebräuchen adliger Sitten zum Trotz habe ich den Thron an mich gerissen, obgleich ich enterbt war.\n\nNun habe ich Schritte unternommen, meinen rechtmäßigen Stand wiederherzustellen, die Enterbung aufzuheben und meinen Anspruch auf die Krone zu bekräftigen."
 agot_crown_theft.0418.a: "Der Thron ist mein."

 #REALM NOTIFIED: BASTARD KING
 agot_crown_theft.0422.t: "[crown_thief.Custom('DE_ART_DEF_S_N')] [crown_thief.Custom('UsurperName')]"
 agot_crown_theft.0422.desc: "Das Reich ist in Aufruhr, als sich die bestürzende Wahrheit gleich einem Banner im Winde entfaltet — ein enterbtes Mitglied der königlichen Familie hat den Thron usurpiert und damit die Gebräuche adliger Abstammung missachtet.\n\nBestürzung hallt durch die höfischen Kreise und dringt bis zu den Ohren des gemeinen Volkes, entfacht Debatten und sät Zweifel an der Rechtmäßigkeit der Herrschaft [Select_CString(crown_thief.IsFemale,'der neuen Herrscherin','des neuen Herrschers')]."
 agot_crown_theft.0422.a: "[Select_CString(crown_thief.IsFemale,'Eine unrechtmäßige Königin','Ein unrechtmäßiger König')]?"

 #The prince arrives
 agot_crown_theft.0523.t: "Zuflucht [Select_CString(crown_theft_king_legit_heir.IsFemale,'der gefallenen Erbin','des gefallenen Erben')]"
 agot_crown_theft.0523.desc: "[crown_theft_king_legit_heir.GetTitledFirstName] und [crown_theft_king_legit_heir.Custom('DE_PRO_POS_S_3P')][Select_CString(legit_spouse.IsFemale,'e Gemahlin',' Gemahl'], [legit_spouse.GetTitledFirstName], erreichen meinen Hof, erschöpft und mittellos, nachdem sie aus der Hauptstadt geflohen sind. [crown_thief.Custom('DE_ART_DEF_S_N')] [crown_thief.Custom('UsurperName')] hat den Thron usurpiert und sie ins Exil getrieben.\n\nNun suchen sie meinen Rat und meinen Beistand, in der Hoffnung, Unterstützung zu sammeln, um einzufordern, was ihnen von Rechts wegen zusteht."
   agot_crown_theft.0523.a: "Sie sind nun in Sicherheit."

#Spouse's House Head decides about support
agot_crown_theft.0518.t: "Ein Ruf zu den Waffen"
 agot_crown_theft.0518.desc: "Als [crown_theft_king_legit_heir.Custom('DE_ART_DEF_S_N')] des Thrones beraubt[crown_theft_king_legit_heir.Custom('DE_END_ADJ_DEF_S_N')] [Select_CString(crown_theft_king_legit_heir.IsFemale,'Erbin','Erbe')] und [crown_theft_king_legit_heir.Custom('DE_PRO_POS_S_3P')][Select_CString(legit_spouse.IsFemale,'e Gemahlin',' Gemahl')] an meinem Hofe Zuflucht suchen, vertraut [crown_theft_king_legit_heir.Custom('DE_PRO_PER_S_3P_N')] mir [crown_theft_king_legit_heir.Custom('DE_PRO_POS_S_3P')]en Wunsch an, [crown_theft_king_legit_heir.Custom('DE_PRO_POS_S_3P')]en Thron zurückzufordern. Das Gewicht der Zukunft des Königreichs lastet nun auf meinen Schultern.\n\nOhne meinen Beistand scheint [crown_theft_king_legit_heir.Custom('DE_PRO_POS_S_3P')]e Sache dem Untergang geweiht. Soll ich [crown_theft_king_legit_heir.Custom('DE_PRO_PER_S_3P_D')] meine Stärke leihen und die Beständigkeit meiner Ländereien aufs Spiel setzen, oder soll ich mich verweigern und den Frieden meines eigenen Reiches wahren?"
 agot_crown_theft.0518.desc.already_here: "Als [crown_theft_king_legit_heir.Custom('DE_ART_DEF_S_N')] des Thrones beraubt[crown_theft_king_legit_heir.Custom('DE_END_ADJ_DEF_S_N')] [Select_CString(crown_theft_king_legit_heir.IsFemale,'Erbin','Erbe')] an meinem Hofe Zuflucht sucht, vertraut [crown_theft_king_legit_heir.Custom('DE_PRO_PER_S_3P_N')] mir [crown_theft_king_legit_heir.Custom('DE_PRO_POS_S_3P')]en Wunsch an, [crown_theft_king_legit_heir.Custom('DE_PRO_POS_S_3P')]en Thron zurückzufordern. Das Gewicht der Zukunft des Königreichs lastet nun auf meinen Schultern.\n\nOhne meinen Beistand scheint [crown_theft_king_legit_heir.Custom('DE_PRO_POS_S_3P')]e Sache dem Untergang geweiht. Soll ich [crown_theft_king_legit_heir.Custom('DE_PRO_PER_S_3P_D')] meine Stärke leihen und die Beständigkeit meiner Ländereien aufs Spiel setzen, oder soll ich mich verweigern und den Frieden meines eigenen Reiches wahren?"
 agot_crown_theft.0518.a: "Ich werde diesen Krieg nicht unterstützen."
 agot_crown_theft.0518.b: "Ich muss [crown_theft_king_legit_heir.Custom('DE_PRO_PER_S_3P_D')] beistehen."
 agot_crown_theft.0518.b.tt: "Sollte [crown_theft_king_legit_heir.GetTitledFirstNameNoTooltip] beschließen, [Select_CString(crown_thief.IsFemale,'der Königin','dem König')] den Krieg zu erklären, werdet Ihr zum Kriegsführer."

 #No Support
 agot_crown_theft.0519.t: "Eine zunichte gemachte Hoffnung"
 agot_crown_theft.0519.desc: "Mein Herz wird schwer, als [landed_helper.GetTitledFirstName] mein Flehen um Beistand bei der Rückeroberung des Thrones abweist. Die Zurückweisung lässt mich ohne die nötige Unterstützung zurück, um den Griff von [crown_thief.Custom('UsurperName')] um das Königreich zu brechen.\n\nDer Pfad zu meinem rechtmäßigen Sitz scheint nun versperrt, und das Gewicht dieses Rückschlags lastet schwer auf mir. Der Traum von Gerechtigkeit und der Rückforderung meines Geburtsrechts muss einstweilen ruhen."
 agot_crown_theft.0519.a: "Ich muss wohl ausharren."

 #Usurper Won
 agot_crown_theft.0522.t: "Ein gesichertes Königreich"
 agot_crown_theft.0522.desc: "Die Kunde erreicht mich, dass [crown_theft_king_legit_heir.GetTitledFirstName], [crown_theft_king_legit_heir.Custom('DE_ART_DEF_S_N')] des Thrones beraubt[crown_theft_king_legit_heir.Custom('DE_END_ADJ_DEF_S_N')] [Select_CString(crown_theft_king_legit_heir.IsFemale,'Thronfolgerin','Thronfolger')], nicht die nötige Unterstützung erhält, um meine Herrschaft anzufechten. [crown_theft_king_legit_heir.Custom('DE_PRO_POS_S_3P')|U]e Isolation in diesem Kampf stärkt meine Stellung und festigt meinen Griff um den Thron.\n\nMit jedem verstreichenden Augenblick wird meine Herrschaft sicherer, während [crown_theft_king_legit_heir.GetTitledFirstNamePossessive] Hoffnungen, [crown_theft_king_legit_heir.Custom('DE_PRO_POS_S_3P')] Geburtsrecht zurückzufordern, in Einsamkeit dahinschwinden."
 agot_crown_theft.0522.a: "Und nun beginnt meine Herrschaft."

 #REALM NOTIFIED ABOUT THE CONFLICT: WAR
 agot_crown_theft.0520.t: "Der Erbfolgekrieg"
 agot_crown_theft.0520.desc: "Raben durchqueren die Himmel, dunkle Schwingen tragen dunkle Worte in jeden Winkel des Reiches. Ein Sturm braut sich am Horizont zusammen, während die Kriegstrommeln dröhnen und den Ausbruch des Konflikts zwischen den rivalisierenden Thronanwärtern verkünden: [crown_thief.GetTitledFirstName] und [crown_theft_king_legit_heir.GetTitledFirstName].\n\nGeflüster hallt durch die Hallen einer jeden Burg und erzählt die Geschichte der Usurpation, wie [crown_thief.GetTitledFirstNameNoTooltip] die Krone an sich riss, während [crown_theft_king.GetTitledFirstName] auf [crown_theft_king.Custom('DE_PRO_POS_S_3P')]em Sterbebett lag. Nun hat [crown_theft_king_legit_heir.GetTitledFirstNameNoTooltip], [crown_theft_king_legit_heir.Custom('DE_ART_DEF_S_N')] rechtmäßig[crown_theft_king_legit_heir.Custom('DE_END_ADJ_DEF_S_N')] [Select_CString(crown_theft_king_legit_heir.IsFemale,'Erbin','Erbe')], mit der Hilfe von [landed_helper.GetTitledFirstName] zu den Waffen gerufen, um einzufordern, was [crown_theft_king_legit_heir.Custom('DE_PRO_PER_S_3P_D')] von Rechts wegen zusteht."

 agot_crown_theft.0623.desc: "[crown_theft_king_legit_heir.GetTitledFirstName] erreicht meinen Hof, erschöpft und mittellos, nachdem [crown_theft_king_legit_heir.Custom('DE_PRO_PER_S_3P_N')] aus der Hauptstadt geflohen ist. [crown_thief.Custom('DE_ART_DEF_S_N')] [crown_thief.Custom('UsurperName')] hat den Thron usurpiert und [crown_theft_king_legit_heir.Custom('DE_PRO_PER_S_3P_A')] ins Exil getrieben.\n\nNun sucht [crown_theft_king_legit_heir.Custom('DE_PRO_PER_S_3P_N')] meinen Rat und meinen Beistand, in der Hoffnung, Unterstützung zu sammeln, um einzufordern, was [crown_theft_king_legit_heir.Custom('DE_PRO_PER_S_3P_D')] von Rechts wegen zusteht."
 agot_crown_theft.0623.a: "[crown_theft_king_legit_heir.Custom('DE_PRO_PER_S_3P_N')|U] ist nun in Sicherheit."

 agot_crown_theft.0618.desc: "Als [crown_theft_king_legit_heir.Custom('DE_ART_DEF_S_N')] des Thrones beraubt[crown_theft_king_legit_heir.Custom('DE_END_ADJ_DEF_S_N')] [Select_CString(crown_theft_king_legit_heir.IsFemale,'Erbin','Erbe')] an meinem Hofe Zuflucht sucht, vertraut [crown_theft_king_legit_heir.Custom('DE_PRO_PER_S_3P_N')] mir [crown_theft_king_legit_heir.Custom('DE_PRO_POS_S_3P')]en Wunsch an, [crown_theft_king_legit_heir.Custom('DE_PRO_POS_S_3P')]en Thron zurückzufordern. Das Gewicht der Zukunft des Königreichs lastet nun auf meinen Schultern.\n\nOhne meinen Beistand scheint [crown_theft_king_legit_heir.Custom('DE_PRO_POS_S_3P')]e Sache dem Untergang geweiht. Soll ich [crown_theft_king_legit_heir.Custom('DE_PRO_PER_S_3P_D')] meine Stärke leihen und die Beständigkeit meiner Ländereien aufs Spiel setzen, oder soll ich mich verweigern und den Frieden meines eigenen Reiches wahren?"

 agot_crown_theft.0722.desc.guardian: "Die Kunde erreicht mich, dass [crown_theft_king_legit_heir.GetTitledFirstName], [crown_theft_king_legit_heir.Custom('DE_ART_DEF_S_N')] des Thrones beraubt[crown_theft_king_legit_heir.Custom('DE_END_ADJ_DEF_S_N')] [Select_CString(crown_theft_king_legit_heir.IsFemale,'Erbin','Erbe')], nicht die nötige Unterstützung erhält, um meine Herrschaft anzufechten. [crown_theft_king_legit_heir.Custom('DE_PRO_POS_S_3P')|U]e Isolation in diesem Kampf stärkt meine Stellung."
 agot_crown_theft.0722.b: "Und nun beginnt meine Regentschaft."

 agot_crown_theft.0720.desc: "Raben durchqueren die Himmel, dunkle Schwingen tragen dunkle Worte in jeden Winkel des Reiches. Ein Sturm braut sich am Horizont zusammen, während die Kriegstrommeln dröhnen und den Ausbruch des Konflikts zwischen den rivalisierenden Thronanwärtern verkünden: [crown_thief.GetTitledFirstName], unterstützt von [usurper_guardian.GetTitledFirstName], und [crown_theft_king_legit_heir.GetTitledFirstName].\n\nGeflüster hallt durch die Hallen einer jeden Burg und erzählt die Geschichte der Usurpation, wie [crown_thief.GetTitledFirstNameNoTooltip] die Krone an sich riss, während [crown_theft_king.GetTitledFirstName] auf [crown_theft_king.Custom('DE_PRO_POS_S_3P')]em Sterbebett lag. Nun hat [crown_theft_king_legit_heir.GetTitledFirstNameNoTooltip], [crown_theft_king_legit_heir.Custom('DE_ART_DEF_S_N')] rechtmäßig[crown_theft_king_legit_heir.Custom('DE_END_ADJ_DEF_S_N')] [Select_CString(crown_theft_king_legit_heir.IsFemale,'Erbin','Erbe')], mit der Hilfe von [landed_helper.GetTitledFirstName] zu den Waffen gerufen, um einzufordern, was [crown_theft_king_legit_heir.Custom('DE_PRO_PER_S_3P_D')] von Rechts wegen zusteht."

 #######################
 ### POST-WAR EVENTS ###
 #######################
 agot_crown_theft.9955.t: "Eine neue Reise"
 agot_crown_theft.9955.desc: "Ich stand am Rande eines Konflikts, bereit zu handeln, doch am Ende wählte ich einen anderen Pfad. Das Feuer in mir lodert noch immer, doch die Zeit zum Handeln ist vorüber, vorerst. Während ich mich auf diese Reise begebe, erfüllt Ungewissheit den Weg, der vor mir liegt. Der kalte Wind des Unbekannten streicht über mein Antlitz, doch es ist ein seltsames Gefühl der Freiheit, das ihn begleitet, wie feiner Sommerregen auf der Stirn. Die Entscheidungen, die ich traf, verweilen in meinen Gedanken, doch die Last ist geringer, als ich erwartet hätte.\n\nDer Pfad voraus wird klarer, als ob das Schicksal selbst sich mit jedem Schritt entfaltet, den ich tue."
 agot_crown_theft.9955.a: "Der Weg ist mein, ihn zu beschreiten, und die Zukunft ist mein, sie zu gestalten."
 agot_crown_theft.9955.a.tt: "Mein Titel erhält einen neuen Namen"

 agot_crown_theft.9966.t: "Ein aufziehender Krieg"
 agot_crown_theft.9966.legit.desc: "Ein Gefühl der Unruhe ergreift das Reich, als die Kunde eines bevorstehenden Krieges mein Ohr erreicht. [crown_thief.Custom('DE_ART_DEF_S_N')] [crown_thief.Custom('UsurperName')] [crown_thief.GetTitledFirstName] hat den Thron [crown_theft_king_legit_heir.Custom('DE_ART_DEF_S_D')] rechtmäßig[crown_theft_king_legit_heir.Custom('DE_END_ADJ_DEF_S_D')] [Select_CString(crown_theft_king_legit_heir.IsFemale,'Erbin','Erben')] [crown_theft_king_legit_heir.GetTitledFirstName] entrissen, und nun steht das Königreich am Rande eines Konflikts.\n\nAls Vasall[ROOT.Char.Custom('DE_END_NOU_S_GS_N')] muss ich meine Treue abwägen und entscheiden, wen ich im kommenden Krieg unterstütze. Soll ich zu [crown_thief.GetTitledFirstName] stehen, [crown_thief.Custom('DE_ART_DEF_S_D')] derzeitig[crown_thief.Custom('DE_END_ADJ_DEF_S_D')] [Select_CString(crown_thief.IsFemale,'Herrscherin','Herrscher')], oder [crown_theft_king_legit_heir.GetTitledFirstNameNoTooltip] unterstützen, [crown_theft_king_legit_heir.Custom('DE_ART_DEF_S_A')] wahr[crown_theft_king_legit_heir.Custom('DE_END_ADJ_DEF_S_A')] [Select_CString(crown_theft_king_legit_heir.IsFemale,'Erbin','Erben')] des Thrones?"
 agot_crown_theft.9966.helper.desc: "Ein Gefühl der Unruhe ergreift das Reich, als die Kunde eines bevorstehenden Krieges mein Ohr erreicht. [crown_thief.Custom('DE_ART_DEF_S_N')] [crown_thief.Custom('UsurperName')] [crown_thief.GetTitledFirstName] hat den Thron [crown_theft_king_legit_heir.Custom('DE_ART_DEF_S_D')] rechtmäßig[crown_theft_king_legit_heir.Custom('DE_END_ADJ_DEF_S_D')] [Select_CString(crown_theft_king_legit_heir.IsFemale,'Erbin','Erben')] [crown_theft_king_legit_heir.GetTitledFirstName] entrissen, und nun steht das Königreich am Rande eines Konflikts.\n\nAls Vasall[ROOT.Char.Custom('DE_END_NOU_S_GS_N')] muss ich meine Treue abwägen und entscheiden, wen ich im kommenden Krieg unterstütze. Soll ich zu [crown_thief.GetTitledFirstNameNoTooltip] stehen, [crown_thief.Custom('DE_ART_DEF_S_D')] derzeitig[crown_thief.Custom('DE_END_ADJ_DEF_S_D')] [Select_CString(crown_thief.IsFemale,'Herrscherin','Herrscher')], oder [landed_helper.GetTitledFirstName] unterstützen, [crown_theft_king_legit_heir.Custom('DE_ART_DEF_S_G')] wahr[crown_theft_king_legit_heir.Custom('DE_END_ADJ_DEF_S_G')] [Select_CString(crown_theft_king_legit_heir.IsFemale,'Erbin','Erben')] [crown_theft_king_legit_heir.GetTitledFirstName] standhaft[landed_helper.Custom('DE_END_ADJ_IND_S_N')] [Select_CString(landed_helper.IsFemale,'Verbündete','Verbündeter')]?"
 agot_crown_theft.9966.a: "Die Sache der Rebellion ist gerecht!"
 agot_crown_theft.9966.a.tt: "Sollte ein Erbfolgekrieg ausbrechen, werdet Ihr Euch der Rebellion auf der Seite von [main_attacker.GetFullName] anschließen."
 agot_crown_theft.9966.b: "Die Rebellen werden teuer dafür bezahlen."
 agot_crown_theft.9966.b.tt: "Sollte ein Erbfolgekrieg ausbrechen, werdet Ihr als Verteidiger auf der Seite von [crown_thief.GetFullName] in den Krieg ziehen."
 agot_crown_theft.9966.c: "Ich sehe keinen Grund, mich einzumischen."

 agot_crown_theft.9977.t: "Festigung der Macht"
 agot_crown_theft.9977.desc: "Da meinem Sieg gesichert ist und meine Herrschaft fest begründet, ist die Zeit gekommen, die volle Gewalt über das Königreich zu erlangen. Doch [attacker.GetTitledFirstName] hält noch immer Titel und Ländereien, die mir von Rechts wegen zustehen.\n\nEs liegt in meiner Macht, deren Rückgabe von [attacker.GetTitledFirstNameNoTooltip] zu fordern und meine Lehnsherrschaft über diese Gebiete durchzusetzen."
 agot_crown_theft.9977.a: "[attacker.GetTitledFirstNameNoTooltip] muss all [attacker.Custom('DE_PRO_POS_S_3P')]e Ländereien abgeben."
 agot_crown_theft.9977.b: "[attacker.Custom('DE_PRO_PER_S_3P_N')|U] mag sie behalten, vorerst."

 agot_crown_theft.9978.t: "Kapitulation"
 agot_crown_theft.9978.desc: "[defender.GetFirstName], [defender.Custom('DE_ART_DEF_S_N')] [defender.Custom('UsurperName')], ist siegreich hervorgegangen, und nun fordert [defender.Custom('DE_PRO_PER_S_3P_N')] die Übergabe all meiner Ländereien.\n\nOhne die Mittel, diese Gebiete gegen [defender.Custom('DE_PRO_POS_S_3P')]e Macht zu verteidigen, muss ich mich fügen."
 agot_crown_theft.9978.a: "Wie tief ist die Welt gesunken..."

 agot_crown_theft.9990.t: "Rückforderung rechtmäßiger Ländereien"
 agot_crown_theft.9990.desc: "Da [Select_CString(crown_thief.IsFemale,'die Usurpatorin','der Usurpator')] besiegt ist und mein Anspruch unumstritten, ist die Zeit gekommen, wiederherzustellen, was mir von Rechts wegen zusteht. Doch die Lords, die einst [Select_CString(crown_thief.IsFemale,'der Prätendentin','dem Prätendenten')] die Treue schworen, klammern sich noch immer an Titel und Ländereien, die meinem Hause von Geburt an zustehen.\n\nEs liegt in meiner Macht, deren Rückgabe von [unlawful_ruler.GetTitledFirstName] zu fordern und meine Lehnsherrschaft über diese Gebiete erneut durchzusetzen."
 agot_crown_theft.9990.a: "Gebt mir meine Titel unverzüglich zurück."
 agot_crown_theft.9990.b: "[unlawful_ruler.Custom('DE_PRO_PER_S_3P_N')|U] mag sie behalten, vorerst."

 agot_crown_theft.9991.t: "Herausgabe usurpierter Ländereien"
 agot_crown_theft.9991.desc: "[legitimate_king.GetTitledFirstName] ist siegreich hervorgegangen, und nun fordert [legitimate_king.Custom('DE_PRO_PER_S_3P_N')] die Rückgabe der Ländereien, die mir unrechtmäßig von [Select_CString(crown_thief.IsFemale,'der Usurpatorin','dem Usurpator')] gewährt wurden.\n\nOhne die Mittel, diese Gebiete gegen [legitimate_king.Custom('DE_PRO_POS_S_3P')]e Macht zu verteidigen, muss ich mich fügen und zurückgeben, was mir nicht von Rechts wegen zusteht."
 agot_crown_theft.9991.a: "Ich werde [legitimate_king.Custom('DE_PRO_POS_S_3P')]e Ländereien zurückgeben."

 agot_crown_theft.9992.t: "Wiederherstellung der Ordnung"
 agot_crown_theft.9992.desc: "[unlawful_ruler.GetTitledFirstName] hat klüglich und hellsichtigerweise beschlossen, die Ländereien zurückzugeben, die mir von Rechts wegen zustehen, und damit einen bedeutsamen Schritt zur Wiederherstellung der alten Ordnung getan. Mit jeder Rückforderung nähern wir uns der Beständigkeit und Einheit, die einst unser Reich auszeichneten."
 agot_crown_theft.9992.a: "[unlawful_ruler.Custom('DE_PRO_PER_S_3P_N')|U] hat recht gehandelt."

