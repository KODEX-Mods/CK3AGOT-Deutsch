agot_events_bastard.0992.t: "Eine überschrittene Grenze"
agot_events_bastard.0992.desc: "So weit ist es also gekommen.\n\nEs ist zu viel Zeit vergangen, um behaupten zu können, ich hätte die Botschaft von [ruler_scope.GetFirstName] nicht erhalten, und um die nötigen Truppen aufzubieten, habe ich die Raben ausgesandt, um die Banner zum Krieg zu rufen. Die Grenze ist überschritten, die Würfel sind gefallen, und entweder wird Haus [reveal_scope.GetHouse.GetBaseName] oder Haus [ruler_scope.GetHouse.GetBaseName] als Sieger hervorgehen, wenn dies vorüber ist.\n\nIch mustere die vor mir versammelten Banner und sehe die vielen, die herbeigeströmt sind, um den ungerechten Forderungen des Tyrannen [ruler_scope.GetName] zu trotzen."
 agot_events_bastard.0992.desc.same: "So weit ist es also gekommen.\n\nEs ist zu viel Zeit vergangen, um behaupten zu können, ich hätte die Botschaft von [ruler_scope.GetFirstName] nicht erhalten, und um die nötigen Truppen aufzubieten, habe ich die Raben ausgesandt, um die Banner zum Krieg zu rufen. Die Grenze ist überschritten, die Würfel sind gefallen, und wer der wahre [ruler_scope.GetHouse.GetBaseName] ist, wird mit Blut entschieden.\n\nIch mustere die vor mir versammelten Banner und sehe die vielen, die herbeigeströmt sind, um den ungerechten Forderungen des Tyrannen [ruler_scope.GetNameNoTooltip] zu trotzen."
 agot_events_bastard.0992.desc.ned: "So weit ist es also gekommen.\n\nEs ist zu viel Zeit vergangen, um behaupten zu können, ich hätte die Botschaft von [ruler_scope.GetFirstName] nicht erhalten, und um die nötigen Truppen aufzubieten, habe ich die Raben ausgesandt, um die Banner zum Krieg zu rufen. Die Grenze ist überschritten, die Würfel sind gefallen, und entweder wird Haus [reveal_scope.GetHouse.GetBaseName] oder Haus [ruler_scope.GetHouse.GetBaseName] als Sieger hervorgehen, wenn dies vorüber ist.\n\nIch mustere die vor mir versammelten Banner, und obwohl es mir das Herz zerreißt, gen Süden gegen meinen einstigen Freund zu marschieren, weiß ich, dass ich es Lyanna und [reveal_scope.GetFirstName] schuldig bin, das Richtige zu tun. Um der Barmherzigkeit aller und meiner selbst willen wünsche ich mir, dass dies ein kurzer Krieg sein möge."
 agot_events_bastard.0992.a: "Gemeinsam marschieren wir für die Gerechtigkeit!"

  # Ruler war declaration alert
 agot_events_bastard.0993.t: "Forderungen abgelehnt"
 agot_events_bastard.0993.desc: "So weit ist es also gekommen.\n\nMeine Forderungen zurückweisend, hat der Bastard [reveal_scope.GetName] [reveal_scope.Custom('DE_PRO_POS_S_3P')]e Absicht verkündet, über [ruler_scope.GetPrimaryTitle.GetName] zu herrschen, und [reveal_scope.Custom('DE_PRO_POS_S_3P')]e Verbündeten aufgerufen, [reveal_scope.Custom('DE_PRO_POS_S_3P')]en Anspruch zu verteidigen. Welche Versprechungen [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] gemacht haben muss, um ein solches Heer aufzustellen, ist unbekannt, doch die Grenze ist überschritten, die Würfel sind gefallen, und entweder wird Haus [reveal_scope.GetHouse.GetBaseName] oder Haus [ruler_scope.GetHouse.GetBaseName] als Sieger hervorgehen, wenn dies vorüber ist.\n\nIch mustere die vor mir versammelten Banner und sehe die vielen, die herbeigeströmt sind, um meine rechtmäßige Herrschaft zu verteidigen."
 agot_events_bastard.0993.desc.same: "So weit ist es also gekommen.\n\nMeine Forderungen zurückweisend, hat der Bastard [reveal_scope.GetName] [reveal_scope.Custom('DE_PRO_POS_S_3P')]e Absicht verkündet, über [ruler_scope.GetPrimaryTitle.GetName] zu herrschen, und [reveal_scope.Custom('DE_PRO_POS_S_3P')]e Verbündeten aufgerufen, [reveal_scope.Custom('DE_PRO_POS_S_3P')]en Anspruch zu verteidigen. Welche Versprechungen [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] gemacht haben muss, um ein solches Heer aufzustellen, ist unbekannt, doch die Grenze ist überschritten, die Würfel sind gefallen, und entweder ein wahrer oder ein falscher [reveal_scope.GetHouse.GetBaseName] wird als Sieger hervorgehen, wenn dies vorüber ist.\n\nIch mustere die vor mir versammelten Banner und sehe die vielen, die herbeigeströmt sind, um meine rechtmäßige Herrschaft zu verteidigen."
 agot_events_bastard.0993.desc.robert: "Die Ereignisse der letzten Wochen haben mich bis ins Mark erschüttert, und nichts mehr als die Lage, in der ich mich nun befinde.\n\nMein einstiger Freund Eddard Stark hat meine Forderungen als ungerecht bezeichnet und seine Banner erhoben, um [reveal_scope.GetName] als Herrscher über [ruler_scope.GetPrimaryTitle.GetName] einzusetzen. Er hat seine zahlreichen Verbündeten und Vasallen aufgerufen, diesen Anspruch zu verteidigen, und behauptet, meine Forderung beweise, dass ich nicht besser sei als der Irre König, den wir einst gemeinsam gestürzt haben.\n\nWelche Freundschaft auch immer zwischen uns bestand, sie ist nun vorbei. Die Grenze ist überschritten, die Würfel sind gefallen, und entweder wird Haus Stark oder Haus Baratheon als Sieger hervorgehen, wenn dies vorüber ist.\n\nIch werde die Rebellen zerschmettern, ich werde die Starks zerschmettern, und ich werde die kleine Drachenbrut zerschmettern, so wie ich [reveal_scope.Custom('DE_PRO_POS_S_3P')]en Vater und Großvater zerschmettert habe!"
 agot_events_bastard.0993.a: "Ich werde diese Rebellen und Thronräuber vernichten!"

  # Ruler wins war
 agot_events_bastard.0994.t: "Die Ordnung ist wiederhergestellt"
 agot_events_bastard.0994.desc: "Der Aufstand des Bastards ist niedergeschlagen.\n\n[claimant.GetName] sitzt in meinen Kerkern, ebenso wie [claimant.Custom('DE_PRO_POS_S_3P')]e verräterischen Verbündeten. Geschichtsschreiber werden darüber streiten, ob dies hätte vermieden werden können oder ob solche Geheimniskrämerei stets zum Scheitern verurteilt war, doch das Ergebnis steht jedenfalls fest.\n\nHaus [ROOT.Char.GetHouse.GetBaseName] herrscht noch immer, und ich regiere weiterhin!"
 agot_events_bastard.0994.a: "Endlich kehrt der Frieden zurück."

  # Bastard wins war
 agot_events_bastard.0995.t: "Euer Geburtsrecht verkünden"
 agot_events_bastard.0995.desc: "Ich schreite durch die großen Tore des Thronsaals, die gewaltige Gestalt des Eisernen Throns beherrscht den Raum und ragt über den zu beiden Seiten versammelten Hof empor. Ich spüre, wie er mich ruft, und mit entschlossenem Schritt folge ich seinem Ruf.\n\nMit jedem Schritt sinken mehr auf die Knie, als ich vorbeischreite, und verneigen sich vor ihrem neuen Lehnsherrn. Obwohl viele es noch vor wenigen Monden bezweifelt hätten, wagt es nun niemand mehr, meine Rechtmäßigkeit in Frage zu stellen.\n\nAls ich die ersten Stufen des Throns erklimme, spüre ich, wie der Makel meiner Geburt von mir abfällt, und als ich die Spitze erreiche, wende ich mich um und erhebe mein Schwert, um ein neues Zeitalter zu verkünden!"
 agot_events_bastard.0995.a.king: "„Ich bin [ROOT.Char.GetFirstNameNoTooltip] [father_house.GetBaseNameNoTooltip], und ich bin euer König!""
 agot_events_bastard.0995.b.king: "„Ich bin [ROOT.Char.GetFirstNameNoTooltip] [mother_house.GetBaseNameNoTooltip], und ich bin euer König!""
 agot_events_bastard.0995.c.king: "„Ich bin [ROOT.Char.GetFirstNameNoTooltip] [checking_house.GetBaseNameNoTooltip], und ich bin euer König!""
 agot_events_bastard.0995.a.queen: "„Ich bin [ROOT.Char.GetFirstNameNoTooltip] [father_house.GetBaseNameNoTooltip], und ich bin eure Königin!""
 agot_events_bastard.0995.b.queen: "„Ich bin [ROOT.Char.GetFirstNameNoTooltip] [mother_house.GetBaseNameNoTooltip], und ich bin eure Königin!""
 agot_events_bastard.0995.c.queen: "„Ich bin [ROOT.Char.GetFirstNameNoTooltip] [checking_house.GetBaseNameNoTooltip], und ich bin eure Königin!""
 agot_events_bastard.0995.flavor: "Möge Eure Herrschaft lang und segensreich sein!"
 agot_events_bastard.0995.stay_house: "Ihr und Eure Erben werdet Teil von [house|E] [checking_house.GetName] bleiben"
 become_father_house_head: "[king.GetShortUIName|U] wird [house_head|E] von Haus [father_house.GetBaseName|V]"
 become_mother_house_head: "[king.GetShortUIName|U] wird [house_head|E] von Haus [mother_house.GetBaseName|V]"

  # Helped bastard win war
 agot_events_bastard.0996.t: "Ein neuer Tag bricht an"
 agot_events_bastard.0996.desc: "Ich sehe zu, wie [claimant.GetFirstName] durch die Tore des Thronsaals schreitet, die Krone auf [claimant.Custom('DE_PRO_POS_S_3P')]em Haupt. Zuversichtliche Augen überblicken ein neues Zeitalter, und mit jedem Schritt beugen mehr, mich eingeschlossen, das Knie vor unserem neuen Lehnsherrn.\n\nEin Teil von mir kann noch immer nicht glauben, dass dies die Welt ist, in der wir nun leben; es ist noch gar nicht so lange her, dass [claimant.Custom('DE_PRO_PER_S_3P_N')] selbst nicht einmal die Wahrheit über [claimant.Custom('DE_PRO_POS_S_3P')]e Abstammung kannte. Doch aufgrund des Weges, den ich uns eingeschlagen habe, bricht ein neuer Tag an über [claimant.GetPrimaryTitle.GetName]."
 agot_events_bastard.0996.a: "Ich frage mich, wie [claimant.Custom('DE_PRO_PER_S_3P_N')] sich gerade fühlt..."
 agot_events_bastard.0996.b: "Lang lebe [claimant.GetNameNoTooltip]!"

 # Herrscher wird über Annahme der doppelten Hinrichtung benachrichtigt
 agot_events_bastard.1001.t: "Forderungen angenommen"
 agot_events_bastard.1001.desc.jon: "Ich sehe zu, wie [reveal_scope.GetFirstName] und Eddard vor mich geführt werden. Der Feigling kann mir nicht einmal in die Augen sehen, als er neben der verabscheuungswürdigen Drachenbrut vor den Thron geschleift wird.\n\n„Für die Verbrechen, einen Targaryen zu beherbergen, eine bekannte Bedrohung für das Reich —“ Während die Anklagepunkte und Erlasse verlesen werden, kann ich die Worte kaum hören. Mein Herz hämmert in meinem Kopf. Zorn brodelt in meinem Inneren. Ich spüre, wie sich ein Inferno in meinem Körper aufbaut, meine Haut vor Wut vibriert und lebendig wird. Ich bemerke nicht, dass ich aufstehe, erst als ich den Thron bereits zur Hälfte hinabgestiegen bin, wird es mir bewusst.\n\nOhne das Ende des Urteils abzuwarten, nehme ich im Vorbeigehen einem der Königsgardisten das Schwert aus der Scheide, und mit einem Hieb und einem Schrei schlage ich Eddard Starks Kopf sauber vom Rumpf, die Schwertspitze zerschlägt das Steinwerk darunter. [reveal_scope.GetFirstNameNoTooltip] schreit entsetzt auf, ehe ich auch [reveal_scope.Custom('DE_PRO_PER_S_3P_A')] mit einem Aufwärtshieb zum Schweigen bringe, Blut und Steinsplitter in einem prächtigen Schauspiel aus Karmesin und Marmor aufspritzen.\n\nIch stehe da inmitten des Blutbads, Targaryen-Blut benetzt erneut den Boden des Hofes. Als ich in die leblosen Augen meines einstigen Freundes blicke, finde ich keinen Frieden. Der Zorn hat nicht nachgelassen. Lyanna ist noch immer nicht hier. Die Blicke meiner Höflinge gleichen denen, die ich einst am Hofe des Irren Königs sah, und ich frage mich, wie es so weit kommen konnte."
 agot_events_bastard.1001.desc: "Ich sehe zu, wie [reveal_scope.GetFirstName] und [reveal_employer.GetFirstName] vor mich und den gesamten Hof geführt werden. Mein Justiziar beginnt die Anklagepunkte zu verlesen, und ich frage mich, warum sie dem zugestimmt haben, angesichts dessen, was gleich geschehen wird.\n\n„Für die Verbrechen, eine bekannte Bedrohung für das Reich zu beherbergen, und für die Verkündung falscher Thronansprüche —“ Während die Anklagepunkte und Erlasse verlesen werden, kann ich mich nicht auf die Worte konzentrieren. War es richtig, zwei Menschen hinzurichten, die nicht unmittelbar gegen mich gehandelt haben? Was muss in diesem Augenblick in ihren Köpfen vorgehen? Doch während ich darüber nachsinne, ist die Verlesung beendet. Der Henker tritt vor und trennt mit einem sauberen Hieb den Kopf des einen, dann des nächsten. Meine persönlichen Zweifel mag ich haben, und das Reich wird reagieren, wie es will."
 agot_events_bastard.1001.a: "Wie dem auch sei, diese Angelegenheit ist erledigt."

 # Herrscher wird über Annahme der Hinrichtung benachrichtigt
 agot_events_bastard.1002.t: "Forderungen angenommen"
 agot_events_bastard.1002.desc.jon: "Ich sehe zu, wie [reveal_scope.GetFirstName] in Ketten vor mich geführt wird. Die verabscheuungswürdige Drachenbrut starrt mir direkt entgegen, als blicke [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] durch meine Augen hindurch und an ihnen vorbei. Nun, da ich die Wahrheit kenne, frage ich mich, wie ich Rhaegars Züge in [reveal_scope.Custom('DE_PRO_PER_S_3P_D')] jemals übersehen konnte.\n\n„Für die Verbrechen, falsche Thronansprüche zu verkünden —" Während die Anklagepunkte und Erlasse verlesen werden, kann ich die Worte kaum hören. Mein Herz hämmert in meinem Kopf. Zorn brodelt in meinem Inneren. Ich spüre, wie sich ein Inferno in meinem Körper aufbaut, meine Haut vor Wut vibriert und lebendig wird. Ich bemerke nicht, dass ich aufstehe, erst als ich den Thron bereits zur Hälfte hinabgestiegen bin, wird es mir bewusst.\n\nOhne das Ende des Urteils abzuwarten, nehme ich im Vorbeigehen einem der Königsgardisten das Schwert aus der Scheide, und mit einem Hieb und einem Schrei schlage ich dem Bastard den Kopf sauber vom Rumpf, die Schwertspitze zerschlägt das Steinwerk darunter. Der Hof schreit entsetzt auf, doch ich kann es nicht hören über dem Rauschen meines eigenen Blutes in meinem Kopf.\n\nIch stehe da inmitten des Blutbads, Targaryen-Blut benetzt erneut den Boden des Hofes. Ich blicke hinab in [reveal_scope.GetFirstNamePossessiveNoTooltip] leblose Augen, und ich finde keinen Frieden. Der Zorn hat nicht nachgelassen. Lyanna ist noch immer nicht hier. Die Blicke meiner Höflinge gleichen denen, die ich einst am Hofe des Irren Königs sah, und ich frage mich, wie es so weit kommen konnte."
 agot_events_bastard.1002.desc: "Ich sehe zu, wie [reveal_scope.GetFirstName] in Ketten vor mich geführt wird. Mein Justiciar beginnt die Anklagepunkte zu verlesen, und ich frage mich, warum [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] dem zugestimmt hat, angesichts dessen, was gleich geschehen wird.\n\n„Für die Verbrechen, falsche Thronansprüche zu verkünden —" Während die Anklagepunkte und Erlasse verlesen werden, kann ich mich nicht auf die Worte konzentrieren. War es richtig, [reveal_scope.Custom('DE_ART_DEF_S_A')] Unehelich[reveal_scope.Custom('DE_END_ADJ_DEF_S_A')] für keine unmittelbar verräterische Tat hinzurichten? Was muss in diesem Augenblick in [reveal_scope.Custom('DE_PRO_POS_S_3P')]em Kopf vorgehen? Doch während ich darüber nachsinne, ist die Verlesung beendet. Der Henker tritt vor und trennt mit einem sauberen Hieb den Kopf von [reveal_scope.GetFullName] vom Rumpf. Meine privaten Zweifel mag ich haben, und das Reich wird reagieren, wie es will."
 agot_events_bastard.1002.a: "Wie dem auch sei, diese Angelegenheit ist erledigt."

 # Ruler notified of NW / SS acceptance
 agot_events_bastard.1003.t: "Forderungen angenommen"
 agot_events_bastard.1003.desc.male: "Dunkle Schwingen tragen ausnahmsweise keine dunklen Worte, sondern Worte des Friedens. Kaum habe ich meine Gemächer verlassen, als man mich über den Raben von der Schwarzen Festung in Kenntnis setzt. Es scheint, dass [reveal_scope.GetFullName] sich wie angewiesen dort eingefunden und geschworen hat, die Pflichten der Nachtwache zu erfüllen. Vor allem: kein Land zu halten und keine Kinder zu zeugen.\n\nIch atme erleichtert auf, dass diese überraschende Angelegenheit ohne Blutvergießen beigelegt werden konnte, und im eisigen Norden wird er wohl kaum Ärger bereiten. Das Reich kann aufatmen, [reveal_scope.GetFirstName] kann ohne Furcht vor mir leben, und ich regiere ohne diesen Dorn in meiner Seite."
 agot_events_bastard.1003.desc.female: "Dunkle Schwingen tragen ausnahmsweise keine dunklen Worte, sondern Worte des Friedens. Kaum habe ich meine Gemächer verlassen, als man mich über den Raben aus dem Mutterhaus von Altsass in Kenntnis setzt. Es scheint, dass [reveal_scope.GetFullName] sich wie angewiesen dort eingefunden und geschworen hat, die heiligen und trübsinnigen Pflichten einer Schweigenden Schwester zu erfüllen. Vor allem: in Schweigen zu dienen und keinen Gatten zu nehmen.\n\nIch atme erleichtert auf, dass diese überraschende Angelegenheit ohne Blutvergießen beigelegt werden konnte, und in den Armen der Schwesternschaft wird sie wohl kaum Ärger bereiten. Das Reich kann aufatmen, [reveal_scope.GetFirstName] kann ohne Furcht vor mir leben, und ich regiere ohne diesen Dorn in meiner Seite."
 agot_events_bastard.1003.a: "Damit wäre diese Angelegenheit also erledigt."

 # Ruler notified of imprison acceptance
 agot_events_bastard.1004.t: "Forderungen angenommen"
 agot_events_bastard.1004.desc.jon: "Ich sehe zu, wie [reveal_scope.GetFirstName] in Ketten vor mich geführt und auf den kalten Marmor des Thronsaals gestoßen wird. Die Drachenbrut starrt mir direkt entgegen, als blicke [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] durch meine Augen hindurch und an ihnen vorbei. Nun, da ich die Wahrheit kenne, frage ich mich, wie ich Rhaegars Züge in [reveal_scope.Custom('DE_PRO_PER_S_3P_D')] jemals übersehen konnte.\n\n„Für die Verbrechen, falsche Thronansprüche zu verkünden —“ Während die Anklagepunkte und Erlasse verlesen werden, kann ich die Worte kaum hören. Diese Augen aber... sie gleichen denen Lyannas. Jahrelang konnte ich mich nicht erinnern, wie sie aussah, und gerade jetzt erinnere ich mich zum ersten Mal seit über einem Jahrzehnt an ein Stück von ihr. Das sind Lyannas Augen. Ich höre mein Herz in meinem Kopf schlagen, und erst an der Stille bemerke ich, dass die Verlesung vorüber ist.\n\nOhne ein Wort von mir beginnen die Wachen, [reveal_scope.Custom('DE_PRO_PER_S_3P_A')] zum Kerker zu führen, und als [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] sich erhebt, ist meine Erinnerung erneut geraubt. Lyannas Augen vielleicht, doch diese Haltung ist die eines Targaryen. Was ich mit [reveal_scope.Custom('DE_PRO_PER_S_3P_D')] tue, liegt nun an mir."
 agot_events_bastard.1004.desc: "Ich sehe zu, wie [reveal_scope.GetFirstName] in Ketten vor mich geführt und auf den kalten Marmor des Thronsaals gestoßen wird. Mein Justiziar beginnt die Anklagepunkte zu verlesen, und ich frage mich, warum [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] dem zugestimmt hat.\n\n„Für die Verbrechen, falsche Thronansprüche zu verkünden —“ Während die Anklagepunkte und Erlasse verlesen werden, kann ich die Worte kaum hören. Ich betrachte genau [reveal_scope.Custom('DE_PRO_POS_S_3P')]e Augen, versuche das Motiv hinter [reveal_scope.Custom('DE_PRO_POS_S_3P')]er Kapitulation zu ergründen. War es Feigheit oder der aufrichtige Wunsch nach Frieden? Vielleicht ist dies Teil eines größeren Plans? Erst an der Stille bemerke ich, dass die Verlesung vorüber ist.\n\nOhne ein Wort von mir beginnen die Wachen, [reveal_scope.Custom('DE_PRO_PER_S_3P_A')] zum Kerker zu führen, und als [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] sich erhebt, wende ich mich praktischeren Überlegungen zu. Was ich mit [reveal_scope.Custom('DE_PRO_PER_S_3P_D')] tue, liegt nun an mir."
 agot_events_bastard.1004.a: "Zumindest weiß ich nun, wo [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] sich befindet."

 # Ruler notified of hostage acceptance
 agot_events_bastard.1005.t: "Forderungen angenommen"
 agot_events_bastard.1005.desc.jon: "Ich sehe zu, wie [reveal_scope.GetFirstName] vor den Augen des gesamten Hofes vor mich geführt wird und auf dem kalten Marmor des Thronsaals niederkniet, während ich über [reveal_scope.Custom('DE_PRO_PER_S_3P_D')] throne. Der Spross meiner geliebten Lyanna und meines Feindes Rhaegar spricht die Eide tadellos, und nun, da ich die Wahrheit kenne, frage ich mich, wie ich Rhaegars Züge in [reveal_scope.Custom('DE_PRO_PER_S_3P_D')] jemals übersehen konnte.\n\n„— und schwöre hiermit Euch und Euren Erben als Herrschern über [ROOT.Char.GetPrimaryTitle.GetName] die Treue.“ Als [reveal_scope.Custom('DE_PRO_POS_S_3P')]e Eide gesprochen sind und [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] sich erhebt, bin ich erschüttert. Diese Augen gleichen denen Lyannas. Jahrelang konnte ich mich nicht erinnern, wie sie aussah, und gerade jetzt erinnere ich mich zum ersten Mal seit über einem Jahrzehnt an ein Stück von ihr. Das sind Lyannas Augen.\n\nOhne ein Wort von mir tritt [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] aus der Zeremonie heraus und hinein in das Getümmel des Hofes. Lyannas Augen vielleicht, doch diese Haltung ist die eines Targaryen. Was ich mit [reveal_scope.Custom('DE_PRO_PER_S_3P_D')] tue, liegt nun an mir."
 agot_events_bastard.1005.desc: "Ich sehe zu, wie [reveal_scope.GetFirstName] vor den Augen des gesamten Hofes vor mich geführt wird und auf dem kalten Marmor des Thronsaals niederkniet, während ich über [reveal_scope.Custom('DE_PRO_PER_S_3P_D')] throne.\n\n„— und schwöre hiermit Euch und Euren Erben als den gerechten Herrschern über [ROOT.Char.GetPrimaryTitle.GetName] Treue und Loyalität.“ Als die Eide gesprochen sind und [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] sich erhebt, betrachte ich genau [reveal_scope.Custom('DE_PRO_POS_S_3P')]e Augen, versuche das Motiv hinter [reveal_scope.Custom('DE_PRO_POS_S_3P')]er Kapitulation zu ergründen. War es Feigheit oder der Wunsch nach Frieden? Vielleicht ist dies Teil eines größeren Plans? Erst an der Stille bemerke ich, dass die Vereidigung vorüber ist.\n\nOhne ein Wort von mir tritt [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] aus der Zeremonie heraus und hinein in das Getümmel des Hofes, zu den anderen Höflingen."
 agot_events_bastard.1005.a: "Ehren, ignorieren oder ausnutzen, ganz wie es mir beliebt."
 agot_events_bastard.1005.b: "[reveal_scope.GetFirstNameNoTooltip] ist ein[reveal_scope.Custom('DE_END_PRO_S_N')] namhaft[reveal_scope.Custom('DE_END_ADJ_NUL_S_N')] Krieger[reveal_scope.Custom('DE_END_NOU_S_GS_N')]; warum [reveal_scope.Custom('DE_PRO_PER_S_3P_A')] nicht in meine Königsgarde einladen?"
 agot_events_bastard.1005.c: "Ab in den Kerker mit [reveal_scope.Custom('DE_PRO_PER_S_3P_D')]!"
 agot_events_bastard.1005.d: "Ich werde [reveal_scope.Custom('DE_PRO_PER_S_3P_A')] als wahres Mitglied des Hauses [reveal_scope.GetHouse.GetBaseName] willkommen heißen."

  # Realm notified of claims forswear acceptance
 agot_events_bastard.1006.opening: "An alle Lords und Ladys von Westeros,"
 agot_events_bastard.1006.desc: "Ich, [reveal_scope.GetFullName], entsage hiermit bei den Alten Göttern und den Neuen allen Ansprüchen auf [ruler_scope.GetPrimaryTitle.GetName] und die damit verbundenen Titel. Meine Geburt mag eine Tatsache sein, doch sie ändert nichts an meinem Stand oder meinen Rechten, und niemals habe ich etwas anderes behauptet. [ruler_scope.GetFullName] ist [ruler_scope.Custom('DE_ART_DEF_S_N')] einzig rechtmäßig[ruler_scope.Custom('DE_END_ADJ_DEF_S_N')] und legitim[ruler_scope.Custom('DE_END_ADJ_DEF_S_N')] Herrscher[ruler_scope.Custom('DE_END_NOU_S_GS_N')], und ich bin nichts als [ruler_scope.Custom('DE_PRO_POS_S_3P')][ROOT.Char.Custom('DE_END_PRO_S_N')] treu[ROOT.Char.Custom('DE_END_ADJ_NUL_S_N')] Untertan[ROOT.Char.Custom('DE_END_NOU_S_GS_N')]."
 agot_events_bastard.1006.a: "Dann sei es also Frieden."