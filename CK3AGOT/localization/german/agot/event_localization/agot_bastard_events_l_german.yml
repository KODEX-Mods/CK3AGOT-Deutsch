agot_events_bastard.0971.desc_execution_bastard: "Dunkle Schwingen tragen dunkle Worte, versehen mit dem Siegel des Hauses [ruler_scope.GetHouse.GetBaseName]. Ein Brief von [ruler_scope.GetName] lässt keinen Raum für Missverständnisse oder Fehlinterpretationen. [ruler_scope.Custom('DE_PRO_PER_S_3P_N')|U] hat meinen Kopf gefordert, der unverzüglich im Namen der Krone genommen werden soll.\n\nDiese harte Forderung hat im ganzen Reich Widerhall gefunden, ihre Schwere beunruhigt viele, doch Tatsache bleibt, dass es sich um einen königlichen Erlass handelt. Könnte ich dieser Forderung tatsächlich nachkommen? Mein eigenes Leben aufgeben? Und doch, wenn ich es nicht tue, wird das Reich zweifellos bluten.\n\nWas soll es also sein, mein Leben oder Tausende anderer?"
 agot_events_bastard.0971.desc_send_to_nw: "Dunkle Schwingen tragen dunkle Worte, versehen mit dem Siegel des Hauses [ruler_scope.GetHouse.GetBaseName]. Ein Brief von [ruler_scope.GetName] lässt keinen Raum für Missverständnisse oder Fehlinterpretationen. [ruler_scope.Custom('DE_PRO_PER_S_3P_N')|U] hat gefordert, dass ich der Nachtwache beitrete, um meine Tage im eisigen Norden zu verbringen.\n\nDiese Forderung hat im ganzen Reich Widerhall gefunden, ihre Schwere beunruhigt viele, doch Tatsache bleibt, dass es sich um einen königlichen Erlass handelt. Komme ich dieser Forderung nach? Wenn ich es nicht tue, wird das Reich zweifellos bluten.\n\nWas soll es also sein, mein Leben oder Tausende?"
 agot_events_bastard.0971.desc_send_to_ss: "Dunkle Schwingen tragen dunkle Worte, versehen mit dem Siegel des Hauses [ruler_scope.GetHouse.GetBaseName]. Ein Brief von [ruler_scope.GetName] lässt keinen Raum für Missverständnisse oder Fehlinterpretationen. [ruler_scope.Custom('DE_PRO_PER_S_3P_N')|U] hat gefordert, dass ich zu den Schweigenden Schwestern geschickt werde, um meine Tage im Dienst für den Glauben zu verbringen.\n\nDiese Forderung hat im ganzen Reich Widerhall gefunden, ihre Schwere beunruhigt viele, doch Tatsache bleibt, dass es sich um einen königlichen Erlass handelt. Komme ich dieser Forderung nach? Wenn ich es nicht tue, wird das Reich zweifellos bluten.\n\nWas soll es also sein, mein Leben oder Tausende?"
 agot_events_bastard.0971.desc_imprison: "Dunkle Schwingen tragen dunkle Worte, versehen mit dem Siegel des Hauses [ruler_scope.GetHouse.GetBaseName]. Ein Brief von [ruler_scope.GetName] lässt keinen Raum für Missverständnisse oder Fehlinterpretationen. [ruler_scope.Custom('DE_PRO_PER_S_3P_N')|U] hat gefordert, dass ich mich der Kerkerhaft unterwerfe, um meine Tage in Ketten zu verbringen, bis [ruler_scope.Custom('DE_PRO_PER_S_3P_N')] etwas anderes entscheidet.\n\nDiese Forderung hat im ganzen Reich Widerhall gefunden, und sie trägt die Kraft eines königlichen Erlasses. Komme ich dieser Forderung nach? Wenn ich es nicht tue, wird das Reich zweifellos bluten.\n\nWas ist mir wertvoller, meine Freiheit oder Frieden?"
 agot_events_bastard.0971.desc_bring_to_court: "Ein Brief ist eingetroffen, versehen mit dem Siegel des Hauses [ruler_scope.GetHouse.GetBaseName]. Der Brief von [ruler_scope.GetName] lässt keinen Raum für Missverständnisse oder Fehlinterpretationen. [ruler_scope.Custom('DE_PRO_PER_S_3P_N')|U] hat gefordert, dass ich meine Ländereien und Titel aufgebe und mich [ruler_scope.Custom('DE_PRO_POS_S_3P')]em Hof anschließe, wo ich mein Leben als Höfling fristen soll.\n\nDiese Forderung hat im ganzen Reich Widerhall gefunden, und obwohl sie mein Leib und Leben verschont, bin ich ein[ROOT.Char.Custom('DE_END_PRO_S_N')] [ROOT.Char.GetLadyLord] des Reiches mit eigenem Land, und diese Forderung ist nicht ohne Widerspruch geblieben. Komme ich dieser Forderung nach? Wenn ich es nicht tue, wird das Reich zweifellos bluten.\n\nWas ist mir wertvoller, meine Ländereien oder Frieden?"
 agot_events_bastard.0971.desc_give_up_claims: "Ein Brief ist eingetroffen, versehen mit dem Siegel des Hauses [ruler_scope.GetHouse.GetBaseName]. Der Brief von [ruler_scope.GetName] lässt keinen Raum für Missverständnisse oder Fehlinterpretationen. [ruler_scope.Custom('DE_PRO_PER_S_3P_N')|U] hat in [ruler_scope.Custom('DE_PRO_POS_S_3P')]er Gnade gefordert, dass ich eine öffentliche und rechtsgültige Erklärung abgebe, in der ich allen Ansprüchen entsage, die meine offenbarte Abstammung begründen könnte.\n\nDiese Forderung wurde im ganzen Reich verbreitet, und viele erachten sie als gerechte Antwort auf die jüngsten Entwicklungen. Dennoch ist es ein Makel auf der Ehre, Ansprüche aufzugeben, die einem von Rechts wegen zustehen könnten, sollte das Rad des Schicksals sich drehen.\n\nWas soll es also sein, mein Stolz oder Frieden im Reich?"
 agot_events_bastard.0971.desc_nothing: "Tage und Nächte lang habe ich mich gesorgt und gegrübelt, was [ruler_scope.GetName] als Antwort auf die jüngsten Enthüllungen tun könnte, doch mittlerweile sind Wochen vergangen, seit die Wahrheit über die Umstände meiner Geburt dem Reich kundgetan wurde. [ruler_scope.Custom('DE_PRO_PER_S_3P_N')|U] muss doch inzwischen davon erfahren haben?\n\nIch bin gezwungen zu dem Schluss zu kommen, dass [ruler_scope.GetName] einfach beschlossen hat, die Angelegenheit ruhen zu lassen. Ob es [ruler_scope.Custom('DE_PRO_PER_S_3P_D')] im Augenblick schlicht zu unbedeutend erscheint oder ob es [ruler_scope.Custom('DE_PRO_PER_S_3P_A')] einfach nicht kümmert — es scheint, als würden keine Forderungen aus Königsmund kommen."
 agot_events_bastard.0971.nw_army_for_claim: "Die Männer des Kommandanten"

