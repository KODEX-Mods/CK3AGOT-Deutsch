l_german:
  # Shared loc
  #########
 agot_events_bastard.reveal_tt: "Ihr werdet [reveal_scope.GetName] die Wahrheit über [reveal_scope.Custom('DE_PRO_POS_S_3P')]e Abstammung offenbaren."
 agot_events_bastard.reveal_warning_cadet: "Ihr und Eure Kinder werdet ein neues [bastard_house|E] gründen."
 agot_events_bastard.reveal_warning: "@warning_icon! #warning Dies könnte erhebliche Auswirkungen auf Euch und das Reich haben.#!"
 agot_events_bastard.reveal_warning_letter: "Ihr werdet Briefe in alle Ecken von Westeros versenden.\n@warning_icon!#warning Dies könnte erhebliche Auswirkungen auf Euch und das Reich haben.#!"
 agot_events_bastard.realm_ruler_react_wait: "Nun wird sich zeigen, wie das Reich und [ruler_scope.GetFirstNameOrMe] reagieren..."
 agot_events_bastard.host_response_choice: "Es wird an [reveal_employer.GetNameNoTooltip] liegen, auf Eure Forderung zu antworten."
 agot_events_bastard.personal_response_choice: "Es wird an [reveal_scope.GetNameNoTooltip] liegen, auf Eure Forderung zu antworten."
 agot_events_bastard.demand_reject_harsh: "Dies ist eine ungeheuerliche Forderung! Das bedeutet Krieg!"
 agot_events_bastard.demand_reject_light: "Dies ist Bestrafung dafür, geboren zu sein. Das werde ich nicht dulden."
 agot_events_bastard.demand_reject_flavor: "Ihr werdet die Forderung von [ruler_scope.GetNameNoTooltip] ablehnen."
 agot_events_bastard.demand_reject_tt: "@warning_icon! #warning Dies wird Euch unumkehrbar auf Kriegskurs mit dem Eisernen Thron führen.#!"
 agot_events_bastard.demand_accept_harsh: "Auch wenn es schmerzt, werde ich um des Friedens willen zustimmen."
 agot_events_bastard.demand_accept_light: "Ich werde [ruler_scope.GetNamePossessiveNoTooltip] einigermaßen gnädige Forderung akzeptieren."  # nicht sicher
 agot_events_bastard.demand_accept_flavor: "Ihr werdet [ruler_scope.GetNamePossessiveNoTooltip] Forderung akzeptieren."
 agot_events_bastard.unjust_warning_tt: "Das Reich könnte Forderungen, die als ungerecht erachtet werden, missbilligen."
 agot_events_bastard.no_demand_acknowledge: "Erleichternd, zweifellos."

  # Parent tells child
 agot_events_bastard.0901.t: "Fragen der Abstammung"
 agot_events_bastard.0901.desc: "Jedes Mal, wenn ich [reveal_scope.GetFirstName] anschaue, muss ich an die Wahrheit über [reveal_scope.Custom('DE_PRO_POS_S_3P')]e Abstammung denken, und auch an die Gefahren, die in solchen Wahrheiten lauern. Obwohl ich mir wünsche, dass [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] ein langes und sorgenfreies Leben führt, muss ich auch anerkennen, dass [reveal_scope.Custom('DE_PRO_POS_S_3P')] gesamtes Leben auf einer Lüge errichtet ist. Es ist nicht gerecht, dass [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] leben und sterben sollte, ohne jemals die Wahrheit über [reveal_scope.Custom('DE_PRO_POS_S_3P')]e königliche Abstammung zu erfahren. Ich kann nicht länger Urheber dieses Unrechts sein."
 agot_events_bastard.0901.desc.jon: "Jedes Mal, wenn ich [reveal_scope.GetFirstName] anschaue, erinnere ich mich an gegebene Versprechen und an lange schlummernde Gefahren, doch ich sehe auch ein Kind, dessen ganzes Leben auf einer Lüge errichtet ist. "Versprich es mir, Ned..."\n\nNein. Es ist nicht gerecht, dass [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] leben und sterben sollte, ohne jemals die Wahrheit zu erfahren. Ich liebte meine Schwester, und ich liebe ihr Kind wie mein eigenes. Sie hätte nicht gewollt, dass [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] aufwächst, ohne die Wahrheit zu kennen. Auch wenn es mich schmerzt, und das Reich womöglich noch mehr, kann ich nicht länger Urheber dieses Unrechts sein."
 agot_events_bastard.0901.a: "[reveal_scope.GetFirstNameNoTooltip], ich muss es Euch sagen, Eure wahren Eltern sind..."
 agot_events_bastard.0901.a.jon: "[reveal_scope.GetFirstNameNoTooltip], die Zeit für die Wahrheit ist gekommen. Ich bin nicht Euer Vater..."
 agot_events_bastard.0901.b: "Nein, die Zeit dafür ist noch nicht reif."
 agot_events_bastard.0901.b.jon: "Und doch muss ich schweigen. Meine Schuldgefühle können das Versprechen, das ich gab, nicht überwiegen."

  # Child responds to 'parent'
 agot_events_bastard.0902.t: "Erschütternde Wahrheit"
 agot_events_bastard.0902.desc.jon: "Mein Vater bittet mich, ihn auf einem Ausritt vor die Burg zu begleiten, und führt mich zu einem Eichenhain, wo wir absitzen und uns niederlassen. Ich habe ihn noch nie so aufgewühlt erlebt — er kann mir kaum in die Augen sehen.\n\nEr beginnt, mir vom Turnier von Harrenhal zu erzählen, von seiner Schwester und von Roberts Rebellion vor all den Jahren. Ich frage mich, warum er mir eine Geschichte erzählt, die ich schon so lange kenne, doch als immer mehr Einzelheiten hinzukommen, kann ich kaum glauben, worauf dies hinauszulaufen scheint.\n\n„Es gibt keine einfache Art, dies zu sagen, daher sage ich es unverblümt. [ROOT.Char.GetFirstNameNoTooltip], ich habe dich belogen. Ich bin nicht dein Vater. Dein wahrer Vater war [real_father.GetName], und du wurdest in einem Bett aus blauen Winterrosen geboren, von meiner Schwester Lyanna Stark. Ich schwor, dieses Geheimnis zu wahren, doch ich konnte die Lüge nicht länger aufrechterhalten. Ich fürchte, ich habe dir nur eine Last gegen eine schwerere eingetauscht, aber wenigstens kannst du nun selbst entscheiden, was du mit dieser Wahrheit anfangen willst.“\n\nDas Eichenlaub raschelt im Wind. Ich will diese Offenbarung zurückweisen, in den Wind hinausschreien, dass es nicht wahr ist, doch in meinem Herzen weiß ich, dass es so ist. Die einzige Frage ist, was ich damit tun soll."
 agot_events_bastard.0902.desc.father: "Mein Vater bittet mich, ihn auf einem Ausritt vor die Burg zu begleiten, und führt mich tief in den Wald zu einer Lichtung. „Damit uns niemand belauscht”, sagt er streng.\n\nWir steigen ab und setzen uns. Ich habe ihn noch nie so aufgewühlt erlebt — er kann mir kaum in die Augen sehen. „Es gibt keine einfache Art, dies zu sagen, daher sage ich es unverblümt. [ROOT.Char.GetFirstNameNoTooltip], deine wahren Eltern sind [real_mother.GetName] und [real_father.GetName]. Ich schwor, dieses Geheimnis zu wahren, doch ich konnte die Lüge nicht länger aufrechterhalten. Ich fürchte, ich habe dir nur eine Last gegen eine schwerere eingetauscht, aber wenigstens kannst du nun selbst entscheiden, was du mit dieser Wahrheit anfangen willst.“\n\nDas Laub raschelt im Wind. Ich will diese Offenbarung zurückweisen, in den Wind hinausschreien, dass es nicht wahr ist, doch in meinem Herzen weiß ich, dass es so ist. Die einzige Frage ist, was ich damit tun soll."
 agot_events_bastard.0902.desc.mother: "Meine Mutter bittet mich, sie im Wohnzimmer aufzusuchen, nimmt mich bei der Hand und scheucht die Diener hinaus. Ich habe sie noch nie so aufgewühlt erlebt — sie kann mir kaum in die Augen sehen.\n\n„Es gibt keine einfache Art, dies zu sagen, daher sage ich es unverblümt. [ROOT.Char.GetFirstNameNoTooltip], deine wahren Eltern sind [real_mother.GetName] und [real_father.GetName]. Ich schwor, dieses Geheimnis zu wahren, doch ich konnte die Lüge nicht länger aufrechterhalten. Ich fürchte, ich habe dir nur eine Last gegen eine schwerere eingetauscht, aber wenigstens kannst du nun selbst entscheiden, was du mit dieser Wahrheit anfangen willst.“\n\nIch will diese Offenbarung zurückweisen, in den Himmel hinausschreien, dass es nicht wahr ist, doch in meinem Herzen weiß ich, dass es so ist. Ob jetzt oder in der Zukunft, ich muss entscheiden, was ich damit anfange."
 agot_events_bastard.0902.a: "Ich werde mich nicht davor verstecken. Die ganze Welt soll es erfahren."
 agot_events_bastard.0902.b: "Das ist alles zu viel! Ich brauche Zeit zum Nachdenken."
 agot_events_bastard.0902.b.flavor: "Ihr werdet die Wahrheit später selbst enthüllen können, wenn Ihr es wünscht."

  # Non-parent tells child
 agot_events_bastard.0903.t: "Fragen der Abstammung"
 agot_events_bastard.0903.desc: "Jedes Mal, wenn ich an [reveal_scope.GetFirstName] denke, muss ich unweigerlich an die Wahrheit über [reveal_scope.Custom('DE_PRO_POS_S_3P')]e Abstammung denken, und auch an die Gefahren, die in solchen Wahrheiten lauern. Obwohl ich mir wünsche, dass [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] ein langes und sorgenfreies Leben führt, muss ich auch anerkennen, dass [reveal_scope.Custom('DE_PRO_POS_S_3P')] gesamtes Leben auf einer Lüge errichtet ist. Es ist nicht gerecht, dass [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] leben und sterben sollte, ohne jemals die Wahrheit über [reveal_scope.Custom('DE_PRO_POS_S_3P')]e königliche Abstammung zu erfahren. Ich kann nicht länger Urheber dieses Unrechts sein."
 agot_events_bastard.0903.desc.jon: "Ich erinnere mich gut an die Versprechen, die ich Lady Lyanna gab, und an die Eide, die ich den Starks noch vor der Rebellion schwor. Vielleicht steht mir diese Entscheidung nicht zu, doch ich kann nicht umhin, an das Kind zu denken, dessen ganzes Leben auf einer Lüge errichtet ist.\n\nNein. Es ist nicht gerecht, dass [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] leben und sterben sollte, ohne jemals die Wahrheit zu erfahren. Auch wenn viele es zweifellos als anmaßend erachten, muss ich die Wahrheit ans Licht bringen. Selbst wenn es mich schmerzt, und das Reich womöglich umso mehr, kann ich nicht länger Urheber dieses Unrechts sein."
 agot_events_bastard.0903.a: "Ich werde [reveal_scope.GetFirstNameNoTooltip] direkt einen Raben schicken."
 agot_events_bastard.0903.b: "Das ganze Reich muss die Wahrheit erfahren!"
 agot_events_bastard.0903.c: "Nein. Die Wahrheit muss vorerst verborgen bleiben."

  # Non-parent writes to child
 agot_events_bastard.0904.t: "Erschütternde Wahrheit"
 agot_events_bastard.0904.desc: "Ich öffne den Brief mit dem Siegel des Hauses [sharer.GetHouse.GetBaseName] ohne große Umstände, doch als ich die Worte darin lese, weiten sich meine Augen vor Schreck.\n\n„Es gibt keine einfache Art, dies zu sagen, daher sage ich es unverblümt“, beginnt [sharer.GetName] nach den üblichen Höflichkeiten. „[ROOT.Char.GetFirstName], man hat Euch belogen. Eure wahren Eltern sind [real_mother.GetName] und [real_father.GetName]. Ich hatte geschworen, dieses Geheimnis zu wahren, doch ich konnte es nicht länger über mich bringen, die Lüge aufrechtzuerhalten. Ich fürchte, ich habe Euch nur eine Last gegen eine schwerere eingetauscht, aber wenigstens könnt Ihr nun selbst entscheiden, was Ihr mit dieser Wahrheit anfangen wollt.“\n\nIch lasse das Pergament vor Schreck zu Boden fallen. Ich will diese Offenbarung zurückweisen, hinausschreien, dass es nicht wahr ist, doch in meinem Herzen weiß ich, dass es so ist. Die einzige Frage ist, was ich damit tun soll."
 agot_events_bastard.0904.desc.blind: "Ich bitte [courtier.GetFirstName], mir den Brief mit dem Siegel des Hauses [sharer.GetHouse.GetBaseName] vorzulesen, doch ich werde es vielleicht bereuen, denn als [courtier.GetSheHe] die Worte auf der Seite liest, weiten sich meine blinden Augen vor Schreck.\n\n„Es gibt keine einfache Art, dies zu sagen, daher sage ich es unverblümt.“ [courtier.GetFirstNameNoTooltip] beginnt, [sharer.GetNamePossessive] Worte nach den üblichen Höflichkeiten vorzulesen. „[ROOT.Char.GetFirstName], man hat Euch belogen. Eure wahren Eltern sind [real_mother.GetName] und [real_father.GetName]. Ich hatte geschworen, dieses Geheimnis zu wahren, doch ich konnte es nicht länger über mich bringen, die Lüge aufrechtzuerhalten. Ich fürchte, ich habe Euch nur eine Last gegen eine schwerere eingetauscht, aber wenigstens könnt Ihr nun selbst entscheiden, was Ihr mit dieser Wahrheit anfangen wollt.“\n\n„M-mein[ROOT.Char.Custom('DE_END_PRO_S_N')] [ROOT.Char.GetLadyLord], ich... weiß nicht, was ich sagen soll!“ stammelt [courtier.GetFirstNameNoTooltip], während ich vor Schreck erstarrt bin. Ich will diese Offenbarung zurückweisen, hinausschreien, dass es nicht wahr ist, doch in meinem Herzen weiß ich, dass es so ist. Die einzige Frage ist, was ich damit tun soll."
 agot_events_bastard.0904.a: "Ich werde mich nicht davor verstecken. Die ganze Welt soll es erfahren."
 agot_events_bastard.0904.b: "Ich muss es Vater sagen! Oder... [father.GetFirstNameNoTooltip]."
 agot_events_bastard.0904.b.flavor: "Ihr werdet gemeinsam entscheiden, was zu tun ist."
 agot_events_bastard.0904.c: "Das ist alles zu viel! Ich brauche Zeit zum Nachdenken."
 agot_events_bastard.0904.c.flavor: "Ihr werdet die Wahrheit später selbst enthüllen können, wenn Ihr es wünscht."
 agot_events_bastard.0904.d: "Ich werde dies nicht enthüllen. Ich muss [sharer.GetFirstNameNoTooltip] Bescheid geben."
 agot_events_bastard.0904.d.flavor: "Ihr werdet zurückschreiben und [sharer.GetFirstName] bitten, Euer Geheimnis zu wahren."

  # Parent tells child who already knows
 agot_events_bastard.0905.t: "Ein Geheimnis... das bereits bekannt ist?"
 agot_events_bastard.0905.desc: "Ich hatte mich auf eines der schwierigsten Gespräche meines Lebens vorbereitet. Ich übte, was ich sagen würde, welchen Blick ich aufsetzen würde. Ich stellte sicher, dass der Ort geheim war und dass uns niemand belauschen konnte.\n\nDoch als ich meine Erzählung zu spinnen beginne, hebt [reveal_scope.GetFirstName] die Hand, um mich zu unterbrechen. „[ROOT.Char.GetFirstName]“, beginnt [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] und spricht mich beim Vornamen an, „ich weiß es bereits. Ich weiß es schon seit geraumer Zeit. Ich habe es noch nicht enthüllt, aber... ich weiß es.“ [reveal_scope.Custom('DE_PRO_PER_S_3P_N')|U] seufzt.\n\nSolch ein Geheimnis hat so lange an mir genagt, und [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] wusste es bereits?!"
 agot_events_bastard.0905.desc.actually_parent: "Ich hatte mich auf eines der schwierigsten Gespräche meines Lebens vorbereitet. Ich übte, was ich sagen würde, welchen Blick ich aufsetzen würde. Ich stellte sicher, dass der Ort geheim war und dass uns niemand belauschen konnte.\n\nDoch als ich meine Erzählung zu spinnen beginne, hebt [reveal_scope.GetFirstName] die Hand, um mich zu unterbrechen. „Danke“, beginnt [reveal_scope.Custom('DE_PRO_PER_S_3P_N')], „danke, dass du es mir sagst, aber... ich weiß es bereits. Ich weiß es schon seit geraumer Zeit. Ich habe es noch nicht enthüllt, aber... ich weiß es.“ [reveal_scope.Custom('DE_PRO_PER_S_3P_N')|U] seufzt.\n\nSolch ein Geheimnis hat so lange an mir genagt, und [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] wusste es bereits?!"
 agot_events_bastard.0905.a: "Dann werde ich dir Land geben, damit du in meinem Namen als mein Kind herrschst."
 agot_events_bastard.0905.a.flavor: "[reveal_scope.GetFirstName] könnte sich zu einem späteren Zeitpunkt entscheiden, die Wahrheit zu enthüllen..."
 agot_events_bastard.0905.b: "Dann müssen wir es dem Reich verkünden!"
 agot_events_bastard.0905.c: "Dann weißt du, dass die Nachtwache der einzig sichere Ort für dich ist."
 agot_events_bastard.0905.d: "Es genügt, dass du es weißt. Was du damit anfängst, liegt bei dir."

 # Parent responds to child keeping secret
 agot_events_bastard.0906.t: "Verborgene Herkunft"
 agot_events_bastard.0906.desc.open: "Ich sehe den gequälten Ausdruck auf dem Gesicht von [reveal_scope.GetFirstName], als ich am Ende meiner Erzählung angelangt bin. Ein langer Moment der Stille vergeht, ehe [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] mir eine Antwort gibt. „Das ändert nichts“, sagt [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] entschlossen. „Ich bleibe, wer ich immer war. Ich bin einfach [reveal_scope.GetNameNoTooltip].“\n\nIch bin überrascht von [reveal_scope.Custom('DE_PRO_POS_S_3P')]er Gewissheit"
 agot_events_bastard.0906.desc.fake: ", und etwas gerührt, dass [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] mich weiterhin als [reveal_scope.Custom('DE_PRO_POS_S_3P')] Elternteil behalten möchte, und "
 agot_events_bastard.0906.desc.close: "dennoch... die Gefahr bleibt bestehen.\n\nNeben der Frage der Vernunft kann ich mich des Gedankens nicht erwehren, dass dies alles nur Verdrängung ist, und es [reveal_scope.Custom('DE_PRO_PER_S_3P_D')] besser dienen würde, die Wahrheit vor aller Welt zu offenbaren."
 agot_events_bastard.0906.a: "Ich werde dir trotzdem Land geben, damit du in meinem Namen als mein Kind herrschst."
 agot_events_bastard.0906.a.flavor: "[reveal_scope.GetFirstName] könnte sich zu einem späteren Zeitpunkt entscheiden, die Wahrheit zu enthüllen..."
 agot_events_bastard.0906.b: "Wir #bold müssen #!es dem Reich verkünden!"
 agot_events_bastard.0906.c: "Du weißt wohl, dass die Nachtwache der einzig sichere Ort für dich ist."
 agot_events_bastard.0906.d: "Es genügt, dass du es weißt. Was du damit anfängst, liegt bei dir."

  # Non-parent writes to child but they knew already
 agot_events_bastard.0907.t: "Mein Geheimnis ist bekannt"
 agot_events_bastard.0907.desc: "Ich öffne den Brief mit dem Siegel des Hauses [sharer.GetHouse.GetBaseName] ohne große Umstände, doch als ich die Worte darin lese, weiten sich meine Augen vor Schreck.\n\n„Es gibt keine einfache Art, dies zu sagen, daher sage ich es unverblümt“, beginnt [sharer.GetName] nach den üblichen Höflichkeiten. „[ROOT.Char.GetFirstName], man hat Euch belogen. Eure wahren Eltern sind [real_mother.GetName] und [real_father.GetName]. Ich hatte geschworen, dieses Geheimnis zu wahren, doch ich konnte es nicht länger über mich bringen, die Lüge aufrechtzuerhalten.“ Es folgen Entschuldigungen und Ratschläge, doch ich lese nicht weiter. Ich lasse einen Seufzer entweichen. Also weiß noch jemand davon.\n\nRasch verbrenne ich das Pergament in einem nahestehenden Kohlenbecken, während ich darüber nachsinne, was damit zu tun ist. Wie soll ich damit umgehen, dass jemand anderes mein Geheimnis kennt?"
 agot_events_bastard.0907.desc.blind: "Ich bitte [courtier.GetFirstName], mir den Brief mit dem Siegel des Hauses [sharer.GetHouse.GetBaseName] vorzulesen, doch ich werde es vielleicht bereuen, denn als [courtier.GetSheHe] die Worte auf der Seite liest, weiten sich meine blinden Augen vor Schreck.\n\n„Es gibt keine einfache Art, dies zu sagen, daher sage ich es unverblümt.“ [courtier.GetFirstNameNoTooltip] beginnt, [sharer.GetNamePossessive] Worte nach den üblichen Höflichkeiten vorzulesen. „[ROOT.Char.GetFirstName], man hat Euch belogen. Eure wahren Eltern sind [real_mother.GetName] und [real_father.GetName]. Ich hatte geschworen, dieses Geheimnis zu wahren, doch —“ Ich hebe die Hand, um [courtier.GetFirstNameNoTooltip] zu unterbrechen, ehe [courtier.GetSheHe] zu Ende gelesen hat.\n\n„M-mein[ROOT.Char.Custom('DE_END_PRO_S_N')] [ROOT.Char.GetLadyLord], Ihr... Ihr wusstet es!“ stammelt [courtier.GetSheHe], und ich lasse einen Seufzer entweichen. Nun scheinen nicht nur eine, sondern gleich zwei weitere Personen eingeweiht zu sein. Ich muss entscheiden, wie ich damit umgehe."
 agot_events_bastard.0907.a: "Das gerät außer Kontrolle. Wenn die Welt es erfahren muss, werde ich es selbst verkünden."
 agot_events_bastard.0907.b: "Ich muss diese Entwicklungen mit [father.GetFirstNameNoTooltip] besprechen."
 agot_events_bastard.0907.b.flavor: "Ihr werdet gemeinsam entscheiden, was zu tun ist."
 agot_events_bastard.0907.c: "Alles andere als günstig... Ich brauche Zeit zum Nachdenken."
 agot_events_bastard.0907.c.flavor: "Ihr werdet die Wahrheit später selbst enthüllen können, wenn Ihr es wünscht, doch [sharer.GetName] könnte die Sache selbst in die Hand nehmen..."
 agot_events_bastard.0907.d: "Ich werde zurückschreiben und [sharer.GetFirstNameNoTooltip] bitten, mein Geheimnis zu wahren."

  # Non-parent receives letter asking them to keep secret
 agot_events_bastard.0908.t: "Bitte um Verschwiegenheit"
 agot_events_bastard.0908.desc: "Es ist einige Zeit vergangen, seit ich [reveal_scope.GetFirstName] einen Brief gesandt habe, und obwohl ich jeden Tag gefragt habe, ob eine Antwort oder eine Offenbarung ans Reich eingegangen sei, habe ich bislang kein Wort erhalten.\n\nEndlich, nach Wochen des Wartens, teilt mir ein Page mit, dass eine Antwort eingetroffen ist. Es ist jedoch nicht die, die ich erwartet hatte.\n„[ROOT.Char.GetFullName],\nIch danke Euch für Euren Brief und das, was Ihr mir anvertraut habt“, beginnt [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] in vorsichtigen Worten, wohl um Unannehmlichkeiten zu vermeiden, sollte die Nachricht abgefangen werden. „Obwohl ich Eure Aufrichtigkeit zu schätzen weiß, muss ich Euch demütig bitten, diese Kenntnis für Euch zu behalten. Es obliegt mir zu entscheiden, wann und ob ich diese Tatsachen bekannt geben werde, und ich bitte Euch, meine Angelegenheit in dieser Hinsicht zu achten.“\n\n[reveal_scope.GetName] hat [reveal_scope.Custom('DE_PRO_POS_S_3P')]e Entscheidung getroffen, zumindest vorerst. Nun liegt es an mir, ob ich sie achten werde."
 agot_events_bastard.0908.a: "Nein, das Reich #bold muss #!es erfahren!"
 agot_events_bastard.0908.b: "Ich werde [reveal_scope.Custom('DE_PRO_POS_S_3P')]en Wunsch respektieren."

  # Non-parent does not receive letter
agot_events_bastard.0909.t: "Offenbarungen ohne Antwort"
 agot_events_bastard.0909.desc: "Es ist einige Zeit vergangen, seit ich [reveal_scope.GetFirstName] einen Brief gesandt habe, und obwohl ich jeden Tag gefragt habe, ob eine Antwort oder eine Offenbarung ans Reich eingegangen sei, habe ich bislang kein Wort erhalten.\n\nEndlich, nach Monaten des Wartens und einem zweiten Brief, um die Zustellung sicherzustellen, muss ich der Tatsache ins Auge sehen, dass [reveal_scope.GetFirstNameNoTooltip] es nicht für nötig befunden hat zu antworten. Ob aus eigennützigen Beweggründen oder schlicht aus Furcht — ich muss nun entscheiden, ob ich mein Wissen dennoch mit dem Reich teilen soll."
 agot_events_bastard.0909.a: "Das Reich #bold muss #!es erfahren!"
 agot_events_bastard.0909.b: "Es ist [reveal_scope.Custom('DE_PRO_POS_S_3P')]e Entscheidung, damit zu tun, was [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] will."

  # Parent responds to letter at request of child
 agot_events_bastard.0910.t: "Fragen der Abstammung"
 agot_events_bastard.0910.desc: "„Vater... [ROOT.Char.GetFirstName]“, beginnt [reveal_scope.GetFirstName] zu sagen, „ich habe einen Brief von [sharer.GetFullName] erhalten. Darin steht, dass ich das Kind von [real_mother.GetName] und [real_father.GetName] bin. Ich brauche jetzt deinen Rat. Was sollen wir tun?“ [reveal_scope.Custom('DE_PRO_PER_S_3P_N')|U] sagt es mit einem Blick, der wahrhaft verloren wirkt.\n\nSolch ein Geheimnis hat so lange an mir genagt, und nun will [sharer.GetFirstNameNoTooltip] es [reveal_scope.GetFirstNameNoTooltip] einfach so erzählen? Wie dem auch sei, wir müssen uns nun mit den Folgen dieses Wissens auseinandersetzen."
 agot_events_bastard.0910.a: "Du musst [sharer.GetLadyLord] [sharer.GetFirstNameNoTooltip] einen Brief schreiben und um [sharer.Custom('DE_PRO_POS_S_3P')]e Verschwiegenheit bitten."
 agot_events_bastard.0910.a.flavor: "Ihr werdet [reveal_scope.GetFirstNameNoTooltip] helfen, einen Brief zu verfassen, in dem [sharer.GetFirstNameNoTooltip] um Stillschweigen gebeten wird."
 agot_events_bastard.0910.b: "Wir müssen es dem Reich nun offenbaren, komme was wolle."
 agot_events_bastard.0910.c: "Die Nachtwache ist von nun an der einzig sichere Ort für dich."

  # Catelyn confronts Ned about secret
 agot_events_bastard.0911.t: "Lügen in der Ehe"
 agot_events_bastard.0911.desc: "Ich wusste, dass dieser Moment kommen würde, seit dem Tag, an dem ich Lyanna mein Versprechen gab, doch die Worte treffen mich dennoch. „Lügner!“ werde ich von meiner geliebten Cat genannt, und ich kann kaum mehr tun, als beschämt den Kopf zu senken. „So viel also zur Ehre von Eddard Stark! Ehrenhaft zu jedermann, nur nicht zu deiner Frau, wie es scheint! Ich sollte deine Vertraute sein, Ned!“ schreit sie, bevor sie abschweift. „Nein...“ Sie lacht freudlos. „Nein, du bist ehrenvoller in deinen Gelübden mir gegenüber, als die Welt dachte, offenbar.“ Ihr berechtigter Ausbruch ebbt ab, und mir fällt nichts ein, was ich sagen könnte.\n\nSie blickt wieder zu mir, Tränen in den Augen. „Familie, Pflicht, Ehre“, sagt sie es wie ein Gebet. „Ich weiß, warum du es getan hast, Ned. Ein Teil von mir ist erleichtert. Aber verdammt, ich bin auch deine Familie! Du hättest es mir sagen müssen. Das war nicht recht. Was die Welt von uns dachte. Von dir. Was ich über [secret_target.Custom('DE_PRO_PER_S_3P_A')] dachte.“ Sie blickt hinab, nun selbst beschämt. „Das war nicht recht“, wiederholt sie schließlich."
 agot_events_bastard.0911.a: "„Es tut mir leid, Cat...“"

  # Employer tells child
agot_events_bastard.0912.t: "Fragen der Abstammung"
 agot_events_bastard.0912.desc: "Jedes Mal, wenn ich [reveal_scope.GetFirstName] anschaue, muss ich an die Wahrheit über [reveal_scope.Custom('DE_PRO_POS_S_3P')]e Abstammung denken, und auch an die Gefahren, die in solchen Wahrheiten lauern. Es ist durchaus möglich, dass [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] ein langes und sorgenfreies Leben führt, ohne jemals zu erfahren, dass [reveal_scope.Custom('DE_PRO_POS_S_3P')] gesamtes Leben auf einer Lüge errichtet ist. Ist es gerecht, dass [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] leben und sterben sollte, ohne jemals die Wahrheit über [reveal_scope.Custom('DE_PRO_POS_S_3P')]e königliche Abstammung zu erfahren? Vielleicht sollte ich [reveal_scope.Custom('DE_PRO_PER_S_3P_D')] die Wahrheit sagen. Außerdem könnte es mir zum Vorteil gereichen..."
 agot_events_bastard.0912.a: "[reveal_scope.GetFirstNameNoTooltip], Eure wahren Eltern sind..."
 agot_events_bastard.0912.b: "Nein, die Zeit für diese Enthüllung ist noch nicht reif."

  # Child responds to employer - this shouldn't really be seen but putting here in case weirdness happens
 agot_events_bastard.0913.t: "Erschütternde Wahrheit"
 agot_events_bastard.0913.desc: "[employer.GetFullName] bittet mich, [employer.Custom('DE_PRO_PER_S_3P_A')] spät abends in [employer.Custom('DE_PRO_POS_S_3P')]em Arbeitszimmer aufzusuchen, und obwohl wir schon einige Male miteinander gesprochen haben, bin ich dennoch nervös, als ich die Tür öffne. [employer.Custom('DE_PRO_PER_S_3P_N')|U] wirkt seltsam befangen, als ich eintrete, doch nichts bereitet mich auf das vor, was [employer.Custom('DE_PRO_PER_S_3P_N')] als Nächstes sagt.\n\n„[ROOT.Char.GetFirstName], es ist an der Zeit, dass Ihr die Wahrheit erfahrt. Eure wahren Eltern sind [real_mother.GetName] und [real_father.GetName]. Dieses Geheimnis wurde eine Zeit lang vor Euch verborgen gehalten, und als ich davon erfuhr, hielt ich es nur für recht und billig, dass Ihr es wisst.“\n\nIch will diese Offenbarung zurückweisen, in den Wind hinausschreien, dass es nicht wahr ist, doch in meinem Herzen weiß ich, dass es so ist. Die einzige Frage ist, was ich damit tun soll."
 agot_events_bastard.0913.a: "Ich werde mich nicht davor verstecken. Die ganze Welt soll es erfahren."
 agot_events_bastard.0913.b: "Das ist alles zu viel! Ich brauche Zeit zum Nachdenken."
 agot_events_bastard.0913.b.flavor: "Ihr werdet die Wahrheit später selbst enthüllen können, wenn Ihr es wünscht."

  # Employer tells child who already knows
 agot_events_bastard.0914.t: "Eine Wahrheit... die bereits bekannt ist?"
 agot_events_bastard.0914.desc: "Ich bitte [reveal_scope.GetFirstName], mich spät abends in meinem Arbeitszimmer aufzusuchen, und obwohl wir schon einige Male miteinander gesprochen haben, bin ich dennoch etwas beklommen ob [reveal_scope.Custom('DE_PRO_POS_S_3P')]er möglichen Reaktion, als ich die Tür öffne, um [reveal_scope.Custom('DE_PRO_PER_S_3P_A')] hereinzubitten.\n\nIch vergewissere mich, dass uns niemand belauschen kann, ehe ich zu sprechen beginne, doch als ich meine Erzählung zu spinnen beginne, hebt [reveal_scope.GetFirstNameNoTooltip] die Hand, um mich zu unterbrechen. „[ROOT.Char.GetFirstNameNoTooltip]“, beginnt [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] und spricht mich beim Vornamen an, „ich weiß es bereits. Ich weiß es schon seit geraumer Zeit. Ich habe es noch nicht enthüllt, aber... ich weiß es.“ [reveal_scope.Custom('DE_PRO_PER_S_3P_N')|U] seufzt."
 agot_events_bastard.0914.a: "Ich werde Euch dennoch Land geben, zu Ehren unserer Verwandtschaft."
 agot_events_bastard.0914.a.flavor: "[reveal_scope.GetFirstName] könnte sich zu einem späteren Zeitpunkt entscheiden, die Wahrheit zu enthüllen..."
 agot_events_bastard.0914.b: "Dann müssen wir es dem Reich verkünden!"
 agot_events_bastard.0914.c: "Dann wisst Ihr, dass die Nachtwache der einzig sichere Ort für Euch ist."
 agot_events_bastard.0914.d: "Es genügt, dass Ihr es wisst. Was Ihr damit anfangt, liegt bei Euch."

  # Employer notified of child revealing
 agot_events_bastard.0915.t: "Eine offenbarte Wahrheit"
 agot_events_bastard.0915.desc: "[reveal_scope.GetName] schweigt eine lange Zeit. Ich kann [reveal_scope.Custom('DE_PRO_POS_S_3P')]e Gedanken über [reveal_scope.Custom('DE_PRO_POS_S_3P')] Gesicht huschen sehen. Verwirrung. Freude. Furcht. „Also...“ atmet [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] schließlich aus, doch [reveal_scope.Custom('DE_PRO_POS_S_3P')] Blick bleibt auf den Boden gerichtet.\n\nIch suche [reveal_scope.Custom('DE_PRO_POS_S_3P')] Gesicht ab, was sich wie ein ganzer Tag anfühlt, ehe [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] sich zu mir wendet und sagt: „Das wird einiges ändern, nicht wahr?“\n\nDamit gab es Pläne zu schmieden. [reveal_scope.GetFirstNameNoTooltip] hat [reveal_scope.Custom('DE_PRO_POS_S_3P')]e Entscheidung getroffen. Das Reich soll es erfahren, und die Folgen sind zu tragen."

  # Employer notified child doesn't want to share
 agot_events_bastard.0916.t: "Eine Bitte von Untergebenen"
 agot_events_bastard.0916.desc: "[reveal_scope.GetName] schweigt eine lange Zeit. Ich kann [reveal_scope.Custom('DE_PRO_POS_S_3P')]e Gedanken über [reveal_scope.Custom('DE_PRO_POS_S_3P')] Gesicht huschen sehen. Verwirrung. Freude. Furcht. „Also...“ atmet [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] schließlich aus, doch [reveal_scope.Custom('DE_PRO_POS_S_3P')] Blick bleibt auf den Boden gerichtet.\n\nIch suche [reveal_scope.Custom('DE_PRO_POS_S_3P')] Gesicht ab, was sich wie ein ganzer Tag anfühlt, ehe [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] sich zu mir wendet und sagt: „Das ändert nichts. Ich bin einfach [reveal_scope.GetNameNoTooltip], gleich welcher Abstammung.“\n\nIch mustere [reveal_scope.Custom('DE_PRO_POS_S_3P')] Gesicht, und [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] scheint in [reveal_scope.Custom('DE_PRO_POS_S_3P')]er Antwort entschlossen. Faszinierend. Dennoch bin ich [reveal_scope.Custom('DE_PRO_POS_S_3P')] Lehnsherr und zudem in das Geheimnis eingeweiht. Wenn ich wollte, könnte ich selbst entscheiden, wie wir darauf reagieren."
 agot_events_bastard.0916.a: "Ich werde Euch dennoch Land geben, zu Ehren unserer Verwandtschaft."
 agot_events_bastard.0916.a.flavor: "[reveal_scope.GetFirstName] könnte sich zu einem späteren Zeitpunkt entscheiden, die Wahrheit zu enthüllen..."
 agot_events_bastard.0916.b: "Nein, wir müssen es dem Reich verkünden!"
 agot_events_bastard.0916.c: "Die Nachtwache ist der einzig sichere Ort für Euch. Ihr werdet morgen aufbrechen."
 agot_events_bastard.0916.d: "Es genügt, dass Ihr es wisst. Was Ihr damit anfangt, liegt bei Euch."

  # Location-sharer tells child
 agot_events_bastard.0917.t: "Fragen der Abstammung"
 agot_events_bastard.0917.desc: "Ehrlich gesagt denke ich nicht allzu oft an [reveal_scope.Custom('DE_PRO_POS_S_3P')]e Blutlinie. Doch nun, da [reveal_scope.GetFirstName] und ich beide in [ROOT.Char.GetCurrentLocation.GetCounty.GetName] weilen und ich [reveal_scope.Custom('DE_PRO_PER_S_3P_A')] leibhaftig vor mir sehe, kann ich den Gedanken nicht mehr abschütteln.\n\n[reveal_scope.Custom('DE_PRO_POS_S_3P')|U] Gesicht gleicht ihnen so sehr. Ist es gerecht, dass [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] leben und sterben sollte, ohne jemals die Wahrheit über [reveal_scope.Custom('DE_PRO_POS_S_3P')]e königliche Abstammung zu erfahren? Vielleicht sollte ich [reveal_scope.Custom('DE_PRO_PER_S_3P_D')] die Wahrheit sagen. Außerdem könnte es mir zum Vorteil gereichen..."
 agot_events_bastard.0917.a: "[reveal_scope.GetFirstName], ich muss mit Euch reden."
 agot_events_bastard.0917.a_tt: "Ihr werdet [reveal_scope.GetName] die Wahrheit über [reveal_scope.Custom('DE_PRO_POS_S_3P')]e Abstammung offenbaren. Da Ihr hier nur zu Gast seid, werdet Ihr keinen Einfluss darauf haben, was [reveal_scope.GetFirstNameNoTooltip] mit dieser Kenntnis anfängt."
 agot_events_bastard.0917.b: "Nein, die Zeit für diese Enthüllung ist noch nicht reif."

 # Child responds to sharer at location
 agot_events_bastard.0918.t: "Erschütternde Wahrheit"
 agot_events_bastard.0918.desc: "[sharer.GetFullName], derzeit zu Besuch in [ROOT.Char.GetCurrentLocation.GetCounty.GetName], bittet mich diskret, [sharer.Custom('DE_PRO_PER_S_3P_A')] später am Abend auf einen Spaziergang zu begleiten. Da ich keinen Grund sehe abzulehnen, nehme ich [sharer.Custom('DE_PRO_POS_S_3P')]e Einladung an.\n\nAls ich [sharer.Custom('DE_PRO_PER_S_3P_A')] näherkommen sehe, macht mich etwas in [sharer.Custom('DE_PRO_POS_S_3P')]em Auftreten seltsam nervös. [sharer.Custom('DE_PRO_PER_S_3P_N')|U] wirkt merkwürdig angespannt, tritt jedoch ohne Umstände neben mich. Wir plaudern eine Weile, doch als wir außer Hörweite der Burg geraten, wird [sharer.Custom('DE_PRO_PER_S_3P_N')] ernst.\n\n„[ROOT.Char.GetFirstName], es ist an der Zeit, dass Ihr die Wahrheit erfahrt. Eure wahren Eltern sind [real_mother.GetName] und [real_father.GetName]. Ich weiß nicht, wie viele davon wissen, doch als ich Euch vorhin sah, fühlte ich mich verpflichtet, es Euch zu sagen.“\n\nIch will diese Offenbarung zurückweisen, in den Wind hinausschreien, dass es nicht wahr ist, doch in meinem Herzen weiß ich, dass es so ist. Die einzige Frage ist, was ich damit tun soll."
 agot_events_bastard.0918.a: "Ich werde mich nicht davor verstecken. Die ganze Welt soll es erfahren."
 agot_events_bastard.0918.b: "Das ist alles zu viel! Ich brauche Zeit zum Nachdenken."
 agot_events_bastard.0918.b.flavor: "Ihr werdet die Wahrheit später selbst enthüllen können, wenn Ihr es wünscht."

  # Location-sharer tells child who already knows
 agot_events_bastard.0919.t: "Eine Wahrheit... die bereits bekannt ist?"
 agot_events_bastard.0919.desc: "Ich bitte [reveal_scope.GetFirstName], mich später am Abend auf einem Spaziergang zu begleiten, und obwohl es nichts im Vergleich zu dem ist, was zweifellos ein großer Schreck für [reveal_scope.Custom('DE_PRO_PER_S_3P_A')] sein wird, bin ich dennoch etwas beklommen ob [reveal_scope.Custom('DE_PRO_POS_S_3P')]er Reaktion, als ich [reveal_scope.Custom('DE_PRO_PER_S_3P_A')] auf mich warten sehe.\n\nIch blicke über die Schulter, um sicherzugehen, dass uns niemand belauschen kann, ehe ich zu sprechen ansetze, doch als ich meine Erzählung zu spinnen beginne, hebt [reveal_scope.GetFirstNameNoTooltip] die Hand, um mich zu unterbrechen. „[ROOT.Char.GetFirstName]“, beginnt [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] zu sagen, „ich weiß es bereits. Ich weiß es schon seit geraumer Zeit. Ich habe es noch nicht enthüllt, aber... ich weiß es.“ [reveal_scope.Custom('DE_PRO_PER_S_3P_N')|U] seufzt. „Aus persönlichen Gründen bitte ich Euch, dieses Geheimnis für Euch zu behalten.“"
 agot_events_bastard.0919.a: "Das geht so nicht! Ich werde es dem Reich verkünden."
 agot_events_bastard.0919.a.flavor: "Ihr schleicht Euch davon, um Briefe an jeden Hof in Westeros zu versenden.\n@warning_icon!#warning Dies könnte erhebliche Auswirkungen auf Euch und das Reich haben.#!"
 agot_events_bastard.0919.b: "Es genügt, dass Ihr es wisst. Was Ihr damit anfangt, liegt bei Euch."

  # Landed JS finds out through learned courtier
agot_events_bastard.0920.t: "Erschütternde Wahrheit"
 agot_events_bastard.0920.desc: "Ich grüble länger als üblich über meinen Dokumenten, als ein kurzes Klopfen an der Tür meines Arbeitszimmers ertönt. „Herein“, sage ich schlicht, in der Erwartung, dass die Mägde nach mir sehen, doch stattdessen tritt [learned_person.GetFirstName] durch die Tür. „Verzeiht, mein[ROOT.Char.Custom('DE_END_PRO_S_N')] [ROOT.Char.GetLadyLord|U], ich... wollte Euch zu einer Zeit aufsuchen, in der wir ungestört sind.“ [learned_person.Custom('DE_PRO_PER_S_3P_N')|U] sagt es nervös, während ich die Feder niederlege, um [learned_person.Custom('DE_PRO_PER_S_3P_D')] meine volle Aufmerksamkeit zu schenken.\n\nMit einem Seufzer beginnt [learned_person.Custom('DE_PRO_PER_S_3P_N')]: „Bei meinen Nachforschungen sind Wahrheiten ans Licht gekommen. Wahrheiten, die... ziemlich weitreichende Folgen für Euch haben... und für das Reich.“ [learned_person.Custom('DE_PRO_PER_S_3P_N')|U] fährt fort, und während sich [learned_person.Custom('DE_PRO_POS_S_3P')]e Geschichte entfaltet, erstarre ich in fassungslosem Schweigen; was auch immer ich zuvor geschrieben habe, ist völlig vergessen. [learned_person.GetNameNoTooltip] erklärt, dass bislang unentdeckte Dokumente offenbaren, dass meine wahren Eltern in Wahrheit [real_mother.GetName] und [real_father.GetName] seien!\n\nIch kann es nicht glauben, und doch, als [learned_person.GetFirstNameNoTooltip] mir die Beweise vorlegt, bin ich gezwungen anzuerkennen, dass dies tatsächlich die Wirklichkeit ist."
 agot_events_bastard.0920.a: "Wenn dies die Wahrheit ist, muss ich es dem Reich verkünden."
 agot_events_bastard.0920.b: "Ich will es nicht. Dieses Wissen muss geheim bleiben."

  ######### Post reveal events below

  # Realm receives letter
 agot_events_bastard.0951.opening: "An [ROOT.Char.GetFullNameNoTooltip],"
 agot_events_bastard.0951.first_person: "Ich schreibe an alle Lords von Westeros, um ihnen eine Wahrheit kundzutun, die zu lange verborgen blieb. Entgegen dem, was Ihr geglaubt haben mögt, wurde ich in Wahrheit aus der Verbindung von [real_mother.GetName] und [real_father.GetName] geboren. Ich bitte Euch und das gesamte Reich, diese neue Wirklichkeit und ihre Folgen anzuerkennen."
 agot_events_bastard.0951.third_person: "Ich schreibe an alle Lords von Westeros, um ihnen eine Wahrheit kundzutun, die zu lange verborgen blieb. Entgegen dem, was Ihr geglaubt haben mögt, wurde [reveal_scope.GetName] in Wahrheit aus der Verbindung von [real_mother.GetName] und [real_father.GetName] geboren. Ich bitte Euch und das gesamte Reich, diese neue Wirklichkeit und ihre Folgen anzuerkennen."
 agot_events_bastard.0951.a: "Nun, das ist fürwahr interessant."
 agot_events_bastard.0951.b: "Ich kann nicht glauben, dass sie dies enthüllt haben!"

  # Parent responds to child revealing after telling
 agot_events_bastard.0952.t: "Eine offenbarte Wahrheit"
 agot_events_bastard.0952.desc: "[reveal_scope.GetName] schweigt eine lange Zeit. Ich kann [reveal_scope.Custom('DE_PRO_POS_S_3P')]e Gedanken über [reveal_scope.Custom('DE_PRO_POS_S_3P')] Gesicht huschen sehen. Verwirrung. Freude. Furcht. „Also...“ atmet [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] schließlich aus, doch [reveal_scope.Custom('DE_PRO_POS_S_3P')] Blick bleibt auf den Boden gerichtet.\n\nIch suche [reveal_scope.Custom('DE_PRO_POS_S_3P')] Gesicht ab, was sich wie ein ganzer Tag anfühlt, ehe [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] sich zu mir wendet und sagt: „Das wird einiges ändern, nicht wahr?“\n\nEs gab Umarmungen, es gab Tränen. Die Familie war zweifellos erschüttert. Doch [reveal_scope.GetFirstNameNoTooltip] hat [reveal_scope.Custom('DE_PRO_POS_S_3P')]e Entscheidung getroffen. Das Reich soll es erfahren."
 agot_events_bastard.0952.desc.jon: "[reveal_scope.GetName] schweigt eine lange Zeit. Ich kann [reveal_scope.Custom('DE_PRO_POS_S_3P')]e Gedanken über [reveal_scope.Custom('DE_PRO_POS_S_3P')] Gesicht huschen sehen. Verwirrung. Freude. Furcht. „Lyanna...“ atmet [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] schließlich aus, doch [reveal_scope.Custom('DE_PRO_POS_S_3P')] Blick bleibt auf den Boden gerichtet.\n\nIch suche [reveal_scope.Custom('DE_PRO_POS_S_3P')] Gesicht ab, was sich wie ein ganzer Tag anfühlt, ehe [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] sich zu mir wendet und sagt: „Das wird einiges ändern, nicht wahr?“\n\nEs gab Umarmungen, es gab Tränen. Die Familie war zweifellos erschüttert. Doch [reveal_scope.GetFirstNameNoTooltip] hat [reveal_scope.Custom('DE_PRO_POS_S_3P')]e Entscheidung getroffen. Das Reich soll es erfahren."

  # Parent responds to child revealing after being told
 agot_events_bastard.0953.t: "Eine offenbarte Wahrheit"
 agot_events_bastard.0953.desc: "[reveal_scope.GetName] schweigt eine lange Zeit, nachdem [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] mir den Brief von [sharer.GetFullName] überreicht hat. Er erzählt von der Wahrheit. Dass [reveal_scope.GetFirstNameNoTooltip] aus der Verbindung von [real_mother.GetName] und [real_father.GetName] geboren wurde. Ein solches Geheimnis hütete ich so lange, dass nicht einmal ich es selbst enthüllen konnte.\n\nEs gab Umarmungen, es gab Tränen. Die Familie war zweifellos erschüttert. Doch [reveal_scope.GetFirstNameNoTooltip] hat [reveal_scope.Custom('DE_PRO_POS_S_3P')]e Entscheidung getroffen. Das Reich soll es erfahren."

  # Parent responds to sharer revealing without telling
 agot_events_bastard.0954.t: "Eine offenbarte Wahrheit"
 agot_events_bastard.0954.desc: "[reveal_scope.GetName] schweigt eine lange Zeit, nachdem [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] mir den Brief von [sharer.GetFullName] überreicht hat. Er erzählt von der Wahrheit. Dass [reveal_scope.GetFirstNameNoTooltip] aus der Verbindung von [real_mother.GetName] und [real_father.GetName] geboren wurde. Schlimmer noch, Abschriften wurden an das gesamte Reich versandt!\n\nEin solches Geheimnis hütete ich so lange, dass nicht einmal ich es selbst enthüllen konnte.\n\nEs gab Umarmungen, es gab Tränen. Diese Entscheidung hätte von Rechts wegen [reveal_scope.Custom('DE_PRO_PER_S_3P_D')] zustehen sollen, doch [sharer.GetFirstNameNoTooltip] hat uns diese Wahl genommen. Wie dem auch sei, es ist geschehen. Obwohl es weder meine Entscheidung noch die von [reveal_scope.GetFirstNameNoTooltip] war, wird das Reich es erfahren."

  # Sharer is told that child is revealing based on their response
 agot_events_bastard.0955.t: "Eine offenbarte Wahrheit"
 agot_events_bastard.0955.desc: "Es ist einige Zeit vergangen, seit ich [reveal_scope.GetFirstName] einen Brief gesandt habe, und obwohl ich jeden Tag gefragt habe, ob eine Antwort oder eine Offenbarung ans Reich eingegangen sei, habe ich bislang kein Wort erhalten.\n\nEndlich, nach Wochen des Wartens, teilt mir ein Page mit, dass eine Antwort eingetroffen ist.\n\n„[ROOT.Char.GetFullNameNoTooltip]“, beginnt [reveal_scope.Custom('DE_PRO_PER_S_3P_N')], „ich danke Euch für Eure Aufrichtigkeit, und ich schreibe Euch im Voraus, um Euch wissen zu lassen, dass ich in den kommenden Tagen Briefe an das Reich versenden werde, in denen ich enthülle, was Ihr mir anvertraut habt.“\n\nEs scheint, als hätte [reveal_scope.GetNameNoTooltip] die Entscheidung getroffen, und ich spüre, wie eine Last von meinen Schultern fällt."
 agot_events_bastard.0955.a: "Nun wird sich zeigen, wie das Reich und [ruler_scope.GetFirstNameOrMe] reagieren..."

  # Child reacts to non-consentual sharing
 agot_events_bastard.0956.t: "Eine offenbarte Wahrheit"
 agot_events_bastard.0956.desc: "Seit ich von [revealer.GetFirstNameNoTooltip] den Brief erhalten habe, hat sich mein Leben in zwei Hälften geteilt. Vor dem Brief und nach dem Brief. Ich schweige, unfähig zu begreifen, dass das, was vor mir liegt, nun auch dem gesamten Reich vorliegt. Es erzählt von der Wahrheit. Dass ich aus der Verbindung von [real_mother.GetName] und [real_father.GetName] geboren wurde. Schlimmer noch, Abschriften wurden an das gesamte Reich versandt!\n\nEin solches Geheimnis hütete ich so lange, dass nicht einmal ich es selbst enthüllen konnte.\n\nDiese Entscheidung hätte von Rechts wegen mir zustehen sollen, doch [sharer.GetFirstNameNoTooltip] hat mir diese Wahl genommen. Wie dem auch sei, es ist geschehen. Obwohl es nicht mein Wunsch war, wird das Reich es erfahren."
 agot_events_bastard.0956.a: "Nun wird sich zeigen, wie das Reich und [ruler_scope.GetFirstName] reagieren..."

  # Child reacts to non-consentual sharing AND they didn't know
 agot_events_bastard.0957.t: "Eine offenbarte Wahrheit"
 agot_events_bastard.0957.desc: "Ich blicke hinab in meine Hände und spüre, wie mein Leben in Scherben zerbricht. Ich kann nicht atmen, und mein Blickfeld beginnt zu schwinden; ich kann nur mit Mühe bei Bewusstsein bleiben angesichts dessen, was vor mir liegt. Mein Leben hat sich in zwei Hälften geteilt. Vor dem Brief und nach dem Brief.\n\nDieser Brief erzählt von der Wahrheit. Dass ich aus der Verbindung von [real_mother.GetName] und [real_father.GetName] geboren wurde. Schlimmer noch, Abschriften wurden an das gesamte Reich versandt!\n\nMein ganzes Leben war eine Lüge. Man hätte es mir sagen müssen! Das war nicht recht!"
 agot_events_bastard.0957.a: "Nun wird sich zeigen, wie das Reich und [ruler_scope.GetFirstName] reagieren..."

  # Revealer is alerted
 agot_events_bastard.0958.t: "Eine offenbarte Wahrheit"
 agot_events_bastard.0958.desc.bastard: "Die Raben sind versandt. Die Botschaften zugestellt. Die Wahrheit verkündet.\n\nObwohl viele mich dafür verfluchen werden, ein solch gewaltiges Geheimnis enthüllt zu haben — die Wahrheit ist nun in der Welt, mit all seinen guten und all seinen schlechten möglichen Folgen. Vielleicht wird mir eine große Rolle in den kommenden Tagen zufallen. Vielleicht wird all dies zu nichts führen. Wie dem auch sei, meine wahre Blutlinie ist nun allen bekannt, auf Gedeih und Verderb."
 agot_events_bastard.0958.desc.host: "Die Raben sind versandt. Die Botschaften zugestellt. Die Wahrheit verkündet.\n\nObwohl viele mich dafür verfluchen werden, ein solch gewaltiges Geheimnis enthüllt zu haben — die Wahrheit ist nun in der Welt, mit all seinen guten und all seinen schlechten möglichen Folgen. Vielleicht wird mir eine große Rolle in den kommenden Tagen zufallen. Vielleicht wird all dies zu nichts führen. Wie dem auch sei, die wahre Blutlinie von [reveal_scope.GetFirstNameNoTooltip] ist nun allen bekannt, auf Gedeih und Verderb."
 agot_events_bastard.0958.desc.else: "Die Raben sind versandt. Die Botschaften zugestellt. Die Wahrheit verkündet.\n\nObwohl viele mich dafür verfluchen werden, ein solch gewaltiges Geheimnis enthüllt zu haben — die Wahrheit ist nun in der Welt, mit all seinen guten und all seinen schlechten möglichen Folgen. Vielleicht wird mir eine große Rolle in den kommenden Tagen zufallen. Vielleicht endet mein Anteil an dieser Geschichte hier. Wie dem auch sei, die wahre Blutlinie von [reveal_scope.GetFirstNameNoTooltip] ist nun allen bekannt, auf Gedeih und Verderb."

  # King is alerted
agot_events_bastard.0959.t: "Ein Bastard von königlichem Blut"
 agot_events_bastard.0959.desc_opening: "Ich sitze auf dem Eisernen Thron, der Hof ist vor mir versammelt, und ich urteile über einen belanglosen Streit zwischen niederen Lords, als [courtier.GetFullName] mit einem Ruf „Euer Gnaden!“ durch die Tür stürmt.\n\n„Was soll diese Unterbrechung?!“"
 agot_events_bastard.0959.desc_opening_wrathful: "schreie ich, als sich der Hof [courtier.Custom('DE_ART_DEF_S_D')] keuchend[courtier.Custom('DE_END_ADJ_DEF_S_D')] [courtier.GetFirstNameNoTooltip] zuwendet. [courtier.Custom('DE_PRO_PER_S_3P_N')|U] tritt rasch vor den Thron und kniet nieder.\n\n"
 agot_events_bastard.0959.desc_opening_not_wrathful: "schreit [council.GetName], als sich der Hof [courtier.Custom('DE_ART_DEF_S_D')] keuchend[courtier.Custom('DE_END_ADJ_DEF_S_D')] [courtier.GetFirstNameNoTooltip] zuwendet. [courtier.Custom('DE_PRO_PER_S_3P_N')|U] tritt rasch vor den Thron und kniet nieder.\n\n"
 agot_events_bastard.0959.desc_opening_end: "„Verzeiht die Störung, Euer Gnaden, doch Ihr müsst dies unverzüglich lesen!“ sagt [courtier.Custom('DE_PRO_PER_S_3P_N')] und reicht mir ein Pergament mit dem Siegel des Hauses [revealer.GetHouse.GetBaseName].\n\n"
 agot_events_bastard.0959.desc.landed: "Als der Großmaester den Brief verliest, kann ich mein Erstaunen nicht verbergen. Er behauptet, dass [reveal_scope.GetFullName] in Wahrheit [Select_CString( reveal_scope.IsFemale, 'die Tochter', 'der Sohn' )] von [real_father.GetFullName] und [real_mother.GetFullName] sei! Mehr noch, der Brief wurde aller Wahrscheinlichkeit nach an das gesamte Reich versandt!"
 agot_events_bastard.0959.desc.courtier: "Als der Großmaester den Brief verliest, kann ich mein Erstaunen nicht verbergen. Er behauptet, dass [reveal_scope.GetName], derzeit am Hofe von [reveal_employer.GetFullName], in Wahrheit [Select_CString( reveal_scope.IsFemale, 'die Tochter', 'der Sohn' )] von [real_father.GetFullName] und [real_mother.GetFullName] sei! Mehr noch, der Brief wurde aller Wahrscheinlichkeit nach an das gesamte Reich versandt!"
 agot_events_bastard.0959.desc.ned_revealer: "Als der Großmaester den Brief verliest, kann ich mein Erstaunen nicht verbergen. Er behauptet, dass [reveal_scope.GetName], derzeit am Hofe von [reveal_employer.GetFullName], in Wahrheit [Select_CString( reveal_scope.IsFemale, 'die Tochter', 'der Sohn' )] von [real_father.GetFullName] und [real_mother.GetFullName] sei! Mehr noch, der Brief wurde aller Wahrscheinlichkeit nach an das gesamte Reich versandt!\n\n„Da ist noch mehr, Euer Gnaden.“ [courtier.GetFirstNameNoTooltip] spricht, als könne irgendeine andere Nachricht dem gleichkommen, und reicht mir ein zweites Pergament. „Es ist persönlich an Euch gerichtet.“"
 agot_events_bastard.0959.desc.robert: "Als der Großmaester den Brief verliest, kann ich mein Erstaunen nicht verbergen. Er behauptet, dass [reveal_scope.GetName], derzeit am Hofe von [reveal_employer.GetFullName], in Wahrheit [Select_CString( reveal_scope.IsFemale, 'die Tochter', 'der Sohn' )] von [real_father.GetFullName] und [real_mother.GetFullName] sei! Mehr noch, der Brief wurde aller Wahrscheinlichkeit nach an das gesamte Reich versandt!\n\n„Da ist noch mehr, Euer Gnaden.“ [courtier.GetFirstNameNoTooltip] spricht, als könne irgendeine andere Nachricht dem gleichkommen, und reicht mir ein zweites Pergament. „Er ist von Lord Eddard Stark.“"
 agot_events_bastard.0959.desc.king_revealer: "Die Raben sind ausgesandt, das Reich benachrichtigt, und wie erwartet ist es das erste Anliegen, über das ich urteilen soll, als ich mich am Morgen auf den Eisernen Thron setze. Obwohl die Offenbarung, dass [reveal_scope.GetName] in Wahrheit das Kind von [real_father.GetFullName] und [real_mother.GetFullName] ist, von mir selbst geteilt wurde, warten alle Augen auf mein nächstes Wort.\n\nNämlich, wie ich in dieser Angelegenheit urteilen werde."
 agot_events_bastard.0959.robert: "Her damit!"
 agot_events_bastard.0959.a: "Ich muss diesem Thronanwärter mit Härte begegnen!"
 agot_events_bastard.0959.a.flavor: "Ihr werdet in dieser Angelegenheit mit Härte antworten."
 agot_events_bastard.0959.b: "Ich muss reagieren, doch lasst uns nicht voreilig handeln."
 agot_events_bastard.0959.b.flavor: "Ihr werdet in dieser Angelegenheit milde urteilen."
 agot_events_bastard.0959.c: "Das ist ohne Belang. Ich werde kein Wort darüber verlieren."
 agot_events_bastard.0959.c.flavor: "Ihr werdet auf diese Entwicklung nicht reagieren."

 # Robert gets Eddards letter
 agot_events_bastard.0960.t: "Die Bitte eines Freundes"
 agot_events_bastard.0960.desc.ned_revealer: "Ich spüre, wie mir das Herz schwer wird, als man mir den zweiten Brief reicht. Mit zitternden Fingern breche ich das Siegel des Hauses Stark. „Mein ältester Freund“, beginnt er, und schon schnürt sich mir die Kehle zu vor Rührung.\n\n„Ich kenne Dich besser als jeder andere, und ich weiß um den Zorn, den Kummer und das Gefühl des Verrats, das diese Nachricht Deinem Herzen aufgebürdet hat. Das tut mir schwerer leid, als Worte es auszudrücken vermögen. Lange hatte ich gehofft, es Dir unter besseren Umständen sagen zu können, doch ich konnte mit der Lüge nicht länger leben.“ Ich spüre, wie sich meine Fäuste ballen, während ich weiterlese und vergeblich versuche, vor dem versammelten Hof meine Fassung zu bewahren.\n\n„Trotz allem hoffe ich, dass ich mich noch an Dich wenden und Dich als Freund betrachten darf. Vielleicht habe ich kein Recht mehr, Dich als solchen anzusprechen, doch um der Liebe willen, die ich sowohl Dir als auch dem Kind meiner Schwester entgegenbringe, muss ich es versuchen. Ich kenne Dich, Robert, und ich weiß um Deinen Zorn nur zu gut. Wir beide liebten Lyanna, und in ihrem Namen bitte ich Dich um Gnade. Dies ist nicht die letzte Drachenbrut, sondern das Letzte, was von einer Frau bleibt, die wir beide liebten. Um ihres Andenkens willen, bitte, zeige Gnade gegenüber ihrem Kind.\nStets dein Freund, Eddard Stark.“\n\nIch blinzle die beinahe geformten Tränen aus meinen Augen, und der Hof tritt wieder in mein Blickfeld. Sie warten auf meine Antwort."
 agot_events_bastard.0960.desc: "Ich spüre, wie mir das Herz schwer wird, als man mir den zweiten Brief reicht. Mit zitternden Fingern breche ich das Siegel des Hauses Stark. „Mein ältester Freund“, beginnt er, und schon schnürt sich mir die Kehle zu vor Rührung.\n\n„Ich kenne Dich besser als jeder andere, und ich weiß um den Zorn, den Kummer und das Gefühl des Verrats, das diese Nachricht Deinem Herzen aufgebürdet hat. Das tut mir schwerer leid, als Worte es auszudrücken vermögen. Lange hatte ich gehofft, es Dir unter besseren Umständen sagen zu können, doch die Umstände haben sich meiner Macht entzogen.“ Ich spüre, wie sich meine Fäuste ballen, während ich weiterlese und vergeblich versuche, vor dem versammelten Hof meine Fassung zu bewahren.\n\n„Trotz allem hoffe ich, dass ich mich noch an Dich wenden und Dich als Freund betrachten darf. Vielleicht habe ich kein Recht mehr, Dich als solchen anzusprechen, doch um der Liebe willen, die ich sowohl Dir als auch dem Kind meiner Schwester entgegenbringe, muss ich es versuchen. Ich kenne Dich, Robert, und ich weiß um deinen Zorn nur zu gut. Wir beide liebten Lyanna, und in ihrem Namen bitte ich Dich um Gnade. Dies ist nicht die letzte Drachenbrut, sondern das Letzte, was von einer Frau bleibt, die wir beide liebten. Um ihres Andenkens willen, bitte, zeige Gnade gegenüber ihrem Kind.\nStets Dein Freund, Eddard Stark.“\n\nIch blinzle die beinahe geformten Tränen aus meinen Augen, und der Hof tritt wieder in mein Blickfeld. Sie warten auf meine Antwort."
 agot_events_bastard.0960.a: "Kein anderer Mann hat jemals einen solchen Verrat erlebt!"
 agot_events_bastard.0960.b.son: "Mein Zorn ist gewaltig, doch ich werde Lyannas Kind nicht abschlachten."
 agot_events_bastard.0960.b.daughter: "Mein Zorn ist gewaltig, doch ich werde die Tochter Lyannas nicht abschlachten."
 agot_events_bastard.0960.c: "Es ist so viele Jahre her... Ich werde nicht gegen jene vorgehen, die ich liebe."
 agot_events_bastard.0960.c.flavor: "Ihr werdet auf diese Entwicklung nicht reagieren."

  # King responds harshly
agot_events_bastard.0961.t: "Eine harsche Antwort"
 agot_events_bastard.0961.desc: "Ich blicke vom Pergament auf, das man mir gereicht hat, in ein Meer erwartungsvoller Gesichter. Sie warten darauf zu sehen, wie ich reagiere, wie ich urteile. Eine derart offenkundige Erhebung eines Anspruchs auf den Thron verlangt selbst vom gemäßigtsten Herrscher eine Antwort — und das bin ich wahrlich nicht, das weiß ich selbst.\n\nWie also soll ich auf diese unverhohlene Herausforderung antworten?"
 agot_events_bastard.0961.a: "Ich will beider Köpfe auf Spießen sehen!"
 agot_events_bastard.0961.a.flavor: "Ihr werdet die Köpfe von [reveal_scope.GetFirstName] und [reveal_employer.GetFirstName] fordern!"
 agot_events_bastard.0961.b: "Ich will [reveal_scope.Custom('DE_PRO_POS_S_3P')]en Kopf!"
 agot_events_bastard.0961.c.nw: "Er soll der Nachtwache beitreten! Nur dann darf er leben!"
 agot_events_bastard.0961.c.ss: "Sie muss der Schwesternschaft beitreten! Nur dann darf sie leben!"
 agot_events_bastard.0961.d: "Der einzig sichere Ort für solches Blut ist mein Kerker!"

  # King responds moderately
 agot_events_bastard.0962.t: "Eine maßvolle Antwort"
 agot_events_bastard.0962.desc: "Ich blicke vom Pergament auf, das man mir gereicht hat, in ein Meer erwartungsvoller Gesichter. Sie warten darauf zu sehen, wie ich reagiere, wie ich urteile. Obwohl ein solcher Anspruch zweifellos eine Bedrohung darstellt, hat [reveal_scope.GetName] noch nicht gegen mich gehandelt und verdient es nicht, bestraft zu werden, als hätte [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] es getan. Wie also soll ich auf diese Nachricht antworten?"
 agot_events_bastard.0962.a.nw: "Er soll sein Leben an der Mauer verbringen dürfen."
 agot_events_bastard.0962.a.ss: "Sie soll den Schweigenden Schwestern beitreten dürfen."
 agot_events_bastard.0962.b: "[reveal_scope.Custom('DE_PRO_PER_S_3P_N')|U] muss in Hausarrest genommen werden."
 agot_events_bastard.0962.c: "[reveal_scope.GetName] darf an den Hof kommen, [reveal_scope.Custom('DE_PRO_POS_S_3P')]em neuen Stand entsprechend."
 agot_events_bastard.0962.d: "[reveal_scope.GetName] muss erklären, dass [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] keinen Anspruch erhebt, das genügt."

  # King is of same dynasty
 agot_events_bastard.0963.t: "[Select_CString( reveal_scope.IsFemale, 'Eine neue', 'Ein neuer' )] [ROOT.Char.GetDynasty.GetBaseNameNoTooltip]?"
 agot_events_bastard.0963.desc.jon: "Ich sitze auf dem Thron und urteile wie gewohnt, als mir eine seltsame Nachricht mit dem Siegel des Hauses [revealer.GetHouse.GetBaseName] überbracht wird. Als ich lese, weiten sich meine Augen vor Schreck.\n\nEs scheint, dass [reveal_scope.GetFullName] tatsächlich von [reveal_scope.GetDynasty.GetBaseName]-Blut ist, wie ich selbst! Aus einer Verbindung von [real_father.GetFullName] und [real_mother.GetFullName] während des Krieges des Usurpators geboren, ist [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] nun als Nachkomme königlichen Blutes bekannt!\n\nIch blicke vom Pergament auf in ein Meer erwartungsvoller Gesichter. Sie warten darauf zu sehen, wie ich auf dieses Stück Familiendrama reagiere. Obwohl ein solcher Anspruch zweifellos eine Bedrohung darstellt, hat [reveal_scope.GetNameNoTooltip] nicht gegen mich gehandelt und ist zudem mein Blutsverwandter, ob unehelich oder nicht. Wie also soll ich auf diese Nachricht antworten?"
 agot_events_bastard.0963.desc.my_son: "Ich sitze auf dem Thron und urteile wie gewohnt, als mir eine erschütternde Nachricht mit dem Siegel des Hauses [revealer.GetHouse.GetBaseName] überbracht wird. Als ich lese, weiten sich meine Augen, und mir fällt beinahe der Kiefer herunter.\n\nEs scheint, dass [reveal_scope.GetFullName] in Wahrheit mein eigenes Kind ist! Aus meiner Verbindung mit [real_mother.GetFullName] geboren, ist [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] nun dem gesamten Reich als Nachkomme königlichen Blutes bekannt.\n\nIch blicke vom Pergament auf in ein Meer erwartungsvoller Gesichter. Sie warten darauf zu sehen, wie ich auf dieses Stück Familiendrama reagiere. Obwohl das Auftauchen eines unbekannten Sohnes zweifellos eine Bedrohung für meine Macht darstellt, hat [reveal_scope.GetNameNoTooltip] nicht gegen mich gehandelt. Wie also soll ich auf diese Nachricht antworten?"
 agot_events_bastard.0963.desc.my_daughter: "Ich sitze auf dem Thron und urteile wie gewohnt, als mir eine erschütternde Nachricht mit dem Siegel des Hauses [revealer.GetHouse.GetBaseName] überbracht wird. Als ich lese, weiten sich meine Augen, und mir fällt beinahe der Kiefer herunter.\n\nEs scheint, dass [reveal_scope.GetFullName] in Wahrheit mein eigenes Kind ist! Aus meiner Verbindung mit [real_mother.GetFullName] geboren, ist [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] nun dem gesamten Reich als Nachkomme königlichen Blutes bekannt.\n\nIch blicke vom Pergament auf in ein Meer erwartungsvoller Gesichter. Sie warten darauf zu sehen, wie ich auf dieses Stück Familiendrama reagiere. Obwohl das Auftauchen einer unbekannten Tochter zweifellos eine Bedrohung für meine Macht darstellt, hat [reveal_scope.GetNameNoTooltip] nicht gegen mich gehandelt, und sie ist zudem eine Frau. Wie also soll ich auf diese Nachricht antworten?"
 agot_events_bastard.0963.desc: "Ich sitze auf dem Thron und urteile wie gewohnt, als mir eine seltsame Nachricht mit dem Siegel des Hauses [revealer.GetHouse.GetBaseName] überbracht wird. Als ich lese, weiten sich meine Augen vor Schreck.\n\nEs scheint, dass [reveal_scope.GetFullName] tatsächlich von [reveal_scope.GetDynasty.GetBaseName]-Blut ist, wie ich selbst! Aus einer Verbindung von [real_father.GetFullName] und [real_mother.GetFullName] geboren, ist [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] nun als Nachkomme königlichen Blutes bekannt.\n\nIch blicke vom Pergament auf in ein Meer erwartungsvoller Gesichter. Sie warten darauf zu sehen, wie ich auf dieses Stück Familiendrama reagiere. Obwohl ein solcher Anspruch zweifellos eine Bedrohung darstellt, hat [reveal_scope.GetNameNoTooltip] nicht gegen mich gehandelt und ist zudem mein Blutsverwandter, ob unehelich oder nicht. Wie also soll ich auf diese Nachricht antworten?"
 agot_events_bastard.0963.a.nw: "Er soll sein Leben an der Mauer verbringen dürfen."
 agot_events_bastard.0963.a.ss: "Sie soll den Stillen Schwestern beitreten dürfen."
 agot_events_bastard.0963.b: "[reveal_scope.Custom('DE_PRO_PER_S_3P_N')|U] muss in Hausarrest genommen werden."
 agot_events_bastard.0963.c: "[reveal_scope.GetNameNoTooltip] darf an den Hof kommen, [reveal_scope.Custom('DE_PRO_POS_S_3P')]em neuen Stand entsprechend."
 agot_events_bastard.0963.c.flavor: "Ihr könnt [reveal_scope.Custom('DE_PRO_PER_S_3P_D')] weitere Ehren erweisen, sollte [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] annehmen."
 agot_events_bastard.0963.d: "[reveal_scope.GetNameNoTooltip] muss erklären, dass [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] keinen Anspruch erhebt, das genügt."

  # Employer responds to king execute all demands
 agot_events_bastard.0970.t_execution_both: "Eine tyrannische Forderung"
 agot_events_bastard.0970.t_execution_bastard: "Eine tödliche Forderung"
 agot_events_bastard.0970.t_send_to_order: "Eine harte Forderung"
 agot_events_bastard.0970.t_imprison: "Eine finstere Forderung"
 agot_events_bastard.0970.t_bring_to_court: "Eine Forderung nach Kontrolle"
 agot_events_bastard.0970.t_give_up_claims: "Eine unmissverständliche Forderung"
 agot_events_bastard.0970.t_nothing: "Keine Nachricht ist eine gute Nachricht?"
 agot_events_bastard.0970.desc_execution_both: "Dunkle Schwingen tragen dunkle Worte, versehen mit dem Siegel des Hauses [ruler_scope.GetHouse.GetBaseName]. Ein Brief von [ruler_scope.GetName] lässt keinen Raum für Missverständnisse oder Fehlinterpretationen. [ruler_scope.Custom('DE_PRO_PER_S_3P_N')|U] hat nicht nur [reveal_scope.GetFirstNamePossessive] Kopf gefordert, sondern auch meinen!\n\nDiese ungeheuerliche Forderung hat als Beweis für die Tyrannei von [ruler_scope.GetTitledFirstNameNoTooltip] im ganzen Reich Widerhall gefunden, doch Tatsache bleibt, dass es sich um einen königlichen Erlass handelt. Ich könnte dieser Forderung unmöglich nachkommen, oder? Und doch, wenn ich es nicht tue, wird das Reich zweifellos bluten.\n\nWas soll es sein, zwei Köpfe oder Tausende?"
 agot_events_bastard.0970.desc_execution_bastard: "Dunkle Schwingen tragen dunkle Worte, versehen mit dem Siegel des Hauses [ruler_scope.GetHouse.GetBaseName]. Ein Brief von [ruler_scope.GetName] lässt keinen Raum für Missverständnisse oder Fehlinterpretationen. [ruler_scope.Custom('DE_PRO_PER_S_3P_N')|U] hat [reveal_scope.GetFirstNamePossessive] Kopf gefordert, der unverzüglich im Namen der Krone genommen werden soll.\n\nDiese harte Forderung hat im ganzen Reich Widerhall gefunden, ihre Schwere beunruhigt viele, doch Tatsache bleibt, dass es sich um einen königlichen Erlass handelt. Komme ich dieser Forderung nach? Kann ich das? Und doch, wenn ich es nicht tue, wird das Reich zweifellos bluten.\n\nWas soll es sein, ein Kopf oder Tausende?"
 agot_events_bastard.0970.desc_send_to_nw: "Dunkle Schwingen tragen dunkle Worte, versehen mit dem Siegel des Hauses [ruler_scope.GetHouse.GetBaseName]. Ein Brief von [ruler_scope.GetName] lässt keinen Raum für Missverständnisse oder Fehlinterpretationen. [ruler_scope.Custom('DE_PRO_PER_S_3P_N')|U] hat gefordert, dass [reveal_scope.GetFirstName] zur Nachtwache geschickt wird, um [reveal_scope.Custom('DE_PRO_POS_S_3P')]e Tage im eisigen Norden zu verbringen.\n\nDiese Forderung hat im ganzen Reich Widerhall gefunden, ihre Schwere beunruhigt viele, doch Tatsache bleibt, dass es sich um einen königlichen Erlass handelt. Komme ich dieser Forderung nach? Wenn ich es nicht tue, wird das Reich zweifellos bluten.\n\nWas soll es also sein, ein tristes Leben oder tausende Tote?"
 agot_events_bastard.0970.desc_send_to_ss: "Dunkle Schwingen tragen dunkle Worte, versehen mit dem Siegel des Hauses [ruler_scope.GetHouse.GetBaseName]. Ein Brief von [ruler_scope.GetName] lässt keinen Raum für Missverständnisse oder Fehlinterpretationen. [ruler_scope.Custom('DE_PRO_PER_S_3P_N')|U] hat gefordert, dass [reveal_scope.GetFirstName] zu den Schweigenden Schwestern geschickt wird, um [reveal_scope.Custom('DE_PRO_POS_S_3P')]e Tage im Dienst für den Glauben zu verbringen.\n\nDiese Forderung hat im ganzen Reich Widerhall gefunden, ihre Schwere beunruhigt viele, doch Tatsache bleibt, dass es sich um einen königlichen Erlass handelt. Komme ich dieser Forderung nach? Wenn ich es nicht tue, wird das Reich zweifellos bluten.\n\nein tristes Leben oder tausende Tote?"
 agot_events_bastard.0970.desc_imprison: "Dunkle Schwingen tragen dunkle Worte, versehen mit dem Siegel des Hauses [ruler_scope.GetHouse.GetBaseName]. Ein Brief von [ruler_scope.GetName] lässt keinen Raum für Missverständnisse oder Fehlinterpretationen. [ruler_scope.Custom('DE_PRO_PER_S_3P_N')|U] hat gefordert, dass [reveal_scope.GetFirstName] in [ruler_scope.Custom('DE_PRO_POS_S_3P')]en Kerker geworfen wird, um [reveal_scope.Custom('DE_PRO_POS_S_3P')]e Tage in Ketten zu verbringen, bis [ruler_scope.Custom('DE_PRO_PER_S_3P_N')] etwas anderes entscheidet.\n\nDiese Forderung hat im ganzen Reich Widerhall gefunden, und sie trägt die Kraft eines königlichen Erlasses. Komme ich dieser Forderung nach? Wenn ich es nicht tue, wird das Reich zweifellos bluten.\n\nWas soll es also sein, ein Leben oder Tausende?"
 agot_events_bastard.0970.desc_bring_to_court: "Ein Brief ist eingetroffen, versehen mit dem Siegel des Hauses [ruler_scope.GetHouse.GetBaseName]. Der Brief von [ruler_scope.GetName] lässt keinen Raum für Missverständnisse oder Fehlinterpretationen. [ruler_scope.Custom('DE_PRO_PER_S_3P_N')|U] hat gefordert, dass [reveal_scope.GetFirstName] aus meiner Burg in die Hauptstadt gebracht wird, um dort unter [ruler_scope.Custom('DE_PRO_POS_S_3P')]er Aufsicht als Höfling zu leben.\n\nDiese Forderung hat im ganzen Reich Widerhall gefunden, und sie trägt die Kraft eines königlichen Erlasses. Komme ich dieser Forderung nach? Wenn ich es nicht tue, wird das Reich zweifellos bluten.\n\nWas ist mir mehr wert, ein Höfling oder Frieden?"
 agot_events_bastard.0970.desc_give_up_claims: "Ein Brief ist eingetroffen, versehen mit dem Siegel des Hauses [ruler_scope.GetHouse.GetBaseName]. Der Brief von [ruler_scope.GetName] lässt keinen Raum für Missverständnisse oder Fehlinterpretationen. [ruler_scope.GetName] hat in [ruler_scope.Custom('DE_PRO_POS_S_3P')]er Gnade gefordert, dass [reveal_scope.GetFirstName] eine öffentliche und rechtsgültige Erklärung abgibt, in der [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] allen Ansprüchen entsagt, die [reveal_scope.Custom('DE_PRO_POS_S_3P')]e offenbarte Abstammung begründen könnte.\n\nDiese Forderung wurde im ganzen Reich verbreitet, und viele erachten sie als gerechte Antwort auf die jüngsten Entwicklungen. Dennoch ist es ein Makel auf der Ehre, Ansprüche aufzugeben, die einem von Rechts wegen zustehen könnten, sollte das Rad des Schicksals sich drehen.\n\nWas soll es also sein, Stolz oder Frieden?"
 agot_events_bastard.0970.desc_nothing: "Tage und Nächte lang habe ich mich gesorgt und gegrübelt, was [ruler_scope.GetName] als Antwort auf diese Enthüllungen tun könnte, doch mittlerweile sind Wochen vergangen, seit die Wahrheit über die Geburt von [reveal_scope.GetName] dem Reich kundgetan wurde. [ruler_scope.Custom('DE_PRO_PER_S_3P_N')|U] muss doch inzwischen davon erfahren haben?\n\nIch bin gezwungen zu dem Schluss zu kommen, dass [ruler_scope.GetTitledFirstNameNoTooltip] einfach beschlossen hat, die Angelegenheit ruhen zu lassen. Ob es [ruler_scope.Custom('DE_PRO_PER_S_3P_D')] im Augenblick schlicht zu unbedeutend erscheint oder ob es [ruler_scope.Custom('DE_PRO_PER_S_3P_A')] einfach nicht kümmert — es scheint, als würden keine Forderungen aus Königsmund kommen."

