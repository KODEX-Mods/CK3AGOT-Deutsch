 agot_events_bastard.0980.opening: "An [ROOT.Char.GetFullNameNoTooltip],"
 agot_events_bastard.0980.desc: "Es sei allen kundgetan, dass [reveal_scope.GetName] und [reveal_employer.GetName] durch ihr Versäumnis, sich dem Thron zu stellen und über die Abstammung von [reveal_scope.GetFirstNameNoTooltip] Rechenschaft abzulegen, als Verräter des Reiches erachtet und hiermit zum Tode verurteilt werden.\n\nJeder, der [reveal_scope.Custom('DE_PRO_PER_S_3P_D')] Beistand leistet, wird dasselbe Schicksal teilen."
 agot_events_bastard.0980.a: "Was für eine grausame Forderung!"

  # Realm receives alert of execute demand
 agot_events_bastard.0981.opening: "An [ROOT.Char.GetFullNameNoTooltip],"
 agot_events_bastard.0981.desc: "Es sei allen kundgetan, dass [reveal_scope.GetName] durch [reveal_scope.Custom('DE_PRO_POS_S_3P')] Versäumnis, sich dem Thron zu stellen und über [reveal_scope.Custom('DE_PRO_POS_S_3P')]e Abstammung Rechenschaft abzulegen, hiermit als Verräter[reveal_scope.Custom('DE_END_NOU_S_GS_N')] des Reiches erachtet und zum Tode verurteilt wird.\n\nJeder, der [reveal_scope.Custom('DE_PRO_PER_S_3P_D')] Beistand leistet, wird dasselbe Schicksal teilen."
 agot_events_bastard.0981.desc_resolved: "Es sei allen kundgetan, dass [reveal_scope.GetName] aufgrund der Bedrohung, die [reveal_scope.Custom('DE_PRO_POS_S_3P')] Erscheinen darstellt, als Verräter[reveal_scope.Custom('DE_END_NOU_S_GS_N')] des Reiches erachtet und zum Tode verurteilt wurde.\n\nMöge [reveal_scope.Custom('DE_PRO_POS_S_3P')] Schicksal als Mahnung dienen für alle, die es wagen, meine Herrschaft zu bedrohen."
 agot_events_bastard.0981.a: "Was für ein hartes Urteil!"

  # Realm receives alert of NW / SS demand
 agot_events_bastard.0982.opening: "An [ROOT.Char.GetFullNameNoTooltip],"
 agot_events_bastard.0982.desc.male: "Es sei allen kundgetan, dass [reveal_scope.GetName] aufgrund der Bedrohung, die [reveal_scope.Custom('DE_PRO_POS_S_3P')]e Abstammung für das Reich darstellt, den Befehl erhalten hat, das Schwarz der Nachtwache anzulegen."
 agot_events_bastard.0982.desc.female: "Es sei allen kundgetan, dass [reveal_scope.GetName] aufgrund der Bedrohung, die [reveal_scope.Custom('DE_PRO_POS_S_3P')]e Herkunft für das Reich darstellt, den Befehl erhalten hat, den Schweigenden Schwestern beizutreten."
 agot_events_bastard.0982.desc_pending: "Jeder Lord oder jede Lady, der oder die [reveal_scope.Custom('DE_PRO_PER_S_3P_D')] bei der Flucht vor dieser Forderung behilflich ist, wird als Verräter des Reiches erachtet und entsprechend behandelt."
 agot_events_bastard.0982.desc_resolved: "Der Hof dankt [reveal_scope.Custom('DE_PRO_PER_S_3P_D')] für [reveal_scope.Custom('DE_PRO_POS_S_3P')]e Dienste und hofft, dass [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] in [reveal_scope.Custom('DE_PRO_POS_S_3P')]er neuen Position ebenso treu dienen wird."
 agot_events_bastard.0982.a: "Bestraft, nur weil man geboren wurde? Das scheint nicht recht."

  # Realm receives alert of imprison demand
 agot_events_bastard.0983.opening: "An [ROOT.Char.GetFullNameNoTooltip],"
 agot_events_bastard.0983.desc: "Es sei allen kundgetan, dass [reveal_scope.GetName] vorgeladen wurde, um eingekerkert zu werden, bis erwiesen ist, dass [reveal_scope.Custom('DE_PRO_POS_S_3P')]e Abstammung keine Bedrohung für das Reich darstellt. Jeder Lord oder jede Lady, der oder die [reveal_scope.Custom('DE_PRO_PER_S_3P_D')] bei der Flucht vor dieser Vorladung behilflich ist, wird als Verräter des Reiches erachtet und entsprechend behandelt."
 agot_events_bastard.0983.desc_resolved: "Es sei allen kundgetan, dass [reveal_scope.GetName] eingekerkert wurde, bis der Hof sich vergewissert hat, dass [reveal_scope.Custom('DE_PRO_POS_S_3P')]e  keine Bedrohung für das Reich darstellt. Jeder Lord oder jede Lady, der oder die bei einem Fluchtversuch behilflich ist, wird als Verräter des Reiches erachtet und entsprechend behandelt."
 agot_events_bastard.0983.a: "Eingekerkert, weil man geboren wurde? Das scheint nicht recht."

  # Realm receives alert of hostage demand
 agot_events_bastard.0984.opening: "An [ROOT.Char.GetFullNameNoTooltip],"
 agot_events_bastard.0984.desc: "Es sei allen kundgetan, dass [reveal_scope.GetName] an den Hof unter den Schutz Seiner Gnaden vorgeladen wurde, bis erwiesen ist, dass [reveal_scope.Custom('DE_PRO_POS_S_3P')]e Abstammung keine Bedrohung für das Reich darstellt. Jeder Lord oder jede Lady, der oder die [reveal_scope.Custom('DE_PRO_PER_S_3P_D')] bei der Flucht vor dieser Vorladung behilflich ist, wird als Verräter des Reiches erachtet und entsprechend behandelt."
 agot_events_bastard.0984.a.courtier: "Das scheint eine angemessene Antwort."
 agot_events_bastard.0984.a.landed: "Gezwungen, die eigenen Besitztümer aufzugeben? Hart."

  # Realm receives alert of claims demand
 agot_events_bastard.0985.opening: "An [ROOT.Char.GetFullNameNoTooltip],"
 agot_events_bastard.0985.desc: "Es sei allen kundgetan, dass [reveal_scope.GetName] angewiesen wurde, eine öffentliche und rechtlich bindende Erklärung abzugeben, in der [reveal_scope.Custom('DE_PRO_PER_S_3P_N')] allen Ansprüchen auf den Thron oder verwandte Titel entsagt."
 agot_events_bastard.0985.desc_pending: "Jeder Lord oder jede Lady, der oder die [reveal_scope.Custom('DE_PRO_PER_S_3P_D')] dabei behilflich ist, sich dieser Forderung zu entziehen oder sie anderweitig anzufechten, wird als Verräter des Reiches erachtet und entsprechend behandelt."
 agot_events_bastard.0985.desc_resolved: "Diese Bedrohung soll ohne Blutvergießen beigelegt werden, so ist es meine Gnade und mein Wille. Die Erklärung sollte Eure Rabenhorste in den kommenden Tagen erreichen, und ich erwarte, dass alle sie als Tatsache anerkennen."
 agot_events_bastard.0985.a: "Das scheint eine angemessene Antwort."

