agot_events_bastard.0990.t: "Ehebündnisse"
 agot_events_bastard.0990.desc.landed: "Seit jeher ist es bei den Häusern von Westeros üblich, in Zeiten der Krise Ehen zum Zwecke von Bündnissen zu schließen. Als unverheirateter Thronprätendent auf [ruler_scope.GetPrimaryTitle.GetName] stelle ich nun eine recht begehrte Partie dar für jene, die sich an das Königshaus binden wollen.\n\nIn Erwartung des stürmischen Weges, den ich eingeschlagen habe, habe ich vorsichtige Annäherungen an die ehrgeizigeren Häuser des Reiches unternommen und nach möglichen Heiratsangeboten gesucht. Angesichts der Gefahren, die vor mir liegen, und des Vorteils, den ein Bündnis bieten könnte, wäre es vielleicht das Klügste, eines davon anzunehmen."
 agot_events_bastard.0990.desc.landed_singular: "Seit jeher ist es bei den Häusern von Westeros üblich, in Zeiten der Krise Ehen zum Zwecke von Bündnissen zu schließen. Als unverheirateter Thronprätendent auf [ruler_scope.GetPrimaryTitle.GetName] stelle ich nun eine recht begehrte Partie dar für jene, die sich an das Königshaus binden wollen.\n\nEin solches Angebot wurde mir von Haus [potential_spouse_1.GetHouse.GetBaseName] unterbreitet, mit dem Versprechen, im kommenden Krieg beizustehen. Angesichts der Gefahren, die vor mir liegen, und des Vorteils, den ein Bündnis bieten könnte, wäre es vielleicht das Klügste, dieses Angebot anzunehmen."
 agot_events_bastard.0990.desc.courtier: "Seit jeher ist es bei den Häusern von Westeros üblich, in Zeiten der Krise Ehen zum Zwecke von Bündnissen zu schließen. Als unverheirateter Thronprätendent auf [ruler_scope.GetPrimaryTitle.GetName] stellt [reveal_scope.GetName] nun eine recht begehrte Partie dar für jene, die sich an den künftigen Herrscher binden wollen.\n\nIn Erwartung des stürmischen Weges, den wir eingeschlagen haben, habe ich vorsichtige Annäherungen an die ehrgeizigeren Häuser des Reiches unternommen und nach möglichen Heiratsangeboten gesucht. Angesichts der Gefahren, die vor uns liegen, und des Vorteils, den ein Bündnis bieten könnte, wäre es vielleicht das Klügste, eines davon anzunehmen."
 agot_events_bastard.0990.desc.courtier_singular: "Seit jeher ist es bei den Häusern von Westeros üblich, in Zeiten der Krise Ehen zum Zwecke von Bündnissen zu schließen. Als unverheirateter Thronprätendent auf [ruler_scope.GetPrimaryTitle.GetName] stellt [reveal_scope.GetName] nun eine recht begehrte Partie dar für jene, die sich an den künftigen Herrscher binden wollen.\n\nEin solches Angebot wurde mir von Haus [potential_spouse_1.GetHouse.GetBaseName] unterbreitet, mit dem Versprechen, im kommenden Krieg beizustehen. Angesichts der Gefahren, die vor uns liegen, und des Vorteils, den ein Bündnis bieten könnte, wäre es vielleicht das Klügste, dieses Angebot anzunehmen."
 agot_events_bastard.0990.a: "Ich werde [potential_spouse_1.GetName] ehelichen!"
 agot_events_bastard.0990.b: "Ich werde [potential_spouse_2.GetName] ehelichen!"
 agot_events_bastard.0990.c: "Ich werde [potential_spouse_3.GetName] ehelichen!"
 agot_events_bastard.0990.d: "Ich werde keinen dahergelaufenen Emporkömmling heiraten!"
 agot_events_bastard.0990.a.they: "[reveal_scope.Custom('DE_PRO_PER_S_3P_N')|U] wird [potential_spouse_1.GetName] ehelichen!"
 agot_events_bastard.0990.b.they: "[reveal_scope.Custom('DE_PRO_PER_S_3P_N')|U] wird [potential_spouse_2.GetName] ehelichen!"
 agot_events_bastard.0990.c.they: "[reveal_scope.Custom('DE_PRO_PER_S_3P_N')|U] wird [potential_spouse_3.GetName] ehelichen!"
 agot_events_bastard.0990.d.they: "[reveal_scope.Custom('DE_PRO_PER_S_3P_N')|U] wird keinen dahergelaufenen Emporkömmling heiraten!"

