 agot_dragon_designer.0100.eggs.t: "Wahl eines Dracheneis"
 agot_dragon_designer.0100.eggs.desc: "Welche Farbe hat mein Drachenei?"
 agot_dragon_designer.0100.eggs.a: "Dies ist mein Ei."
 agot_dragon_designer.0100.eggs.b: "Ich kann mich nicht entsinnen. Noch schert es mich."
 agot_dragon_designer.0100.eggs.b.tt: "Ihr erhaltet ein zufälliges Drachenei-[artifact|E]"

 agot_dragon_designer.0110.t: "Auswahl eines wilden Drachen"
 agot_dragon_designer.0110.desc: "Welcher Drache ist meiner?"
 agot_dragon_designer.0110.a: "Ich bin der Reiter von diesem hier."
 agot_dragon_designer.0110.b: "Ich reite keinen dieser Drachen."
 agot_dragon_designer.0110.b.tt: "Ihr kehrt zum Hauptereignis des Drachengestalters zurück."
 agot_dragon_designer.0110.toast_invalid: "Ungültiger Drache"
 agot_dragon_designer.0110.toast_invalid_desc: "Der Drache ist nicht mehr zur Zähmung geeignet."
 agot_dragon_designer.0110.toast_tamed: "[dragon.GetNameNicknamed] gezähmt"

 agot_dragon_designer.2000.t: "Feuer im Eis"
 agot_dragon_designer.2000.desc: "Drachen weigern sich, sich jenseits der Mauer aufzuhalten, und so weit im Norden würde der Versuch, ein Ei auszubrüten, aller Wahrscheinlichkeit nach damit enden, dass es zu Stein wird. Wenn ich mein Ei sicher verwahren kann, bis ich mich südlich der Mauer und der Schenkung befinde, dann kann ich vielleicht, nur vielleicht, meinen eigenen Drachen ausbrüten. Andernfalls könnte mir ein Drachenhorn südlich der Mauer einen Vorteil verschaffen."
 agot_dragon_designer.2000.egg: "Lasst mich einen Blick auf mein Ei werfen."
 agot_dragon_designer.2000.egg_tt: "Ihr werdet die Farbe Eures Dracheneis wählen."
 agot_dragon_designer.2000.dragon_horn: "Ich werde dieses Horn nahe bei mir behalten."
 agot_dragon_designer.2000.dragon_horn.tt: "$agot_dragon_designer.0001.b.tt$"
