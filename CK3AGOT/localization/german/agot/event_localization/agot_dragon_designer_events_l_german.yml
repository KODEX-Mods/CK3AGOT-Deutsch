l_german:
 agot_dragon_designer.0001.t: "Ein neuer Drachenreiter"
 agot_dragon_designer.0001.desc: "Es ist an der Zeit, mir als neuer Drachenreiter meinen Platz in der Welt zu erkämpfen. Doch was für ein Drachenreiter bin ich"

 agot_dragon_designer.0001.egg: "Ich besitze lediglich ein Ei."
 agot_dragon_designer.0001.egg_tt: "Ihr werdet die Farbe Eures Dracheneis wählen."
 agot_dragon_designer.0001.a: "Mein Drache ist..."
 agot_dragon_designer.0001.a.tt: "Ihr werdet Euren Drachen erschaffen oder auswählen."
 agot_dragon_designer.0001.b: "Ich besitze ein Drachenhorn aus dem alten Valyria."
 agot_dragon_designer.0001.b.tt: "Ein Drachenhorn ist ein gefährliches Werkzeug, um einen Drachen zu bändigen, ohne eigenes oder fremdes Drachenblut zu benötigen."

 agot_dragon_designer.0002.t: "Einen Drachen wählen"
 agot_dragon_designer.0002.desc: "Vom Himmel herab werde ich mich mit Feuer und Blut als Feder und Tinte in die Geschichtsbücher verewigen, doch welche Art von Drachen soll mir dabei zur Seite stehen? Bevorzuge ich einen jungen, kampfbereiten Drachen, der voller Tatendrang ist, oder einen großen, alten Leviathan, mit dem ich Verderben und Tod bringen kann?"
 agot_dragon_designer.0002.baby: "Ein Schlüpfling."
 agot_dragon_designer.0002.a: "Ein junger Drache."
 agot_dragon_designer.0002.b: "Ein ausgewachsener Drache."
 agot_dragon_designer.0002.c: "Eine alte Bestie."
 agot_dragon_designer.0002.d: "Ein uraltes Ungeheuer."
 agot_dragon_designer.0002.e: "Ein wilder Drache."
 agot_dragon_designer.0002.e.tt: "Ihr werdet einen Drachen aus den lebenden, wilden Drachen auszuwählen."
 agot_dragon_designer.0002.f: "Bei näherer Überlegung möchte ich doch etwas anderes wählen."
 agot_dragon_designer.0002.f.tt: "Ihr kehrt zum Hauptereignis des Drachengestalters zurück."
 agot_dragon_designer.0002.gender: "Geschlecht des Drachen:"
 agot_dragon_designer.0002.gender.male: "$agot_dragon_designer.0002.gender$ #bold #B Männlich#!"
 agot_dragon_designer.0002.gender.female: "$agot_dragon_designer.0002.gender$ #bold #D Weiblich#!"
 agot_dragon_designer.0002.gender.unspecified: "$agot_dragon_designer.0002.gender$ #bold #M Überrascht mich#!"
 agot_dragon_designer.0002.gender.tt: "Dies wird das Geschlecht des erschaffenen Drachen sein. Klickt auf diese Option, um zwischen männlich/weiblich/zufällig zu wechseln."
 agot_dragon_designer.0003.t_hatchling: "Ein Schlüpfling"
 agot_dragon_designer.0003.t_young: "Ein junger Drache"
 agot_dragon_designer.0003.t_adult: "Ein majestätisches Geschöpf"
 agot_dragon_designer.0003.t_old: "Eine furchteinflößende Bestie"
 agot_dragon_designer.0003.t_ancient: "Ein uraltes Ungeheuer"
 agot_dragon_designer.0003.desc_hatchling: "Dieser Drache ist erst kürzlich aus seinem Ei geschlüpft und hat eine Welt voller Möglichkeiten vor sich. Wer wird dieser Drache werden? Welche Wunder und welchen Schrecken wird er säen?"
 agot_dragon_designer.0003.desc_young: "Dieser Drache ist seiner Zeit als Schlüpfling entwachsen, doch ein langer Weg liegt noch vor ihm. Er wird mit jedem Schritt und mit jedem Flügelschlag wachsen. Die Flammen des Drachen sind heiß, doch unerprobt — was nicht lange so bleiben wird."
 agot_dragon_designer.0003.desc_adult: "Stolz und Klugheit blitzen in den Augen dieses äußerst furchterregenden Drachen. Mit zunehmendem Alter ist er noch größer geworden, doch das Feuer seiner Jugend brennt noch immer hell. Mit seiner Erfahrung und Macht – wer könnte es schon wagen, ihm zu trotzen?"
 agot_dragon_designer.0003.desc_old: "Ein betagter Drache ist trotz seines Alters nicht minder gefährlich. Dieses träge Ungetüm brennt noch immer vor Wut und Hunger, vermag ein ganzes Pferd zu verschlingen und auf einen einzigen Befehl seines Reiters hin ganze Heere in Flammen aufgehen zu lassen. Dieser Drache ist Stoff für Legenden, Mythen und Sagen."
 agot_dragon_designer.0003.desc_ancient: "Die Luft scheint unter dem Echo seines Grollens zu ächzen, die Erde selbst bebt bei jedem Schritt, wenn er zum Flug ansetzt. Städte und Burgen verschwinden gänzlich im Schatten seiner riesigen Schwingen, und alles Lebendige starrt in seinen Schlund und erblickt den Tod. Dieser uralte Drache ist eines der gefürchtetsten Wesen der Welt, und er weiß das."
 agot_dragon_designer.0003.a: "Schauen wir uns sein Wesen an..."
 agot_dragon_designer.0003.a.baby: "Schon bei der Geburt war dieser Drache..."
 agot_dragon_designer.0003.a.tt: "Ihr werdet die Eigenschaften Eures Drachen anpassen."
 agot_dragon_designer.0003.b: "Sieht nicht ganz richtig aus..."
 agot_dragon_designer.0003.b.tt: "Ihr werdet das Erscheinungsbild Eures Drachen anpassen."
 agot_dragon_designer.0003.c: "Die Welt gehört uns!"
 agot_dragon_designer.0003.c.tt: "Ihr werdet die Gestaltung Eures Drachen abschließen."
 agot_dragon_designer.0003.c.needs_traits_tt: "@warning_icon! #warning Euer Drache hat einen unvollständigen Satz an Eigenschaften. Eigenschaften werden zufällig zugewiesen, wenn Ihr fortfahrt, ohne sie auszuwählen.#!"

